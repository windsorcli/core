---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: system-cni
spec:
  interval: 5m
  timeout: 15m
  # Cilium components (DaemonSet, Operator, etc.) run in kube-system per upstream convention.
  # The HelmRelease CR lives in system-cni; Flux helm-controller adopts the release that was
  # bootstrapped by terraform/cni/cilium before Flux started.
  targetNamespace: kube-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: cilium
      # renovate: datasource=helm depName=cilium package=cilium helmRepo=https://helm.cilium.io
      version: 1.16.19
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: system-gitops
  values:
    # IPAM: use Kubernetes node CIDR allocation.
    ipam:
      mode: kubernetes

    # Replace kube-proxy. k8sServiceHost/k8sServicePort are required so Cilium can reach the
    # API server before eBPF service rules are active. Values are injected by Flux substitution
    # from the blueprint's talos_common.k8s_service_host config value.
    kubeProxyReplacement: true
    k8sServiceHost: ${k8s_service_host}
    k8sServicePort: "6443"

    operator:
      replicas: 1
