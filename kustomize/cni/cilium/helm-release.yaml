---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: system-cni
spec:
  interval: 5m
  timeout: 15m
  # Cilium components (DaemonSet, Operator, etc.) run in kube-system per upstream convention.
  # The HelmRelease CR lives in system-cni; Flux helm-controller adopts the release that was
  # bootstrapped by terraform/cni/cilium before Flux started.
  releaseName: cilium
  targetNamespace: kube-system
  storageNamespace: kube-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: cilium
      # renovate: datasource=helm depName=cilium package=cilium helmRepo=https://helm.cilium.io
      version: 1.19.3
      sourceRef:
        kind: HelmRepository
        name: cilium
  values:
    # Cluster identity surfaces in Hubble flows, metrics, and (if enabled later) ClusterMesh
    # routing. Sourced from the Windsor context name — generic, not Cilium-specific.
    cluster:
      name: ${cluster_name}

    # IPAM: use Kubernetes node CIDR allocation.
    ipam:
      mode: kubernetes

    # Replace kube-proxy. k8sServiceHost/k8sServicePort are required so Cilium can reach the
    # API server before eBPF service rules are active. Values are injected by Flux substitution
    # from the blueprint's talos_common.k8s_service_host config value.
    kubeProxyReplacement: true
    k8sServiceHost: ${k8s_service_host}
    k8sServicePort: "6443"

    # Single operator on single-node clusters (avoids pending pods + extra Lease churn on etcd);
    # two on multi-node/ha for controller redundancy. Set by the facet from the topology value.
    operator:
      replicas: ${operator_replicas:=1}
