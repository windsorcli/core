apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: system-cni
spec:
  values:
    # Enable L2 announcements so Cilium answers ARP requests for LoadBalancer IPs
    # on the local network — replaces kube-vip/MetalLB ARP mode.
    l2announcements:
      enabled: true
    externalIPs:
      enabled: true
