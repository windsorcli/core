apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: system-cni
spec:
  values:
    hubble:
      enabled: true
      # Rotate TLS certs via an in-cluster CronJob instead of Helm-generated secrets.
      # The 'helm' method re-renders server-secret.yaml on every upgrade and trips on
      # newly-enabled Hubble components ("invalid value; expected string" on upgrade).
      tls:
        auto:
          method: cronJob
      metrics:
        enabled:
          - dns
          - drop
          - port-distribution
          - tcp
          - flow
          - icmp
          - http
        serviceMonitor:
          enabled: true
      relay:
        enabled: true
      ui:
        enabled: true
