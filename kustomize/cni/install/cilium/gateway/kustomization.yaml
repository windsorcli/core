apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
# Enables Cilium's Gateway API controller (helm patch). The LBIPAM sharing policy
# lives in the ./lbipam sub-component, composed only for L2/LBIPAM environments.
patches:
  - path: patches/helm-release.yaml
    target:
      group: helm.toolkit.fluxcd.io
      version: v2
      kind: HelmRelease
      name: cilium
      namespace: system-cni
