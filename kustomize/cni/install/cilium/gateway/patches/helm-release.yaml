apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: system-cni
spec:
  values:
    # Enable Cilium's built-in Gateway API controller.
    # The Gateway API CRDs are vendored in the shared crds layer
    # (kustomize/crds/gateway-api-experimental-1.5.1) and ordered ahead of cni
    # via the facet `crds:` dependency, so they exist before cilium-operator
    # starts its Gateway controller.
    gatewayAPI:
      enabled: true
      enableAlpn: true
      enableAppProtocol: true
