# Descriptor consumed by scripts/kustomize-docs.sh to populate the
# BEGIN_KUSTOMIZE_DOCS / END_KUSTOMIZE_DOCS region of README.md.
# Edit this file (not the README tables) when substitutions, components,
# or dependencies change.

# Component names below are prefixed `install/` or `resources/` to keep them
# unique across the two tiers of the `telemetry` flux: system — facet authors
# reference the tail segment (`components: [prometheus]`), the tier's path is
# implicit. See the README intro for the mapping.
facets:
  - telemetry-install
  - telemetry-resources

components:
  install/prometheus:
    facet: telemetry-install
    enable_when: "`telemetry.metrics.enabled: true`"
    description: "Helm release of `kube-prometheus-stack` (chart) in `system-telemetry`. Provides Prometheus, Alertmanager, node-exporter, kube-state-metrics. Grafana sub-chart is disabled (Grafana lives in the observability add-on). Chart CRD install is skipped; the prometheus-operator CRDs are vendored under `kustomize/crds/` and applied ahead of the controller via the facet `crds:` section."
  install/prometheus/flux:
    facet: telemetry-install
    enable_when: "`telemetry.metrics.enabled: true`"
    description: "Patches the kube-prometheus-stack HelmRelease to scrape Flux controller metrics and enable the bundled Flux dashboards."
  install/fluentbit:
    facet: telemetry-install
    enable_when: "`telemetry.logs.enabled: true`"
    description: "Helm release of the `fluent-operator` chart in `system-telemetry`. Installs the operator and a FluentBit DaemonSet on every node (chart CRD install is skipped). The operator's CRDs are vendored under `kustomize/crds/` and applied via the facet `crds:` section, so an operator teardown can't cascade-delete its CRs. The actual collector configuration ships as the `resources/fluentbit/*` components."
  install/filebeat:
    facet: telemetry-install
    enable_when: "`addons.observability.logs_driver == 'elasticsearch'` (telemetry-install is replaced)"
    description: "Helm release of Elastic's Filebeat chart, used instead of FluentBit when Elasticsearch is the log driver. Wired by the `addon-observability` facet's `strategy: replace` override of telemetry-install."
  install/metrics-server:
    facet: telemetry-install
    enable_when: "`telemetry.metrics.enabled: true` AND `telemetry.metrics_server_enabled: true`"
    description: "Helm release of `metrics-server` for `kubectl top` and HPA. Some platforms (EKS / AKS) ship a managed metrics-server; gate this off when one is already present."
  install/metrics-server/skip-tls:
    facet: telemetry-install
    enable_when: "default (when metrics-server is enabled in a cluster with selfsigned kubelet certs)"
    description: "Patches the metrics-server Deployment to add `--kubelet-insecure-tls`. Required on Talos and other distros where kubelet serves cert-manager-issued or selfsigned certs."
  resources/prometheus:
    facet: telemetry-resources
    enable_when: "`telemetry.metrics.enabled: true`"
    description: "Reserved anchor component for prometheus-adjacent resources; currently empty. ServiceMonitors and PrometheusRules live under `resources/prometheus/flux` and `resources/prometheus/alerts`."
  resources/prometheus/flux:
    facet: telemetry-resources
    enable_when: "`telemetry.metrics.enabled: true`"
    description: "ServiceMonitor and PodMonitor for Flux controllers."
  resources/prometheus/alerts:
    facet: telemetry-resources
    enable_when: "`telemetry.alerts.enabled: true` (default) and `telemetry.metrics.enabled: true`"
    description: "Bundle of PrometheusRule alerting rules, curated from samber/awesome-prometheus-alerts, one system per sub-component (currently `node`, `prometheus`; more land incrementally). Deliberately supplemental to kube-prometheus-stack's own defaultRules where those already cover a system well -- not a wholesale replacement. Reference the bundle for all always-on systems or an individual system (e.g. `resources/prometheus/alerts/node`) for selective inclusion."
  resources/fluentbit:
    facet: telemetry-resources
    enable_when: "`telemetry.logs.enabled: true`"
    description: "`ClusterFluentBitConfig` + `ClusterOutput` (no-op by default; outputs are added by `addon-observability` based on `logs_driver`). Establishes the base FluentBit pipeline."
  resources/fluentbit/containerd:
    facet: telemetry-resources
    enable_when: "`telemetry.logs.enabled: true`"
    description: "`ClusterInput` reading containerd logs from `/var/log/containers/*.log` with the multiline-parser configuration for containerd's CRI log format."
  resources/fluentbit/kubernetes:
    facet: telemetry-resources
    enable_when: "`telemetry.logs.enabled: true`"
    description: "`ClusterFilter` enriching log records with Kubernetes metadata (Pod / Namespace / Container labels) from the kubelet API."
  resources/fluentbit/parser:
    facet: telemetry-resources
    enable_when: "`telemetry.logs.enabled: true`"
    description: "Base parser definitions (JSON, logfmt) plus optional sub-overlays for `service-name`, `logfmt`, `grpc` that opt-in additional structured-log shapes."
  resources/fluentbit/systemd:
    facet: telemetry-resources
    enable_when: "`telemetry.logs.enabled: true`"
    description: "`ClusterInput` reading systemd journal entries. Captures node-level events that don't reach the containerd log path."
  resources/fluentbit/prometheus:
    facet: telemetry-resources
    enable_when: "`telemetry.logs.enabled: true` AND `telemetry.metrics.enabled: true`"
    description: "ServiceMonitor for FluentBit's metrics endpoint."
  resources/fluentbit/fluentd:
    facet: telemetry-resources
    enable_when: "`telemetry.logs.driver == 'fluentd'`"
    description: "`ClusterOutput` shipping records to the central FluentD aggregator in `system-observability`. Activates when the observability add-on is in fluentd mode."

dependencies: {}
