apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# Envoy access log parser
# Matches: Envoy Gateway / Envoy proxy access logs (JSON, no level field)
#
# Extracts:
#   - severity_text: based on HTTP status (5xx=ERROR, 4xx=WARN, 0=WARN, else INFO)
#   - body: "METHOD PATH STATUS DURATIONms (FLAGS)"
#
# OTEL HTTP semantic conventions applied for filtering/querying

resources:
  - fluentbit-clusterfilter.yaml

configMapGenerator:
  - name: fluent-bit-envoy-access-config
    namespace: system-telemetry
    files:
      - envoy-access.lua
    options:
      disableNameSuffixHash: true
