apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-pod-monitor
  namespace: system-gitops
spec:
  interval: 5m
  timeout: 10m
  chart:
    spec:
      chart: flux2
      # renovate: datasource=helm depName=flux package=flux2 helmRepo=https://fluxcd-community.github.io/helm-charts
      version: 2.18.3
      sourceRef:
        kind: HelmRepository
        name: fluxcd-community
  values:
    cli:
      # renovate: datasource=docker depName=ghcr.io/fluxcd/flux-cli package=ghcr.io/fluxcd/flux-cli
      tag: v2.8.6@sha256:8dac34106b9d684ce07b13c9762b5132813c3d477cfd724e9e13cc5944ad771e
    prometheus:
      podMonitor:
        create: true
    helmController:
      create: false
    imageAutomationController:
      create: false
    imageReflectionController:
      create: false
    kustomizeController:
      create: false
    notificationController:
      create: false
    sourceController:
      create: false
    policies:
      create: false
    rbac:
      create: false
      createAggregation: false
