---
# Routes keycloak.${external_domain} through the shared external Gateway to the
# operator-managed `keycloak-service` (HTTP 8080; TLS terminates at the gateway).
# external-dns picks up the hostname from this route automatically.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
  namespace: system-identity
spec:
  parentRefs:
    # web-https only; plain HTTP is 301-redirected by the gateway's https-redirect.
    - kind: Gateway
      name: external
      namespace: system-gateway
      sectionName: web-https
  hostnames:
    - keycloak.${external_domain}
  rules:
    - backendRefs:
        - kind: Service
          name: keycloak-service
          port: 8080
