apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
# operator.yaml is vendored verbatim from keycloak-k8s-resources (see the renovate
# comment in it). Upstream hardcodes namespace `keycloak`; retarget to system-identity.
# A NamespaceTransformer (not the plain `namespace:` field) is used because only it,
# with setRoleBindingSubjects: allServiceAccounts, rewrites the ClusterRoleBinding SA
# subject namespace too — without which the operator loses its cluster permissions.
# Keycloak CRDs are vendored under kustomize/crds/keycloak-26.7.0 and applied via the
# facet `crds:` layer, so they are not listed here.
resources:
  - operator.yaml
# system-identity is policy-managed (Kyverno require-image-digest), so the operator
# image must carry a SHA256 digest. The vendored file is do-not-edit, so pin here.
# The RELATED_IMAGE_KEYCLOAK env is the operator's fallback server image, used only
# when a Keycloak CR omits spec.image; pin it too so that path stays policy-clean.
# Re-derive when the keycloak version in kustomize/crds/sources.yaml bumps:
#   crane digest --platform all quay.io/keycloak/keycloak-operator:<version>
#   crane digest --platform all quay.io/keycloak/keycloak:<version>
patches:
  - target:
      kind: Deployment
      name: keycloak-operator
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/image
        # renovate: datasource=docker depName=keycloak/keycloak-operator package=quay.io/keycloak/keycloak-operator
        value: quay.io/keycloak/keycloak-operator:26.7.0@sha256:257ee324da2c701b7fc1ed1b2ce0e03979d1bf149952383bdcf6be904ae5b4f3
  # Keyed by env name (not index) so it survives upstream env reordering on a bump.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: keycloak-operator
      spec:
        template:
          spec:
            containers:
              - name: keycloak-operator
                env:
                  - name: RELATED_IMAGE_KEYCLOAK
                    # renovate: datasource=docker depName=keycloak/keycloak package=quay.io/keycloak/keycloak
                    value: quay.io/keycloak/keycloak:26.7.0@sha256:0f198be292568439d700cdbfb893e69a6009bb43a94a06a945b1d3d506c76b13
transformers:
  - |-
    apiVersion: builtin
    kind: NamespaceTransformer
    metadata:
      name: retarget-system-identity
      namespace: system-identity
    setRoleBindingSubjects: allServiceAccounts
    unsetOnly: false
    fieldSpecs:
      - path: metadata/namespace
        create: true
