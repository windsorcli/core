kind: HelmRepository
metadata:
  name: cloudnativepg
  namespace: system-gitops
spec:
  interval: 10m
  timeout: 3m
  type: ${helm_repo_type:=default}
  url: ${helm_registry:=https://cloudnative-pg.github.io/charts}
  insecure: ${helm_repo_insecure:=false}
