# Descriptor consumed by scripts/kustomize-docs.sh to populate the
# BEGIN_KUSTOMIZE_DOCS / END_KUSTOMIZE_DOCS region of README.md.
# Edit this file (not the README tables) when substitutions, components,
# or dependencies change.

facets:
  - compute-install

substitutions:
  cluster_name:
    required_when: "`cluster-autoscaler` is enabled"
    description: "EKS cluster name the autoscaler discovers node groups for. Sourced from `terraform_output('cluster', 'cluster_name')`. No fallback — an empty value fails the install loudly rather than discovering nothing."
  aws_region:
    required_when: "`cluster-autoscaler` is enabled"
    description: "AWS region for the autoscaler's EC2/ASG API calls. Sourced from top-level `aws.region`."

components:
  cluster-autoscaler:
    facet: compute-install
    enable_when: "platform is AWS"
    description: "Helm release of the Kubernetes cluster-autoscaler in `system-compute`. Watches for unschedulable pods and adjusts the EKS managed node-group ASGs between each pool's min and max. Discovers groups by the `k8s.io/cluster-autoscaler` tags the aws-eks module applies to autoscaling-enabled pools, and authenticates via the IAM role + Pod Identity the module provisions. AKS autoscales natively, so there is no Azure equivalent component."

dependencies:
  policy-resources:
    required_when: "`policies.enabled: true`"
    reason: "compute depends on Kyverno's baseline policies being active before the autoscaler pod (in the `system-compute` system namespace) is admitted."
