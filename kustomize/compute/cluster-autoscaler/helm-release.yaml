---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cluster-autoscaler
  namespace: system-compute
spec:
  interval: 5m
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: cluster-autoscaler
      # renovate: datasource=helm depName=cluster-autoscaler package=cluster-autoscaler helmRepo=https://kubernetes.github.io/autoscaler
      version: 9.57.0
      sourceRef:
        kind: HelmRepository
        name: cluster-autoscaler
  values:
    cloudProvider: aws
    # Discover node groups by the k8s.io/cluster-autoscaler ASG tags the EKS
    # module applies. Empty clusterName fails the install loudly if the
    # terraform_output('cluster', 'cluster_name') hasn't resolved yet.
    autoDiscovery:
      clusterName: "${cluster_name:-}"
    awsRegion: "${aws_region:-}"
    image:
      repository: registry.k8s.io/autoscaling/cluster-autoscaler
      # renovate: datasource=docker depName=cluster-autoscaler package=registry.k8s.io/autoscaling/cluster-autoscaler
      tag: v1.34.1@sha256:1cd9b79f742e2f8da273f6492baedecc50a6203bb97d82c2de25202841450993
    rbac:
      serviceAccount:
        create: true
        # Matches the EKS Pod Identity association (system-compute/cluster-autoscaler).
        name: cluster-autoscaler
    extraArgs:
      balance-similar-node-groups: true
      expander: least-waste
