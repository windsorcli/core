---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: ingress-nginx
  namespace: system-ingress
spec:
  interval: 10m
  timeout: 3m
  type: ${helm_repo_type:=default}
  url: ${helm_registry:=https://kubernetes.github.io/ingress-nginx}
  insecure: ${helm_repo_insecure:=false}
