apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: flux-webhook
  namespace: system-gitops
  annotations:
    # Set directly: the external-dns-default-ttl Kyverno policy can't mutate
    # this route because Kyverno's webhook excludes the system-gitops namespace.
    external-dns.alpha.kubernetes.io/ttl: "300"
spec:
  parentRefs:
    - name: external
      namespace: system-gateway
      sectionName: web-http
    - name: external
      namespace: system-gateway
      sectionName: flux-webhook
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /hook/
      backendRefs:
        - name: webhook-receiver
          port: 80
