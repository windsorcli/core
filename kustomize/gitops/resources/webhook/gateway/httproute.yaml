apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: flux-webhook
  namespace: system-gitops
spec:
  parentRefs:
    - name: external
      namespace: system-gateway
      sectionName: web-http
    - name: external
      namespace: system-gateway
      sectionName: flux-webhook
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /hook/
      backendRefs:
        - name: webhook-receiver
          port: 80
