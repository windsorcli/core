apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: flux-operator
  namespace: system-gitops
spec:
  parentRefs:
    - kind: Gateway
      name: external
      namespace: system-gateway
      sectionName: web-http
    - kind: Gateway
      name: external
      namespace: system-gateway
      sectionName: web-https
  hostnames:
    - flux.${external_domain}
  rules:
    - backendRefs:
        - kind: Service
          name: flux-operator
          port: 9080
