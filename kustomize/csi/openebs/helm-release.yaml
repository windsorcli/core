---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openebs
  namespace: system-csi
spec:
  interval: 5m
  timeout: 20m
  chart:
    spec:
      chart: openebs
      # renovate: datasource=helm depName=openebs package=openebs helmRepo=https://openebs.github.io/openebs
      version: 4.5.1
      sourceRef:
        kind: HelmRepository
        name: openebs
  values:
    localpv-provisioner:
      enabled: false
      localpv:
        image:
          # renovate: datasource=docker depName=openebs/provisioner-localpv package=openebs/provisioner-localpv
          tag: 4.5.1@sha256:a1b4659ea4bba01235593ab796424d1503cf25e1b31fe278fef2a4829385fc61
      helperPod:
        image:
          # renovate: datasource=docker depName=openebs/linux-utils package=openebs/linux-utils
          tag: 4.5.0@sha256:e90916c22a077e5f983afaa67f3f085e08575efb7f9828db3bb9dd53671c947f
      hostpathClass:
        enabled: false
    zfs-localpv:
      enabled: false
      zfsPlugin:
        image:
          # renovate: datasource=docker depName=openebs/zfs-driver package=openebs/zfs-driver
          tag: 2.10.1@sha256:f9eeeefe1dd50f400d8a5dce8e748f8fffa92def86fcf9610583a3d7ec2fc291
    lvm-localpv:
      enabled: false
      lvmPlugin:
        image:
          # renovate: datasource=docker depName=openebs/lvm-driver package=openebs/lvm-driver
          tag: 1.9.1@sha256:8ee8221f13075c138dc6bba605b2190e70912fd5edc85fbd93ebd7d602becab1
    mayastor:
      enabled: false
      image:
        # renovate: datasource=docker depName=openebs/mayastor-io-engine package=openebs/mayastor-io-engine
        tag: v2.11.0@sha256:a47519d30586f4d8fe44a15e4bd6368f80d083fa8dcea9c266ee389a4f12f4f2
      base:
        metrics:
          enabled: false
    engines:
      local:
        lvm:
          enabled: false
        zfs:
          enabled: false
      replicated:
        mayastor:
          enabled: false
    loki:
      enabled: false
    minio:
      enabled: false
    alloy:
      enabled: false
    preUpgradeHook:
      image:
        # renovate: datasource=docker depName=openebs/kubectl package=openebs/kubectl
        tag: 1.32.4@sha256:9524faf8e3cefb47fa28244a5d15f95ec21a73d963273798e593e61f80712333
