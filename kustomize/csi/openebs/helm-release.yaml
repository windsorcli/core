---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openebs
  namespace: system-csi
spec:
  interval: 5m
  timeout: 20m
  chart:
    spec:
      chart: openebs
      # renovate: datasource=helm depName=openebs package=openebs helmRepo=https://openebs.github.io/openebs
      version: 4.4.0
      sourceRef:
        kind: HelmRepository
        name: openebs
  values:
    localpv-provisioner:
      enabled: false
      localpv:
        image:
          # renovate: datasource=docker depName=openebs/provisioner-localpv package=openebs/provisioner-localpv
          tag: 4.5.0@sha256:2e108216d4c57264067185423384f8eacf636d1fe5d6c99104796a64a33f064d
      helperPod:
        image:
          # renovate: datasource=docker depName=openebs/linux-utils package=openebs/linux-utils
          tag: 4.5.0@sha256:e90916c22a077e5f983afaa67f3f085e08575efb7f9828db3bb9dd53671c947f
      hostpathClass:
        enabled: false
    zfs-localpv:
      enabled: false
      zfsPlugin:
        image:
          # renovate: datasource=docker depName=openebs/zfs-driver package=openebs/zfs-driver
          tag: 2.10.0@sha256:4a1ba36d65409ce576f39e19b934842691c436f79af0344a41debe342c1a230f
    lvm-localpv:
      enabled: false
      lvmPlugin:
        image:
          # renovate: datasource=docker depName=openebs/lvm-driver package=openebs/lvm-driver
          tag: 1.9.0@sha256:e4f5dec4391cdf0da2d1841587ab7276f6c09f5efc2c3acd1ebb7a48c81b29f7
    mayastor:
      enabled: false
      image:
        # renovate: datasource=docker depName=openebs/mayastor-io-engine package=openebs/mayastor-io-engine
        tag: v2.10.0@sha256:2e7bedf7b67f2a3e4de1b90424a6b54493050f32b8f708c543b590e488074d34
      base:
        metrics:
          enabled: false
    engines:
      local:
        lvm:
          enabled: false
        zfs:
          enabled: false
      replicated:
        mayastor:
          enabled: false
    loki:
      enabled: false
    minio:
      enabled: false
    alloy:
      enabled: false
    preUpgradeHook:
      image:
        # renovate: datasource=docker depName=openebs/kubectl package=openebs/kubectl
        tag: 1.32.4@sha256:9524faf8e3cefb47fa28244a5d15f95ec21a73d963273798e593e61f80712333
