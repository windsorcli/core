---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hcloud-cloud-controller-manager
  namespace: system-lb
spec:
  interval: 5m
  timeout: 10m
  targetNamespace: system-lb
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: hcloud-cloud-controller-manager
      # renovate: datasource=helm depName=hcloud-cloud-controller-manager package=hcloud-cloud-controller-manager helmRepo=https://charts.hetzner.cloud
      version: 1.34.0
      sourceRef:
        kind: HelmRepository
        name: hcloud
  values:
    image:
      repository: docker.io/hetznercloud/hcloud-cloud-controller-manager
      # renovate: datasource=docker depName=docker.io/hetznercloud/hcloud-cloud-controller-manager
      tag: v1.34.0@sha256:bedf16705f1c2a1a8d0dcfddd7eb89938f329a5542e464ba08fc580b905621ec
    # Reads the API token from the `hcloud` Secret (key `token`) the platform
    # facet materializes into system-lb. The CCM watches type=LoadBalancer
    # Services and provisions Hetzner Cloud Load Balancers; it also clears the
    # uninitialized taint on nodes.
    env:
      HCLOUD_TOKEN:
        valueFrom:
          secretKeyRef:
            name: hcloud
            key: token
      # Default location for Cloud Load Balancers the CCM provisions for
      # type=LoadBalancer Services (the CCM refuses to guess). Per-Service
      # load-balancer.hetzner.cloud/location annotations still override.
      HCLOUD_LOAD_BALANCERS_LOCATION:
        value: ${hcloud_location:-fsn1}
      # Attach Cloud LBs to the private network and target nodes by private IP,
      # so LB->nodePort traffic bypasses the public firewall (which only opens the
      # Talos/API ports). HCLOUD_NETWORK must be the numeric id — the name is
      # rejected with "missing network id". Routes stay off; cilium owns the pod
      # network, so this only scopes LB target IPs, not routing.
      HCLOUD_NETWORK:
        value: ${hcloud_network_id}
      HCLOUD_NETWORK_ROUTES_ENABLED:
        value: "false"
      HCLOUD_LOAD_BALANCERS_USE_PRIVATE_IP:
        value: "true"
    # Cilium owns the pod network, so the CCM route-controller stays off (routes
    # are disabled above); networking.enabled would turn it on and conflict.
    networking:
      enabled: false
