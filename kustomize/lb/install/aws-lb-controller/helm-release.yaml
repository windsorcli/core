---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: aws-load-balancer-controller
  namespace: system-lb
spec:
  interval: 5m
  timeout: 10m
  install:
    crds: Skip
    remediation:
      retries: 3
  upgrade:
    crds: Skip
    remediation:
      retries: 3
  uninstall:
    deletionPropagation: foreground
    disableWait: false
  chart:
    spec:
      chart: aws-load-balancer-controller
      # renovate: datasource=helm depName=aws-load-balancer-controller package=aws-load-balancer-controller helmRepo=https://aws.github.io/eks-charts
      version: 3.4.1
      sourceRef:
        kind: HelmRepository
        name: aws-load-balancer-controller
  values:
    # No fallback — LBC tags every AWS resource it owns with this name and
    # filters reconciliation by it, so a generic default would let a second
    # cluster in the same account race over the same tags. Empty fails the
    # helm install loudly (chart requires clusterName), which is what we want
    # if terraform_output('cluster', 'cluster_name') hasn't resolved yet.
    clusterName: "${cluster_name:-}"
    vpcId: "${vpc_id:-}"
    region: "${aws_region:-}"
    image:
      repository: public.ecr.aws/eks/aws-load-balancer-controller
      # renovate: datasource=docker depName=public.ecr.aws/eks/aws-load-balancer-controller package=public.ecr.aws/eks/aws-load-balancer-controller
      tag: v3.4.1@sha256:e31c0ba0cbc0105d7407c92c54cddaf91615c6e577fbc8a22e8a607155929713
    serviceAccount:
      create: true
      name: aws-load-balancer-controller
    # IRSA / Pod Identity provides the role; no static annotations needed.
    enableServiceMutatorWebhook: false
    # Two replicas with HA-friendly anti-affinity. Falls back to single
    # replica on single-node clusters via the topologyKey at zone level.
    replicaCount: 2
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: aws-load-balancer-controller
              topologyKey: kubernetes.io/hostname
