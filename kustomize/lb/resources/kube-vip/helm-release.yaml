apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-vip
  namespace: system-lb
spec:
  interval: 5m
  timeout: 10m
  chart:
    spec:
      chart: kube-vip
      # renovate: datasource=helm depName=kube-vip package=kube-vip helmRepo=https://kube-vip.github.io/helm-charts
      version: 0.9.8
      sourceRef:
        kind: HelmRepository
        name: kube-vip
        namespace: system-gitops
  values:
    image:
      repository: ghcr.io/kube-vip/kube-vip
      # renovate: datasource=docker depName=ghcr.io/kube-vip/kube-vip package=ghcr.io/kube-vip/kube-vip
      tag: v1.1.2@sha256:840305b94ef2a89abb3b7fd2b09edfbde690d90052020da4dff90679fe892da2
    env:
      svc_enable: "true"
      svc_election: "true"
