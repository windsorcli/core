---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: aws-load-balancer-controller
  namespace: system-lb
spec:
  interval: 5m
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  uninstall:
    deletionPropagation: foreground
    disableWait: false
  chart:
    spec:
      chart: aws-load-balancer-controller
      # renovate: datasource=helm depName=aws-load-balancer-controller package=aws-load-balancer-controller helmRepo=https://aws.github.io/eks-charts
      version: 3.2.2
      sourceRef:
        kind: HelmRepository
        name: aws-load-balancer-controller
  values:
    clusterName: "${cluster_name:-cluster}"
    vpcId: "${vpc_id:-}"
    region: "${aws_region:-}"
    image:
      repository: public.ecr.aws/eks/aws-load-balancer-controller
      # renovate: datasource=docker depName=public.ecr.aws/eks/aws-load-balancer-controller package=public.ecr.aws/eks/aws-load-balancer-controller
      tag: v3.2.2@sha256:427b998b1e07cbf0a564f95c4215a9b039b8d784f1fbb36e6e4012051a75ff95
    serviceAccount:
      create: true
      name: aws-load-balancer-controller
    # IRSA / Pod Identity provides the role; no static annotations needed.
    enableServiceMutatorWebhook: false
    # Two replicas with HA-friendly anti-affinity. Falls back to single
    # replica on single-node clusters via the topologyKey at zone level.
    replicaCount: 2
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: aws-load-balancer-controller
              topologyKey: kubernetes.io/hostname
