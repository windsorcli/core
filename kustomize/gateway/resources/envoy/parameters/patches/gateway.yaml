---
# Points the external Gateway at its EnvoyProxy (gateway/install/envoy/envoy-proxy.yaml)
# so the data-plane Service is configured per gateway rather than through the
# controller-global EnvoyGateway default. Envoy-only: Cilium gateways don't use
# the gateway.envoyproxy.io EnvoyProxy resource.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: external
  namespace: system-gateway
spec:
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: external
