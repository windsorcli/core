---
# Redirects all plain-HTTP traffic on the external gateway to HTTPS with a 301.
# App routes attach only to web-https, so their hostnames are TLS-only and this
# catch-all covers everything else on web-http uniformly. The flux-webhook route
# keeps its own /hook/ path match (more specific than this catch-all), so signed
# webhook POSTs are not redirected.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: https-redirect
  namespace: system-gateway
spec:
  parentRefs:
    - kind: Gateway
      name: external
      namespace: system-gateway
      sectionName: web-http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            # Target the port the gateway's HTTPS is actually reached on: 443 for
            # cloud/LB, 8443 on docker-desktop (its NodePort host-forward). Derived
            # in the gateway facet, same as keycloak_hostname's port suffix.
            port: ${gateway_redirect_port}
            statusCode: 301
