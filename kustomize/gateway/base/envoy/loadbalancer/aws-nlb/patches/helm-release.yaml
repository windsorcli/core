---
# AWS-specific annotations on the Envoy Gateway's data-plane Service. These
# tell the AWS Load Balancer Controller to provision an NLB (not the in-tree
# CCM's classic ELB) with target-type=ip — traffic goes directly to Envoy
# pods, source IP preserved, no kube-proxy hop. Strategic-merge stacks on
# top of the loadbalancer/patches/helm-release.yaml that sets type=LoadBalancer.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: system-gateway
spec:
  values:
    config:
      envoyGateway:
        envoyProxy:
          provider:
            type: Kubernetes
            kubernetes:
              envoyService:
                patch:
                  type: StrategicMerge
                  value:
                    metadata:
                      annotations:
                        service.beta.kubernetes.io/aws-load-balancer-type: external
                        service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
                        service.beta.kubernetes.io/aws-load-balancer-scheme: ${lb_scheme:-internet-facing}
                        service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
