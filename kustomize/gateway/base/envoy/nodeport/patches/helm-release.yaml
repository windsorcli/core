---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: system-gateway
spec:
  values:
    config:
      envoyGateway:
        envoyProxy:
          provider:
            type: Kubernetes
            kubernetes:
              envoyService:
                patch:
                  type: JSONMerge
                  value:
                    spec:
                      type: NodePort
                      externalTrafficPolicy: Cluster
                      ports:
                        - name: http-80
                          protocol: TCP
                          port: 80
                          targetPort: 10080
                          nodePort: 30080
                        - name: https-443
                          protocol: TCP
                          port: 443
                          targetPort: 10443
                          nodePort: 30443
