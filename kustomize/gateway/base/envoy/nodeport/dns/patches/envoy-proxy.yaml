# Appends the DNS NodePort entries (UDP/TCP 53 → 30053) to the envoyService
# patch's spec.ports list. JSONPatch op: add against the list's terminal slot
# (path ending in `/-`) so this stacks additively on the base nodeport patch
# without replacing the existing web ports. Used only when CoreDNS is being
# exposed through the gateway (gated by option-gateway).
- op: add
  path: /spec/provider/kubernetes/envoyService/patch/value/spec/ports/-
  value:
    name: udp-53
    protocol: UDP
    port: 53
    targetPort: 10053
    nodePort: 30053
- op: add
  path: /spec/provider/kubernetes/envoyService/patch/value/spec/ports/-
  value:
    name: tcp-53
    protocol: TCP
    port: 53
    targetPort: 10053
    nodePort: 30053
