---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: system-gateway
spec:
  interval: 5m
  timeout: 10m
  install:
    crds: Skip
  upgrade:
    crds: Skip
  chart:
    spec:
      chart: gateway-helm
      # renovate: datasource=docker depName=envoyproxy/gateway-helm package=envoyproxy/gateway-helm
      version: v1.7.1
      sourceRef:
        kind: HelmRepository
        name: envoyproxy
        namespace: system-gitops
  values:
    global:
      images:
        envoyGateway:
          # renovate: datasource=docker depName=docker.io/envoyproxy/gateway package=docker.io/envoyproxy/gateway
          image: docker.io/envoyproxy/gateway:v1.7.1@sha256:8bb273728bacf981cb2862ed11a6ba8b70970e3b31e3a00429f34f8478c94b8b
        ratelimit:
          # renovate: datasource=docker depName=docker.io/envoyproxy/ratelimit package=docker.io/envoyproxy/ratelimit
          image: docker.io/envoyproxy/ratelimit:c8765e89@sha256:afce1a5111cf9cb6662383c7f2c72d9c26d9cf53d8285173166d6d853074a1f7
    config:
      envoyGateway:
        gateway:
          controllerName: gateway.envoyproxy.io/gatewayclass-controller
        envoyProxy:
          provider:
            type: Kubernetes
            kubernetes:
              # Enforce digest pinning on generated Envoy proxy workload to satisfy Kyverno policy.
              envoyDeployment:
                patch:
                  type: StrategicMerge
                  value:
                    spec:
                      template:
                        spec:
                          containers:
                            # renovate: datasource=docker depName=docker.io/envoyproxy/envoy package=docker.io/envoyproxy/envoy
                            - name: envoy
                              image: docker.io/envoyproxy/envoy:distroless-v1.37.1@sha256:4d9226b9fd4d1449887de7cde785beb24b12e47d6e79021dec3c79e362609432
