---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway-crds
  namespace: system-gateway
spec:
  interval: 5m
  timeout: 10m
  chart:
    spec:
      chart: gateway-crds-helm
      # renovate: datasource=docker depName=envoyproxy/gateway-crds-helm package=envoyproxy/gateway-crds-helm
      version: v1.7.1
      sourceRef:
        kind: HelmRepository
        name: envoyproxy
        namespace: system-gitops
  values:
    crds:
      gatewayAPI:
        enabled: false
      envoyGateway:
        enabled: true
