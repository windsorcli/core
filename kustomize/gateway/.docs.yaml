# Descriptor consumed by scripts/kustomize-docs.sh to populate the
# BEGIN_KUSTOMIZE_DOCS / END_KUSTOMIZE_DOCS region of README.md.
# Edit this file (not the README tables) when substitutions, components,
# or dependencies change.

facets:
  - gateway-base
  - gateway-resources

substitutions:
  gateway_class_name:
    required_when: always
    description: "Name of the `GatewayClass` the cluster Gateway references. Sourced from `gateway.driver` (`envoy` or `cilium`)."
  gateway_dns_target:
    required_when: "`dns` is enabled and `gateway-resources/dns` is composed"
    description: "External hostname/IP that external-dns publishes as the gateway target. Resolves to `network.loadbalancer_ips.start` when `lb_effective.enabled`, empty otherwise."
  external_domain:
    required_when: "`gateway-resources` is composed"
    description: "Cert SAN domain. `dns.private_domain` when `gateway.access: private` (and the private domain is set); otherwise `dns.public_domain` if set, falling back to `dns.private_domain`."
  loadbalancer_start_ip:
    required_when: "`lb-address` or `cilium` (resources) is composed"
    description: "Fixed IP the Gateway advertises. Used in the cilium variant's `lbipam.cilium.io/ips` annotation and in the envoy variant's `spec.addresses` patch."

components:
  envoy:
    facet: gateway-base
    enable_when: "`gateway.driver == 'envoy'`"
    description: "Helm release of `envoy-gateway` in `system-gateway`. Installs the Envoy Gateway operator (chart CRD install is skipped) and the self-contained `external` `EnvoyProxy` resource that owns the per-gateway data-plane config (digest-pinned proxy image plus the Service patches layered on by the loadbalancer/nodeport components). The EnvoyGateway config keeps no default proxy patch, so the EnvoyProxy each Gateway references via `parametersRef` is authoritative. The Envoy Gateway and shared Gateway API CRDs are vendored under `kustomize/crds/` and applied ahead of the controller via the facet `crds:` section."
  envoy/loadbalancer:
    facet: gateway-base
    enable_when: "envoy driver AND `lb_effective.mode == 'loadbalancer'`"
    description: "Patches the `external` `EnvoyProxy` so the data-plane Envoy Service is `type: LoadBalancer`. Cloud-specific annotation patches (aws-nlb / azure-lb-internal) merge on top."
  envoy/loadbalancer/aws-nlb:
    facet: gateway-base
    enable_when: "envoy driver AND platform is AWS AND `lb_effective.mode == 'loadbalancer'`"
    description: "Adds NLB annotations onto the Envoy data-plane Service so the AWS Load Balancer Controller provisions an NLB with target-type=ip. Traffic reaches Envoy pods directly, source IP preserved."
  envoy/loadbalancer/azure-lb-internal:
    facet: gateway-base
    enable_when: "envoy driver AND platform is Azure AND `gateway.access == 'private'`"
    description: "Adds Azure ILB annotations so the Envoy data-plane Service provisions an internal load balancer (subnet-bound, no public IP)."
  envoy/nodeport:
    facet: gateway-base
    enable_when: "envoy driver AND `lb_effective.mode == 'nodeport'`"
    description: "Patches the `external` `EnvoyProxy` so the data-plane Service is `type: NodePort`. Used on local clusters where no LoadBalancer provider exists."
  envoy/nodeport/dns:
    facet: gateway-base
    enable_when: "envoy/nodeport AND `addons.private_dns.enabled: true` (default in `dev`)"
    description: "Opens an additional NodePort for the cluster's private DNS resolver (UDP/TCP 53). Lets a workstation point at the host's IP for `*.<dns.private_domain>` resolution."
  envoy/nodeport/flux-webhook:
    facet: gateway-base
    enable_when: "envoy/nodeport AND `gitops.mode == 'push'`"
    description: "Opens an additional NodePort for the Flux notification-controller webhook (port 9292). Lets the GitOps push pipeline reach in-cluster receivers."
  envoy/prometheus:
    facet: gateway-base
    enable_when: "envoy driver"
    description: "Adds the Envoy Gateway operator's PodMonitor + the Envoy data-plane's ServiceMonitor."
  base/cilium:
    facet: gateway-base
    enable_when: "`gateway.driver == 'cilium'`"
    description: "Installs the Gateway API CRDs and a `GatewayClass` referencing the `cilium` controller. The Cilium HelmRelease itself is owned by the `cni` add-on (see option-cni's `cilium/gateway` component). Operator references this as `components: [cilium]` under `gateway-base`."
  resources/cilium:
    facet: gateway-resources
    enable_when: "`gateway.driver == 'cilium'`"
    description: "Patches the `external` Gateway with `lbipam.cilium.io/ips: ${loadbalancer_start_ip}` and the LBIPAM sharing annotations so multiple Gateways can share a single IP. Operator references this as `components: [cilium]` under `gateway-resources`."
  envoy/parameters:
    facet: gateway-resources
    enable_when: "envoy driver"
    description: "Patches the `external` Gateway's `spec.infrastructure.parametersRef` to point at the `external` `EnvoyProxy`, so the data-plane Service is configured per gateway rather than through the controller-global EnvoyGateway default. Cilium gateways don't use the `EnvoyProxy` resource."
  envoy/default-404:
    facet: gateway-resources
    enable_when: "envoy driver"
    description: "Catch-all `HTTPRouteFilter` returning a 404 directResponse for any request that doesn't match a real app's HTTPRoute. Cilium clusters don't ship this (the Envoy-specific CRD isn't available there)."
  envoy/default-404/external-dns:
    facet: gateway-resources
    enable_when: "envoy driver AND (public OR private gateway-managed DNS zone exists)"
    description: "Adds the `external-dns.alpha.kubernetes.io/hostname` annotation to the 404 catch-all route so external-dns publishes the gateway hostname for the bare domain (not just per-app HTTPRoutes)."
  dns:
    facet: gateway-resources
    enable_when: "envoy driver AND `addons.private_dns.enabled: true` (default in `dev`)"
    description: "Patches the `external` Gateway with `external-dns.alpha.kubernetes.io/target: ${gateway_dns_target}` and adds UDPRoute / TCPRoute listeners on port 53 for in-cluster DNS service exposure."
  lb-address:
    facet: gateway-resources
    enable_when: "`lb_effective.enabled: true`"
    description: "Patches the `external` Gateway's `spec.addresses` to pin a fixed IPAddress (`${loadbalancer_start_ip}`). Skipped when no LB is enabled (NodePort mode picks node IP at apply time)."
  flux-webhook:
    facet: gateway-resources
    enable_when: "`gitops.mode == 'push'`"
    description: "Adds an HTTP listener on port 9292 to the `external` Gateway for the Flux notification-controller webhook. Paired with `envoy/nodeport/flux-webhook` on nodeport-mode clusters."

dependencies:
  pki-install:
    required_when: "always"
    reason: "gateway-base needs cert-manager CRDs reconciling so the `Certificate` for the external Gateway can be issued before the Gateway is admitted."
  lb-install:
    required_when: "`lb_effective.controller_required: true` (e.g., metallb-driven clusters; AWS via aws-lb-controller)"
    reason: "The LB controller must be live so the data-plane Service can get an external IP."
  dns:
    required_when: "`dns.enabled: true`"
    reason: "external-dns must be reconciling so the gateway hostname is published when the Gateway comes up."
  cni:
    required_when: "`gateway.driver == 'cilium'` (declared by option-gateway as a cross-stack merge into option-cni)"
    reason: "Cilium's Gateway controller needs the Gateway API CRDs from gateway-base before its operator starts watching."
