apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: system-policy
spec:
  interval: 5m
  timeout: 30m
  chart:
    spec:
      chart: kyverno
      # renovate: datasource=helm depName=kyverno package=kyverno helmRepo=https://kyverno.github.io/kyverno/
      version: 3.6.2
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: system-gitops
  values:
    crds:
      migration:
        image:
          # renovate: datasource=docker depName=reg.kyverno.io/kyverno/kyverno-cli package=reg.kyverno.io/kyverno/kyverno-cli
          tag: v1.17.1@sha256:3a7addf83897abae291361dfccbdf63cba5926c7795fe44e527883ae2237e4b8
    # Disable ANSI color codes in logs
    admissionController:
      initContainer:
        image:
          # renovate: datasource=docker depName=reg.kyverno.io/kyverno/kyvernopre package=reg.kyverno.io/kyverno/kyvernopre
          tag: v1.17.1@sha256:13bb0430078d3e36cfa3a1c905d915fb7ad1a3a936fefa75092b6a480d2e2c2e
      container:
        image:
          # renovate: datasource=docker depName=reg.kyverno.io/kyverno/kyverno package=reg.kyverno.io/kyverno/kyverno
          tag: v1.16.2@sha256:b0c123d62a1b8e21da707450ef44c4616832434f919d1cd19cfdbe2836277699
        extraEnvVars:
        - name: NO_COLOR
          value: "1"
    backgroundController:
      container:
        image:
          # renovate: datasource=docker depName=reg.kyverno.io/kyverno/background-controller package=reg.kyverno.io/kyverno/background-controller
          tag: v1.17.1@sha256:6d694a404b54368f5ad429f9341e2a9e4e17b8d83bd2ec74643cdaed845d6ea8
        extraEnvVars:
        - name: NO_COLOR
          value: "1"
    # cleanup-controller executes CleanupPolicy / ClusterCleanupPolicy CRDs
    # on a cron. Windsor defines zero CleanupPolicy resources out of the
    # box, so this controller sits idle — disabled by default; opt in with
    # policies.cleanup=enabled, which layers in the kyverno/cleanup
    # component.
    cleanupController:
      enabled: false
      container:
        image:
          # renovate: datasource=docker depName=reg.kyverno.io/kyverno/cleanup-controller package=reg.kyverno.io/kyverno/cleanup-controller
          tag: v1.17.1@sha256:8789cbf5a89cbc97240de9d07be44a504d76e937fa75a43b27cb891b3d2b01c6
        extraEnvVars:
        - name: NO_COLOR
          value: "1"
    # reports-controller runs background scans and emits PolicyReport /
    # ClusterPolicyReport resources for audit/observability. Admission-time
    # enforcement is unaffected when this is off. Disabled by default; opt
    # in with policies.reporting=enabled, which layers in the
    # kyverno/reports component.
    reportsController:
      enabled: false
      container:
        image:
          # renovate: datasource=docker depName=reg.kyverno.io/kyverno/reports-controller package=reg.kyverno.io/kyverno/reports-controller
          tag: v1.17.1@sha256:7eb66e1fead6a3791209e1a0869d0217f9c89886a6809e99d3094b750e2b731d
        extraEnvVars:
        - name: NO_COLOR
          value: "1"
