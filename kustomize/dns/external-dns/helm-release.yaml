---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: system-dns
spec:
  interval: 5m
  timeout: 10m
  dependsOn: []
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: external-dns
      # renovate: datasource=helm depName=external-dns package=external-dns helmRepo=https://kubernetes-sigs.github.io/external-dns/
      version: 1.20.0
      sourceRef: 
        kind: HelmRepository
        name: external-dns
        namespace: system-gitops
  values:
    image:
      # renovate: datasource=docker depName=registry.k8s.io/external-dns/external-dns package=registry.k8s.io/external-dns/external-dns
      tag: v0.21.0@sha256:f53faaf71cb270d1ca9dce6ea0c94bfebf1a18696263487f0fbc74b9bf2bd7ff
    env: []
    extraVolumes: []
    extraVolumeMounts: []
    sources:
      - ingress
      - gateway-httproute
    domainFilters:
      - "${DOMAIN:-test}"
