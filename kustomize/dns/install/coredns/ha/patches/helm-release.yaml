- op: add
  path: /spec/values/replicaCount
  value: 3
- op: add
  path: /spec/values/affinity
  value:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: coredns
            topologyKey: kubernetes.io/hostname
