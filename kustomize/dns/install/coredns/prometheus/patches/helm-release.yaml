---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: coredns
  namespace: system-dns
spec:
  dependsOn:
    - name: kube-prometheus-stack
      namespace: system-telemetry
  values:
    prometheus:
      service:
        enabled: true
      monitor:
        enabled: true
        additionalLabels:
          release: kube-prometheus-stack
