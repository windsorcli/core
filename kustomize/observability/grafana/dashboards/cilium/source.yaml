# Cilium / Hubble Grafana Dashboards
# Run: task dashboards
#
# Dashboards live in per-component subdirs — per-file URLs required (symlinks in examples/ are not raw-fetchable).

upstream:
  # renovate: datasource=github-releases depName=cilium/cilium versioning=semver
  base_tag: v1.16.19

files:
  - name: cilium-dashboard.json
    url: https://raw.githubusercontent.com/cilium/cilium/v1.16.19/install/kubernetes/cilium/files/cilium-agent/dashboards/cilium-dashboard.json
    patch: patches/cilium.patch.json
  - name: cilium-operator-dashboard.json
    url: https://raw.githubusercontent.com/cilium/cilium/v1.16.19/install/kubernetes/cilium/files/cilium-operator/dashboards/cilium-operator-dashboard.json
    patch: patches/cilium-operator.patch.json
  - name: hubble-dashboard.json
    url: https://raw.githubusercontent.com/cilium/cilium/v1.16.19/install/kubernetes/cilium/files/hubble/dashboards/hubble-dashboard.json
    patch: patches/hubble.patch.json
  - name: hubble-network-overview-namespace.json
    url: https://raw.githubusercontent.com/cilium/cilium/v1.16.19/install/kubernetes/cilium/files/hubble/dashboards/hubble-network-overview-namespace.json
    patch: patches/hubble.patch.json
