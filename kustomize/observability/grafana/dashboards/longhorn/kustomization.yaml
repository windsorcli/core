apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# Longhorn dashboards - vendored
# Run: task dashboards
# See: source.yaml for provenance

configMapGenerator:
  - name: grafana-dashboards-longhorn
    namespace: system-observability
    files:
      - longhorn.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"
      annotations:
        grafana_folder: "Storage"
