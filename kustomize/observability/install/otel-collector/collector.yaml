receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
processors:
  transform:
    log_statements:
      - context: log
        statements:
          # Envoy's generated OTel access log has no service.name anywhere;
          # Quickwit's strict schema requires it. Distinct from the
          # envoy-gateway *controller's* own service_name (from its stdout
          # logs via the existing fluent-bit pipeline) to avoid conflating
          # control-plane logs with data-plane access logs in dashboards.
          - set(resource.attributes["service.name"], "envoy-gateway-accesslog")
          # response_code arrives as a numeric string; 0 means no HTTP
          # response was ever produced (connection failure, TCP/UDP
          # passthrough) rather than a real 2xx.
          - set(severity_number, SEVERITY_NUMBER_INFO) where Int(attributes["response_code"]) >= 0 and Int(attributes["response_code"]) < 400
          - set(severity_number, SEVERITY_NUMBER_WARN) where Int(attributes["response_code"]) >= 400 and Int(attributes["response_code"]) < 500
          - set(severity_number, SEVERITY_NUMBER_ERROR) where Int(attributes["response_code"]) >= 500
          - set(severity_number, SEVERITY_NUMBER_WARN) where Int(attributes["response_code"]) == 0
          - set(severity_text, "INFO") where severity_number == SEVERITY_NUMBER_INFO
          - set(severity_text, "WARN") where severity_number == SEVERITY_NUMBER_WARN
          - set(severity_text, "ERROR") where severity_number == SEVERITY_NUMBER_ERROR
          # Body is otherwise empty - Envoy's generated record carries no message.
          - set(body, Concat([attributes["method"], attributes["x-envoy-origin-path"], attributes["response_code"], attributes["duration"]], " "))
exporters:
  # basic, not detailed: this collector's own stdout gets tailed by the same
  # fluent-bit pipeline it feeds, so a full per-record dump here becomes log
  # volume in its own right - it was the single largest log source in the
  # cluster (18K+ lines in an hour) before this was turned down.
  debug:
    verbosity: basic
  otlp/quickwit:
    endpoint: quickwit-indexer.system-observability.svc.cluster.local:7281
    tls:
      insecure: true
service:
  pipelines:
    logs:
      receivers: [otlp]
      processors: [transform]
      exporters: [debug, otlp/quickwit]
