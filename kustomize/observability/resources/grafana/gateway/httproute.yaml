apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: system-observability
spec:
  parentRefs:
    # web-https only; plain HTTP is 301-redirected by the gateway's https-redirect.
    - kind: Gateway
      name: external
      namespace: system-gateway
      sectionName: web-https
  hostnames:
    - grafana.${external_domain}
  rules:
    - backendRefs:
        - kind: Service
          name: grafana
          port: 80
