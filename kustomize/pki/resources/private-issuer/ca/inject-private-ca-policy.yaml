apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: inject-private-ca
spec:
  # Fail closed: a pod must not start without the CA bundle it expects to trust.
  # The pod-label match scopes the webhook to opted-in pods, so this never gates
  # unrelated workloads or the control plane.
  failurePolicy: Fail
  background: false
  rules:
    - name: inject-private-ca
      match:
        resources:
          kinds:
            - Pod
          selector:
            matchLabels:
              use-custom-ca: "true"
      mutate:
        patchStrategicMerge:
          spec:
            volumes:
              - name: private-ca-bundle
                configMap:
                  name: private-ca
                  defaultMode: 0644
                  optional: false
                  items:
                    - key: trust-bundle.pem
                      path: ca.crt
            containers:
              - (name): "*"
                volumeMounts:
                  - name: private-ca-bundle
                    mountPath: /usr/local/share/ca-certificates/ca.crt
                    subPath: ca.crt
                env:
                  - name: SSL_CERT_FILE
                    value: /usr/local/share/ca-certificates/ca.crt
                  - name: REQUESTS_CA_BUNDLE
                    value: /usr/local/share/ca-certificates/ca.crt
