apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: public
spec:
  acme:
    server: ${acme_server}
    email: ${acme_email}
    privateKeySecretRef:
      name: acme-account-key
    solvers:
      - selector:
          dnsZones:
            - ${acme_dns_zone}
        dns01:
          route53:
            region: ${acme_region}
            hostedZoneID: ${acme_hosted_zone_id}
