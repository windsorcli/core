---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: system-pki
spec:
  values:
    # Single-replica controllers have no peer to coordinate with, so leader
    # election is pure etcd write pressure (~1 lease PUT every ~2s per lease).
    extraArgs:
      - --leader-elect=false
    cainjector:
      extraArgs:
        - --leader-elect=false
