kind: Facet
apiVersion: blueprints.windsorcli.dev/v1alpha1
metadata:
  name: metal
  description: "Metal provider basic infrastructure"

when: (platform ?? provider) == 'metal'

terraform:
- name: cluster
  path: cluster/talos
  parallelism: 1
  inputs:
    cluster_endpoint: ${cluster.endpoint ?? ("https://" + split(values(cluster.controlplanes.nodes)[0].endpoint, ":")[0] + ":6443")}
    cluster_name: talos
    talos_version: ${talos.talos_version}
    controlplanes: ${values(cluster.controlplanes.nodes)}
    workers: "${(cluster.workers.count ?? 0) > 0 ? values(cluster.workers.nodes) : []}"
    controlplane_disks: ${talos_common.vars.controlplane_disks}
    worker_disks: ${talos_common.vars.worker_disks}
    common_config_patches: ${talos_common.patchVars.common_config_patches}
    controlplane_volumes: ${talos_common.vars.controlplane_volumes ?? []}
    worker_volumes: ${talos_common.vars.worker_volumes ?? []}
- name: gitops
  path: gitops/flux
  dependsOn:
    - cluster
  inputs:
    concurrency: ${max(2, min(floor((cluster.controlplanes.cpu ?? 4) / 2), floor((cluster.controlplanes.memory ?? 4) / 2), 10))}
  destroy: false

kustomize:

# CSI
- name: csi
  path: csi
  dependsOn:
    - policy-resources
  components:
    - openebs
    - openebs/dynamic-localpv
  substitutions:
    local_volume_path: ${talos_common.vars.csi_local_volume_path}
  timeout: 20m
  interval: 5m

# Load Balancer
- name: lb-base
  path: lb/base
  when: workstation.runtime != 'docker-desktop'
  dependsOn:
    - policy-resources
  components:
    - "${network.loadbalancer_driver == 'metallb' ? 'metallb' : ''}"
  timeout: 5m
  interval: 5m

- name: lb-resources
  path: lb/resources
  when: workstation.runtime != 'docker-desktop'
  dependsOn:
    - lb-base
  components:
    - ${network.loadbalancer_driver}
    - "${network.loadbalancer_driver}/${network.loadbalancer_mode}"
  substitutions:
    loadbalancer_ip_range: ${network.loadbalancer_ips.start + '-' + network.loadbalancer_ips.end}
  timeout: 5m
  interval: 5m
