kind: Facet
apiVersion: blueprints.windsorcli.dev/v1alpha1
metadata:
  name: incus
  description: Incus compute platform infrastructure

# Incus requires Talos. Without workstation, this facet owns the full terraform
# chain; with workstation, option-workstation owns compute/cluster and this
# facet contributes config only.
when: "platform == 'incus' && cluster.driver == 'talos'"

# Remote state lives in the local Talos cluster (Kubernetes backend); the
# `cluster` component uses local state since it creates the cluster.
backend: cluster

# =============================================================================
# Config — Incus-specific Talos values
# =============================================================================
config:

  # Incus VMs have dedicated block devices, so Longhorn is the default storage.
  # Controlplane sits at CIDR offset 10 for a stable k8s_service_host.
  - name: talos_common
    value:
      storage_driver: "${cluster.storage.driver ?? 'longhorn'}"
      longhorn_default_disk:
        - name: longhorn
          size: 30
      k8s_service_host: "${cidrhost(network.cidr_block, 10)}"

  # Derivable only from compute output; empty string otherwise, so the caller
  # falls back to an explicit cluster.endpoint.
  - name: cluster_endpoint_fallback
    value:
      endpoint: >-
        ${
          len(terraform_output("compute", "controlplanes") ?? []) > 0
          && terraform_output("compute", "controlplanes")[0].endpoint != null
            ? "https://" + split(terraform_output("compute", "controlplanes")[0].endpoint, ":")[0] + ":6443"
            : ""
        }

  # Node targets for post-cluster steps (e.g. extensions), using the same
  # compute-output-or-fallback resolution as the `cluster` step.
  - name: talos_node_targets
    value:
      controlplanes: >-
        ${map(
          len(terraform_output("compute", "controlplanes") ?? []) > 0
            ? terraform_output("compute", "controlplanes")
            : values(cluster.controlplanes.nodes ?? {}),
          fromPairs(filter(toPairs(#), get(#, 0) == "node" || get(#, 0) == "endpoint")))}
      workers: >-
        ${map(
          len(terraform_output("compute", "workers") ?? []) > 0
            ? terraform_output("compute", "workers")
            : ((cluster.workers.count ?? 0) > 0 ? values(cluster.workers.nodes) : []),
          fromPairs(filter(toPairs(#), get(#, 0) == "node" || get(#, 0) == "endpoint")))}

# =============================================================================
# Terraform — standalone incus (no workstation)
# =============================================================================
# With workstation.runtime unset, this facet owns compute → cluster → gitops.
# With workstation set, option-workstation owns the chain and these are gated off.
terraform:

  # Talos VMs on a fresh Incus network (create_network: true — no workstation
  # stack to inherit one from). Uses the default incus storage pool.
  - name: compute
    when: "workstation.runtime == null || workstation.runtime == ''"
    path: compute/incus
    inputs:
      network_name: ""
      create_network: true
      network_cidr: ${network.cidr_block}
      storage_pools:
        local:
          driver: null
      instances:
        - name: controlplane
          role: controlplane
          count: ${cluster.controlplanes.count ?? 1}
          ipv4: ${cidrhost(network.cidr_block, 10)}
          image: ${cluster.controlplanes.image ?? ("windsor:talos/v" + talos.talos_version + "/amd64")}
          type: virtual-machine
          description: Talos control plane node
          storage_pool: "default"
          root_disk_size: ${string(cluster.controlplanes.root_disk_size ?? 30) + "GB"}
          limits:
            cpu: ${string(cluster.controlplanes.cpu)}
            memory: ${string(cluster.controlplanes.memory) + "GB"}
          disks: ${talos_common.controlplane_disks}
          config:
            user.hostname: ${values(cluster.controlplanes.nodes)[0].hostname ?? "controlplane-1"}
            environment.TALOSSKU: ${string(cluster.controlplanes.cpu) + "CPU-" + string(cluster.controlplanes.memory * 1024) + "RAM"}
            raw.qemu: -boot order=c,menu=off
        - name: worker
          role: worker
          count: ${cluster.workers.count ?? 0}
          ipv4: ${cidrhost(network.cidr_block, 20)}
          image: ${cluster.workers.image ?? ("windsor:talos/v" + talos.talos_version + "/amd64")}
          type: virtual-machine
          description: Talos worker node
          storage_pool: "default"
          root_disk_size: ${string(cluster.workers.root_disk_size ?? 50) + "GB"}
          limits:
            cpu: ${string(cluster.workers.cpu)}
            memory: ${string(cluster.workers.memory) + "GB"}
          disks: ${talos_common.worker_disks}
          config:
            user.hostname: "${len(cluster.workers.nodes ?? {}) > 0 ? (values(cluster.workers.nodes)[0].hostname ?? 'worker-1') : 'worker-1'}"
            environment.TALOSSKU: "${string(cluster.workers.cpu) + 'CPU-' + string(cluster.workers.memory * 1024) + 'RAM'}"
            raw.qemu: -boot order=c,menu=off

  # Talos bootstrap/apply. Uses compute output when available, else user-supplied nodes.
  - name: cluster
    when: "workstation.runtime == null || workstation.runtime == ''"
    path: cluster/talos
    dependsOn:
      - compute
    parallelism: 1
    inputs:
      cluster_endpoint: "${cluster.endpoint ?? cluster_endpoint_fallback.endpoint}"
      cluster_name: talos
      talos_version: ${talos.talos_version}
      controlplanes: ${terraform_output("compute", "controlplanes") ?? values(cluster.controlplanes.nodes)}
      workers: "${terraform_output(\"compute\", \"workers\") ?? ((cluster.workers.count ?? 0) > 0 ? values(cluster.workers.nodes) : [])}"
      controlplane_disks: ${talos_common.controlplane_disks}
      worker_disks: ${talos_common.worker_disks}
      common_config_patches: ${talos_common.common_config_patches}
      controlplane_volumes: ${talos_common.controlplane_volumes ?? []}
      worker_volumes: ${talos_common.worker_volumes ?? []}

  # Flux. destroy: false — cluster teardown removes it; we don't uninstall on `windsor destroy`.
  - name: gitops
    when: "workstation.runtime == null || workstation.runtime == ''"
    path: gitops/flux
    dependsOn:
      - cluster
    inputs:
      # Floor stays 2 here (other platforms use 4): incus runs the cluster in a
      # nested VM with slower vCPUs, so higher concurrency floods the apiserver.
      concurrency: ${max(2, min(floor(cluster.controlplanes.cpu / 2), floor(cluster.controlplanes.memory / 2), 10))}
    destroy: false

# =============================================================================
# Flux systems — MetalLB / kube-vip
# =============================================================================
# Incus always has a real bridge network, so MetalLB or kube-vip works whenever
# an LB is requested. install ships the driver's controller HelmRelease (plus
# kube-vip's arp patch); resources ships metallb's IPAddressPool/L2Advertisement CRs.
flux:

  - name: lb
    when: lb_effective.enabled
    install:
      components:
        - ${lb_effective.driver}
        - "${lb_effective.driver == 'kube-vip' ? lb_effective.driver + '/' + (network.loadbalancer_mode ?? 'arp') : ''}"
      substitutions:
        loadbalancer_ip_range: "${network.loadbalancer_ips.start + '-' + network.loadbalancer_ips.end}"
      timeout: 5m
      interval: 5m
    resources:
      - components:
          - "${lb_effective.driver == 'metallb' ? lb_effective.driver + '/' + (network.loadbalancer_mode ?? 'arp') : ''}"
        substitutions:
          loadbalancer_ip_range: "${network.loadbalancer_ips.start + '-' + network.loadbalancer_ips.end}"
        timeout: 5m
        interval: 5m
