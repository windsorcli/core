kind: Facet
apiVersion: blueprints.windsorcli.dev/v1alpha1
metadata:
  name: incus
  description: Incus compute platform infrastructure

# Incus is only supported with Talos. Without workstation, this facet owns
# the full terraform chain directly; with workstation, option-workstation
# owns compute/cluster and this facet contributes config only.
when: "platform == 'incus' && cluster.driver == 'talos'"

# =============================================================================
# Config — Incus-specific Talos values
# =============================================================================
#
config:

  # Incus VMs have dedicated block devices, making Longhorn the natural choice
  # (distributed block storage over the VM disks). The controlplane always
  # sits at CIDR offset 10 so k8s_service_host is stable.
  - name: talos_common
    value:
      storage_driver: "${cluster.storage.driver ?? 'longhorn'}"
      longhorn_default_disk:
        - name: longhorn
          size: 30
      k8s_service_host: "${cidrhost(network_effective.cidr_block, 10)}"

  # ---------------------------------------------------------------------------
  # cluster_endpoint_fallback — config-time best-effort endpoint
  # ---------------------------------------------------------------------------
  #
  # Provides a fallback from user-supplied cluster config (no terraform_output
  # — deferred expressions are not allowed in config blocks). The terraform
  # cluster input below resolves the full chain including compute output.
  #
  - name: cluster_endpoint_fallback
    value:
      endpoint: "${cluster.endpoint ?? ''}"

# =============================================================================
# Terraform — standalone incus (no workstation)
# =============================================================================
#
# When workstation.runtime is unset, this facet owns the full chain:
#   compute → cluster → gitops
#
# With workstation set, option-workstation owns this chain (and adds a
# workstation → compute link), so everything here is gated off.
#
terraform:

  # ---------------------------------------------------------------------------
  # compute — Talos VMs on a fresh Incus network
  # ---------------------------------------------------------------------------
  #
  # Creates its own network (create_network: true) because there's no
  # workstation stack to inherit one from. Uses the default incus storage pool.
  #
  - name: compute
    when: "workstation.runtime == null || workstation.runtime == ''"
    path: compute/incus
    inputs:
      network_name: ""
      create_network: true
      network_cidr: ${network_effective.cidr_block}
      storage_pools:
        local:
          driver: null
      instances:
        - name: controlplane
          role: controlplane
          count: ${cluster.controlplanes.count ?? 1}
          ipv4: ${cidrhost(network_effective.cidr_block, 10)}
          image: ${cluster.controlplanes.image ?? ("windsor:talos/v" + talos.talos_version + "/amd64")}
          type: virtual-machine
          description: Talos control plane node
          storage_pool: "default"
          root_disk_size: ${string(cluster.controlplanes.root_disk_size ?? 30) + "GB"}
          limits:
            cpu: ${string(cluster.controlplanes.cpu ?? 2)}
            memory: ${string(cluster.controlplanes.memory ?? 2) + "GB"}
          disks: ${talos_common.controlplane_disks}
          config:
            user.hostname: ${values(cluster.controlplanes.nodes)[0].hostname ?? "controlplane-1"}
            environment.TALOSSKU: ${string(cluster.controlplanes.cpu ?? 2) + "CPU-" + string((cluster.controlplanes.memory ?? 2) * 1024) + "RAM"}
            raw.qemu: -boot order=c,menu=off
        - name: worker
          role: worker
          count: ${cluster.workers.count ?? 0}
          ipv4: ${cidrhost(network_effective.cidr_block, 20)}
          image: ${cluster.workers.image ?? ("windsor:talos/v" + talos.talos_version + "/amd64")}
          type: virtual-machine
          description: Talos worker node
          storage_pool: "default"
          root_disk_size: ${string(cluster.workers.root_disk_size ?? 50) + "GB"}
          limits:
            cpu: ${string(cluster.workers.cpu ?? 4)}
            memory: ${string(cluster.workers.memory ?? 4) + "GB"}
          disks: ${talos_common.worker_disks}
          config:
            user.hostname: "${len(cluster.workers.nodes ?? {}) > 0 ? (values(cluster.workers.nodes)[0].hostname ?? 'worker-1') : 'worker-1'}"
            environment.TALOSSKU: "${string(cluster.workers.cpu ?? 4) + 'CPU-' + string((cluster.workers.memory ?? 4) * 1024) + 'RAM'}"
            raw.qemu: -boot order=c,menu=off

  # ---------------------------------------------------------------------------
  # cluster — Talos bootstrap/apply
  # ---------------------------------------------------------------------------
  #
  # Uses compute output when available, falling back to user-supplied nodes
  # for scenarios where we describe an existing cluster.
  #
  - name: cluster
    when: "workstation.runtime == null || workstation.runtime == ''"
    path: cluster/talos
    dependsOn:
      - compute
    parallelism: 1
    inputs:
      cluster_endpoint: >-
        ${cluster.endpoint ?? (len(terraform_output("compute", "controlplanes") ?? []) > 0
          && terraform_output("compute", "controlplanes")[0].endpoint != null
            ? "https://" + split(terraform_output("compute", "controlplanes")[0].endpoint, ":")[0] + ":6443"
            : "")}
      cluster_name: talos
      talos_version: ${talos.talos_version}
      controlplanes: ${terraform_output("compute", "controlplanes") ?? values(cluster.controlplanes.nodes)}
      workers: "${terraform_output(\"compute\", \"workers\") ?? ((cluster.workers.count ?? 0) > 0 ? values(cluster.workers.nodes) : [])}"
      controlplane_disks: ${talos_common.controlplane_disks}
      worker_disks: ${talos_common.worker_disks}
      common_config_patches: ${talos_common.common_config_patches}
      controlplane_volumes: ${talos_common.controlplane_volumes ?? []}
      worker_volumes: ${talos_common.worker_volumes ?? []}

  # ---------------------------------------------------------------------------
  # gitops — Flux
  # ---------------------------------------------------------------------------
  #
  # destroy: false — we don't uninstall Flux on `windsor destroy`; the
  # cluster teardown takes it with it.
  #
  - name: gitops
    when: "workstation.runtime == null || workstation.runtime == ''"
    path: gitops/flux
    dependsOn:
      - cluster
    inputs:
      concurrency: ${max(2, min(floor((cluster.controlplanes.cpu ?? 4) / 2), floor((cluster.controlplanes.memory ?? 4) / 2), 10))}
    destroy: false

# =============================================================================
# Kustomize — MetalLB
# =============================================================================
#
# Incus always has a real bridge network, so MetalLB works unconditionally
# when an LB is requested.
#
kustomize:

  - name: lb-base
    path: lb/base
    when: lb_effective.enabled
    dependsOn:
      - policy-resources
    components:
      - "${lb_effective.driver == 'metallb' ? 'metallb' : ''}"
    timeout: 5m
    interval: 5m

  - name: lb-resources
    path: lb/resources
    when: lb_effective.enabled
    dependsOn:
      - lb-base
    components:
      - ${lb_effective.driver}
      - "${lb_effective.driver}/${network.loadbalancer_mode ?? 'arp'}"
    substitutions:
      loadbalancer_ip_range: "${network_effective.loadbalancer_ips.start + '-' + network_effective.loadbalancer_ips.end}"
    timeout: 5m
    interval: 5m
