kind: Facet
apiVersion: blueprints.windsorcli.dev/v1alpha1
metadata:
  name: observability
  description: Observability stack with metrics backends, log storage drivers, and dashboarding

when: addons.observability.enabled == true

config:
- name: observability_effective
  value:
    dashboards: "${addons.observability.dashboards ?? 'grafana'}"
    logs_driver: "${addons.observability.logs_driver}"

kustomize:

# Grafana dashboards (self-hosted Grafana, typically used with prometheus metrics)
- name: observability
  path: observability
  when: observability_effective.dashboards == 'grafana'
  dependsOn:
    - telemetry-base
  timeout: 15m
  interval: 10m
  components:
    - grafana
    - grafana/prometheus
    - grafana/dashboards/node
    - grafana/dashboards/kubernetes
    - grafana/dashboards/flux
    - grafana/dashboards/cert-manager
    - grafana/dashboards/nginx
    - grafana/dashboards/fluent-bit
    - grafana/dashboards/fluentd
  substitutions:
    external_domain: ${dns.private_domain}
    timezone: ${timezone}
    date_full: "${time_format == '12h' ? 'MMM DD, YYYY @ hh:mm:ss a' : 'YYYY-MM-DD HH:mm:ss'}"
    date_interval_second: "${time_format == '12h' ? 'hh:mm:ss a' : 'HH:mm:ss'}"
    date_interval_minute: "${time_format == '12h' ? 'hh:mm a' : 'HH:mm'}"
    date_interval_hour: "${time_format == '12h' ? 'MMM DD hh:mm a' : 'MM/DD HH:mm'}"
    date_interval_day: "${time_format == '12h' ? 'MMM DD' : 'MM/DD'}"

# Grafana route via nginx-backed gateway-resources (path: ingress)
- name: observability
  path: observability
  when: observability_effective.dashboards == 'grafana' && gateway_effective.enabled == true && gateway_effective.driver == 'nginx'
  dependsOn:
    - gateway-resources
  components:
    - grafana/ingress

# Grafana route via Envoy Gateway API resources
- name: observability
  path: observability
  when: observability_effective.dashboards == 'grafana' && gateway_effective.enabled == true && gateway_effective.driver == 'envoy'
  dependsOn:
    - gateway-resources
  components:
    - grafana/gateway
  substitutions:
    external_domain: ${dns.private_domain}

# FluentD stdout output
- name: observability
  path: observability
  when: observability_effective.logs_driver == 'stdout'
  dependsOn:
    - telemetry-resources
  components:
    - fluentd/outputs/stdout

# Quickwit log storage
- name: observability
  path: observability
  when: observability_effective.logs_driver == 'quickwit'
  dependsOn:
    - csi
    - telemetry-resources
  components:
    - fluentd/outputs/quickwit
    - quickwit
    - quickwit/pvc
    - quickwit/prometheus
    - "${observability_effective.dashboards == 'grafana' ? 'grafana/quickwit' : ''}"
    - "${observability_effective.dashboards == 'grafana' ? 'grafana/dashboards/logs/quickwit' : ''}"

# Elasticsearch + Kibana route via active gateway driver
- name: observability
  path: observability
  when: observability_effective.logs_driver == 'elasticsearch' && gateway_effective.enabled == true
  dependsOn:
    - csi
    - gateway-resources
  components:
    - elasticsearch
    - kibana
    - "${gateway_effective.driver == 'envoy' ? 'kibana/gateway' : 'kibana/ingress'}"
  substitutions:
    external_domain: ${dns.private_domain}

# Elasticsearch telemetry (filebeat driver)
- name: telemetry-base
  path: telemetry/base
  when: observability_effective.logs_driver == 'elasticsearch' && gateway_effective.enabled == true
  timeout: 30m
  interval: 10m
  strategy: replace
  components:
    - prometheus
    - prometheus/flux
    - filebeat

- name: telemetry-resources
  path: telemetry/resources
  when: observability_effective.logs_driver == 'elasticsearch' && gateway_effective.enabled == true
  timeout: 10m
  interval: 5m
  strategy: replace
  dependsOn:
    - telemetry-base
  components:
    - metrics-server
    - prometheus
    - prometheus/flux
