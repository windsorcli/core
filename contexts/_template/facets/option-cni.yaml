kind: Facet
apiVersion: blueprints.windsorcli.dev/v1alpha1
metadata:
  name: cni
  description: Kubernetes CNI driver configuration (Cilium)

when: cni_effective.driver == 'cilium'

terraform:

# Bootstrap Cilium before Flux so that pod networking is available when GitOps controllers start.
# Skipped for docker without workstation (no cluster is provisioned in that case).
- name: cni
  when: "talos_provisioned"
  path: cni/cilium
  dependsOn:
    - cluster
  inputs:
    cluster_endpoint: "${cluster.endpoint ?? cluster_endpoint_fallback.endpoint}"
    talos_mode: true

# Merge cni dep into cluster-extensions so Talos extensions install after Cilium bootstrap.
- name: cluster-extensions
  when: "talos_provisioned"
  path: cluster/talos/extensions
  dependsOn:
    - cni

# Merge cni dep into gitops so Flux waits for Cilium bootstrap before reconciling.
- name: gitops
  when: "talos_provisioned"
  path: gitops/flux
  dependsOn:
    - cni

kustomize:

# Merge cni dep into csi so Longhorn installs after Cilium's eBPF is fully loaded.
# Without this, Longhorn's node-driver-registrar sees transient loopback connectivity
# disruptions during Cilium's eBPF initialization and crashes repeatedly.
- name: csi
  dependsOn:
    - cni

# Cilium dashboards merged into the observability kustomization when Grafana is deployed.
- name: observability
  when: observability_effective.dashboards == 'grafana'
  components:
    - grafana/dashboards/cilium

# Talos: bootstrap was handled by terraform/cni/cilium; Flux adopts the release here.
# Talos-specific security context and cgroup settings are applied via the cilium/talos component.
- name: cni
  path: cni
  when: cluster.driver == 'talos'
  dependsOn:
    - policy-resources
    - telemetry-base
  components:
    - cilium
    - cilium/talos
    - "${(ha ?? false) ? 'cilium/ha' : ''}"
    - "${(gateway_effective.enabled == true && gateway_effective.driver == 'cilium') ? 'cilium/gateway' : ''}"
    - cilium/prometheus
    - cilium/hubble
    - cilium/l2
  substitutions:
    k8s_service_host: ${talos_common.k8s_service_host}
    loadbalancer_start_ip: ${network.loadbalancer_ips.start}
    loadbalancer_end_ip: ${network.loadbalancer_ips.end}
  timeout: 15m
  interval: 5m

# EKS: bootstrap was handled by terraform/cni/cilium; Flux adopts the release here.
# No Talos-specific settings; k8sServiceHost is the EKS control plane endpoint host.
- name: cni
  path: cni
  when: cluster.driver == 'eks'
  dependsOn:
    - policy-resources
    - telemetry-base
  components:
    - cilium
    - "${(ha ?? false) ? 'cilium/ha' : ''}"
    - "${(gateway_effective.enabled == true && gateway_effective.driver == 'cilium') ? 'cilium/gateway' : ''}"
    - cilium/prometheus
    - cilium/hubble
  substitutions:
    k8s_service_host: "${split(split(terraform_output(\"cluster\", \"cluster_endpoint\") ?? \"https://localhost:443\", \"://\")[1], \":\")[0]}"
  timeout: 15m
  interval: 5m
