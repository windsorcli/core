kind: Facet
apiVersion: blueprints.windsorcli.dev/v1alpha1
metadata:
  name: cni
  description: Kubernetes CNI driver configuration (Cilium)

# Active only when Cilium is the resolved CNI and the cluster is enabled; the
# cluster.enabled guard avoids dangling csi→cni deps for workstation-only stacks.
when: cluster.cni.driver == 'cilium' && (cluster.enabled ?? true)

# =============================================================================
# Terraform — Cilium pre-flight bootstrap
# =============================================================================
# Talos chicken-and-egg: Flux needs pod networking, but Flux installs the CNI.
# Bootstrap Cilium via Terraform (Talos API), then Flux adopts it below.
terraform:

  - name: cni
    when: "talos_provisioned"
    path: cni/cilium
    dependsOn:
      - cluster
    inputs:
      cluster_endpoint: "${cluster.endpoint ?? cluster_endpoint_fallback.endpoint}"
      # Talos forbids privileged pods and mounts cgroups at init — both required
      # for Cilium on Talos.
      privileged: false
      cgroup_auto_mount: false
      # Match the Flux HelmRelease's replicas so `windsor up` re-runs don't flap.
      operator_replicas: "${topology == 'single-node' ? 1 : 2}"
  
  - name: gitops
    when: "talos_provisioned"
    path: gitops/flux
    dependsOn:
      - cni

# =============================================================================
# Flux systems
# =============================================================================
# The cilium gateway waits for cni so Cilium is up before the gateway controller
# creates its LoadBalancer Service (and the LBIPAM sharing policy is in place).
flux:

  - name: gateway
    when: gateway.enabled == true && gateway.driver == 'cilium'
    resources:
      - dependsOn:
          - cni-install

  # ---------------------------------------------------------------------------
  # cni — Flux adoption of the HelmRelease
  # ---------------------------------------------------------------------------
  #
  # Terraform bootstraps Cilium; these kustomizations reconcile the same
  # HelmRelease through Flux for day-2 changes. Two variants (Talos / EKS)
  # differ in Talos-specific settings and how k8s_service_host is derived.
  #

  # Talos: cilium/talos applies Talos-specific security context + cgroup
  # settings. k8s_service_host comes from talos_common (cidrhost offset 10).
  # cilium/l2 (LBIPAM + L2 announcements) is skipped when a cloud LB controller
  # owns LoadBalancer Services (hetzner CCM): cloud networks aren't a flat L2
  # domain, so ARP-announced pool IPs never route.
  - name: cni
    when: talos_enabled
    dependsOn:
      - "${telemetry.metrics.enabled || telemetry.logs.enabled ? 'telemetry-install' : ''}"
    install:
      components:
        - cilium
        - cilium/talos
        - "${(gateway.enabled == true && gateway.driver == 'cilium') ? 'cilium/gateway' : ''}"
        - "${telemetry.metrics.enabled ? 'cilium/prometheus' : ''}"
        - cilium/hubble
        - "${lb_effective.controller_required ? '' : 'cilium/l2'}"
      substitutions:
        k8s_service_host: ${talos_common.k8s_service_host}
        loadbalancer_start_ip: ${network.loadbalancer_ips.start}
        loadbalancer_end_ip: ${network.loadbalancer_ips.end}
        cluster_name: ${context}
        operator_replicas: "${topology == 'single-node' ? 1 : 2}"
      timeout: 15m
      interval: 5m

  # EKS: no Talos-specific settings, no L2 component (EKS has its own LB).
  # k8s_service_host is parsed from the EKS cluster_endpoint terraform output.
  - name: cni
    when: eks_enabled
    dependsOn:
      - "${telemetry.metrics.enabled || telemetry.logs.enabled ? 'telemetry-install' : ''}"
    install:
      components:
        - cilium
        - "${(gateway.enabled == true && gateway.driver == 'cilium') ? 'cilium/gateway' : ''}"
        - "${telemetry.metrics.enabled ? 'cilium/prometheus' : ''}"
        - cilium/hubble
      substitutions:
        k8s_service_host: "${split(split(terraform_output(\"cluster\", \"cluster_endpoint\") ?? \"https://localhost:443\", \"://\")[1], \":\")[0]}"
        cluster_name: ${context}
        operator_replicas: "${topology == 'single-node' ? 1 : 2}"
      timeout: 15m
      interval: 5m

  # csi must wait for cni so it installs after Cilium's eBPF is fully loaded.
  # Without this, CSI node-driver-registrar can see transient loopback
  # connectivity disruptions during eBPF init and crash-loop repeatedly.
  - name: csi
    dependsOn:
      - cni-install

  # Add the Cilium dashboards to the observability-resources kustomization when
  # Grafana is the dashboard backend.
  - name: observability
    when: addons.observability.dashboards == 'grafana'
    resources:
      - components:
          - grafana/dashboards/cilium
