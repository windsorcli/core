kind: Facet
apiVersion: blueprints.windsorcli.dev/v1alpha1
metadata:
  name: cni
  description: Kubernetes CNI driver configuration (Cilium)

# Only active when Cilium is the resolved CNI and the cluster is enabled.
# Other CNIs (flannel on docker-desktop, managed CNIs on EKS/AKS) skip this
# facet entirely. The cluster.enabled guard prevents dangling csi→cni
# dependencies when someone stands up just the workstation services.
when: cni_effective.driver == 'cilium' && (cluster.enabled ?? true)

# =============================================================================
# Terraform — Cilium pre-flight bootstrap
# =============================================================================
#
# Cilium has a chicken-and-egg problem on Talos: Flux needs pod networking to
# reconcile anything, but Flux is what normally installs the CNI HelmRelease.
# We resolve this by bootstrapping Cilium directly via Terraform (using the
# Talos API), then letting Flux adopt the release later via the `cni`
# kustomization below.
#
terraform:

  # Bootstrap Cilium before Flux so pod networking exists when GitOps controllers
  # start. Skipped on docker without workstation (no cluster is provisioned).
  - name: cni
    when: "talos_provisioned"
    path: cni/cilium
    dependsOn:
      - cluster
    inputs:
      cluster_endpoint: >-
        ${cluster.endpoint
          ?? (cluster_endpoint_fallback.endpoint != '' ? cluster_endpoint_fallback.endpoint : null)
          ?? (len(terraform_output("compute", "controlplanes") ?? []) > 0
              && terraform_output("compute", "controlplanes")[0].endpoint != null
                ? "https://" + split(terraform_output("compute", "controlplanes")[0].endpoint, ":")[0] + ":6443"
                : "https://localhost:6443")}
      talos_mode: true

  # Dependency merges — insert the `cni` step into the existing terraform graph
  # so Talos extensions and Flux both wait for Cilium bootstrap to finish.
  - name: cluster-extensions
    when: "talos_provisioned"
    path: cluster/talos/extensions
    dependsOn:
      - cni

  - name: gitops
    when: "talos_provisioned"
    path: gitops/flux
    dependsOn:
      - cni

# =============================================================================
# Kustomize — Flux adoption of Cilium HelmRelease + ordering patches
# =============================================================================
#
kustomize:

  # ---------------------------------------------------------------------------
  # Dependency patches
  # ---------------------------------------------------------------------------
  #
  # These entries have no `path:` — they exist purely to inject dependsOn edges
  # into kustomizations that are created in other facets.
  #

  # gateway-resources must wait for cni when Cilium is the gateway driver.
  # Otherwise the Kyverno LBIPAM sharing policy (in cilium/gateway) may not be
  # in place when the Cilium gateway controller creates the
  # cilium-gateway-external Service, and the LB IP won't be shared.
  - name: gateway-resources
    when: gateway_effective.enabled == true && gateway_effective.driver == 'cilium'
    dependsOn:
      - cni

  # csi must wait for cni so it installs after Cilium's eBPF is fully loaded.
  # Without this, CSI node-driver-registrar can see transient loopback
  # connectivity disruptions during eBPF init and crash-loop repeatedly.
  - name: csi
    dependsOn:
      - cni

  # Add the Cilium dashboards to the observability kustomization when Grafana
  # is the dashboard backend.
  - name: observability
    when: observability_effective.dashboards == 'grafana'
    components:
      - grafana/dashboards/cilium

  # ---------------------------------------------------------------------------
  # cni — Flux adoption of the HelmRelease
  # ---------------------------------------------------------------------------
  #
  # The bootstrap was done in Terraform; these kustomizations reconcile the
  # same HelmRelease through Flux so day-2 config changes flow via GitOps.
  #
  # Two variants — they differ in Talos-specific settings and how
  # k8s_service_host is derived:
  #

  # Talos: cilium/talos applies Talos-specific security context + cgroup
  # settings. k8s_service_host comes from talos_common (cidrhost offset 10).
  - name: cni
    path: cni
    when: talos_enabled
    dependsOn:
      - policy-resources
      - telemetry-base
    components:
      - cilium
      - cilium/talos
      - "${topology == 'ha' ? 'cilium/ha' : ''}"
      - "${(gateway_effective.enabled == true && gateway_effective.driver == 'cilium') ? 'cilium/gateway' : ''}"
      - cilium/prometheus
      - cilium/hubble
      - cilium/l2
    substitutions:
      k8s_service_host: ${talos_common.k8s_service_host}
      loadbalancer_start_ip: ${network_effective.loadbalancer_ips.start}
      loadbalancer_end_ip: ${network_effective.loadbalancer_ips.end}
    timeout: 15m
    interval: 5m

  # EKS: no Talos-specific settings, no L2 component (EKS has its own LB).
  # k8s_service_host is parsed from the EKS cluster_endpoint terraform output.
  - name: cni
    path: cni
    when: eks_enabled
    dependsOn:
      - policy-resources
      - telemetry-base
    components:
      - cilium
      - "${topology == 'ha' ? 'cilium/ha' : ''}"
      - "${(gateway_effective.enabled == true && gateway_effective.driver == 'cilium') ? 'cilium/gateway' : ''}"
      - cilium/prometheus
      - cilium/hubble
    substitutions:
      k8s_service_host: "${split(split(terraform_output(\"cluster\", \"cluster_endpoint\") ?? \"https://localhost:443\", \"://\")[1], \":\")[0]}"
    timeout: 15m
    interval: 5m
