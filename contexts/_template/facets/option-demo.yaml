kind: Facet
apiVersion: blueprints.windsorcli.dev/v1alpha1
metadata:
  name: demo
  description: "Demo resources including sample databases and example applications"

when: demo.enabled == true

# =============================================================================
# Flux — demo applications
# =============================================================================
#
# Sample apps reconciled onto the running cluster, so a resources-only system.
# Each demo.resources.* flag toggles one app. The database entry also drives a
# system dependency on the `database` install tier (from addon-database) so
# CNPG is up before the sample app tries to create its DB.
#
flux:

  - name: demo
    path: demo
    dependsOn:
      - "${demo.resources.database == true ? 'database' : ''}"
    resources:
      - components:
          - "${demo.resources.database == true ? 'database' : ''}"
          - "${demo.resources.static == true ? 'static' : ''}"
          - "${demo.resources.bookinfo == true ? 'bookinfo' : ''}"
