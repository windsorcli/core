kind: Facet
apiVersion: blueprints.windsorcli.dev/v1alpha1
metadata:
  name: provider-base
  description: "Base infrastructure components for all providers"

when: (platform ?? provider) != 'none'

config:
- name: platform
  value: "${platform ?? provider ?? 'none'}"
- name: workstation
  value:
    runtime: "${workstation.runtime ?? ''}"
- name: cni_effective
  value:
    # Talos defaults to Cilium; managed clusters (EKS, AKS) use their own CNI.
    driver: "${cluster.cni.driver ?? (cluster.driver == 'talos' ? 'cilium' : '')}"
- name: lb_effective
  value:
    # Cilium provides built-in L2/BGP load balancing; external LB (e.g. MetalLB) is only needed for other CNIs.
    enabled: "${cni_effective.driver != 'cilium'}"
    # NodePort on docker-desktop (no loadbalancer available); loadbalancer everywhere else.
    mode: loadbalancer
- name: dns
  value:
    domain: "${dns.domain ?? (dev == true ? 'test' : '')}"
    public_domain: "${dns.public_domain ?? dns.domain ?? (dev == true ? 'test' : '')}"
    private_domain: "${dns.private_domain ?? dns.domain ?? (dev == true ? 'test' : '')}"
- name: cluster_provisioned
  value: "${(cluster.enabled ?? true) && (platform != 'docker' || (workstation.runtime != null && workstation.runtime != ''))}"
- name: talos_enabled
  value: "${cluster.driver == 'talos' && (cluster.enabled ?? true)}"
- name: talos_provisioned
  value: "${cluster.driver == 'talos' && cluster_provisioned}"
- name: telemetry_effective
  value:
    logs_driver: "${telemetry.logs.driver ?? 'fluentd'}"

substitutions:
  private_domain: ${dns.private_domain}
  public_domain: ${dns.public_domain}

kustomize:

# Cleanup
- name: cleanup
  path: cleanup
  destroyOnly: true
  components:
  - ingresses
  - loadbalancers
  - pvcs
  timeout: 10m
  interval: 5m

# Policy
- name: policy-base
  path: policy/base
  components:
    - kyverno
  timeout: 30m
  interval: 5m

- name: policy-resources
  path: policy/resources
  dependsOn:
    - policy-base
  components:
    - "${(policies.resource_limits_requests ?? 'enabled') != 'disabled' ? 'kyverno/resource-limits-requests' : ''}"
    - "${(policies.require_image_digest ?? 'enabled') != 'disabled' ? 'kyverno/require-image-digest' : ''}"
  timeout: 5m
  interval: 5m
  retryInterval: 1m

# PKI
- name: pki-base
  path: pki/base
  dependsOn:
    - policy-resources
    - telemetry-base
  components:
    - cert-manager
    - cert-manager/prometheus
  timeout: 20m
  interval: 5m

# Telemetry
- name: telemetry-base
  path: telemetry/base
  components:
    - prometheus
    - prometheus/flux
    - fluentbit
  timeout: 30m
  interval: 10m
- name: telemetry-resources
  path: telemetry/resources
  dependsOn:
    - telemetry-base
  components:
    - metrics-server
    - prometheus
    - prometheus/flux
    - fluentbit
    - fluentbit/containerd
    - fluentbit/kubernetes
    - fluentbit/parser
    - fluentbit/systemd
    - fluentbit/prometheus
    - "${telemetry_effective.logs_driver == 'fluentd' ? 'fluentbit/fluentd' : ''}"
  timeout: 10m
  interval: 5m

# FluentD aggregator (log aggregation driver, runs in observability namespace for security)
# Independent of observability addon - FluentD is part of base telemetry infrastructure
# Excluded when elasticsearch is used (which uses filebeat instead) or when log aggregation driver is not fluentd
# Depends on telemetry-base so fluent-operator (and ClusterFilter/Fluentd CRDs) is installed first
- name: observability
  path: observability
  when: telemetry_effective.logs_driver == 'fluentd' && (addons.observability.logs_driver ?? '') != 'elasticsearch'
  dependsOn:
    - telemetry-base
  components:
    - fluentd
    - fluentd/filters/otel
    - fluentd/prometheus
    - "${log_level != 'trace' ? 'fluentd/filters/log-level/' + (log_level ?? 'info') : ''}"
  timeout: 15m
  interval: 10m

# Flux webhook receiver for immediate source reconciliation.
# When Gateway API is in use, gitops waits for gateway-base so HTTPRoute CRDs are installed first.
- name: gitops
  path: gitops/flux
  when: (gitops.webhook.enabled ?? false) == true
  dependsOn:
    - "${gateway_effective.enabled == true ? 'gateway-base' : ''}"
  components:
    - webhook
    - "${gateway_effective.enabled == true ? 'webhook/gateway' : ''}"
    - "${gateway_effective.enabled == true && gateway_effective.driver == 'cilium' ? 'webhook/gateway/cilium' : ''}"
  substitutions:
    git_repository_name: ${gitops.repository.name ?? "local"}
