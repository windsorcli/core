kind: Facet
apiVersion: blueprints.windsorcli.dev/v1alpha1
metadata:
  name: incus
  description: Incus compute platform infrastructure

when: "platform == 'incus' && cluster.driver == 'talos'"

config:
- name: talos_common
  value:
    # On incus, VMs have dedicated block devices — default to longhorn instead of openebs.
    storage_driver: "${cluster.storage.driver ?? 'longhorn'}"
    # Default 30GB data disk for longhorn on incus.
    longhorn_default_disk:
      - name: longhorn
        size: 30

- name: cluster_endpoint_fallback
  value:
    endpoint: >-
      ${
        len(terraform_output("compute", "controlplanes") ?? []) > 0
        && terraform_output("compute", "controlplanes")[0].endpoint != null
          ? "https://" + split(terraform_output("compute", "controlplanes")[0].endpoint, ":")[0] + ":6443"
          : ""
      }

terraform:

- name: compute
  when: "workstation.runtime == null || workstation.runtime == ''"
  path: compute/incus
  inputs:
    network_name: ""
    create_network: true
    network_cidr: ${network.cidr_block}
    storage_pools:
      local:
        driver: null
    instances:
      - name: controlplane
        role: controlplane
        count: ${cluster.controlplanes.count ?? 1}
        ipv4: ${cidrhost(network.cidr_block, 10)}
        image: ${cluster.controlplanes.image ?? ("windsor:talos/v" + talos.talos_version + "/amd64")}
        type: virtual-machine
        description: Talos control plane node
        storage_pool: "default"
        root_disk_size: ${string(cluster.controlplanes.root_disk_size ?? 30) + "GB"}
        limits:
          cpu: ${string(cluster.controlplanes.cpu ?? 2)}
          memory: ${string(cluster.controlplanes.memory ?? 2) + "GB"}
        disks: ${cluster.controlplanes.disks ?? []}
        config:
          user.hostname: ${values(cluster.controlplanes.nodes)[0].hostname ?? "controlplane-1"}
          environment.TALOSSKU: ${string(cluster.controlplanes.cpu ?? 2) + "CPU-" + string((cluster.controlplanes.memory ?? 2) * 1024) + "RAM"}
          raw.qemu: -boot order=c,menu=off
      - name: worker
        role: worker
        count: ${cluster.workers.count ?? 0}
        ipv4: ${cidrhost(network.cidr_block, 20)}
        image: ${cluster.workers.image ?? ("windsor:talos/v" + talos.talos_version + "/amd64")}
        type: virtual-machine
        description: Talos worker node
        storage_pool: "default"
        root_disk_size: ${string(cluster.workers.root_disk_size ?? 50) + "GB"}
        limits:
          cpu: ${string(cluster.workers.cpu ?? 4)}
          memory: ${string(cluster.workers.memory ?? 4) + "GB"}
        disks: ${cluster.workers.disks ?? []}
        config:
          user.hostname: "${len(cluster.workers.nodes ?? {}) > 0 ? (values(cluster.workers.nodes)[0].hostname ?? 'worker-1') : 'worker-1'}"
          environment.TALOSSKU: "${string(cluster.workers.cpu ?? 4) + 'CPU-' + string((cluster.workers.memory ?? 4) * 1024) + 'RAM'}"
          raw.qemu: -boot order=c,menu=off

- name: cluster
  when: "workstation.runtime == null || workstation.runtime == ''"
  path: cluster/talos
  dependsOn:
  - compute
  parallelism: 1
  inputs:
    cluster_endpoint: "${cluster.endpoint ?? cluster_endpoint_fallback.endpoint}"
    cluster_name: talos
    talos_version: ${talos.talos_version}
    controlplanes: ${terraform_output("compute", "controlplanes") ?? values(cluster.controlplanes.nodes)}
    workers: "${terraform_output(\"compute\", \"workers\") ?? ((cluster.workers.count ?? 0) > 0 ? values(cluster.workers.nodes) : [])}"
    controlplane_disks: ${talos_common.controlplane_disks}
    worker_disks: ${talos_common.worker_disks}
    common_config_patches: ${talos_common.common_config_patches}
    controlplane_volumes: ${talos_common.controlplane_volumes ?? []}
    worker_volumes: ${talos_common.worker_volumes ?? []}
    extensions: ${talos_common.extensions ?? []}

- name: gitops
  path: gitops/flux
  dependsOn:
  - cluster
  inputs:
    concurrency: ${max(2, min(floor((cluster.controlplanes.cpu ?? 4) / 2), floor((cluster.controlplanes.memory ?? 4) / 2), 10))}
  destroy: false

kustomize:

# Load Balancer
- name: lb-base
  path: lb/base
  dependsOn:
    - policy-resources
  components:
    - "${network.loadbalancer_driver == 'metallb' ? 'metallb' : ''}"
  timeout: 5m
  interval: 5m

- name: lb-resources
  path: lb/resources
  dependsOn:
    - lb-base
  components:
    - ${network.loadbalancer_driver}
    - "${network.loadbalancer_driver}/${network.loadbalancer_mode}"
  substitutions:
    loadbalancer_ip_range: "${network.loadbalancer_ips.start + '-' + network.loadbalancer_ips.end}"
  timeout: 5m
  interval: 5m
