kind: Facet
apiVersion: blueprints.windsorcli.dev/v1alpha1
metadata:
  name: gateway
  description: Configurable cluster traffic entrypoint

# =============================================================================
# Config — derived values consumed by this facet
# =============================================================================
#
# cert_effective.public_issuer: which public ClusterIssuer is currently
# deployed. The selfsigned and ACME public issuers are deployed as distinct
# ClusterIssuers (`public-selfsigned`, `public-acme`) rather than one
# `public` resource mutated in place — flipping the name flips a Certificate's
# spec.issuerRef.name and forces cert-manager to reissue. See platform-aws.yaml
# and kustomize/pki/resources/public-issuer/.
#
config:

  - name: cert_effective
    value:
      public_issuer: "${(dns.public_domain ?? '') != '' ? 'public-acme' : 'public-selfsigned'}"

# =============================================================================
# Kustomize — Gateway API controller + shared Gateway resource
# =============================================================================
#
# gateway_effective (resolved in platform-base) selects the driver: 'envoy' or
# 'cilium'. All downstream facets dependsOn the canonical names `gateway-base`
# and `gateway-resources` regardless of driver — we emit one variant of each.
#
kustomize:

  # ---------------------------------------------------------------------------
  # gateway-base — CRDs, namespace, controller
  # ---------------------------------------------------------------------------
  #
  # Envoy path: install Envoy Gateway + its service variant (loadbalancer or
  # nodeport, chosen by lb_effective.mode) + prometheus scraping.
  #
  # Depends on pki-base so cert-manager is available for the Gateway TLS
  # certificate created in gateway-resources.
  #
  - name: gateway-base
    path: gateway/base
    when: gateway_effective.enabled == true && gateway_effective.driver != 'cilium'
    dependsOn:
      - pki-base
      - "${lb_effective.controller_required ? 'lb-base' : ''}"
    components:
      - "${gateway_effective.driver}"
      - "${gateway_effective.driver == 'envoy' ? 'envoy/' + lb_effective.mode : ''}"
      - "${gateway_effective.driver == 'envoy' ? 'envoy/prometheus' : ''}"
    timeout: 10m
    interval: 5m

  # Cilium path: Cilium itself provides the Gateway API implementation, so this
  # variant only needs to install the Gateway API CRDs (via the `cilium`
  # component). The Cilium HelmRelease is owned by option-cni.
  - name: gateway-base
    path: gateway/base
    when: gateway_effective.enabled == true && gateway_effective.driver == 'cilium'
    dependsOn:
      - pki-base
      - "${lb_effective.controller_required ? 'lb-base' : ''}"
    components:
      - cilium
    timeout: 10m
    interval: 5m

  # ---------------------------------------------------------------------------
  # cni dep merge (cilium gateway only)
  # ---------------------------------------------------------------------------
  #
  # When Cilium is the gateway driver, the Gateway API CRDs (installed by
  # gateway-base) must exist before the Cilium HelmRelease is applied.
  # Otherwise cilium-operator starts with gatewayAPI.enabled but finds no CRDs
  # and never initializes the Gateway controller.
  #
  - name: cni
    when: gateway_effective.enabled == true && gateway_effective.driver == 'cilium'
    dependsOn:
      - gateway-base

  # ---------------------------------------------------------------------------
  # gateway-resources — shared Gateway CR + TLS certificate
  # ---------------------------------------------------------------------------
  #
  # Conditional components:
  #   - cilium:       patches Gateway spec.infrastructure.annotations so the
  #                   Cilium gateway LB IP is shared with CoreDNS (LBIPAM).
  #   - dns:          UDP/TCP port-53 listeners for CoreDNS. Envoy only —
  #                   Cilium shares the LB IP instead, no extra listeners
  #                   needed.
  #   - lb-address:   pins the Gateway to the start of the LB IP range when an
  #                   in-cluster LB is active.
  #   - flux-webhook: adds a dedicated port-9292 listener for the Flux
  #                   notification receiver (gated on gitops.mode == 'push').
  #
  # `gateway_class_name` drives the Gateway spec.gatewayClassName (envoy,
  # cilium, etc.). `gateway_dns_target` is the IP external-dns advertises for
  # Gateway-attached hostnames.
  #
  - name: gateway-resources
    path: gateway/resources
    when: gateway_effective.enabled == true
    dependsOn:
      - gateway-base
      - "${dns.enabled ? 'dns' : ''}"
      - "${lb_effective.controller_required ? 'lb-base' : ''}"
    components:
      - "${gateway_effective.driver == 'cilium' ? 'cilium' : ''}"
      # Catch-all 404 served by Envoy's directResponse — covers any
      # request that doesn't match a real app's HTTPRoute. Envoy-only:
      # uses the gateway.envoyproxy.io HTTPRouteFilter CRD, which
      # cilium clusters don't ship.
      - "${gateway_effective.driver != 'cilium' ? 'envoy/default-404' : ''}"
      # external-dns hostname annotation on the 404 route. Fires whenever a
      # gateway-managed DNS zone exists — the public zone (dns.public_domain)
      # for the default public path, or the private zone (dns.private_domain)
      # when gateway.access=private. Skipped when neither applies so the
      # substitution doesn't render a malformed ",*." value.
      - "${gateway_effective.driver != 'cilium' && ((dns.public_domain ?? '') != '' || (gateway.access == 'private' && (dns.private_domain ?? '') != '')) ? 'envoy/default-404/external-dns' : ''}"
      - "${gateway_effective.driver != 'cilium' && (addons.private_dns.enabled ?? (dev == true)) == true ? 'dns' : ''}"
      - "${lb_effective.enabled == true ? 'lb-address' : ''}"
      - "${(gitops.mode ?? 'push') == 'push' ? 'flux-webhook' : ''}"
    substitutions:
      gateway_class_name: ${gateway_effective.driver}
      gateway_dns_target: "${lb_effective.enabled == true ? network_effective.loadbalancer_ips.start : ''}"
      # Cert SAN domain.
      # - access=private (with dns.private_domain set): gateway is reachable
      #   only inside the VPC, so the cert covers the private domain (the
      #   public zone is irrelevant even if dns.public_domain is set for
      #   unrelated reasons).
      # - otherwise: prefer dns.public_domain when set; fall back to
      #   dns.private_domain for in-cluster / private-trust configs.
      #
      # access=private without dns.private_domain falls through to the
      # public branch — operator config is incoherent (private gateway
      # with no private domain) and silently degrading is worse than
      # treating it as public; the next assertion they make against the
      # gateway will surface the misconfig.
      external_domain: "${gateway.access == 'private' && (dns.private_domain ?? '') != '' ? dns.private_domain : ((dns.public_domain ?? '') == '' ? (dns.private_domain ?? '') : dns.public_domain)}"

      # ClusterIssuer name for the Gateway's external-web-tls certificate.
      #
      #   private mode (gateway.access=private + dns.private_domain set)
      #     → 'private': ACME DNS-01 can't validate against a VPC-only zone,
      #     so fall back to private selfsigned until an operator wires a
      #     private CA.
      #   AWS, or any platform with dns.public_domain set
      #     → cert_effective.public_issuer (resolves to 'public-acme' or
      #     'public-selfsigned'). AWS always renders public-issuer/* via
      #     pki-resources, so its public branch is always available.
      #   anything else → 'private': no public ClusterIssuer is deployed
      #     on those platforms, so falling back to private selfsigned is
      #     the only safe option.
      gateway_cert_issuer: "${gateway.access == 'private' && (dns.private_domain ?? '') != '' ? 'private' : (platform == 'aws' || (dns.public_domain ?? '') != '' ? cert_effective.public_issuer : 'private')}"
      # Only emitted when a consumer is active: the lb-address patch (in-cluster
      # LB) or the cilium gateway component. NodePort/cloud-managed-LB paths
      # have no consumer, so leave it empty and the harness drops it.
      loadbalancer_start_ip: "${(lb_effective.enabled == true || gateway_effective.driver == 'cilium') ? network_effective.loadbalancer_ips.start : ''}"
    # 5m matches the convention in kustomize/GUIDELINES.md for declarative-only
    # kustomizations (no HelmReleases). Gateway/HTTPRoute/Cert all reach Ready
    # in seconds when the system is healthy; if the cert is stuck on external
    # state (ACME DNS-01), we want the failure surface in 5min, not 10min.
    timeout: 5m
    interval: 5m
