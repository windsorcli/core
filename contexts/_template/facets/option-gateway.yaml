kind: Facet
apiVersion: blueprints.windsorcli.dev/v1alpha1
metadata:
  name: gateway
  description: Configurable cluster traffic entrypoint

# =============================================================================
# Kustomize — Gateway API controller + shared Gateway resource
# =============================================================================
#
# gateway_effective (resolved in platform-base) selects the driver: 'envoy' or
# 'cilium'. All downstream facets dependsOn the canonical names `gateway-base`
# and `gateway-resources` regardless of driver — we emit one variant of each.
#
kustomize:

  # ---------------------------------------------------------------------------
  # gateway-base — CRDs, namespace, controller
  # ---------------------------------------------------------------------------
  #
  # Envoy path: install Envoy Gateway + its service variant (loadbalancer or
  # nodeport, chosen by lb_effective.mode) + prometheus scraping.
  #
  # Depends on pki-base so cert-manager is available for the Gateway TLS
  # certificate created in gateway-resources.
  #
  - name: gateway-base
    path: gateway/base
    when: gateway_effective.enabled == true && gateway_effective.driver != 'cilium'
    dependsOn:
      - pki-base
    components:
      - "${gateway_effective.driver}"
      - "${gateway_effective.driver == 'envoy' ? 'envoy/' + lb_effective.mode : ''}"
      - "${gateway_effective.driver == 'envoy' ? 'envoy/prometheus' : ''}"
    timeout: 10m
    interval: 5m

  # Cilium path: Cilium itself provides the Gateway API implementation, so this
  # variant only needs to install the Gateway API CRDs (via the `cilium`
  # component). The Cilium HelmRelease is owned by option-cni.
  - name: gateway-base
    path: gateway/base
    when: gateway_effective.enabled == true && gateway_effective.driver == 'cilium'
    dependsOn:
      - pki-base
    components:
      - cilium
    timeout: 10m
    interval: 5m

  # ---------------------------------------------------------------------------
  # cni dep merge (cilium gateway only)
  # ---------------------------------------------------------------------------
  #
  # When Cilium is the gateway driver, the Gateway API CRDs (installed by
  # gateway-base) must exist before the Cilium HelmRelease is applied.
  # Otherwise cilium-operator starts with gatewayAPI.enabled but finds no CRDs
  # and never initializes the Gateway controller.
  #
  - name: cni
    when: gateway_effective.enabled == true && gateway_effective.driver == 'cilium'
    dependsOn:
      - gateway-base

  # ---------------------------------------------------------------------------
  # gateway-resources — shared Gateway CR + TLS certificate
  # ---------------------------------------------------------------------------
  #
  # Conditional components:
  #   - cilium:       patches Gateway spec.infrastructure.annotations so the
  #                   Cilium gateway LB IP is shared with CoreDNS (LBIPAM).
  #   - dns:          UDP/TCP port-53 listeners for CoreDNS. Envoy only —
  #                   Cilium shares the LB IP instead, no extra listeners
  #                   needed.
  #   - lb-address:   pins the Gateway to the start of the LB IP range when an
  #                   in-cluster LB is active.
  #   - flux-webhook: adds a dedicated port-9292 listener for the Flux
  #                   notification receiver (gated on gitops.mode == 'push').
  #
  # `gateway_class_name` drives the Gateway spec.gatewayClassName (envoy,
  # cilium, etc.). `gateway_dns_target` is the IP external-dns advertises for
  # Gateway-attached hostnames.
  #
  - name: gateway-resources
    path: gateway/resources
    when: gateway_effective.enabled == true
    dependsOn:
      - gateway-base
    components:
      - "${gateway_effective.driver == 'cilium' ? 'cilium' : ''}"
      # Catch-all 404 served by Envoy's directResponse — covers any
      # request that doesn't match a real app's HTTPRoute. Envoy-only:
      # uses the gateway.envoyproxy.io HTTPRouteFilter CRD, which
      # cilium clusters don't ship.
      - "${gateway_effective.driver != 'cilium' ? 'envoy/default-404' : ''}"
      - "${gateway_effective.driver != 'cilium' && (addons.private_dns.enabled ?? (dev == true)) == true ? 'dns' : ''}"
      - "${lb_effective.enabled == true ? 'lb-address' : ''}"
      - "${(gitops.mode ?? 'push') == 'push' ? 'flux-webhook' : ''}"
    substitutions:
      gateway_class_name: ${gateway_effective.driver}
      gateway_dns_target: "${lb_effective.enabled == true ? network_effective.loadbalancer_ips.start : ''}"
      # Cert SAN domain. When dns.public_domain is set, that's the
      # publicly-routable hostname pattern the cert covers. Otherwise
      # fall back to dns.private_domain (in-cluster / private trust).
      external_domain: "${(dns.public_domain ?? '') == '' ? (dns.private_domain ?? '') : dns.public_domain}"

      # ClusterIssuer name for the Gateway's external-web-tls certificate.
      #
      # AWS always provides a `public` ClusterIssuer (selfsigned by
      # default, ACME when dns.public_domain or dns.public_zone_id is
      # set), so the cert can always reference `public` and just-works
      # default → real-public-cert is a hot swap of the issuer's spec
      # without renaming the ClusterIssuer or the cert resource. Other
      # platforms keep the original `private`/`public` switch keyed on
      # whether the operator wired up a public domain (those platforms
      # don't yet auto-provide a public issuer).
      gateway_cert_issuer: "${platform == 'aws' ? 'public' : ((dns.public_domain ?? '') == '' ? 'private' : 'public')}"
      # Only emitted when a consumer is active: the lb-address patch (in-cluster
      # LB) or the cilium gateway component. NodePort/cloud-managed-LB paths
      # have no consumer, so leave it empty and the harness drops it.
      loadbalancer_start_ip: "${(lb_effective.enabled == true || gateway_effective.driver == 'cilium') ? network_effective.loadbalancer_ips.start : ''}"
    timeout: 10m
    interval: 5m
