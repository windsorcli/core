kind: Facet
apiVersion: blueprints.windsorcli.dev/v1alpha1
metadata:
  name: platform-base
  description: "Base infrastructure components for all platforms"

# Skip the entire facet when no platform/provider is selected (the "none" context
# used for bare blueprint scaffolding and schema validation).
when: (platform ?? provider) != 'none'

# =============================================================================
# Config — effective values
# =============================================================================
#
# platform-base is the single source of truth for every `_effective` computed
# value. Downstream facets (options, addons, platform-*) consume these values;
# they do not re-derive or override them.
#
# Evaluation order matters: later entries may reference earlier ones. Keep
# dependent values below their dependencies (e.g. gateway_effective reads
# cni_effective, so cni_effective must come first).
#
config:

  # ---------------------------------------------------------------------------
  # Platform identity
  # ---------------------------------------------------------------------------
  #
  # `platform` is the canonical field; `provider` is the legacy alias. Accept
  # either and fall back to 'none' so expressions downstream can rely on a
  # non-null string value.
  #
  - name: platform
    value: "${platform ?? provider ?? 'none'}"

  # Normalize workstation.runtime so `workstation.runtime == '...'` checks are
  # safe even when the user didn't supply a workstation block at all.
  - name: workstation
    value:
      runtime: "${workstation.runtime ?? ''}"

  # ---------------------------------------------------------------------------
  # Cluster driver (platform-implied default)
  # ---------------------------------------------------------------------------
  #
  # Managed clouds imply their managed driver: aws → eks, azure → aks. Every
  # other platform (metal, incus, docker, workstation-only) defaults to talos.
  # Computed here in platform-base, before `cni_effective` / `talos_provisioned`
  # / `eks_enabled` are derived, so downstream `when:` guards (option-cni,
  # option-storage, config-talos, the per-platform facets) all see the
  # platform-correct driver without needing their own fallbacks. An explicit
  # `cluster.driver` in values.yaml always wins.
  #
  - name: cluster
    value:
      driver: "${cluster.driver ?? (platform == 'aws' ? 'eks' : (platform == 'azure' ? 'aks' : 'talos'))}"

  # ---------------------------------------------------------------------------
  # CNI driver selection
  # ---------------------------------------------------------------------------
  #
  # Default rules:
  #   - Explicit cluster.cni.driver always wins.
  #   - Talos defaults to Cilium (our standard L2/BGP + Gateway API stack).
  #   - Managed clusters (EKS, AKS) use their own CNI; leave empty so option-cni
  #     does not activate unless cilium is explicitly requested.
  #
  - name: cni_effective
    value:
      driver: "${cluster.cni.driver ?? (cluster.driver == 'talos' ? 'cilium' : '')}"

  # Docker Desktop override: its API server is reachable only via a localhost
  # tunnel, which Cilium's eBPF bootstrap cannot use. Fall back to the built-in
  # flannel CNI (no bootstrap required).
  - name: cni_effective
    when: workstation.runtime == 'docker-desktop'
    value:
      driver: "${cluster.cni.driver ?? 'flannel'}"

  # ---------------------------------------------------------------------------
  # Gateway driver selection
  # ---------------------------------------------------------------------------
  #
  # Resolution order (first non-null wins):
  #   1. Explicit gateway.driver.
  #   2. Legacy ingress.driver alias ('envoy-gateway' and 'nginx' both map to
  #      'envoy'; anything else passes through unchanged).
  #   3. Platform-based default:
  #        - docker-desktop and AWS always use envoy (no cilium LB path).
  #        - Otherwise, use cilium when it is the CNI (native Gateway API),
  #          else envoy.
  #
  - name: gateway_effective
    value:
      enabled: ${gateway.enabled ?? ingress.enabled ?? true}
      driver: "${gateway.driver ?? (ingress.driver == 'envoy-gateway' || ingress.driver == 'nginx' ? 'envoy' : ingress.driver) ?? (workstation.runtime == 'docker-desktop' || platform == 'aws' ? 'envoy' : (cni_effective.driver == 'cilium' ? 'cilium' : 'envoy'))}"

  # ---------------------------------------------------------------------------
  # Load balancer selection
  # ---------------------------------------------------------------------------
  #
  # An in-cluster LB is only needed when:
  #   - The CNI doesn't provide one (Cilium has built-in L2/BGP LB), AND
  #   - A loadbalancer_driver is explicitly configured.
  #
  # Cloud platforms (AWS, Azure) use cloud-managed LBs and leave
  # loadbalancer_driver unset, so this evaluates to false there.
  #
  - name: lb_effective
    value:
      enabled: "${cni_effective.driver != 'cilium' && (network.loadbalancer_driver ?? '') != ''}"
      driver: "${network.loadbalancer_driver ?? 'kube-vip'}"
      mode: loadbalancer

  # Docker Desktop has no routable node network, so Services of type
  # LoadBalancer cannot be reached and an in-cluster LB controller (MetalLB)
  # has nothing to advertise. Force enabled=false so lb-base is not pulled in
  # via controller_required, and switch the gateway service to NodePort.
  - name: lb_effective
    when: workstation.runtime == 'docker-desktop'
    value:
      enabled: false
      mode: nodeport

  # Explicit gateway.service_type wins over driver/platform auto-detect. Lets
  # any platform expose the gateway via NodePort (e.g. single-node Talos VMs
  # without a cluster LB) or force LoadBalancer on docker-desktop.
  #
  # NodePort also forces lb_effective.enabled=false: even when the cluster has
  # a loadbalancer_driver configured (e.g. kube-vip), a NodePort service will
  # never be assigned a LoadBalancer IP, so the lb-address patch and
  # gateway_dns_target would reconcile against an IP that never materializes.
  - name: lb_effective
    when: gateway.service_type == 'NodePort'
    value:
      enabled: false
      mode: nodeport

  - name: lb_effective
    when: gateway.service_type == 'LoadBalancer'
    value:
      mode: loadbalancer

  # True when an in-cluster LB controller is required — i.e. a `lb-base`
  # Kustomization will be composed into the blueprint. This is the union of
  # every `when:` that produces an lb-base entry across the platform facets:
  #   - platform-aws: always (aws-lb-controller manages cloud NLBs/ALBs).
  #   - platform-metal/incus/docker: when lb_effective.enabled (MetalLB).
  #   - platform-azure: never (Azure native LBs, no in-cluster controller).
  # Consumers (gateway-resources, anything that owns a Service type=LoadBalancer
  # or Ingress class managed by aws-lb-controller) reference this in their
  # dependsOn so reverse-topo destroy ordering puts the controller last among
  # in-cluster controllers — it's alive to lift its finalizers (e.g.
  # service.k8s.aws/resources, elbv2.k8s.aws/resources) on Service /
  # TargetGroupBinding deletion before its own Kustomization is torn down.
  # Keep this in sync if a new platform facet adds another path that creates
  # an `lb-base` Kustomization.
  - name: lb_effective
    value:
      controller_required: "${platform == 'aws' || lb_effective.enabled == true}"

  # ---------------------------------------------------------------------------
  # DNS domains
  # ---------------------------------------------------------------------------
  #
  # Three views of the same setting so callers can be specific:
  #   - domain:         user-facing root, used when public/private aren't split.
  #   - public_domain:  publicly-routable hostname pattern (external-dns
  #                     publication, ACME cert SAN). Explicit only — never
  #                     filled in from `domain`. The trigger for "this
  #                     deployment has real public DNS" must be the operator
  #                     setting public_domain themselves; falling back from
  #                     `domain` would silently activate ACME paths whenever
  #                     anyone configured a domain at all.
  #   - private_domain: records served inside the cluster (CoreDNS).
  #
  # `dev: true` defaults `domain` and `private_domain` to 'test' so local dev
  # works without any DNS configuration; public_domain stays empty in dev
  # because there's no real public DNS to talk to.
  #
  - name: dns
    value:
      domain: "${dns.domain ?? (dev == true ? 'test' : '')}"
      public_domain: "${dns.public_domain ?? ''}"
      private_domain: "${dns.private_domain ?? dns.domain ?? (dev == true ? 'test' : '')}"
      enabled: "${(addons.private_dns.enabled ?? false) == true || (dns.public_domain ?? '') != '' || (gateway.access == 'private' && (dns.private_domain ?? '') != '')}"

  # ---------------------------------------------------------------------------
  # Cluster provisioning flags
  # ---------------------------------------------------------------------------
  #
  # cluster_provisioned: true when a cluster should actually exist. On docker,
  # the cluster only exists when a workstation runtime is set — `provider:
  # docker` without workstation is a no-op scaffold used for tests.
  #
  # talos_enabled / eks_enabled: driver-specific gates for cluster.enabled.
  # Used by option-cni and related facets to decide whether to bootstrap.
  #
  # talos_provisioned: talos_enabled + cluster actually provisioned (matters
  # on docker where provisioning requires workstation).
  #
  - name: cluster_provisioned
    value: "${(cluster.enabled ?? true) && (platform != 'docker' || (workstation.runtime != null && workstation.runtime != ''))}"
  - name: talos_enabled
    value: "${cluster.driver == 'talos' && (cluster.enabled ?? true)}"
  - name: talos_provisioned
    value: "${cluster.driver == 'talos' && cluster_provisioned}"
  - name: eks_enabled
    value: "${cluster.driver == 'eks' && (cluster.enabled ?? true)}"

  # ---------------------------------------------------------------------------
  # Topology
  # ---------------------------------------------------------------------------
  #
  # Effective node counts: `count` wins when set (matches platform-docker/incus
  # which use `count` as the authoritative sizing signal), otherwise fall back
  # to the declared `nodes` map length.
  #
  # Topology is declared differently depending on whether the platform gives
  # us a node layout to read:
  #
  #   - Layout declared (metal, incus, docker-compose-style): derive from
  #     effective counts — `count` wins when set, otherwise fall back to
  #     the declared `nodes` map length. 1 total node → single-node;
  #     3+ control planes → ha; otherwise multi-node.
  #
  #   - Workstation runtime with no layout declared (colima, docker-desktop):
  #     platform implicitly provisions 1 CP, so default to single-node.
  #
  #   - Cloud platforms (EKS, AKS) with no layout: explicit `topology` drives.
  #     Defaults to schema default 'multi-node'.
  #
  #   - Explicit `topology` always wins when set. Preserves test overrides
  #     and the rare case where desired behavior diverges from physical layout.
  #
  # The count expressions are inlined (rather than captured in helper config
  # values) because intermediate config values in the same facet are not
  # reliably visible to later `when:` clauses in the engine.
  #
  - name: topology_effective
    value: "${topology ?? 'multi-node'}"
  - name: topology_effective
    when: "((cluster.controlplanes.count ?? len(cluster.controlplanes.nodes ?? {})) + (cluster.workers.count ?? len(cluster.workers.nodes ?? {}))) > 0"
    value: "${topology ?? (((cluster.controlplanes.count ?? len(cluster.controlplanes.nodes ?? {})) + (cluster.workers.count ?? len(cluster.workers.nodes ?? {}))) == 1 ? 'single-node' : (cluster.controlplanes.count ?? len(cluster.controlplanes.nodes ?? {})) >= 3 ? 'ha' : 'multi-node')}"
  - name: topology_effective
    when: "workstation.runtime != '' && ((cluster.controlplanes.count ?? len(cluster.controlplanes.nodes ?? {})) + (cluster.workers.count ?? len(cluster.workers.nodes ?? {}))) == 0"
    value: "${topology ?? 'single-node'}"

  # ---------------------------------------------------------------------------
  # Network effective values
  # ---------------------------------------------------------------------------
  #
  # Compute loadbalancer IP range from the CIDR when the user doesn't supply
  # one. Offsets 266/356 place the range well inside a /16 and clear of the
  # first 256 addresses reserved for nodes/services.
  #
  - name: network_cidr_effective
    value: "${network.cidr_block ?? '10.5.0.0/16'}"
  - name: network_effective
    value:
      cidr_block: "${network_cidr_effective}"
      loadbalancer_ips:
        start: "${network.loadbalancer_ips.start ?? cidrhost(network_cidr_effective, 266)}"
        end: "${network.loadbalancer_ips.end ?? cidrhost(network_cidr_effective, 356)}"

  # ---------------------------------------------------------------------------
  # Telemetry driver
  # ---------------------------------------------------------------------------
  #
  # metrics_enabled / logs_enabled: independent gates for the two halves of the
  # telemetry pipeline. Both default on; disable individually to trim resources
  # on small clusters (e.g. metrics-only when HPA is needed but logs aren't, or
  # logs-only for debugging without the Prometheus overhead).
  #
  # Both are force-on when addons.observability is enabled — the observability
  # addon expects a metrics backend and a log pipeline to be present, so opting
  # the addon in trumps explicit disables here.
  #
  # logs_driver: aggregator choice. Valid values: 'fluentd' (default), 'none'
  # (keep fluent-bit shipper but drop the fluentd aggregator), 'elasticsearch'
  # (filebeat → Elasticsearch, set by addon-observability). Coerced to 'none'
  # when the logs pipeline is disabled so downstream `when:` guards on the
  # fluentd aggregator fall through cleanly.
  #
  - name: telemetry_effective
    value:
      metrics_enabled: ${telemetry.metrics.enabled ?? true}
      logs_enabled: ${telemetry.logs.enabled ?? true}
      logs_driver: "${telemetry.logs.driver ?? 'fluentd'}"

  # Observability addon forces both pipelines on.
  - name: telemetry_effective
    when: addons.observability.enabled == true
    value:
      metrics_enabled: true
      logs_enabled: true

  # No logs pipeline → nothing to aggregate.
  - name: telemetry_effective
    when: telemetry.logs.enabled == false && addons.observability.enabled != true
    value:
      logs_driver: none

# =============================================================================
# Global substitutions
# =============================================================================
#
# Variables exposed to every kustomization's postBuild via Flux variable
# substitution. Declared here (rather than per-kustomization) because they
# are consumed across many components — HTTPRoutes, certificates, external-dns
# annotations — and hardcoding them in each would mean chasing down every
# site on a domain change. Add new globals here only when they are truly
# cross-cutting; per-kustomization values belong on the kustomization.
#
substitutions:
  # FQDN suffix for internal/cluster-local resources (e.g. grafana.test,
  # flux-webhook.test). Resolved by the in-cluster CoreDNS and the workstation
  # DNS forwarder.
  private_domain: ${dns.private_domain}

  # FQDN suffix for externally-reachable resources on cloud platforms. Unused
  # on local/workstation contexts where private_domain covers everything.
  public_domain: ${dns.public_domain}

# =============================================================================
# Kustomize — base cluster resources
# =============================================================================
# =============================================================================
# Terraform — shared gitops inputs
# =============================================================================
#
# Each platform facet declares its own `gitops` terraform block with the
# dependencies it needs. Windsor merges inputs across facets, so adding the
# mode here applies to every platform without repeating it per-facet. In pull
# mode the terraform module drops notification-controller and the webhook
# token secret.
#
terraform:
  - name: gitops
    path: gitops/flux
    inputs:
      mode: ${gitops.mode ?? 'push'}

# =============================================================================
# Kustomize — policy, telemetry, PKI, observability, gitops webhook
# =============================================================================
#
# These kustomizations are always applied (subject to per-entry `when:` guards
# where noted). Ordering below matches the dependency chain:
#
#   policy → telemetry → pki → gitops webhook
#
kustomize:

  # ---------------------------------------------------------------------------
  # Policy (Kyverno)
  # ---------------------------------------------------------------------------
  #
  # policy-base installs the Kyverno controller.
  # policy-resources applies cluster policies; each policy is individually
  # toggleable via the top-level `policies.*` field (defaults to enabled).
  #
  - name: policy-base
    path: policy/base
    when: (policies.enabled ?? true) == true
    components:
      - kyverno
      - "${(policies.reporting ?? 'disabled') == 'enabled' ? 'kyverno/reports' : ''}"
      - "${(policies.cleanup ?? 'disabled') == 'enabled' ? 'kyverno/cleanup' : ''}"
    timeout: 30m
    interval: 5m

  - name: policy-resources
    path: policy/resources
    when: (policies.enabled ?? true) == true
    dependsOn:
      - policy-base
    components:
      - "${(policies.resource_limits_requests ?? 'enabled') != 'disabled' ? 'kyverno/resource-limits-requests' : ''}"
      - "${(policies.require_image_digest ?? 'enabled') != 'disabled' ? 'kyverno/require-image-digest' : ''}"
    timeout: 5m
    interval: 5m
    retryInterval: 1m

  # ---------------------------------------------------------------------------
  # PKI (cert-manager)
  # ---------------------------------------------------------------------------
  #
  # Depends on telemetry-base so cert-manager's ServiceMonitor has a working
  # Prometheus target from the moment it's created.
  #
  - name: pki-base
    path: pki/base
    dependsOn:
      - "${(policies.enabled ?? true) ? 'policy-resources' : ''}"
      - "${telemetry_effective.metrics_enabled || telemetry_effective.logs_enabled ? 'telemetry-base' : ''}"
    components:
      - cert-manager
      - "${telemetry_effective.metrics_enabled ? 'cert-manager/prometheus' : ''}"
    timeout: 20m
    interval: 5m

  # ---------------------------------------------------------------------------
  # Telemetry pipeline (Prometheus + fluent-bit + fluentd aggregator)
  # ---------------------------------------------------------------------------
  #
  # Full collection pipeline, always present on every cluster:
  #
  #   fluent-bit (per-node shipper) → fluentd (central aggregator) → sink
  #
  # addon-observability wires up the sink (stdout / quickwit / elasticsearch).
  # Without observability, fluentd runs as a terminal receiver with no output
  # — logs are buffered and dropped, but the pipeline shape stays intact so
  # enabling observability later doesn't require reconfiguring telemetry.
  #
  # telemetry-base:       operators (Prometheus, fluent-bit, fluent-operator).
  # telemetry-resources:  metrics-server, scrape jobs, fluent-bit filters,
  #                       and the fluent-bit → fluentd shipper when fluentd
  #                       is the chosen aggregator.
  # observability:        fluentd aggregator (skipped when logs_driver='none').
  #
  - name: telemetry-base
    path: telemetry/base
    when: telemetry_effective.metrics_enabled || telemetry_effective.logs_enabled
    components:
      - "${telemetry_effective.metrics_enabled ? 'prometheus' : ''}"
      - "${telemetry_effective.metrics_enabled ? 'prometheus/flux' : ''}"
      - "${telemetry_effective.logs_enabled ? 'fluentbit' : ''}"
    timeout: 30m
    interval: 10m

  - name: telemetry-resources
    path: telemetry/resources
    when: telemetry_effective.metrics_enabled || telemetry_effective.logs_enabled
    dependsOn:
      - telemetry-base
    components:
      # Platform-specific opt-out: AKS (and other managed K8s flavors) ship
      # metrics-server as a built-in add-on, so platform-azure overrides
      # telemetry_effective.metrics_server_enabled to false to skip our copy.
      # Defaults to true via ?? so the AWS / metal / incus paths are unchanged.
      - "${telemetry_effective.metrics_enabled && (telemetry_effective.metrics_server_enabled ?? true) ? 'metrics-server' : ''}"
      - "${telemetry_effective.metrics_enabled ? 'prometheus' : ''}"
      - "${telemetry_effective.metrics_enabled ? 'prometheus/flux' : ''}"
      - "${telemetry_effective.logs_enabled ? 'fluentbit' : ''}"
      - "${telemetry_effective.logs_enabled ? 'fluentbit/containerd' : ''}"
      - "${telemetry_effective.logs_enabled ? 'fluentbit/kubernetes' : ''}"
      - "${telemetry_effective.logs_enabled ? 'fluentbit/parser' : ''}"
      - "${telemetry_effective.logs_enabled ? 'fluentbit/systemd' : ''}"
      - "${telemetry_effective.logs_enabled && telemetry_effective.metrics_enabled ? 'fluentbit/prometheus' : ''}"
      - "${telemetry_effective.logs_driver == 'fluentd' ? 'fluentbit/fluentd' : ''}"
    timeout: 10m
    interval: 5m

  # Central FluentD aggregator. Runs in the observability namespace (where
  # fluent-operator has RBAC). Skipped when logs_driver='none' (aggregation
  # disabled entirely) or when logs_driver='elasticsearch' (filebeat → ES
  # replaces the fluentbit→fluentd path; see addon-observability).
  #
  # The log-level filter is attached unless log_level='trace' (trace wants
  # every log, unfiltered).
  - name: observability
    path: observability
    when: telemetry_effective.logs_driver == 'fluentd' && (addons.observability.logs_driver ?? '') != 'elasticsearch'
    dependsOn:
      - telemetry-base
    components:
      - fluentd
      - fluentd/filters/otel
      - "${telemetry_effective.metrics_enabled ? 'fluentd/prometheus' : ''}"
      - "${log_level != 'trace' ? 'fluentd/filters/log-level/' + (log_level ?? 'info') : ''}"
    timeout: 15m
    interval: 10m

  # ---------------------------------------------------------------------------
  # GitOps webhook receiver
  # ---------------------------------------------------------------------------
  #
  # Exposes a Flux webhook for immediate source reconciliation (push-driven
  # instead of polling). Two variants:
  #
  #   1. No Gateway API: plain HTTP webhook. Used when gateway_effective is
  #      disabled (e.g. cluster.enabled=false with only workstation services).
  #
  #   2. With Gateway API: webhook + HTTPRoute on the port-80 listener. Works
  #      for both Envoy and Cilium gateways. Must wait for gateway-base so the
  #      HTTPRoute CRDs exist before the route is applied.
  #
  # Emission tracks gitops.mode — push emits, pull skips entirely.
  #
  - name: gitops
    path: gitops/flux
    when: (gitops.mode ?? 'push') == 'push' && gateway_effective.enabled != true
    components:
      - webhook
    substitutions:
      git_repository_name: ${gitops.repository.name ?? "local"}

  - name: gitops
    path: gitops/flux
    when: (gitops.mode ?? 'push') == 'push' && gateway_effective.enabled == true
    dependsOn:
      - gateway-base
    components:
      - webhook
      - webhook/gateway
      - "${gateway_effective.driver == 'cilium' ? 'webhook/gateway/cilium' : ''}"
    substitutions:
      git_repository_name: ${gitops.repository.name ?? "local"}
