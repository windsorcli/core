kind: Facet
apiVersion: blueprints.windsorcli.dev/v1alpha1
metadata:
  name: platform-base
  description: "Base infrastructure components for all platforms"

# Skip the facet when no platform is selected (the "none" scaffolding context).
when: (platform ?? 'none') != 'none'

# =============================================================================
# Config — effective values
# =============================================================================
# Single source of truth for every `_effective` value; downstream facets
# consume these without re-deriving. Order matters — dependent values sit
# below their dependencies (gateway reads cluster.cni.driver).
config:

  # Platform identity — fall back to 'none' for a non-null downstream value.
  - name: platform
    value: "${platform ?? 'none'}"

  # Normalize workstation.runtime so equality checks are safe when unset.
  - name: workstation
    value:
      runtime: "${workstation.runtime ?? ''}"

  # Cluster driver and CNI. Managed clouds imply their driver (aws→eks,
  # azure→aks); else talos. Talos defaults CNI to cilium; managed clouds leave
  # it empty. driver is re-derived inline since siblings see user input only.
  - name: cluster
    value:
      driver: "${cluster.driver ?? (platform == 'aws' ? 'eks' : (platform == 'azure' ? 'aks' : 'talos'))}"
      cni:
        driver: "${cluster.cni.driver ?? ((cluster.driver ?? (platform == 'aws' ? 'eks' : (platform == 'azure' ? 'aks' : 'talos'))) == 'talos' ? 'cilium' : '')}"

  # Docker Desktop: Cilium's eBPF bootstrap can't use its localhost-tunnel API
  # server, so fall back to flannel. when:-gated (not inline) because
  # option-workstation defers the workstation block past this one.
  - name: cluster
    when: workstation.runtime == 'docker-desktop'
    value:
      cni:
        driver: "${cluster.cni.driver ?? 'flannel'}"

  # Gateway driver. First non-null wins: explicit gateway.driver; legacy
  # ingress.driver alias (envoy-gateway/nginx → envoy); else platform default
  # — docker-desktop and AWS use envoy, otherwise cilium when it's the CNI. On
  # hetzner the Cilium gateway's LoadBalancer Service is provisioned by the
  # hcloud cloud-controller-manager (no LBIPAM; cilium/l2 is suppressed).
  - name: gateway
    value:
      enabled: ${gateway.enabled ?? ingress.enabled ?? true}
      driver: |-
        ${gateway.driver
          ?? (ingress.driver == 'envoy-gateway' || ingress.driver == 'nginx'
              ? 'envoy'
              : ingress.driver)
          ?? (workstation.runtime == 'docker-desktop' || platform == 'aws'
              ? 'envoy'
              : (cluster.cni.driver == 'cilium' ? 'cilium' : 'envoy'))}

  # Load balancer. In-cluster LB needed only when the CNI lacks one (Cilium has
  # built-in L2/BGP) and loadbalancer_driver is set. Cloud platforms use managed
  # LBs and leave it unset → false.
  - name: lb_effective
    value:
      enabled: "${cluster.cni.driver != 'cilium' && (network.loadbalancer_driver ?? '') != ''}"
      driver: "${network.loadbalancer_driver ?? 'kube-vip'}"
      mode: loadbalancer

  # Docker Desktop has no routable node network, so LoadBalancer Services are
  # unreachable — force enabled=false and switch the gateway to NodePort.
  - name: lb_effective
    when: workstation.runtime == 'docker-desktop'
    value:
      enabled: false
      mode: nodeport

  # Explicit gateway.service_type wins over auto-detect. NodePort also forces
  # enabled=false: a NodePort service never gets a LoadBalancer IP, so the
  # lb-address patch would reconcile against an IP that never materializes.
  - name: lb_effective
    when: gateway.service_type == 'NodePort'
    value:
      enabled: false
      mode: nodeport

  - name: lb_effective
    when: gateway.service_type == 'LoadBalancer'
    value:
      mode: loadbalancer

  # True when an in-cluster LB controller (lb-install) is required: aws always
  # (aws-lb-controller), hetzner always (hcloud cloud-controller-manager),
  # metal/incus/docker/hyperv when lb_effective.enabled, azure never. Consumers
  # dependsOn this so reverse-topo destroy keeps the controller alive to lift its
  # finalizers before its Kustomization is torn down. Keep in sync if a new
  # platform facet creates an lb-install.
  - name: lb_effective
    value:
      controller_required: "${platform == 'aws' || platform == 'hetzner' || lb_effective.enabled == true}"

  # DNS domains. domain: user-facing root. public_domain: publicly-routable
  # pattern (external-dns, ACME SAN) — explicit only, never from `domain`, so
  # configuring a domain doesn't silently activate ACME. private_domain:
  # in-cluster records (CoreDNS). dev:true defaults domain/private_domain to
  # 'test'; public_domain stays empty (no real public DNS).
  - name: dns
    value:
      domain: "${dns.domain ?? (dev == true ? 'test' : '')}"
      public_domain: "${dns.public_domain ?? ''}"
      private_domain: "${dns.private_domain ?? dns.domain ?? (dev == true ? 'test' : '')}"
      enabled: "${(addons.private_dns.enabled ?? false) == true || (dns.public_domain ?? '') != '' || (gateway.access == 'private' && (dns.private_domain ?? '') != '')}"

  # Cluster provisioning flags. cluster_provisioned: a cluster should exist —
  # on docker only when a workstation runtime is set (bare `platform: docker`
  # is a test scaffold). talos_enabled/eks_enabled: driver-specific gates.
  # talos_provisioned: talos_enabled and actually provisioned.
  - name: cluster_provisioned
    value: "${(cluster.enabled ?? true) && (platform != 'docker' || (workstation.runtime != null && workstation.runtime != ''))}"
  - name: talos_enabled
    value: "${cluster.driver == 'talos' && (cluster.enabled ?? true)}"
  - name: talos_provisioned
    value: "${cluster.driver == 'talos' && cluster_provisioned}"
  - name: eks_enabled
    value: "${cluster.driver == 'eks' && (cluster.enabled ?? true)}"

  # Resolve `topology` to a concrete value. Explicit wins; else from node
  # counts (count ?? len(nodes)): 1 → single-node, 3+ CPs → ha, else
  # multi-node; workstation runtime with no layout → single-node; cloud with
  # no layout → multi-node. Single inline expression so later entries still
  # read the original user input, not a value this entry wrote back.
  - name: topology
    value: >-
      ${
        topology
        ?? (
          ((cluster.controlplanes.count ?? len(cluster.controlplanes.nodes ?? {}))
            + (cluster.workers.count ?? len(cluster.workers.nodes ?? {}))) > 0
            ? (
                ((cluster.controlplanes.count ?? len(cluster.controlplanes.nodes ?? {}))
                  + (cluster.workers.count ?? len(cluster.workers.nodes ?? {}))) == 1
                  ? 'single-node'
                  : (cluster.controlplanes.count ?? len(cluster.controlplanes.nodes ?? {})) >= 3
                    ? 'ha'
                    : 'multi-node'
              )
            : workstation.runtime != ''
              ? 'single-node'
              : 'multi-node'
        )
      }

  # Network defaults for downstream facets. Each entry is when:-guarded rather
  # than self-referencing `${network.X ?? default}`: unevaluated block bodies
  # can leak the literal template to an earlier-evaluating facet, so the
  # when-form avoids the self-reference while still computing over other inputs.
  - name: network
    when: (network.cidr_block ?? '') == ''
    value:
      cidr_block: '10.5.0.0/16'
  - name: network
    when: (network.loadbalancer_ips.start ?? '') == ''
    value:
      loadbalancer_ips:
        start: "${cidrhost(network.cidr_block ?? '10.5.0.0/16', 266)}"
  - name: network
    when: (network.loadbalancer_ips.end ?? '') == ''
    value:
      loadbalancer_ips:
        end: "${cidrhost(network.cidr_block ?? '10.5.0.0/16', 356)}"

  # Telemetry driver. metrics/logs: independent gates, both default on.
  # addons.observability forces both on. logs.driver: 'fluentd' (default),
  # 'none' (shipper only, no aggregator), or 'elasticsearch' (via
  # addon-observability); coerced to 'none' when the logs pipeline is off.
  - name: telemetry
    value:
      metrics:
        enabled: ${telemetry.metrics.enabled ?? true}
      logs:
        enabled: ${telemetry.logs.enabled ?? true}
        driver: "${telemetry.logs.driver ?? 'fluentd'}"

  # Single source of truth for the alerts resources.components list, so
  # addon-observability's telemetry override doesn't duplicate it. One line
  # per system, same convention as the resources.components lists below.
  - name: telemetry
    when: (telemetry.alerts.enabled ?? true) && (telemetry.metrics.enabled ?? true)
    value:
      alert_components:
        - prometheus/alerts/node
        - prometheus/alerts/prometheus
        - prometheus/alerts/coredns
        - prometheus/alerts/cert-manager
        - prometheus/alerts/flux
        - "${gateway.enabled == true && gateway.driver == 'envoy' ? 'prometheus/alerts/envoy' : ''}"

  # Observability addon forces both pipelines on.
  - name: telemetry
    when: addons.observability.enabled == true
    value:
      metrics:
        enabled: true
      logs:
        enabled: true

  # No logs pipeline → nothing to aggregate.
  - name: telemetry
    when: telemetry.logs.enabled == false && addons.observability.enabled != true
    value:
      logs:
        driver: none

  # metrics-server, default-on. Managed-K8s platforms that ship it built-in
  # (AKS, future GKE) override to false to avoid two instances on one APIService.
  - name: telemetry
    value:
      metrics_server_enabled: true

# =============================================================================
# Global substitutions
# =============================================================================
# Variables exposed to every kustomization's postBuild via Flux substitution.
# Declared here because they're consumed cross-cutting (HTTPRoutes, certs,
# external-dns). Add only truly cross-cutting values; else per-kustomization.
substitutions:
  # FQDN suffix for cluster-local resources (grafana.test), resolved by CoreDNS.
  private_domain: ${dns.private_domain}

  # FQDN suffix for externally-reachable resources on cloud platforms.
  public_domain: ${dns.public_domain}

# =============================================================================
# CRDs — vendored, applied ahead of the controller
# =============================================================================
# cert-manager, prometheus-operator, fluent-operator CRDs vendored under
# kustomize/crds/, applied before the controllers (charts run CRD-install off).
# Every kustomization auto-depends on this layer (see issue #2021).
crds:
  # renovate: datasource=github-releases depName=cert-manager/cert-manager package=cert-manager/cert-manager
  - cert-manager-1.21.0
  # renovate: datasource=github-releases depName=prometheus-operator/prometheus-operator package=prometheus-operator/prometheus-operator
  - "${telemetry.metrics.enabled ? 'prometheus-operator-0.92.1' : ''}"
  # renovate: datasource=helm depName=fluent-operator package=fluent-operator helmRepo=https://fluent.github.io/helm-charts
  - "${telemetry.logs.enabled ? 'fluent-operator-4.2.0' : ''}"

# =============================================================================
# Kustomize — base cluster resources
# =============================================================================
# =============================================================================
# Terraform — shared gitops inputs
# =============================================================================
# Each platform facet declares its own `gitops` block; Windsor merges inputs,
# so setting mode here applies everywhere. Pull mode drops notification-
# controller and the webhook token secret.
terraform:
  - name: gitops
    path: gitops/flux
    inputs:
      mode: ${gitops.mode ?? 'push'}

# =============================================================================
# Flux systems — policy, telemetry, pki (install/resources tier split)
# =============================================================================
# resources implicitly dependsOn install. policy: Kyverno controller + cluster
# policies (globalDependency — every workload implicitly waits on its resources
# tier; toggle via policies.*). telemetry: operators + metrics-server/
# scrape/filters; addon-observability replaces it for the Elasticsearch driver.
# pki: cert-manager; resources empty here (platform/addon facets add issuers).
flux:
  - name: policy
    when: (policies.enabled ?? true) == true
    globalDependency: true
    install:
      components:
        - kyverno
        - "${(policies.reporting ?? 'disabled') == 'enabled' ? 'kyverno/reports' : ''}"
        - "${(policies.cleanup ?? 'disabled') == 'enabled' ? 'kyverno/cleanup' : ''}"
        - "${topology == 'ha' ? 'kyverno/ha' : ''}"
      timeout: 30m
      interval: 5m
    resources:
      - components:
          - "${(policies.resource_limits_requests ?? 'enabled') != 'disabled' ? 'kyverno/resource-limits-requests' : ''}"
          - "${(policies.require_image_digest ?? 'enabled') != 'disabled' ? 'kyverno/require-image-digest' : ''}"
        timeout: 5m
        interval: 5m
        retryInterval: 1m

  - name: telemetry
    when: telemetry.metrics.enabled || telemetry.logs.enabled
    install:
      components:
        - "${telemetry.metrics.enabled ? 'prometheus' : ''}"
        - "${telemetry.metrics.enabled ? 'prometheus/flux' : ''}"
        - "${telemetry.logs.enabled ? 'fluentbit' : ''}"
        - "${telemetry.metrics.enabled && telemetry.metrics_server_enabled ? 'metrics-server' : ''}"
      timeout: 30m
      interval: 10m
    resources:
      - components:
          - "${telemetry.metrics.enabled ? 'prometheus' : ''}"
          - "${telemetry.metrics.enabled ? 'prometheus/flux' : ''}"
          - "${telemetry.alert_components ?? []}"
          - "${(telemetry.metrics.enabled ?? true) && (telemetry.alerts.slack.webhook_url ?? '') != '' ? 'prometheus/notifications/slack' : ''}"
          - "${telemetry.logs.enabled ? 'fluentbit' : ''}"
          - "${telemetry.logs.enabled ? 'fluentbit/containerd' : ''}"
          - "${telemetry.logs.enabled ? 'fluentbit/kubernetes' : ''}"
          - "${telemetry.logs.enabled ? 'fluentbit/parser' : ''}"
          - "${telemetry.logs.enabled ? 'fluentbit/systemd' : ''}"
          - "${telemetry.logs.enabled && telemetry.metrics.enabled ? 'fluentbit/prometheus' : ''}"
          - "${telemetry.logs.driver == 'fluentd' ? 'fluentbit/fluentd' : ''}"
        substitutions:
          # Only two severities exist in the enum, so "2 or more selected"
          # and "both" are equivalent -- no join() needed for this bounded case.
          #
          # slack_channel bakes in its own quotes: kustomize strips
          # "unnecessary" quotes around a bare ${token}, and an unquoted
          # value starting with "#" gets parsed as a YAML comment after
          # Flux's substitution.
          slack_channel: "\"${telemetry.alerts.slack.channel ?? '#alerts'}\""
          severity_regex: >-
            ${len(telemetry.alerts.slack.severity ?? ['warning', 'critical']) >= 2
              ? 'warning|critical'
              : (telemetry.alerts.slack.severity ?? ['warning', 'critical'])[0]}
          # Base URL for the alert's Grafana links. Explicit override wins; else
          # derive from the domain the Grafana route publishes on (public_domain
          # when set, else private_domain).
          grafana_base_url: >-
            ${telemetry.alerts.grafana_url
              ?? ('https://grafana.' + ((dns.public_domain ?? '') == ''
                    ? (dns.private_domain ?? '')
                    : dns.public_domain))}
        timeout: 10m
        interval: 5m

  # Slack alert routing secret. Gated on a configured webhook so the bare
  # sensitive reference (the composer rejects a ?? fallback, the materializer
  # rejects an empty non-optional value) always resolves against a real value.
  - name: telemetry
    when: (telemetry.alerts.slack.webhook_url ?? '') != ''
    secrets:
      alertmanager-notification-slack:
        url: ${telemetry.alerts.slack.webhook_url}

  # Depends on telemetry-install so cert-manager's ServiceMonitor has a
  # working Prometheus target from the moment it's created.
  - name: pki
    dependsOn:
      - "${telemetry.metrics.enabled || telemetry.logs.enabled ? 'telemetry-install' : ''}"
    install:
      components:
        - cert-manager
        - "${telemetry.metrics.enabled ? 'cert-manager/prometheus' : ''}"
      timeout: 20m
      interval: 5m

  # Central FluentD aggregator. Runs in the observability namespace (where
  # fluent-operator has RBAC). Skipped when logs_driver='none' (aggregation
  # disabled entirely) or when logs_driver='elasticsearch' (filebeat → ES
  # replaces the fluentbit→fluentd path; see addon-observability).
  #
  # The log-level filter is attached unless log_level='trace' (trace wants
  # every log, unfiltered).
  - name: observability
    when: telemetry.logs.driver == 'fluentd' && (addons.observability.logs_driver ?? '') != 'elasticsearch'
    dependsOn:
      - telemetry-install
    install:
      components:
        - fluentd
      timeout: 15m
      interval: 10m
    resources:
      - timeout: 10m
        interval: 5m
        components:
          - fluentd/filters/otel
          - "${telemetry.metrics.enabled ? 'fluentd/prometheus' : ''}"
          - "${log_level != 'trace' ? 'fluentd/filters/log-level/' + (log_level ?? 'info') : ''}"

  # GitOps webhook — push-driven Flux reconciliation, resources-only (onto the
  # terraform-bootstrapped Flux). With a gateway, adds the port-80 HTTPRoute and
  # waits for gateway-resources, since the HTTPRoute parents to the Gateway
  # object created there, not the controller in gateway-install. push emits,
  # pull skips the system.
  - name: gitops
    path: gitops
    when: (gitops.mode ?? 'push') == 'push'
    dependsOn:
      - "${gateway.enabled == true ? 'gateway-resources' : ''}"
    resources:
      - components:
          - webhook
          - "${gateway.enabled == true ? 'webhook/gateway' : ''}"
          - "${gateway.enabled == true && gateway.driver == 'cilium' ? 'webhook/gateway/cilium' : ''}"
        substitutions:
          git_repository_name: ${gitops.repository.name ?? "local"}
        timeout: 5m
        interval: 5m

  # Flux Operator web UI — opt-in (gitops.web_ui) HTTPRoute at flux.<domain>
  # when a gateway is present. Merges into the gitops system above (same
  # path, own when:) rather than its own name, so the two share one
  # gitops-resources Kustomization instead of two both watching gitops/.
  # Resources-only; cilium adds a gateway-reach CNP. Waits for
  # gateway-resources (the HTTPRoute parents to the Gateway object created
  # there), not gateway-install.
  - name: gitops
    path: gitops
    when: gateway.enabled == true && (gitops.web_ui ?? false) == true
    dependsOn:
      - gateway-resources
    resources:
      - components:
          - ui
          - "${gateway.driver == 'cilium' ? 'ui/cilium' : ''}"
        substitutions:
          external_domain: ${gateway_effective.external_domain}
        timeout: 5m
        interval: 5m
