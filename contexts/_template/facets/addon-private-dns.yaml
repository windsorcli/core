kind: Facet
apiVersion: blueprints.windsorcli.dev/v1alpha1
metadata:
  name: private-dns
  description: Self-hosted CoreDNS for private DNS zones

when: addons.private_dns.enabled == true

kustomize:

# Cilium: depends on cni for LBIPAM readiness; CoreDNS gets a LoadBalancer IP directly.
# Others (envoy, etc.): depend on gateway-base for TCPRoute/UDPRoute CRDs.
- name: dns
  path: dns
  dependsOn:
    - pki-base
    - "${gateway_effective.driver == 'cilium' ? 'cni' : 'gateway-base'}"
  timeout: 20m
  interval: 5m
  components:
    - coredns
    - coredns/etcd
    - "${(ha ?? false) ? 'coredns/ha' : ''}"
    - "${gateway_effective.driver == 'cilium' ? 'coredns/loadbalancer' : ''}"
    - "${gateway_effective.driver == 'cilium' ? 'coredns/cilium' : ''}"
    - "${gateway_effective.driver == 'envoy' && gateway_effective.enabled == true ? 'coredns/gateway' : ''}"
    - external-dns
    - external-dns/coredns
    - "${(ha ?? false) ? 'external-dns/ha' : ''}"
    - "${workstation.runtime == 'docker-desktop' ? 'external-dns/localhost' : ''}"
  substitutions:
    external_domain: ${dns.private_domain}
    loadbalancer_start_ip: ${network.loadbalancer_ips.start}
