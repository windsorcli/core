kind: Facet
apiVersion: blueprints.windsorcli.dev/v1alpha1
metadata:
  name: private-dns
  description: Self-hosted CoreDNS for private DNS zones

when: addons.private_dns.enabled == true

requires:
  - paths:
      - dns.private_domain
    message: The private DNS addon serves and publishes records into this zone.

# =============================================================================
# Kustomize — CoreDNS + external-dns
# =============================================================================
#
# Single kustomization with many conditional components. The dependency on
# pki-install is unconditional (CoreDNS needs TLS for DoT/DoH); the second
# dep depends on the gateway driver:
#
#   - Cilium: CoreDNS is exposed via a LoadBalancer Service with LBIPAM, so
#     we wait for cni (Cilium's Gateway controller is part of the CNI).
#   - Envoy / other: CoreDNS port-53 listeners are attached to the edge
#     Gateway via UDP/TCP routes, so we wait for gateway-install to install the
#     route CRDs — but only when the gateway is actually enabled. If no
#     gateway exists, fall through to an empty dep (CoreDNS runs internally
#     but isn't reachable from outside).
#
# Conditional components:
#   - coredns/prometheus:     ServiceMonitor so this instance is covered by
#                             the shared prometheus/alerts/coredns rules.
#   - coredns/ha:             multi-replica + anti-affinity.
#   - coredns/loadbalancer:   Service type LoadBalancer (Cilium only).
#   - coredns/cilium:         LBIPAM annotation to share the gateway IP.
#   - coredns/gateway:        TCPRoute/UDPRoute on port 53 (Envoy only).
#   - external-dns/ha:        replicas/PDBs for external-dns.
#   - external-dns/localhost: docker-desktop override — advertise 127.0.0.1
#                             instead of the unreachable LB IP.
#
flux:

  - name: dns
    dependsOn:
      - pki-install
      - "${gateway.driver == 'cilium' ? 'cni' : (gateway.enabled == true ? 'gateway-install' : '')}"
    install:
      components:
        - coredns
        - coredns/etcd
        - "${telemetry.metrics.enabled ? 'coredns/prometheus' : ''}"
        - "${topology == 'ha' ? 'coredns/ha' : ''}"
        - "${gateway.driver == 'cilium' ? 'coredns/loadbalancer' : ''}"
        - "${gateway.driver == 'cilium' ? 'coredns/cilium' : ''}"
        - "${gateway.driver == 'envoy' && gateway.enabled == true ? 'coredns/gateway' : ''}"
        - external-dns
        - external-dns/providers/coredns
        - "${topology == 'ha' ? 'external-dns/ha' : ''}"
        - "${workstation.runtime == 'docker-desktop' ? 'external-dns/localhost' : ''}"
        # Gateway API HTTPRoute source — pulled in only when the cluster has a
        # Gateway controller. external-dns crashes on startup if it's told to
        # watch HTTPRoute resources whose CRDs aren't installed.
        - "${gateway.enabled == true ? 'external-dns/sources/gateway-httproute' : ''}"
      substitutions:
        external_domain: ${dns.private_domain}
        loadbalancer_start_ip: ${network.loadbalancer_ips.start}
      timeout: 20m
      interval: 5m
