kind: Facet
apiVersion: blueprints.windsorcli.dev/v1alpha1
metadata:
  name: private-dns
  description: Self-hosted CoreDNS for private DNS zones

when: addons.private_dns.enabled == true

kustomize:

# CoreDNS server for private DNS zones
- name: dns
  path: dns
  dependsOn:
    - pki-base
  timeout: 10m
  interval: 5m
  components:
    - coredns
    - coredns/etcd
    - external-dns
    - external-dns/coredns
    # Component name remains "ingress" for compatibility, but it configures
    # both ingress and Gateway API HTTPRoute sources in external-dns.
    - external-dns/ingress
    - "${workstation.runtime == 'docker-desktop' ? 'external-dns/localhost' : ''}"
  substitutions:
    external_domain: ${dns.private_domain}
