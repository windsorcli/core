kind: Facet
apiVersion: blueprints.windsorcli.dev/v1alpha1
metadata:
  name: dev
  description: "Development mode configurations including selfsigned certificates and dev-specific resources"

# Dev mode is a policy flag: turn on conveniences that make local iteration
# fast but are unsuitable for production (selfsigned certs, default Grafana
# password, auto-enabled addons).
when: dev == true

# =============================================================================
# Config — auto-enable common addons
# =============================================================================
#
# Flip common addons on *unless the user explicitly set them to false*.
# The `!= false` form preserves user overrides — setting `enabled: false`
# keeps them off, while leaving the field unset defaults them on.
#
config:
  - name: addons
    value:
      private_ca:
        enabled: ${addons.private_ca.enabled != false}
      private_dns:
        enabled: ${addons.private_dns.enabled != false}
      observability:
        enabled: ${addons.observability.enabled != false}
      database:
        postgres:
          enabled: ${addons.database.postgres.enabled != false}
          driver: "${addons.database.postgres.driver ?? 'cloudnativepg'}"

# =============================================================================
# Kustomize — dev-only resources
# =============================================================================
#
kustomize:

  # PKI for local dev: a selfsigned ClusterIssuer so every certificate works
  # without an external trust anchor. Production uses letsencrypt / a private
  # CA wired up by addon-private-ca.
  - name: pki-resources
    path: pki/resources
    dependsOn:
      - pki-base
    components:
      - public-issuer/selfsigned

  # Grafana dev credentials (default admin password "grafana"). In production
  # observability.admin_password is expected to come from a secret.
  - name: observability
    path: observability
    dependsOn:
      - telemetry-base
    components:
      - grafana/dev
    substitutions:
      admin_password: ${addons.observability.admin_password ?? "grafana"}
