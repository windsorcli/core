kind: Facet
apiVersion: blueprints.windsorcli.dev/v1alpha1
metadata:
  name: dev
  description: "Development mode configurations including selfsigned certificates and dev-specific resources"

# Dev mode: enable local-iteration conveniences unsuitable for production
# (selfsigned certs, default Grafana password, auto-enabled addons).
when: dev == true

# =============================================================================
# Config — auto-enable common addons
# =============================================================================
# Enable common addons unless explicitly set to false; `!= false` preserves
# user overrides while defaulting unset fields on.
config:
  - name: addons
    value:
      private_ca:
        enabled: ${addons.private_ca.enabled != false}
      private_dns:
        enabled: ${addons.private_dns.enabled != false}
      observability:
        enabled: ${addons.observability.enabled != false}
      database:
        postgres:
          enabled: ${addons.database.postgres.enabled != false}
          driver: "${addons.database.postgres.driver ?? 'cloudnativepg'}"

# =============================================================================
# Flux systems — pki resources overlay
# =============================================================================
# Local-dev PKI: a selfsigned ClusterIssuer so certificates work without an
# external trust anchor. Production uses letsencrypt or addon-private-ca.
flux:

  - name: pki
    resources:
      - timeout: 5m
        interval: 5m
        components:
          - public-issuer/selfsigned

  # Grafana dev credentials (default admin password "grafana"). In production
  # observability.admin_password is expected to come from a secret.
  - name: observability
    dependsOn:
      - telemetry-install
    install:
      components:
        - grafana/dev
      substitutions:
        admin_password: ${addons.observability.admin_password ?? "grafana"}
