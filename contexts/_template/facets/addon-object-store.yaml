kind: Facet
apiVersion: blueprints.windsorcli.dev/v1alpha1
metadata:
  name: object-store
  description: Object storage service with multiple drivers

when: addons.object_store.enabled == true

# =============================================================================
# Kustomize — object storage driver (MinIO)
# =============================================================================
#
# `addons.object_store.driver` selects the backend. Currently only MinIO is
# wired up; other drivers (Ceph, cloud-provider managed) can be added as
# additional `- name: object-store-base` blocks gated on their own driver value.
#
kustomize:

  # MinIO depends on csi for PVC-backed storage.
  - name: object-store-base
    path: object-store/base
    when: addons.object_store.driver == 'minio'
    timeout: 10m
    interval: 5m
    dependsOn:
      - csi
    components:
      - minio
