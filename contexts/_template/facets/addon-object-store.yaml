kind: Facet
apiVersion: blueprints.windsorcli.dev/v1alpha1
metadata:
  name: object-store
  description: Object storage service with multiple drivers

when: addons.object_store.enabled == true

# =============================================================================
# Flux systems — object storage driver (MinIO)
# =============================================================================
# `addons.object_store.driver` selects the backend; only MinIO is wired up.
# Operator manages Tenant CRs but creates none (see kustomize/object-store/README.md).
flux:

  # MinIO depends on csi for PVC-backed storage.
  - name: object-store
    when: addons.object_store.driver == 'minio'
    dependsOn:
      - csi
    install:
      components:
        - minio
      timeout: 10m
      interval: 5m
