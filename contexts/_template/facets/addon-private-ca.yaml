kind: Facet
apiVersion: blueprints.windsorcli.dev/v1alpha1
metadata:
  name: private-ca
  description: Private Certificate Authority with trust-manager integration

when: addons.private_ca.enabled == true

# =============================================================================
# Flux systems — pki (trust-manager + private CA issuer)
# =============================================================================
#
# Layers trust-manager (install) and the private-issuer/ca ClusterIssuer
# (resources) onto the pki tiers from platform-base. The issuer becomes the
# default for workload certificates.
#
flux:

  - name: pki
    install:
      components:
        - trust-manager
      timeout: 10m
      interval: 5m
    resources:
      - timeout: 5m
        interval: 5m
        components:
          - private-issuer/ca
