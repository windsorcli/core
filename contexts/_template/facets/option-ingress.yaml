kind: Facet
apiVersion: blueprints.windsorcli.dev/v1alpha1
metadata:
  name: ingress
  description: "Legacy ingress controller compatibility facet"

# Legacy-only path: keep this facet available for explicit compatibility mode,
# but avoid deploying nginx ingress alongside the canonical gateway facet.
when: ingress.enabled == true && ingress.driver == 'nginx' && gateway.enabled == false

kustomize:

- name: ingress
  path: ingress
  dependsOn:
    - pki-base
  components:
    - nginx
    - "${(workstation.runtime ?? (platform == 'docker' ? 'docker-desktop' : '')) == 'docker-desktop' ? 'nginx/nodeport' : 'nginx/loadbalancer'}"
    - nginx/web
    - "${addons.private_dns.enabled == true && (workstation.runtime ?? (platform == 'docker' ? 'docker-desktop' : '')) != 'docker-desktop' ? 'nginx/coredns' : ''}"
    - nginx/prometheus
  timeout: 10m
  interval: 5m
