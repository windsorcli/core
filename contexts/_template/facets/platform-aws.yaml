kind: Facet
apiVersion: blueprints.windsorcli.dev/v1alpha1
metadata:
  name: aws
  description: "AWS provider basic infrastructure"

when: platform == 'aws'

# =============================================================================
# Terraform — S3 state backend, VPC, EKS, optional Cilium bootstrap
# =============================================================================
#
# Dependency chain:
#   backend (S3) → network (VPC) → cluster (EKS) → cluster-additions → cni? → gitops
#
# The backend stack provisions the S3 bucket (and optional DynamoDB lock
# table) that every downstream stack uses for remote state. It runs first on
# apply and — because of the reverse-order teardown — last on destroy, so
# dependent stacks finish writing their final (empty) state before the
# bucket itself is removed.
#
# Cilium is optional on EKS; when used it's a full bring-your-own-CNI
# replacement for VPC-CNI and is bootstrapped before Flux so pod networking
# is up when the first reconciliation runs.
#
terraform:

  # S3 + (optional) DynamoDB remote state backend. context_id/context_path and
  # TF_VAR_operation are auto-injected by the CLI; the module's force_destroy
  # flips on when operation == "destroy" so the bucket can be torn down with
  # its contents on windsor destroy.
  - name: backend
    path: backend/s3

  # VPC with the requested CIDR. domain_name still feeds the private
  # (VPC-scoped) zone created inside this module — internal DNS for VPC
  # resources. The public zone for ACME / external-dns lives in the
  # standalone dns-zone stack below.
  - name: network
    path: network/aws-vpc
    dependsOn:
      - backend
    inputs:
      cidr_block: ${network_effective.cidr_block}
      domain_name: ${dns.public_domain ?? ""}

  # Public Route53 zone for dns.public_domain. Skipped when the operator
  # supplies dns.public_zone_id (BYO — already-managed zone). Lives in
  # its own stack so it can be provisioned independently of the cluster
  # (e.g. zone-only setups, different lifecycle than compute) and so
  # tearing the cluster down doesn't drag the DNS zone (and its NS
  # delegation effort) with it unless the operator explicitly destroys
  # this stack.
  - name: dns-zone
    path: dns/zone/route53
    when: "dns.public_domain != null && dns.public_domain != '' && (dns.public_zone_id ?? '') == ''"
    dependsOn:
      - backend
    inputs:
      domain_name: ${dns.public_domain}

  # EKS cluster itself. When dns.public_domain is set, the cluster module
  # also provisions the cert-manager IAM role + Pod Identity association so
  # the ACME Route53 DNS-01 solver can write challenge records.
  - name: cluster
    path: cluster/aws-eks
    dependsOn:
      - network
    inputs:
      create_cert_manager_role: "${dns.public_domain != null && dns.public_domain != ''}"

  # destroy: false — "additions" are IAM / IRSA / aws-auth entries that are
  # idempotent from EKS's perspective; leave them on teardown, the cluster
  # delete takes them.
  - name: cluster-additions
    path: cluster/aws-eks/additions
    dependsOn:
      - cluster
    destroy: false

  # ---------------------------------------------------------------------------
  # Optional Cilium bootstrap
  # ---------------------------------------------------------------------------
  #
  # Only runs when the user explicitly opts into Cilium on EKS. EKS runs the
  # Cilium agent privileged with chart-default cgroup auto-mount (Amazon Linux
  # AMIs don't mount cgroups during init the way Talos does), so this step
  # omits the privileged/cgroup_auto_mount overrides the Talos path uses.
  #
  - name: cni
    when: "cni_effective.driver == 'cilium'"
    path: cni/cilium
    dependsOn:
      - cluster
    inputs:
      # EKS endpoint only exists after the cluster module applies, so pull it
      # from the terraform output by default. An explicit `cluster.endpoint` in
      # values.yaml still wins — useful for proxied or air-gapped scenarios.
      cluster_endpoint: ${cluster.endpoint ?? terraform_output("cluster", "cluster_endpoint") ?? ""}

  # ---------------------------------------------------------------------------
  # GitOps (two variants)
  # ---------------------------------------------------------------------------
  #
  # Without Cilium: Flux can start as soon as EKS is up (VPC-CNI is preinstalled).
  # With Cilium: wait for the `cni` step so pod networking is healthy first.
  #
  - name: gitops
    when: "cni_effective.driver != 'cilium'"
    path: gitops/flux
    dependsOn:
      - cluster
    inputs:
      concurrency: 5
    destroy: false

  - name: gitops
    when: "cni_effective.driver == 'cilium'"
    path: gitops/flux
    dependsOn:
      - cluster
      - cni
    inputs:
      concurrency: 5
    destroy: false

# =============================================================================
# Kustomize — AWS EBS CSI
# =============================================================================
#
# EBS is the default block storage on EKS. `single_storage_type` configures
# the StorageClass volumeType; gp3 is the current AWS recommendation.
#
kustomize:

  - name: csi
    path: csi
    dependsOn:
      - policy-resources
    components:
      - aws-ebs
    timeout: 5m
    interval: 5m
    substitutions:
      single_storage_type: ${cluster.storage.single_storage_type ?? "gp3"}

  # ---------------------------------------------------------------------------
  # ACME (Let's Encrypt) public ClusterIssuer
  # ---------------------------------------------------------------------------
  #
  # Activates when the operator supplies dns.public_domain. Layers the
  # public-issuer/acme component onto pki-resources, configuring cert-manager
  # to satisfy DNS-01 challenges via Route53 (using the IAM role + Pod
  # Identity binding wired up by the cluster module). option-gateway then
  # picks `public` as the gateway cert issuer because acme_effective.enabled
  # is true (see config block above).
  #
  # Server selection is implicit:
  #   - dev == true → Let's Encrypt staging (avoids prod rate limits during
  #     iteration; staging certs aren't browser-trusted but won't burn quota).
  #   - otherwise → Let's Encrypt production.
  #
  # Hosted zone source: prefer dns.public_zone_id when set (BYO), otherwise
  # use the zone the network module just created. This lets operators who
  # manage their public DNS elsewhere CNAME or delegate a subdomain to a
  # Route53 zone they already own without Windsor provisioning a new one.
  #
  # Required user config when dns.public_domain is set:
  #   - email — operator address Let's Encrypt registers against.
  #   - aws.region — the Route53 API region (defaults to us-east-1).
  #
  - name: pki-resources
    path: pki/resources
    when: "dns.public_domain != null && dns.public_domain != ''"
    dependsOn:
      - pki-base
      - policy-resources
    components:
      - public-issuer/acme
    timeout: 5m
    interval: 5m
    substitutions:
      acme_server: "${dev == true ? 'https://acme-staging-v02.api.letsencrypt.org/directory' : 'https://acme-v02.api.letsencrypt.org/directory'}"
      acme_email: "${email ?? ''}"
      acme_dns_zone: "${dns.public_domain}"
      acme_region: "${aws.region ?? 'us-east-1'}"
      acme_hosted_zone_id: "${dns.public_zone_id ?? terraform_output('dns-zone', 'zone_id') ?? ''}"
