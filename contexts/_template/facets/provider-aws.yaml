kind: Facet
apiVersion: blueprints.windsorcli.dev/v1alpha1
metadata:
  name: aws
  description: "AWS provider basic infrastructure"

when: platform == 'aws'

terraform:
- name: network
  path: network/aws-vpc
  inputs:
    cidr_block: ${network.cidr_block}
    domain_name: ${dns.public_domain ?? ""}
- name: cluster
  path: cluster/aws-eks
  dependsOn:
    - network
- name: cluster-additions
  path: cluster/aws-eks/additions
  dependsOn:
    - cluster
  destroy: false

# Bootstrap Cilium before Flux so that pod networking is available when GitOps controllers start.
# Only active when cni_effective.driver is explicitly set to 'cilium'. EKS does not use Talos mode.
- name: cni
  when: "cni_effective.driver == 'cilium'"
  path: cni/cilium
  dependsOn:
    - cluster
  inputs:
    cluster_endpoint: ${cluster.endpoint ?? ""}

- name: gitops
  when: "cni_effective.driver != 'cilium'"
  path: gitops/flux
  dependsOn:
    - cluster
  inputs:
    concurrency: 5
  destroy: false

- name: gitops
  when: "cni_effective.driver == 'cilium'"
  path: gitops/flux
  dependsOn:
    - cluster
    - cni
  inputs:
    concurrency: 5
  destroy: false

kustomize:

# CSI
- name: csi
  path: csi
  dependsOn:
    - policy-resources
  components:
    - aws-ebs
  timeout: 5m
  interval: 5m
  substitutions:
    single_storage_type: ${cluster.storage.single_storage_type ?? "gp3"}
