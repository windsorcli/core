# addon-private-ca.yaml facet tests
# Tests private Certificate Authority with trust-manager integration

# Common configurations
x-defaults:
  network: &default-network
    cidr_block: 10.5.0.0/16
    loadbalancer_driver: kube-vip
    loadbalancer_mode: arp
    loadbalancer_ips:
      start: "10.5.1.10"
      end: "10.5.1.100"

  cluster: &default-cluster
    driver: talos
    controlplanes:
      nodes:
        controlplane-1:
          endpoint: 10.5.0.10:50000
          node: 10.5.0.10
          hostname: controlplane-1
    workers:
      volumes:
        - /var/mnt/local


cases:
  # Minimal: dev mode enables private-ca addon. Intended: addon pki install tier (trust-manager) overrides provider. See docs/cli-bugs.md if this fails.
  - name: minimal config creates private CA with defaults via dev mode
    values:
      platform: metal
      dev: true
      network: *default-network
      cluster: *default-cluster
    expect:
      flux:
        - name: pki
          install:
            timeout: 10m
            interval: 5m
            components:
              - trust-manager
          resources:
            - dependsOn:
                - policy-resources
              timeout: 5m
              interval: 5m
              components:
                - private-issuer/ca

  # Full: addon explicitly enabled. Intended: addon pki install tier (trust-manager) overrides. See docs/cli-bugs.md if this fails.
  - name: full config creates private CA when addon explicitly enabled
    values:
      platform: metal
      network: *default-network
      cluster: *default-cluster
      addons:
        private_ca:
          enabled: true
    expect:
      flux:
        - name: pki
          install:
            timeout: 10m
            interval: 5m
            components:
              - trust-manager
          resources:
            - dependsOn:
                - policy-resources
              timeout: 5m
              interval: 5m
              components:
                - private-issuer/ca

  # Edge case: Addon disabled
  - name: excludes private CA when addon disabled
    values:
      platform: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      addons:
        private_ca:
          enabled: false
    exclude:
      kustomize:
        - name: pki-resources
          components:
            - private-issuer/ca
