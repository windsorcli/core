# addon-observability.yaml facet tests
# Tests observability stack with multiple log drivers and time format options

# Common configurations
x-defaults:
  network: &default-network
    cidr_block: 10.5.0.0/16
    loadbalancer_driver: kube-vip
    loadbalancer_mode: arp
    loadbalancer_ips:
      start: "10.5.1.10"
      end: "10.5.1.100"

  cluster: &default-cluster
    driver: talos
    controlplanes:
      nodes:
        controlplane-1:
          endpoint: 10.5.0.10:50000
          node: 10.5.0.10
          hostname: controlplane-1
    workers:
      volumes:
        - /var/mnt/local

cases:
  # Minimal: dev mode enables observability addon; addon wins (last-wins)
  # Metal defaults to cilium gateway driver, cilium dashboard included.
  - name: minimal config creates observability with defaults via dev mode
    values:
      platform: metal
      dev: true
      dns:
        domain: example.local
      network: *default-network
      cluster: *default-cluster
    expect:
      flux:
        - name: observability
          install:
            components:
              - grafana
              - grafana/prometheus
            substitutions:
              external_domain: example.local
          resources:
            - timeout: 10m
              interval: 5m
              components:
                - grafana/dashboards/node
                - grafana/dashboards/kubernetes
                - grafana/dashboards/flux
                - grafana/dashboards/cert-manager
                - grafana/dashboards/cilium
                - grafana/dashboards/fluent-bit
                - grafana/dashboards/fluentd
              substitutions:
                date_full: "YYYY-MM-DD HH:mm:ss"
                date_interval_second: "HH:mm:ss"
                date_interval_minute: "HH:mm"
                date_interval_hour: "MM/DD HH:mm"
                date_interval_day: "MM/DD"

  # Full: stdout driver with Gateway API (envoy); grafana/gateway route included.
  - name: full config with stdout driver creates FluentD pipeline and log filtering
    values:
      platform: metal
      dns:
        domain: full.example.com
      time_format: 24h
      log_level: warn
      gateway:
        enabled: true
        driver: envoy
      network: *default-network
      cluster: *default-cluster
      addons:
        observability:
          enabled: true
          logs_driver: stdout
    expect:
      flux:
        - name: telemetry
          resources:
            - components:
                - fluentbit/fluentd
        - name: observability
          install:
            components:
              - grafana
              - grafana/prometheus
            substitutions:
              external_domain: full.example.com
          resources:
            - dependsOn:
                - gateway-resources
                - telemetry-resources
              components:
                - grafana/dashboards/node
                - grafana/dashboards/kubernetes
                - grafana/dashboards/flux
                - grafana/dashboards/cert-manager
                - grafana/dashboards/cilium
                - grafana/dashboards/fluent-bit
                - grafana/dashboards/fluentd
                - grafana/gateway
                - fluentd/outputs/stdout
              substitutions:
                external_domain: full.example.com
                date_full: "YYYY-MM-DD HH:mm:ss"
                date_interval_second: "HH:mm:ss"
                date_interval_minute: "HH:mm"
                date_interval_hour: "MM/DD HH:mm"
                date_interval_day: "MM/DD"

  # Full: quickwit driver; addon wins (last-wins), addon contributes quickwit + fluentd output only
  - name: full config with quickwit driver creates storage pipeline with PVC and dashboards
    values:
      platform: metal
      dns:
        domain: quickwit.example.com
      network: *default-network
      cluster: *default-cluster
      addons:
        observability:
          enabled: true
          logs_driver: quickwit
    expect:
      flux:
        - name: telemetry
          resources:
            - components:
                - fluentbit/fluentd
        - name: observability
          dependsOn:
            - csi-install
          install:
            timeout: 20m
            interval: 5m
            components:
              - quickwit
              - quickwit/pvc
              - quickwit/prometheus
              - grafana/quickwit
          resources:
            - dependsOn:
                - telemetry-resources
              timeout: 10m
              interval: 5m
              components:
                - fluentd/outputs/quickwit
                - grafana/dashboards/logs/quickwit
                - grafana/dashboards/quickwit

  # Full: elasticsearch driver. Addon overrides the telemetry flux: system (filebeat) via strategy: replace.
  - name: full config with elasticsearch driver creates ELK stack with filebeat
    values:
      platform: metal
      dns:
        domain: elk.example.com
      gateway:
        enabled: true
        driver: envoy
      network: *default-network
      cluster: *default-cluster
      addons:
        observability:
          enabled: true
          logs_driver: elasticsearch
    expect:
      flux:
        - name: telemetry
          install:
            components:
              - prometheus
              - prometheus/flux
              - filebeat
              - metrics-server
            timeout: 30m
            interval: 10m
          resources:
            - components:
                - prometheus
                - prometheus/flux
                - prometheus/alerts/node
                - prometheus/alerts/prometheus
                - prometheus/alerts/coredns
              timeout: 10m
          interval: 5m
        - name: observability
          dependsOn:
            - csi-install
          install:
            timeout: 20m
            interval: 5m
            components:
              - elasticsearch
              - kibana
          resources:
            - dependsOn:
                - gateway-resources
              timeout: 10m
              interval: 5m
              components:
                - kibana/gateway
              substitutions:
                external_domain: elk.example.com

  # Addon disabled: Grafana / log-storage outputs are not created, but the FluentD
  # aggregator (part of base telemetry) still runs.
  - name: excludes observability when addon disabled
    values:
      platform: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      addons:
        observability:
          enabled: false
    expect:
      flux:
        - name: observability
          install:
            components:
              - fluentd
          resources:
            - components:
                - fluentd/filters/otel
                - fluentd/prometheus

  # Edge: trace log level; grafana dashboards appear without a route (gateway disabled), stdout output included.
  - name: trace log level creates stdout pipeline without log filter
    values:
      platform: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      log_level: trace
      addons:
        observability:
          enabled: true
          logs_driver: stdout
    expect:
      flux:
        - name: observability
          install:
            components:
              - grafana
              - grafana/prometheus
          resources:
            - dependsOn:
                - telemetry-resources
              components:
                - grafana/dashboards/node
                - grafana/dashboards/kubernetes
                - grafana/dashboards/flux
                - grafana/dashboards/cert-manager
                - grafana/dashboards/cilium
                - grafana/dashboards/fluent-bit
                - grafana/dashboards/fluentd
                - fluentd/outputs/stdout

  # Edge: gateway disabled → gateway.enabled is false → filebeat replacement skipped.
  # telemetry keeps its default fluentbit components; elasticsearch/kibana not deployed.
  - name: elasticsearch with gateway disabled skips filebeat and ELK stack
    values:
      platform: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      addons:
        observability:
          enabled: true
          logs_driver: elasticsearch
    expect:
      flux:
        - name: telemetry
          install:
            components:
              - fluentbit

  # Edge: Envoy gateway mode uses Gateway API route components for Grafana and Kibana.
  - name: elasticsearch observability with envoy uses gateway routes
    values:
      platform: metal
      gateway:
        enabled: true
        driver: envoy
      dns:
        domain: envoy-observability.example.com
      network: *default-network
      cluster: *default-cluster
      addons:
        observability:
          enabled: true
          logs_driver: elasticsearch
    expect:
      flux:
        - name: observability
          dependsOn:
            - csi-install
          resources:
            - dependsOn:
                - gateway-resources
              components:
                - grafana/gateway
                - kibana/gateway
