# addon-observability.yaml facet tests
# Tests observability stack with multiple log drivers and time format options

# Common configurations
x-defaults:
  network: &default-network
    loadbalancer_driver: kube-vip
    loadbalancer_mode: arp
    loadbalancer_ips:
      start: "10.5.1.10"
      end: "10.5.1.100"

  cluster: &default-cluster
    controlplanes:
      nodes:
        controlplane-1:
          endpoint: 10.5.0.10:50000
          node: 10.5.0.10
          hostname: controlplane-1
    workers:
      volumes:
        - /var/mnt/local

  ingress-disabled: &ingress-disabled
    enabled: false
    driver: nginx

cases:
  # Minimal: dev mode enables observability addon; addon wins (last-wins)
  - name: minimal config creates observability with defaults via dev mode
    values:
      provider: metal
      dev: true
      dns:
        domain: example.local
      network: *default-network
      cluster: *default-cluster
    expect:
      kustomize:
        - name: observability
          path: observability
          timeout: 15m
          interval: 10m
          components:
            - grafana
            - grafana/prometheus
            - grafana/dashboards/node
            - grafana/dashboards/kubernetes
            - grafana/dashboards/flux
            - grafana/dashboards/cert-manager
            - grafana/dashboards/nginx
            - grafana/dashboards/fluent-bit
            - grafana/dashboards/fluentd
          substitutions:
            external_domain: example.local
            date_full: "YYYY-MM-DD HH:mm:ss"
            date_interval_second: "HH:mm:ss"
            date_interval_minute: "HH:mm"
            date_interval_hour: "MM/DD HH:mm"
            date_interval_day: "MM/DD"

  # Full: stdout driver; addon wins (last-wins), addon contributes grafana + fluentd/outputs/stdout only
  - name: full config with stdout driver creates FluentD pipeline and log filtering
    values:
      provider: metal
      dns:
        domain: full.example.com
      time_format: 24h
      log_level: warn
      ingress:
        enabled: true
        driver: nginx
      network: *default-network
      cluster: *default-cluster
      addons:
        observability:
          enabled: true
          logs_driver: stdout
    expect:
      kustomize:
        - name: observability
          path: observability
          timeout: 15m
          interval: 10m
          components:
            - grafana
            - grafana/prometheus
            - grafana/dashboards/node
            - grafana/dashboards/kubernetes
            - grafana/dashboards/flux
            - grafana/dashboards/cert-manager
            - grafana/dashboards/nginx
            - grafana/dashboards/fluent-bit
            - grafana/dashboards/fluentd
            - grafana/ingress
            - fluentd/outputs/stdout
          substitutions:
            external_domain: full.example.com
            date_full: "YYYY-MM-DD HH:mm:ss"
            date_interval_second: "HH:mm:ss"
            date_interval_minute: "HH:mm"
            date_interval_hour: "MM/DD HH:mm"
            date_interval_day: "MM/DD"
        - name: telemetry-resources
          dependsOn:
            - telemetry-base
          components:
            - fluentbit/fluentd

  # Full: quickwit driver; addon wins (last-wins), addon contributes quickwit + fluentd output only
  - name: full config with quickwit driver creates storage pipeline with PVC and dashboards
    values:
      provider: metal
      dns:
        domain: quickwit.example.com
      network: *default-network
      cluster: *default-cluster
      addons:
        observability:
          enabled: true
          logs_driver: quickwit
    expect:
      kustomize:
        - name: observability
          path: observability
          dependsOn:
            - csi
            - telemetry-resources
          components:
            - fluentd/outputs/quickwit
            - quickwit
            - quickwit/pvc
            - quickwit/prometheus
            - grafana/quickwit
            - grafana/dashboards/logs/quickwit
        - name: telemetry-resources
          dependsOn:
            - telemetry-base
          components:
            - fluentbit/fluentd

  # Full: elasticsearch driver. Intended: addon overrides telemetry-base (filebeat). See docs/cli-bugs.md if this fails.
  - name: full config with elasticsearch driver creates ELK stack with filebeat
    values:
      provider: metal
      dns:
        domain: elk.example.com
      ingress:
        enabled: true
        driver: nginx
      network: *default-network
      cluster: *default-cluster
      addons:
        observability:
          enabled: true
          logs_driver: elasticsearch
    expect:
      kustomize:
        - name: observability
          path: observability
          dependsOn:
            - csi
            - ingress
          components:
            - elasticsearch
            - kibana
            - kibana/ingress
          substitutions:
            external_domain: elk.example.com
        - name: telemetry-base
          path: telemetry/base
          strategy: replace
          components:
            - prometheus
            - prometheus/flux
            - filebeat
          timeout: 30m
          interval: 10m
        - name: telemetry-resources
          path: telemetry/resources
          strategy: replace
          dependsOn:
            - telemetry-base
          components:
            - metrics-server
            - prometheus
            - prometheus/flux
          timeout: 10m
          interval: 5m

  # Edge case: Addon disabled (FluentD is still included as part of base telemetry)
  - name: excludes observability when addon disabled
    values:
      provider: metal
      ingress: *ingress-disabled
      network: *default-network
      cluster: *default-cluster
      addons:
        observability:
          enabled: false
    expect:
      kustomize:
        - name: observability
          path: observability
          components:
            - fluentd
            - fluentd/filters/otel
            - fluentd/prometheus

  # Edge: trace log level; addon wins, addon contributes fluentd/outputs/stdout only
  - name: trace log level creates stdout pipeline without log filter
    values:
      provider: metal
      ingress: *ingress-disabled
      network: *default-network
      cluster: *default-cluster
      log_level: trace
      addons:
        observability:
          enabled: true
          logs_driver: stdout
    expect:
      kustomize:
        - name: observability
          path: observability
          dependsOn:
            - telemetry-resources
          components:
            - fluentd/outputs/stdout

  # Edge case: Elasticsearch without ingress fails
  - name: fails when elasticsearch selected without ingress
    values:
      provider: metal
      vm:
        driver: docker-desktop
      ingress: *ingress-disabled
      network: *default-network
      cluster: *default-cluster
      addons:
        observability:
          enabled: true
          logs_driver: elasticsearch
    expectError: true
