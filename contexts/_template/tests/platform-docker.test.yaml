# platform-docker.yaml facet tests
# Tests Talos cluster infrastructure for Docker-based dev environments (workstation path).
# With platform: docker, cluster runs only when workstation.enabled == true; chain is workstation → compute → cluster.
#
# Note: platform: docker requires cluster.controlplanes.nodes because
# cluster_endpoint is derived from the first node.

# Common configurations
x-defaults:
  network: &default-network
    cidr_block: 10.5.0.0/16
    loadbalancer_driver: kube-vip
    loadbalancer_mode: arp
    loadbalancer_ips:
      start: "10.5.1.10"
      end: "10.5.1.100"

  dns: &default-dns
    domain: test.local

  cluster: &default-cluster
    driver: talos
    controlplanes:
      nodes:
        controlplane-1: &cp1-node
          endpoint: 10.5.0.10:50000
          node: 10.5.0.10
          hostname: controlplane-1
    workers:
      volumes:
        - /var/mnt/local

  terraform-outputs: &default-terraform-outputs
    compute:
      controlplanes:
        - endpoint: 10.5.0.10:6443
          node: 10.5.0.10
          hostname: controlplane-1
      workers: []

  # Workstation registries with hostname so common_config_patches gets non-empty mirrors (mirror key -> endpoint).
  terraform-outputs-with-workstation-registries: &terraform-outputs-with-workstation-registries
    compute:
      controlplanes:
        - endpoint: 10.5.0.10:6443
          node: 10.5.0.10
          hostname: controlplane-1
      workers: []
    workstation:
      registries:
        gcr.io:
          remote: "https://gcr.io"
          hostname: "gcr.test"


cases:
  # Minimal: workstation path — when workstation enabled, cluster depends on compute (workstation → compute → cluster from option-workstation + platform-docker)
  - name: minimal config creates workstation compute cluster chain with default CSI
    values:
      platform: docker
      workstation:
        runtime: colima
      dns: *default-dns
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
    terraformOutputs: *default-terraform-outputs
    expect:
      terraform:
        - name: cluster
          path: cluster/talos
          parallelism: 1
          inputs:
            cluster_endpoint: https://10.5.0.10:6443
            cluster_name: talos
        - name: cni
          path: cni/cilium
          dependsOn:
            - cluster
          inputs:
            cluster_endpoint: https://10.5.0.10:6443
            privileged: false
            cgroup_auto_mount: false
        - name: gitops
          path: gitops/flux
          dependsOn:
            - cluster
            - cni
          destroy: false
          inputs:
            concurrency: 4
      flux:
        - name: policy
          install:
            components:
              - kyverno
            timeout: 30m
            interval: 5m
          resources:
            - components:
                - kyverno/resource-limits-requests
                - kyverno/require-image-digest
              timeout: 5m
              interval: 5m
        - name: telemetry
          install:
            components:
              - prometheus
              - prometheus/flux
              - fluentbit
              - metrics-server
            timeout: 30m
            interval: 10m
          resources:
            - components:
                - prometheus
                - prometheus/flux
                - prometheus/alerts/node
                - prometheus/alerts/prometheus
                - prometheus/alerts/coredns
                - prometheus/alerts/cert-manager
                - fluentbit
                - fluentbit/containerd
                - fluentbit/kubernetes
                - fluentbit/parser
                - fluentbit/systemd
                - fluentbit/prometheus
              timeout: 10m
              interval: 5m
        - name: pki
          dependsOn:
            - policy-resources
            - telemetry-install
          install:
            components:
              - cert-manager
              - cert-manager/prometheus
            timeout: 20m
            interval: 5m
        - name: cni
          dependsOn:
            - policy-resources
          install:
            components:
              - cilium
              - cilium/talos
              - cilium/l2
            substitutions:
              k8s_service_host: "10.5.0.10"
              loadbalancer_start_ip: "10.5.1.10"
              loadbalancer_end_ip: "10.5.1.100"
        - name: csi
          dependsOn:
            - policy-resources
          install:
            components:
              - openebs
              - openebs/dynamic-localpv
            substitutions:
              local_volume_path: /var/mnt/local
    exclude:
      kustomize:
        - name: lb-install
        - name: lb-resources

  # Registry mirrors: when terraform_output("workstation", "registries") has hostname, common_config_patches must include non-empty mirrors. Colima: no certSANs.
  - name: cluster common_config_patches includes registry mirrors when docker.registries have hostname
    values:
      platform: docker
      workstation:
        runtime: colima
      dns: *default-dns
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      docker:
        registries:
          gcr.io:
            remote: "https://gcr.io"
            hostname: "gcr.test"
    terraformOutputs: *terraform-outputs-with-workstation-registries
    expect:
      terraform:
        - name: cluster
          path: cluster/talos
          inputs:
            common_config_patches: |-
              cluster:
                allowSchedulingOnControlPlanes: true
                controllerManager:
                  extraArgs:
                    leader-elect: "false"
                etcd:
                  extraArgs:
                    auto-compaction-mode: revision
                    auto-compaction-retention: "1000"
                    max-snapshots: "3"
                    max-wals: "3"
                extraManifests:
                - https://raw.githubusercontent.com/alex1989hu/kubelet-serving-cert-approver/v0.8.7/deploy/standalone-install.yaml
                network:
                  cni:
                    name: none
                proxy:
                  disabled: true
                scheduler:
                  extraArgs:
                    leader-elect: "false"
              machine:
                kubelet:
                  extraArgs:
                    rotate-server-certificates: "true"
                registries:
                  config: {}
                  mirrors:
                    gcr.io:
                      endpoints:
                      - http://gcr.test:5000

  # Full: workstation path with fully populated cluster, ingress, volumes (flannel + kube-vip to exercise lb path)
  - name: full config creates workstation compute cluster chain with all options
    values:
      platform: docker
      workstation:
        runtime: colima
      dns: *default-dns
      gateway:
        enabled: true
        driver: envoy
      network: *default-network
      cluster:
        driver: talos
        cni:
          driver: flannel
        controlplanes:
          cpu: 20
          memory: 32
          nodes:
            controlplane-1: *cp1-node
        workers:
          count: 1
          volumes:
            - /mnt/data
        storage:
          local_base_path: /mnt/data
    terraformOutputs: *default-terraform-outputs
    expect:
      terraform:
        - name: cluster
          path: cluster/talos
          parallelism: 1
          inputs:
            cluster_endpoint: https://10.5.0.10:6443
            cluster_name: talos
        - name: gitops
          path: gitops/flux
          dependsOn:
            - cluster
          destroy: false
          inputs:
            concurrency: 10
      flux:
        - name: policy
          install:
            components:
              - kyverno
            timeout: 30m
            interval: 5m
          resources:
            - components:
                - kyverno/resource-limits-requests
                - kyverno/require-image-digest
              timeout: 5m
              interval: 5m
        - name: telemetry
          install:
            components:
              - prometheus
              - prometheus/flux
              - fluentbit
              - metrics-server
            timeout: 30m
            interval: 10m
          resources:
            - components:
                - prometheus
                - prometheus/flux
                - prometheus/alerts/node
                - prometheus/alerts/prometheus
                - prometheus/alerts/coredns
                - prometheus/alerts/cert-manager
                - fluentbit
                - fluentbit/containerd
                - fluentbit/kubernetes
                - fluentbit/parser
                - fluentbit/systemd
                - fluentbit/prometheus
              timeout: 10m
              interval: 5m
        - name: pki
          dependsOn:
            - policy-resources
            - telemetry-install
          install:
            components:
              - cert-manager
              - cert-manager/prometheus
            timeout: 20m
            interval: 5m
        - name: lb
          dependsOn:
            - policy-resources
          install:
            components:
              - kube-vip
              - kube-vip/arp
            substitutions:
              loadbalancer_ip_range: 10.5.1.10-10.5.1.100
            timeout: 5m
            interval: 5m
        - name: csi
          dependsOn:
            - policy-resources
          install:
            components:
              - openebs
              - openebs/dynamic-localpv
            substitutions:
              local_volume_path: /mnt/data

  # Edge: docker without workstation yields no cluster and no gitops (gitops always dependsOn cluster; cluster only when workstation enabled).
  - name: docker without workstation has no cluster terraform
    values:
      platform: docker
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
    expect:
      terraform: []

  # Edge: Docker Desktop excludes load balancer and cilium bootstrap (uses flannel)
  - name: Docker Desktop excludes load balancer and uses flannel CNI
    values:
      platform: docker
      workstation:
        runtime: docker-desktop
      dns: *default-dns
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
    terraformOutputs: *default-terraform-outputs
    expect:
      terraform:
        - name: cluster
          path: cluster/talos
          inputs:
            cluster_endpoint: https://10.5.0.10:6443
    exclude:
      terraform:
        - name: cni
      flux:
        - name: cni
      kustomize:
        - name: lb-install
        - name: lb-resources
