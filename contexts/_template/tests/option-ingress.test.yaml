# option-ingress.yaml facet tests
# Tests configurable ingress controller with various configurations.

# Common configurations
x-defaults:
  network: &default-network
    cidr_block: 10.5.0.0/16
    loadbalancer_driver: kube-vip
    loadbalancer_mode: arp
    loadbalancer_ips:
      start: "10.5.1.10"
      end: "10.5.1.100"

  cluster: &default-cluster
    driver: talos
    controlplanes:
      nodes:
        controlplane-1:
          endpoint: 10.5.0.10:50000
          node: 10.5.0.10
          hostname: controlplane-1
    workers:
      volumes:
        - /var/mnt/local

cases:
  # Minimal: Standard ingress without coredns
  - name: standard ingress without coredns
    values:
      provider: metal
      gateway:
        enabled: false
      ingress:
        enabled: true
        driver: nginx
      network: *default-network
      cluster: *default-cluster
    expect:
      kustomize:
        - name: ingress
          path: ingress
          dependsOn:
            - pki-base
          components:
            - nginx
            - nginx/loadbalancer
            - nginx/web
            - nginx/prometheus
          timeout: 10m
          interval: 5m

  - name: ingress with private DNS includes coredns
    values:
      provider: metal
      gateway:
        enabled: false
      ingress:
        enabled: true
        driver: nginx
      addons:
        private_dns:
          enabled: true
      network: *default-network
      cluster: *default-cluster
    expect:
      kustomize:
        - name: ingress
          path: ingress
          dependsOn:
            - pki-base
          components:
            - nginx
            - nginx/loadbalancer
            - nginx/coredns
            - nginx/web
            - nginx/prometheus
          timeout: 10m
          interval: 5m

  # Docker Desktop: nodeport (no loadbalancer); workstation.runtime in scope selects nginx/nodeport.
  - name: Docker Desktop uses nodeport ingress
    values:
      platform: docker
      gateway:
        enabled: false
      ingress:
        enabled: true
        driver: nginx
      workstation:
        enabled: true
        runtime: docker-desktop
      network: *default-network
      cluster: *default-cluster
    terraformOutputs:
      compute:
        controlplanes:
          - endpoint: 10.5.0.10:6443
            node: 10.5.0.10
            hostname: controlplane-1
        workers: []
      workstation:
        registries: {}
    expect:
      kustomize:
        - name: ingress
          path: ingress
          dependsOn:
            - pki-base
          components:
            - nginx
            - nginx/nodeport
            - nginx/web
            - nginx/prometheus
          timeout: 10m
          interval: 5m

  - name: platform docker with runtime colima uses loadbalancer
    values:
      platform: docker
      gateway:
        enabled: false
      ingress:
        enabled: true
        driver: nginx
      workstation:
        enabled: true
        runtime: colima
      network: *default-network
      cluster: *default-cluster
    terraformOutputs:
      compute:
        controlplanes:
          - endpoint: 10.5.0.10:6443
            node: 10.5.0.10
            hostname: controlplane-1
        workers: []
      workstation:
        registries: {}
    expect:
      kustomize:
        - name: ingress
          path: ingress
          dependsOn:
            - pki-base
          components:
            - nginx
            - nginx/loadbalancer
            - nginx/web
            - nginx/prometheus
          timeout: 10m
          interval: 5m

  # Edge case: Ingress disabled
  - name: excludes ingress when disabled
    values:
      provider: metal
      gateway:
        enabled: false
      ingress:
        enabled: false
        driver: nginx
      network: *default-network
      cluster: *default-cluster
    exclude:
      kustomize:
        - name: ingress
