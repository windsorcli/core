# platform-incus.yaml facet tests
# Tests Incus compute platform with Talos cluster infrastructure
#
# Note: Tests must provide terraformOutputs.compute to mock terraform_output() calls.

# Common configurations
x-defaults:
  network: &default-network
    cidr_block: 10.5.0.0/16
    loadbalancer_driver: kube-vip
    loadbalancer_mode: arp
    loadbalancer_ips:
      start: "10.5.1.10"
      end: "10.5.1.100"

  cluster: &default-cluster
    driver: talos
    controlplanes:
      nodes:
        controlplane-1: &cp1-node
          endpoint: 10.5.0.10:50000
          node: 10.5.0.10
          hostname: controlplane-1
    workers: &default-workers
      count: 1
      volumes:
        - /var/mnt/local
      nodes:
        worker-1:
          endpoint: 10.5.0.20:50000
          node: 10.5.0.20
          hostname: worker-1

  terraform-outputs: &default-terraform-outputs
    compute:
      controlplanes:
        - endpoint: 10.5.0.10:6443
          node: 10.5.0.10
          hostname: controlplane-1
      workers:
        - endpoint: 10.5.0.20:50000
          node: 10.5.0.20
          hostname: worker-1


cases:
  # Minimal: Test default behavior with minimal required fields
  - name: minimal config creates compute and cluster terraform chain with defaults
    values:
      platform: incus
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
    terraformOutputs: *default-terraform-outputs
    expect:
      terraform:
        - name: compute
          path: compute/incus
        - name: cluster
          path: cluster/talos
          dependsOn:
            - compute
          parallelism: 1
          inputs:
            cluster_endpoint: https://10.5.0.10:6443
            cluster_name: talos
        - name: cni
          path: cni/cilium
          dependsOn:
            - cluster
          inputs:
            cluster_endpoint: https://10.5.0.10:6443
            privileged: false
            cgroup_auto_mount: false
        - name: gitops
          path: gitops/flux
          dependsOn:
            - cluster
            - cni
          destroy: false
          inputs:
            concurrency: 2
      flux:
        - name: cni
          dependsOn:
            - policy-resources
          install:
            components:
              - cilium
              - cilium/talos
              - cilium/l2
            substitutions:
              k8s_service_host: "10.5.0.10"
              loadbalancer_start_ip: "10.5.1.10"
              loadbalancer_end_ip: "10.5.1.100"
        - name: csi
          dependsOn:
            - policy-resources
            - telemetry-install
          install:
            components:
              - longhorn
    exclude:
      kustomize:
        - name: lb-install
        - name: lb-resources

  # Full: Test all configurable options together (explicit flannel CNI to exercise MetalLB path)
  - name: full config with custom network, MetalLB, ingress, and all cluster options
    values:
      platform: incus
      dns:
        private_domain: test
      gateway:
        enabled: true
        driver: envoy
      addons:
        private_dns:
          enabled: true
      network:
        cidr_block: 10.10.0.0/16
        loadbalancer_driver: metallb
        loadbalancer_mode: arp
        loadbalancer_ips:
          start: "10.10.1.10"
          end: "10.10.1.100"
      cluster:
        driver: talos
        cni:
          driver: flannel
        controlplanes:
          count: 3
          cpu: 4
          memory: 8
          root_disk_size: 50
          nodes:
            controlplane-1:
              endpoint: 10.10.0.10:50000
              node: 10.10.0.10
              hostname: cp-1
        workers:
          count: 2
          cpu: 8
          memory: 16
          volumes:
            - /mnt/storage
          nodes:
            worker-1:
              endpoint: 10.10.0.20:50000
              node: 10.10.0.20
              hostname: wk-1
        storage:
          local_base_path: /mnt/storage
    terraformOutputs:
      compute:
        controlplanes:
          - endpoint: 10.10.0.10:6443
            node: 10.10.0.10
            hostname: cp-1
        workers:
          - endpoint: 10.10.0.20:50000
            node: 10.10.0.20
            hostname: wk-1
    expect:
      terraform:
        - name: compute
          path: compute/incus
        - name: cluster
          path: cluster/talos
          dependsOn:
            - compute
          parallelism: 1
          inputs:
            cluster_endpoint: https://10.10.0.10:6443
            cluster_name: talos
        - name: gitops
          path: gitops/flux
          dependsOn:
            - cluster
          destroy: false
          inputs:
            concurrency: 2
      flux:
        - name: lb
          dependsOn:
            - policy-resources
          install:
            components:
              - metallb
            timeout: 5m
            interval: 5m
          resources:
            - components:
                - metallb/arp
              substitutions:
                loadbalancer_ip_range: 10.10.1.10-10.10.1.100
              timeout: 5m
              interval: 5m
        - name: gateway
          dependsOn:
            - pki-install
          install:
            components:
              - envoy
              - envoy/loadbalancer
              - envoy/prometheus
            timeout: 10m
            interval: 5m
          resources:
            - components:
                - dns
              timeout: 10m
              interval: 5m
        - name: csi
          dependsOn:
            - policy-resources
            - telemetry-install
          install:
            components:
              - longhorn

  # Edge case: colima-incus uses Incus path (platform selects compute/incus; option-workstation does not apply)
  - name: colima-incus uses compute/incus not docker stack
    values:
      platform: incus
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
    terraformOutputs: *default-terraform-outputs
    expect:
      terraform:
        - name: compute
          path: compute/incus
        - name: cluster
          path: cluster/talos
    exclude:
      terraform:
        - name: workstation
        - path: compute/docker

  # Edge case: Colima uses existing incusbr0 network (avoids creating a new bridge)
  - name: Colima uses existing incusbr0 network
    values:
      platform: incus
      workstation:
        runtime: colima
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
    terraformOutputs: *default-terraform-outputs
    expect:
      terraform:
        - name: workstation
          path: workstation/incus
          inputs:
            network_name: incusbr0
            create_network: false
      flux:
        - name: telemetry
          install:
            components:
              - prometheus
              - prometheus/flux
              - fluentbit

  # colima-incus: defaults to flannel CNI (no cilium overhead; used for storage driver testing)
  - name: colima-incus defaults to flannel CNI and kube-vip lb
    values:
      platform: incus
      workstation:
        runtime: colima
      network: *default-network
      cluster: *default-cluster
    terraformOutputs: *default-terraform-outputs
    expect:
      terraform:
        - name: gitops
          path: gitops/flux
          dependsOn:
            - cluster
      flux:
        - name: lb
          install:
            components:
              - kube-vip
              - kube-vip/arp
    exclude:
      terraform:
        - name: cni
      flux:
        - name: cni

  # Edge case: Schedulable controlplanes use controlplane volume path
  - name: schedulable controlplanes use controlplane volume path for CSI
    values:
      platform: incus
      gateway:
        enabled: false
      network: *default-network
      cluster:
        driver: talos
        controlplanes:
          schedulable: true
          volumes:
            - /data/local
          nodes:
            controlplane-1: *cp1-node
        workers: *default-workers
        storage:
          local_base_path: /data/local
    terraformOutputs: *default-terraform-outputs
    expect:
      flux:
        - name: csi
