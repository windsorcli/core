# platform-metal.yaml facet tests
# Tests Talos cluster infrastructure with load balancer and ingress configuration
#
# Note: provider: metal requires cluster.controlplanes.nodes because
# cluster_endpoint is derived from the first node.

# Common configurations
x-defaults:
  network: &default-network
    cidr_block: 10.5.0.0/16
    loadbalancer_driver: kube-vip
    loadbalancer_mode: arp
    loadbalancer_ips:
      start: "10.5.1.10"
      end: "10.5.1.100"

  cluster: &default-cluster
    driver: talos
    controlplanes:
      nodes:
        controlplane-1: &cp1-node
          endpoint: 10.5.0.10:50000
          node: 10.5.0.10
          hostname: controlplane-1
    workers:
      volumes:
        - /var/mnt/local


cases:
  # Minimal: Test default behavior with required fields only
  - name: minimal config creates Talos cluster with Cilium L2 and default CSI
    values:
      provider: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
    expect:
      terraform:
        - name: cluster
          path: cluster/talos
          parallelism: 1
          inputs:
            cluster_endpoint: https://10.5.0.10:6443
            cluster_name: talos
        - name: cni
          path: cni/cilium
          dependsOn:
            - cluster
          inputs:
            cluster_endpoint: https://10.5.0.10:6443
            privileged: false
            cgroup_auto_mount: false
        - name: gitops
          path: gitops/flux
          dependsOn:
            - cluster
            - cni
          destroy: false
          inputs:
            concurrency: 4
            mode: push
      kustomize:
        - name: cleanup
          path: cleanup
          destroyOnly: true
          components:
            - ingresses
            - loadbalancers
            - pvcs
          timeout: 10m
          interval: 5m
        - name: policy-base
          path: policy/base
          components:
            - kyverno
          timeout: 30m
          interval: 5m
        - name: policy-resources
          path: policy/resources
          dependsOn:
            - policy-base
          components:
            - kyverno/resource-limits-requests
            - kyverno/require-image-digest
          timeout: 5m
          interval: 5m
        - name: pki-base
          path: pki/base
          dependsOn:
            - policy-resources
            - telemetry-base
          components:
            - cert-manager
            - cert-manager/prometheus
          timeout: 20m
          interval: 5m
        - name: telemetry-base
          path: telemetry/base
          components:
            - prometheus
            - prometheus/flux
            - fluentbit
          timeout: 30m
          interval: 10m
        - name: telemetry-resources
          path: telemetry/resources
          dependsOn:
            - telemetry-base
          components:
            - metrics-server
            - prometheus
            - prometheus/flux
            - fluentbit
            - fluentbit/containerd
            - fluentbit/kubernetes
            - fluentbit/parser
            - fluentbit/systemd
            - fluentbit/prometheus
          timeout: 10m
          interval: 5m
        - name: cni
          path: cni
          dependsOn:
            - policy-resources
          components:
            - cilium
            - cilium/talos
            - cilium/l2
          substitutions:
            k8s_service_host: "10.5.0.10"
            loadbalancer_start_ip: "10.5.1.10"
            loadbalancer_end_ip: "10.5.1.100"
          timeout: 15m
          interval: 5m
        - name: csi
          path: csi
          dependsOn:
            - policy-resources
          components:
            - openebs
            - openebs/dynamic-localpv
          substitutions:
            local_volume_path: /var/mnt/local
          timeout: 20m
          interval: 5m
    exclude:
      kustomize:
        - name: lb-base
        - name: lb-resources

  # Full: Test all configurable options together (explicit flannel CNI to exercise MetalLB path)
  - name: full config with MetalLB, custom resources, ingress, and custom worker volume
    values:
      provider: metal
      workstation:
        runtime: colima
      gateway:
        enabled: true
        driver: envoy
      network:
        loadbalancer_driver: metallb
        loadbalancer_mode: layer2
        loadbalancer_ips:
          start: "192.168.1.100"
          end: "192.168.1.200"
      cluster:
        driver: talos
        cni:
          driver: flannel
        controlplanes:
          cpu: 20
          memory: 32
          nodes:
            controlplane-1: *cp1-node
        workers:
          count: 1
          volumes:
            - /mnt/data
        storage:
          local_base_path: /mnt/data
    expect:
      terraform:
        - name: cluster
          path: cluster/talos
          parallelism: 1
          inputs:
            cluster_endpoint: https://10.5.0.10:6443
            cluster_name: talos
        - name: gitops
          path: gitops/flux
          dependsOn:
            - cluster
          destroy: false
          inputs:
            concurrency: 10
      kustomize:
        - name: cleanup
          path: cleanup
          destroyOnly: true
          components:
            - ingresses
            - loadbalancers
            - pvcs
          timeout: 10m
          interval: 5m
        - name: policy-base
          path: policy/base
          components:
            - kyverno
          timeout: 30m
          interval: 5m
        - name: policy-resources
          path: policy/resources
          dependsOn:
            - policy-base
          components:
            - kyverno/resource-limits-requests
            - kyverno/require-image-digest
          timeout: 5m
          interval: 5m
        - name: pki-base
          path: pki/base
          dependsOn:
            - policy-resources
            - telemetry-base
          components:
            - cert-manager
            - cert-manager/prometheus
          timeout: 20m
          interval: 5m
        - name: telemetry-base
          path: telemetry/base
          components:
            - prometheus
            - prometheus/flux
            - fluentbit
          timeout: 30m
          interval: 10m
        - name: telemetry-resources
          path: telemetry/resources
          dependsOn:
            - telemetry-base
          components:
            - metrics-server
            - prometheus
            - prometheus/flux
            - fluentbit
            - fluentbit/containerd
            - fluentbit/kubernetes
            - fluentbit/parser
            - fluentbit/systemd
            - fluentbit/prometheus
          timeout: 10m
          interval: 5m
        - name: csi
          path: csi
          dependsOn:
            - policy-resources
          components:
            - openebs
            - openebs/dynamic-localpv
          substitutions:
            local_volume_path: /mnt/data
          timeout: 20m
          interval: 5m
        - name: lb-base
          path: lb/base
          dependsOn:
            - policy-resources
          components:
            - metallb
          timeout: 5m
          interval: 5m
        - name: lb-resources
          path: lb/resources
          dependsOn:
            - lb-base
          components:
            - metallb
            - metallb/layer2
          substitutions:
            loadbalancer_ip_range: 192.168.1.100-192.168.1.200
          timeout: 5m
          interval: 5m

  # Edge case: longhorn storage driver passes Talos extensions via cluster-extensions step
  - name: longhorn storage driver passes iscsi and util-linux extensions to cluster terraform
    values:
      provider: metal
      gateway:
        enabled: false
      network: *default-network
      cluster:
        driver: talos
        controlplanes:
          nodes:
            controlplane-1: *cp1-node
        workers:
          count: 1
          volumes:
            - /var/mnt/longhorn
        storage:
          driver: longhorn
          local_base_path: /var/mnt/longhorn
    expect:
      terraform:
        - name: cluster-extensions
          path: cluster/talos/extensions
          dependsOn:
            - cni
          parallelism: 1
          inputs:
            extensions:
              - siderolabs/iscsi-tools
              - siderolabs/util-linux-tools
