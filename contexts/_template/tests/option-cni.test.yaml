# option-cni.yaml facet tests
# Tests Cilium CNI selection — Terraform bootstrap, Talos machine config patches, and kustomize component composition.
# Uses platform: metal to keep tests platform-agnostic (option-cni applies to any Talos cluster).

x-defaults:
  network: &default-network
    cidr_block: 10.5.0.0/16
    loadbalancer_driver: kube-vip
    loadbalancer_mode: arp
    loadbalancer_ips:
      start: "10.5.1.10"
      end: "10.5.1.100"

  cluster: &default-cluster
    driver: talos
    controlplanes:
      nodes:
        controlplane-1: &cp1-node
          endpoint: 10.5.0.10:50000
          node: 10.5.0.10
          hostname: controlplane-1
    workers:
      volumes:
        - /var/mnt/local


  cni-install: &cni-install
    name: cni
    dependsOn:
      - policy-resources
      - telemetry-install

cases:
  # Default: no CNI config — cilium is the default, cni terraform + kustomize are deployed.
  - name: default config (no cluster.cni) deploys cilium on metal
    values:
      platform: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
    expect:
      terraform:
        - name: cni
          path: cni/cilium
          dependsOn:
            - cluster
          inputs:
            cluster_endpoint: https://10.5.0.10:6443
      flux:
        - <<: *cni-install
          install:
            components:
              - cilium
              - cilium/talos
              - cilium/prometheus
              - cilium/hubble
              - cilium/l2
            substitutions:
              k8s_service_host: "10.5.0.10"

  # Explicit flannel: opt-out of cilium — no cni kustomize component deployed.
  - name: explicit flannel driver omits cni kustomize component
    values:
      platform: metal
      gateway:
        enabled: false
      network: *default-network
      cluster:
        <<: *default-cluster
        cni:
          driver: flannel
    exclude:
      flux:
        - name: cni
      terraform:
        - name: cni

  # Cilium: deploys cni terraform + kustomize with k8s_service_host substitution.
  # Also covers the layout-driven auto-derivation of single-node topology:
  # 1 control plane + 0 workers with no explicit `topology:` should drive
  # topology → 'single-node' → operator_replicas=1 in both the TF inputs
  # and the kustomize substitutions.
  - name: cilium driver deploys cni terraform and kustomize component
    values:
      platform: metal
      gateway:
        enabled: false
      network: *default-network
      cluster:
        driver: talos
        controlplanes:
          nodes:
            controlplane-1: *cp1-node
        workers:
          volumes:
            - /var/mnt/local
        cni:
          driver: cilium
    expect:
      terraform:
        - name: cni
          path: cni/cilium
          dependsOn:
            - cluster
          inputs:
            cluster_endpoint: https://10.5.0.10:6443
            privileged: false
            cgroup_auto_mount: false
            operator_replicas: 1
      flux:
        - <<: *cni-install
          install:
            components:
              - cilium
              - cilium/talos
              - cilium/prometheus
              - cilium/hubble
              - cilium/l2
            substitutions:
              k8s_service_host: "10.5.0.10"
              operator_replicas: "1"

  # Workstation layouts (docker/colima) don't declare cluster.controlplanes.nodes
  # — terraform provisions them — so the node list is empty at compose time. The
  # controlplane count floors at 1, so 1 cp + 0 workers resolves single-node →
  # operator_replicas=1 from the node counts alone, independent of when
  # workstation.runtime becomes visible to the topology derivation.
  - name: nodeless colima single node resolves single-node operator replicas
    values:
      platform: docker
      workstation:
        enabled: true
        runtime: colima
      dns:
        domain: test
      gateway:
        enabled: false
      network: *default-network
      cluster:
        driver: talos
        cni:
          driver: cilium
    terraformOutputs:
      compute:
        controlplanes:
          - endpoint: 10.5.0.10:6443
            node: 10.5.0.10
            hostname: controlplane-1
        workers: []
    expect:
      terraform:
        - name: cni
          path: cni/cilium
          inputs:
            operator_replicas: 1

  # Cilium + HA: operator replicas scale from 1 (single-node) to 2 via substitution.
  - name: cilium with topology=ha sets operator_replicas to 2
    values:
      platform: metal
      topology: ha
      gateway:
        enabled: false
      network: *default-network
      cluster:
        driver: talos
        controlplanes:
          nodes:
            controlplane-1: *cp1-node
        workers:
          count: 2
          volumes:
            - /var/mnt/local
        cni:
          driver: cilium
    expect:
      flux:
        - <<: *cni-install
          install:
            components:
              - cilium
              - cilium/talos
              - cilium/prometheus
              - cilium/hubble
              - cilium/l2
            substitutions:
              k8s_service_host: "10.5.0.10"
              operator_replicas: "2"

  # Cilium + Gateway: adds cilium/gateway component and gateway-install dep (CRDs before cilium-operator).
  - name: cilium gateway driver adds cilium/gateway component
    values:
      platform: metal
      gateway:
        enabled: true
        driver: cilium
      network: *default-network
      cluster: *default-cluster
    expect:
      flux:
        - name: cni
          dependsOn:
            - policy-resources
            - telemetry-install
          install:
            components:
              - cilium
              - cilium/talos
              - cilium/gateway
              - cilium/prometheus
              - cilium/hubble
              - cilium/l2
            substitutions:
              k8s_service_host: "10.5.0.10"

  # Cilium: Talos cluster terraform receives the CNI patch merged into common_config_patches.
  - name: cilium driver merges cni patch into common_config_patches for cluster/talos terraform
    values:
      platform: metal
      # Explicit multi-node to isolate the test from the node-layout-driven
      # single-node auto-derivation (single-node would add leader-elect and
      # etcd compaction patches that are covered by option-single-node tests).
      topology: multi-node
      gateway:
        enabled: false
      network: *default-network
      cluster:
        driver: talos
        controlplanes:
          nodes:
            controlplane-1: *cp1-node
        workers:
          volumes:
            - /var/mnt/local
        cni:
          driver: cilium
    expect:
      terraform:
        - name: cluster
          path: cluster/talos
          inputs:
            common_config_patches: |-
              cluster:
                allowSchedulingOnControlPlanes: true
                extraManifests:
                - https://raw.githubusercontent.com/alex1989hu/kubelet-serving-cert-approver/v0.8.7/deploy/standalone-install.yaml
                network:
                  cni:
                    name: none
                proxy:
                  disabled: true
              machine:
                kubelet:
                  extraArgs:
                    rotate-server-certificates: "true"

  # Cilium + Gateway: gateway-resources depends on cni so the LBIPAM sharing policy
  # is applied before the Gateway resource is created.
  - name: cilium gateway driver makes gateway-resources depend on cni
    values:
      platform: metal
      gateway:
        enabled: true
        driver: cilium
      network: *default-network
      cluster: *default-cluster
    expect:
      flux:
        - name: gateway
          resources:
            - dependsOn:
                - cni-install

  # network.loadbalancer_ips: derived from CIDR when not explicitly set (workstation layer active).
  - name: loadbalancer IPs derived from cidr_block when not set
    values:
      platform: docker
      workstation:
        runtime: colima
      gateway:
        enabled: false
      network:
        cidr_block: 10.5.0.0/16
        loadbalancer_driver: kube-vip
        loadbalancer_mode: arp
      cluster: *default-cluster
    expect:
      flux:
        - <<: *cni-install
          install:
            components:
              - cilium
              - cilium/talos
              - cilium/prometheus
              - cilium/hubble
              - cilium/l2
            substitutions:
              loadbalancer_start_ip: "10.5.1.10"
              loadbalancer_end_ip: "10.5.1.100"

  # Cilium: gitops terraform depends on cni when cilium is selected.
  - name: cilium driver makes gitops terraform depend on cni
    values:
      platform: metal
      gateway:
        enabled: false
      network: *default-network
      cluster:
        driver: talos
        controlplanes:
          nodes:
            controlplane-1: *cp1-node
        workers:
          volumes:
            - /var/mnt/local
        cni:
          driver: cilium
    expect:
      terraform:
        - name: gitops
          path: gitops/flux
          dependsOn:
            - cluster
            - cni

  # telemetry.metrics.enabled=false drops the cilium/prometheus ServiceMonitor
  # (no Prometheus to scrape). telemetry-install dep stays because logs still need it.
  - name: telemetry metrics disabled strips cilium/prometheus component
    values:
      platform: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      telemetry:
        metrics:
          enabled: false
    expect:
      flux:
        - name: cni
          dependsOn:
            - policy-resources
            - telemetry-install
          install:
            components:
              - cilium
              - cilium/talos
              - cilium/hubble
              - cilium/l2

  # Both halves of telemetry disabled: drop the cilium/prometheus component
  # AND the telemetry-install dependency (the kustomization isn't emitted).
  - name: telemetry metrics and logs disabled drops cilium/prometheus and telemetry-install dep
    values:
      platform: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      telemetry:
        metrics:
          enabled: false
        logs:
          enabled: false
    expect:
      flux:
        - name: cni
          dependsOn:
            - policy-resources
          install:
            components:
              - cilium
              - cilium/talos
              - cilium/hubble
              - cilium/l2

  # policies.enabled=false drops the policy-resources dependency edge.
  - name: policies.enabled false strips policy-resources dep on cni
    values:
      platform: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      policies:
        enabled: false
    expect:
      flux:
        - name: cni
          dependsOn:
            - telemetry-install
          install:
            components:
              - cilium
              - cilium/talos
              - cilium/prometheus
              - cilium/hubble
              - cilium/l2
