# option-cni.yaml facet tests
# Tests Cilium CNI selection — Terraform bootstrap, Talos machine config patches, and kustomize component composition.
# Uses provider: metal to keep tests platform-agnostic (option-cni applies to any Talos cluster).

x-defaults:
  network: &default-network
    cidr_block: 10.5.0.0/16
    loadbalancer_driver: kube-vip
    loadbalancer_mode: arp
    loadbalancer_ips:
      start: "10.5.1.10"
      end: "10.5.1.100"

  cluster: &default-cluster
    driver: talos
    controlplanes:
      nodes:
        controlplane-1: &cp1-node
          endpoint: 10.5.0.10:50000
          node: 10.5.0.10
          hostname: controlplane-1
    workers:
      volumes:
        - /var/mnt/local


  cni-base: &cni-base
    name: cni
    path: cni
    dependsOn:
      - policy-resources
      - telemetry-base
    timeout: 15m
    interval: 5m

cases:
  # Default: no CNI config — cilium is the default, cni terraform + kustomize are deployed.
  - name: default config (no cluster.cni) deploys cilium on metal
    values:
      provider: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
    expect:
      terraform:
        - name: cni
          path: cni/cilium
          dependsOn:
            - cluster
          inputs:
            cluster_endpoint: https://10.5.0.10:6443
      kustomize:
        - <<: *cni-base
          components:
            - cilium
            - cilium/talos
            - cilium/prometheus
            - cilium/hubble
            - cilium/l2
          substitutions:
            k8s_service_host: "10.5.0.10"

  # Explicit flannel: opt-out of cilium — no cni kustomize component deployed.
  - name: explicit flannel driver omits cni kustomize component
    values:
      provider: metal
      gateway:
        enabled: false
      network: *default-network
      cluster:
        <<: *default-cluster
        cni:
          driver: flannel
    exclude:
      kustomize:
        - name: cni
      terraform:
        - name: cni

  # Cilium: deploys cni terraform + kustomize with k8s_service_host substitution.
  # Also covers the layout-driven auto-derivation of single-node topology:
  # 1 control plane + 0 workers with no explicit `topology:` should drive
  # topology_effective → 'single-node' → operator_replicas=1 in both the TF
  # inputs and the kustomize substitutions.
  - name: cilium driver deploys cni terraform and kustomize component
    values:
      provider: metal
      gateway:
        enabled: false
      network: *default-network
      cluster:
        driver: talos
        controlplanes:
          nodes:
            controlplane-1: *cp1-node
        workers:
          volumes:
            - /var/mnt/local
        cni:
          driver: cilium
    expect:
      terraform:
        - name: cni
          path: cni/cilium
          dependsOn:
            - cluster
          inputs:
            cluster_endpoint: https://10.5.0.10:6443
            privileged: false
            cgroup_auto_mount: false
            operator_replicas: 1
      kustomize:
        - <<: *cni-base
          components:
            - cilium
            - cilium/talos
            - cilium/prometheus
            - cilium/hubble
            - cilium/l2
          substitutions:
            k8s_service_host: "10.5.0.10"
            operator_replicas: "1"

  # Cilium + HA: operator replicas scale from 1 (single-node) to 2 via substitution.
  - name: cilium with topology=ha sets operator_replicas to 2
    values:
      provider: metal
      topology: ha
      gateway:
        enabled: false
      network: *default-network
      cluster:
        driver: talos
        controlplanes:
          nodes:
            controlplane-1: *cp1-node
        workers:
          count: 2
          volumes:
            - /var/mnt/local
        cni:
          driver: cilium
    expect:
      kustomize:
        - <<: *cni-base
          components:
            - cilium
            - cilium/talos
            - cilium/prometheus
            - cilium/hubble
            - cilium/l2
          substitutions:
            k8s_service_host: "10.5.0.10"
            operator_replicas: "2"

  # Cilium + Gateway: adds cilium/gateway component and gateway-base dep (CRDs before cilium-operator).
  - name: cilium gateway driver adds cilium/gateway component
    values:
      provider: metal
      gateway:
        enabled: true
        driver: cilium
      network: *default-network
      cluster: *default-cluster
    expect:
      kustomize:
        - name: cni
          path: cni
          dependsOn:
            - policy-resources
            - telemetry-base
            - gateway-base
          components:
            - cilium
            - cilium/talos
            - cilium/gateway
            - cilium/prometheus
            - cilium/hubble
            - cilium/l2
          substitutions:
            k8s_service_host: "10.5.0.10"
          timeout: 15m
          interval: 5m

  # Cilium: Talos cluster terraform receives the CNI patch merged into common_config_patches.
  - name: cilium driver merges cni patch into common_config_patches for cluster/talos terraform
    values:
      provider: metal
      # Explicit multi-node to isolate the test from the node-layout-driven
      # single-node auto-derivation (single-node would add leader-elect and
      # etcd compaction patches that are covered by option-single-node tests).
      topology: multi-node
      gateway:
        enabled: false
      network: *default-network
      cluster:
        driver: talos
        controlplanes:
          nodes:
            controlplane-1: *cp1-node
        workers:
          volumes:
            - /var/mnt/local
        cni:
          driver: cilium
    expect:
      terraform:
        - name: cluster
          path: cluster/talos
          inputs:
            common_config_patches: |-
              cluster:
                allowSchedulingOnControlPlanes: true
                extraManifests:
                - https://raw.githubusercontent.com/alex1989hu/kubelet-serving-cert-approver/v0.8.7/deploy/standalone-install.yaml
                network:
                  cni:
                    name: none
                proxy:
                  disabled: true
              machine:
                kubelet:
                  extraArgs:
                    rotate-server-certificates: "true"

  # Cilium + Gateway: gateway-resources depends on cni so the LBIPAM sharing policy
  # is applied before the Gateway resource is created.
  - name: cilium gateway driver makes gateway-resources depend on cni
    values:
      provider: metal
      gateway:
        enabled: true
        driver: cilium
      network: *default-network
      cluster: *default-cluster
    expect:
      kustomize:
        - name: gateway-resources
          path: gateway/resources
          dependsOn:
            - gateway-base
            - cni

  # network_effective: loadbalancer IPs derived from CIDR when not explicitly set (workstation layer active).
  - name: loadbalancer IPs derived from cidr_block when not set
    values:
      provider: docker
      workstation:
        runtime: colima
      gateway:
        enabled: false
      network:
        cidr_block: 10.5.0.0/16
        loadbalancer_driver: kube-vip
        loadbalancer_mode: arp
      cluster: *default-cluster
    expect:
      kustomize:
        - <<: *cni-base
          components:
            - cilium
            - cilium/talos
            - cilium/prometheus
            - cilium/hubble
            - cilium/l2
          substitutions:
            loadbalancer_start_ip: "10.5.1.10"
            loadbalancer_end_ip: "10.5.1.100"

  # Cilium: gitops terraform depends on cni when cilium is selected.
  - name: cilium driver makes gitops terraform depend on cni
    values:
      provider: metal
      gateway:
        enabled: false
      network: *default-network
      cluster:
        driver: talos
        controlplanes:
          nodes:
            controlplane-1: *cp1-node
        workers:
          volumes:
            - /var/mnt/local
        cni:
          driver: cilium
    expect:
      terraform:
        - name: gitops
          path: gitops/flux
          dependsOn:
            - cluster
            - cni

  # telemetry.metrics.enabled=false drops the cilium/prometheus ServiceMonitor
  # (no Prometheus to scrape). telemetry-base dep stays because logs still need it.
  - name: telemetry metrics disabled strips cilium/prometheus component
    values:
      provider: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      telemetry:
        metrics:
          enabled: false
    expect:
      kustomize:
        - name: cni
          path: cni
          dependsOn:
            - policy-resources
            - telemetry-base
          components:
            - cilium
            - cilium/talos
            - cilium/hubble
            - cilium/l2

  # Both halves of telemetry disabled: drop the cilium/prometheus component
  # AND the telemetry-base dependency (the kustomization isn't emitted).
  - name: telemetry metrics and logs disabled drops cilium/prometheus and telemetry-base dep
    values:
      provider: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      telemetry:
        metrics:
          enabled: false
        logs:
          enabled: false
    expect:
      kustomize:
        - name: cni
          path: cni
          dependsOn:
            - policy-resources
          components:
            - cilium
            - cilium/talos
            - cilium/hubble
            - cilium/l2

  # policies.enabled=false drops the policy-resources dependency edge.
  - name: policies.enabled false strips policy-resources dep on cni
    values:
      provider: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      policies:
        enabled: false
    expect:
      kustomize:
        - name: cni
          path: cni
          dependsOn:
            - telemetry-base
          components:
            - cilium
            - cilium/talos
            - cilium/prometheus
            - cilium/hubble
            - cilium/l2
