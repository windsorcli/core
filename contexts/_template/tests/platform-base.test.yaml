# platform-base.yaml facet tests
# Tests base infrastructure components shared by all platforms
# Includes: policy, PKI, telemetry, and log aggregation driver configuration

# Common configurations
x-defaults:
  network: &default-network
    cidr_block: 10.5.0.0/16
    loadbalancer_driver: kube-vip
    loadbalancer_mode: arp
    loadbalancer_ips:
      start: "10.5.1.10"
      end: "10.5.1.100"

  cluster: &default-cluster
    driver: talos
    controlplanes:
      nodes:
        controlplane-1:
          endpoint: 10.5.0.10:50000
          node: 10.5.0.10
          hostname: controlplane-1
    workers:
      volumes:
        - /var/mnt/local

cases:
  # Minimal: Test base infrastructure with default log aggregation driver (fluentd)
  - name: minimal config creates base infrastructure with default fluentd driver
    values:
      platform: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
    expect:
      flux:
        - name: policy
          install:
            components:
              - kyverno
            timeout: 30m
            interval: 5m
          resources:
            - components:
                - kyverno/resource-limits-requests
                - kyverno/require-image-digest
                - kyverno/external-dns-ttl
              timeout: 5m
              interval: 5m
        - name: telemetry
          install:
            components:
              - prometheus
              - prometheus/flux
              - fluentbit
              - metrics-server
            timeout: 30m
            interval: 10m
          resources:
            - components:
                - prometheus
                - prometheus/flux
                - prometheus/alerts/node
                - prometheus/alerts/prometheus
                - prometheus/alerts/coredns
                - prometheus/alerts/cert-manager
                - prometheus/alerts/flux
                - fluentbit
                - fluentbit/containerd
                - fluentbit/kubernetes
                - fluentbit/parser
                - fluentbit/systemd
                - fluentbit/prometheus
                - fluentbit/fluentd
              timeout: 10m
              interval: 5m
        - name: pki
          dependsOn:
            - policy-resources
            - telemetry-install
          install:
            components:
              - cert-manager
              - cert-manager/prometheus
            timeout: 20m
            interval: 5m
        - name: observability
          install:
            components:
              - fluentd
          resources:
            - timeout: 10m
              interval: 5m
              components:
                - fluentd/filters/otel
                - fluentd/prometheus
      crds:
        # renovate: datasource=github-releases depName=cert-manager/cert-manager package=cert-manager/cert-manager
        - cert-manager-1.21.0
        # renovate: datasource=github-releases depName=prometheus-operator/prometheus-operator package=prometheus-operator/prometheus-operator
        - prometheus-operator-0.92.1
        # renovate: datasource=helm depName=fluent-operator package=fluent-operator helmRepo=https://fluent.github.io/helm-charts
        - fluent-operator-4.2.0

  # Full: observability addon enabled; addon wins for same-name observability (grafana + fluentd/outputs/stdout)
  - name: full config with explicit fluentd driver and observability enabled
    values:
      platform: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      telemetry:
        logs:
          driver: fluentd
      addons:
        observability:
          enabled: true
          logs_driver: stdout
    expect:
      flux:
        - name: telemetry
          resources:
            - components:
                - prometheus
                - prometheus/flux
                - prometheus/alerts/node
                - prometheus/alerts/prometheus
                - prometheus/alerts/coredns
                - prometheus/alerts/cert-manager
                - prometheus/alerts/flux
                - fluentbit
                - fluentbit/containerd
                - fluentbit/kubernetes
                - fluentbit/parser
                - fluentbit/systemd
                - fluentbit/fluentd
              timeout: 10m
              interval: 5m
        - name: observability
          install:
            components:
              - grafana
              - grafana/prometheus
          resources:
            - dependsOn:
                - telemetry-resources
              components:
                - grafana/dashboards/node
                - grafana/dashboards/kubernetes
                - grafana/dashboards/flux
                - grafana/dashboards/cert-manager
                - grafana/dashboards/fluent-bit
                - grafana/dashboards/fluentd
                - fluentd/outputs/stdout

  # Edge case: FluentD aggregator is base telemetry, runs independently of the observability addon.
  - name: fluentd included when observability addon disabled
    values:
      platform: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      addons:
        observability:
          enabled: false
    expect:
      flux:
        - name: telemetry
          resources:
            - components:
                - fluentbit/fluentd
        - name: observability
          install:
            components:
              - fluentd
          resources:
            - components:
                - fluentd/filters/otel
                - fluentd/prometheus

  # Edge case: elasticsearch logs driver; addon overrides the telemetry system's install tier (filebeat). Addon wins.
  - name: fluentd excluded when elasticsearch logs driver used
    values:
      platform: metal
      dns:
        domain: elk.example.com
      gateway:
        enabled: true
        driver: envoy
      network: *default-network
      cluster: *default-cluster
      addons:
        observability:
          enabled: true
          logs_driver: elasticsearch
    expect:
      flux:
        - name: telemetry
          install:
            components:
              - prometheus
              - prometheus/flux
              - filebeat
              - metrics-server
            timeout: 30m
            interval: 10m
          resources:
            - components:
                - prometheus
                - prometheus/flux
                - prometheus/alerts/node
                - prometheus/alerts/prometheus
                - prometheus/alerts/coredns
                - prometheus/alerts/cert-manager
                - prometheus/alerts/flux
                - prometheus/alerts/envoy
              timeout: 10m
              interval: 5m
        - name: observability
          dependsOn:
            - csi-install
          install:
            components:
              - elasticsearch
              - kibana
          resources:
            - dependsOn:
                - gateway-resources
              components:
                - kibana/gateway
              substitutions:
                external_domain: elk.example.com

  # Edge case: None driver disables log aggregation
  - name: none driver disables log aggregation
    values:
      platform: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      telemetry:
        logs:
          driver: none
    expect:
      flux:
        - name: telemetry
          resources:
            - components:
                - prometheus
                - prometheus/flux
                - prometheus/alerts/node
                - prometheus/alerts/prometheus
                - prometheus/alerts/coredns
                - prometheus/alerts/cert-manager
                - prometheus/alerts/flux
                - fluentbit
                - fluentbit/containerd
                - fluentbit/kubernetes
                - fluentbit/parser
                - fluentbit/systemd
                - fluentbit/prometheus
              timeout: 10m
              interval: 5m
    exclude:
      flux:
        - name: observability

  # Policy modes: disabled removes policy component from policy-resources stack.
  - name: policy mode disabled excludes selected policies
    values:
      platform: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      policies:
        require_image_digest: disabled
        resource_limits_requests: disabled
    expect:
      flux:
        - name: policy
          resources:
            - components: []
              timeout: 5m
              interval: 5m
              retryInterval: 1m

  # Kyverno reports-controller opt-in layers in the kyverno/reports component.
  - name: policies.reporting enabled adds kyverno/reports component
    values:
      platform: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      policies:
        reporting: enabled
    expect:
      flux:
        - name: policy
          install:
            components:
              - kyverno
              - kyverno/reports

  # Kyverno cleanup-controller opt-in layers in the kyverno/cleanup component.
  - name: policies.cleanup enabled adds kyverno/cleanup component
    values:
      platform: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      policies:
        cleanup: enabled
    expect:
      flux:
        - name: policy
          install:
            components:
              - kyverno
              - kyverno/cleanup

  # Both opt-in flags compose.
  - name: policies.reporting and policies.cleanup enabled adds both components
    values:
      platform: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      policies:
        reporting: enabled
        cleanup: enabled
    expect:
      flux:
        - name: policy
          install:
            components:
              - kyverno
              - kyverno/reports
              - kyverno/cleanup

  # topology=ha layers in the kyverno/ha component (multi-replica admission
  # controller + PDB) so the webhook backend survives drains and rollouts.
  - name: topology ha adds kyverno/ha component
    values:
      platform: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      topology: ha
    expect:
      flux:
        - name: policy
          install:
            components:
              - kyverno
              - kyverno/ha

  # policies.enabled=false skips both policy kustomizations entirely and
  # drops the policy-resources dep from pki-install.
  - name: policies.enabled false excludes policy kustomizations and drops pki-install dep
    values:
      platform: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      policies:
        enabled: false
    expect:
      flux:
        - name: pki
          dependsOn:
            - telemetry-install
          install:
            components:
              - cert-manager
              - cert-manager/prometheus
    exclude:
      flux:
        - name: policy

  # Both metrics and logs disabled skips the telemetry system, the
  # fluentd aggregator, and strips the telemetry-install dep / cert-manager/prometheus
  # from pki-install entirely.
  - name: telemetry metrics and logs both disabled excludes telemetry pipeline and trims pki-install
    values:
      platform: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      telemetry:
        metrics:
          enabled: false
        logs:
          enabled: false
    expect:
      flux:
        - name: pki
          dependsOn:
            - policy-resources
          install:
            components:
              - cert-manager
      crds:
        # renovate: datasource=github-releases depName=cert-manager/cert-manager package=cert-manager/cert-manager
        - cert-manager-1.21.0
    exclude:
      flux:
        - name: telemetry
        - name: observability
      crds:
        # renovate: datasource=github-releases depName=prometheus-operator/prometheus-operator package=prometheus-operator/prometheus-operator
        - prometheus-operator-0.92.1
        # renovate: datasource=helm depName=fluent-operator package=fluent-operator helmRepo=https://fluent.github.io/helm-charts
        - fluent-operator-4.2.0

  # Metrics on, logs off: Prometheus stack deploys, fluent-bit and fluentd are
  # dropped. cert-manager/prometheus stays (metrics are on).
  - name: telemetry logs disabled keeps metrics pipeline and drops fluent-bit
    values:
      platform: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      telemetry:
        logs:
          enabled: false
    expect:
      flux:
        - name: telemetry
          install:
            components:
              - prometheus
              - prometheus/flux
              - metrics-server
          resources:
            - components:
                - prometheus
                - prometheus/flux
                - prometheus/alerts/node
                - prometheus/alerts/prometheus
                - prometheus/alerts/coredns
                - prometheus/alerts/cert-manager
                - prometheus/alerts/flux
        - name: pki
          dependsOn:
            - policy-resources
            - telemetry-install
          install:
            components:
              - cert-manager
              - cert-manager/prometheus
    exclude:
      flux:
        - name: observability

  # alerts.enabled: false drops the node PrometheusRule component; the rest
  # of the metrics/logs pipeline is unaffected.
  - name: telemetry alerts disabled excludes node prometheus rules
    values:
      platform: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      telemetry:
        alerts:
          enabled: false
    expect:
      flux:
        - name: telemetry
          resources:
            - components:
                - prometheus
                - prometheus/flux
                - fluentbit
                - fluentbit/containerd
                - fluentbit/kubernetes
                - fluentbit/parser
                - fluentbit/systemd
                - fluentbit/prometheus
                - fluentbit/fluentd
              timeout: 10m
              interval: 5m

  # No Prometheus to evaluate against, so the metrics guard excludes it
  # even with alerts.enabled: true.
  - name: telemetry alerts enabled without metrics excludes node prometheus rules
    values:
      platform: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      telemetry:
        metrics:
          enabled: false
        alerts:
          enabled: true
    expect:
      flux:
        - name: telemetry
          install:
            components:
              - fluentbit
          resources:
            - components:
                - fluentbit
                - fluentbit/containerd
                - fluentbit/kubernetes
                - fluentbit/parser
                - fluentbit/systemd
                - fluentbit/fluentd

  # Default severity (both) falls into the "2 or more selected" branch --
  # the alternation regex, not a single value.
  - name: telemetry slack notification with default severity routes the alternation
    values:
      platform: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      telemetry:
        alerts:
          slack:
            webhook_url: https://hooks.slack.com/services/T000/B000/XXXXXXXX
            channel: "#test-alerts"
    expect:
      flux:
        - name: telemetry
          resources:
            - components:
                - prometheus
                - prometheus/flux
                - prometheus/alerts/node
                - prometheus/alerts/prometheus
                - prometheus/alerts/coredns
                - prometheus/alerts/cert-manager
                - prometheus/alerts/flux
                - prometheus/notifications/slack
                - fluentbit
                - fluentbit/containerd
                - fluentbit/kubernetes
                - fluentbit/parser
                - fluentbit/systemd
                - fluentbit/prometheus
                - fluentbit/fluentd
              secrets:
                alertmanager-notification-slack:
                  url: https://hooks.slack.com/services/T000/B000/XXXXXXXX
              substitutions:
                slack_channel: '"#test-alerts"'
                severity_regex: warning|critical

  # A single configured severity skips the "2+ selected" branch -- confirms
  # the bounded ternary (no join() available) picks the lone value.
  - name: telemetry slack notification with one severity routes that severity only
    values:
      platform: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      telemetry:
        alerts:
          slack:
            webhook_url: https://hooks.slack.com/services/T000/B000/XXXXXXXX
            channel: "#test-alerts"
            severity: [critical]
    expect:
      flux:
        - name: telemetry
          resources:
            - components:
                - prometheus/notifications/slack
              secrets:
                alertmanager-notification-slack:
                  url: https://hooks.slack.com/services/T000/B000/XXXXXXXX
              substitutions:
                slack_channel: '"#test-alerts"'
                severity_regex: critical

  # Grafana link base URL derives from the domain the Grafana route publishes
  # on (private_domain here, since no public_domain is set).
  - name: telemetry alert grafana links derive the base url from the domain
    values:
      platform: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      dns:
        domain: example.com
      telemetry:
        alerts:
          slack:
            webhook_url: https://hooks.slack.com/services/T000/B000/XXXXXXXX
            channel: "#test-alerts"
    expect:
      flux:
        - name: telemetry
          resources:
            - components:
                - prometheus/notifications/slack
              substitutions:
                grafana_base_url: https://grafana.example.com

  # An explicit grafana_url wins over the derived value -- the escape hatch for
  # a non-standard host or port (e.g. local NodePort forwarding).
  - name: telemetry alert grafana_url overrides the derived base url
    values:
      platform: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      dns:
        domain: example.com
      telemetry:
        alerts:
          grafana_url: https://grafana.example.com:8443
          slack:
            webhook_url: https://hooks.slack.com/services/T000/B000/XXXXXXXX
            channel: "#test-alerts"
    expect:
      flux:
        - name: telemetry
          resources:
            - components:
                - prometheus/notifications/slack
              substitutions:
                grafana_base_url: https://grafana.example.com:8443

  # No webhook_url (the default) excludes the component entirely, even with
  # metrics on -- confirms the notification component isn't unconditional.
  - name: telemetry slack notification without a webhook_url excludes the component
    values:
      platform: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
    expect:
      flux:
        - name: telemetry
          resources:
            - components:
                - prometheus
                - prometheus/flux
                - prometheus/alerts/node
                - prometheus/alerts/prometheus
                - prometheus/alerts/coredns
                - prometheus/alerts/cert-manager
                - prometheus/alerts/flux
                - fluentbit

  # Logs on, metrics off: fluent-bit ships + fluentd aggregates, Prometheus
  # stack is dropped. cert-manager/prometheus and fluentbit/prometheus (the
  # ServiceMonitors) are excluded — no Prometheus to scrape.
  - name: telemetry metrics disabled keeps logs pipeline and drops Prometheus
    values:
      platform: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      telemetry:
        metrics:
          enabled: false
    expect:
      flux:
        - name: telemetry
          install:
            components:
              - fluentbit
          resources:
            - components:
                - fluentbit
                - fluentbit/containerd
                - fluentbit/kubernetes
                - fluentbit/parser
                - fluentbit/systemd
                - fluentbit/fluentd
        - name: pki
          dependsOn:
            - policy-resources
            - telemetry-install
          install:
            components:
              - cert-manager
        - name: observability
          dependsOn:
            - telemetry-install
          install:
            components:
              - fluentd
          resources:
            - components:
                - fluentd/filters/otel
      crds:
        # renovate: datasource=github-releases depName=cert-manager/cert-manager package=cert-manager/cert-manager
        - cert-manager-1.21.0
        # renovate: datasource=helm depName=fluent-operator package=fluent-operator helmRepo=https://fluent.github.io/helm-charts
        - fluent-operator-4.2.0
    exclude:
      crds:
        # renovate: datasource=github-releases depName=prometheus-operator/prometheus-operator package=prometheus-operator/prometheus-operator
        - prometheus-operator-0.92.1

  # Observability addon force-overrides both telemetry toggles — Grafana needs
  # Prometheus to scrape and the fluentbit→fluentd path to ship logs.
  - name: observability addon overrides telemetry metrics and logs disabled
    values:
      platform: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      telemetry:
        metrics:
          enabled: false
        logs:
          enabled: false
      addons:
        observability:
          enabled: true
    expect:
      flux:
        - name: telemetry
          install:
            components:
              - prometheus
              - prometheus/flux
              - fluentbit
        - name: pki
          dependsOn:
            - policy-resources
            - telemetry-install
          install:
            components:
              - cert-manager
              - cert-manager/prometheus

