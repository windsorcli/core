# platform-base.yaml facet tests
# Tests base infrastructure components shared by all providers
# Includes: cleanup, policy, PKI, telemetry, and log aggregation driver configuration

# Common configurations
x-defaults:
  network: &default-network
    cidr_block: 10.5.0.0/16
    loadbalancer_driver: kube-vip
    loadbalancer_mode: arp
    loadbalancer_ips:
      start: "10.5.1.10"
      end: "10.5.1.100"

  cluster: &default-cluster
    driver: talos
    controlplanes:
      nodes:
        controlplane-1:
          endpoint: 10.5.0.10:50000
          node: 10.5.0.10
          hostname: controlplane-1
    workers:
      volumes:
        - /var/mnt/local

cases:
  # Minimal: Test base infrastructure with default log aggregation driver (fluentd)
  - name: minimal config creates base infrastructure with default fluentd driver
    values:
      provider: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
    expect:
      kustomize:
        - name: cleanup
          path: cleanup
          destroyOnly: true
          components:
            - ingresses
            - loadbalancers
            - pvcs
          timeout: 10m
          interval: 5m
        - name: policy-base
          path: policy/base
          components:
            - kyverno
          timeout: 30m
          interval: 5m
        - name: policy-resources
          path: policy/resources
          dependsOn:
            - policy-base
          components:
            - kyverno/resource-limits-requests
            - kyverno/require-image-digest
          timeout: 5m
          interval: 5m
        - name: telemetry-base
          path: telemetry/base
          components:
            - prometheus
            - prometheus/flux
            - fluentbit
          timeout: 30m
          interval: 10m
        - name: telemetry-resources
          path: telemetry/resources
          dependsOn:
            - telemetry-base
          components:
            - metrics-server
            - prometheus
            - prometheus/flux
            - fluentbit
            - fluentbit/containerd
            - fluentbit/kubernetes
            - fluentbit/parser
            - fluentbit/systemd
            - fluentbit/prometheus
            - fluentbit/fluentd
          timeout: 10m
          interval: 5m
        - name: pki-base
          path: pki/base
          dependsOn:
            - policy-resources
            - telemetry-base
          components:
            - cert-manager
            - cert-manager/prometheus
          timeout: 20m
          interval: 5m
        - name: observability
          path: observability
          components:
            - fluentd
            - fluentd/filters/otel
            - fluentd/prometheus
          timeout: 15m
          interval: 10m

  # Full: observability addon enabled; addon wins for same-name observability (grafana + fluentd/outputs/stdout)
  - name: full config with explicit fluentd driver and observability enabled
    values:
      provider: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      telemetry:
        logs:
          driver: fluentd
      addons:
        observability:
          enabled: true
          logs_driver: stdout
    expect:
      kustomize:
        - name: telemetry-resources
          path: telemetry/resources
          dependsOn:
            - telemetry-base
          components:
            - metrics-server
            - prometheus
            - prometheus/flux
            - fluentbit
            - fluentbit/containerd
            - fluentbit/kubernetes
            - fluentbit/parser
            - fluentbit/systemd
            - fluentbit/fluentd
          timeout: 10m
          interval: 5m
        - name: observability
          path: observability
          components:
            - grafana
            - grafana/prometheus
            - grafana/dashboards/node
            - grafana/dashboards/kubernetes
            - grafana/dashboards/flux
            - grafana/dashboards/cert-manager
            - grafana/dashboards/fluent-bit
            - grafana/dashboards/fluentd
            - fluentd/outputs/stdout
          timeout: 15m
          interval: 10m

  # Edge case: FluentD aggregator is base telemetry, runs independently of the observability addon.
  - name: fluentd included when observability addon disabled
    values:
      provider: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      addons:
        observability:
          enabled: false
    expect:
      kustomize:
        - name: telemetry-resources
          components:
            - fluentbit/fluentd
        - name: observability
          components:
            - fluentd
            - fluentd/filters/otel
            - fluentd/prometheus

  # Edge case: elasticsearch logs driver; addon overrides telemetry-base (filebeat). Intended: addon wins. See docs/cli-bugs.md if this fails.
  - name: fluentd excluded when elasticsearch logs driver used
    values:
      provider: metal
      dns:
        domain: elk.example.com
      gateway:
        enabled: true
        driver: envoy
      network: *default-network
      cluster: *default-cluster
      addons:
        observability:
          enabled: true
          logs_driver: elasticsearch
    expect:
      kustomize:
        - name: telemetry-base
          path: telemetry/base
          strategy: replace
          components:
            - prometheus
            - prometheus/flux
            - filebeat
          timeout: 30m
          interval: 10m
        - name: telemetry-resources
          path: telemetry/resources
          strategy: replace
          dependsOn:
            - telemetry-base
          components:
            - metrics-server
            - prometheus
            - prometheus/flux
          timeout: 10m
          interval: 5m
        - name: observability
          path: observability
          dependsOn:
            - csi
            - gateway-resources
          components:
            - elasticsearch
            - kibana
            - kibana/gateway
          substitutions:
            external_domain: elk.example.com

  # Edge case: None driver disables log aggregation
  - name: none driver disables log aggregation
    values:
      provider: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      telemetry:
        logs:
          driver: none
    expect:
      kustomize:
        - name: telemetry-resources
          path: telemetry/resources
          dependsOn:
            - telemetry-base
          components:
            - metrics-server
            - prometheus
            - prometheus/flux
            - fluentbit
            - fluentbit/containerd
            - fluentbit/kubernetes
            - fluentbit/parser
            - fluentbit/systemd
            - fluentbit/prometheus
          timeout: 10m
          interval: 5m
    exclude:
      kustomize:
        - name: observability

  # Policy modes: disabled removes policy component from policy-resources stack.
  - name: policy mode disabled excludes selected policies
    values:
      provider: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      policies:
        require_image_digest: disabled
        resource_limits_requests: disabled
    expect:
      kustomize:
        - name: policy-resources
          path: policy/resources
          dependsOn:
            - policy-base
          components: []
          timeout: 5m
          interval: 5m

  # Kyverno reports-controller opt-in layers in the kyverno/reports component.
  - name: policies.reporting enabled adds kyverno/reports component
    values:
      provider: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      policies:
        reporting: enabled
    expect:
      kustomize:
        - name: policy-base
          path: policy/base
          components:
            - kyverno
            - kyverno/reports

  # Kyverno cleanup-controller opt-in layers in the kyverno/cleanup component.
  - name: policies.cleanup enabled adds kyverno/cleanup component
    values:
      provider: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      policies:
        cleanup: enabled
    expect:
      kustomize:
        - name: policy-base
          path: policy/base
          components:
            - kyverno
            - kyverno/cleanup

  # Both opt-in flags compose.
  - name: policies.reporting and policies.cleanup enabled adds both components
    values:
      provider: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      policies:
        reporting: enabled
        cleanup: enabled
    expect:
      kustomize:
        - name: policy-base
          path: policy/base
          components:
            - kyverno
            - kyverno/reports
            - kyverno/cleanup

  # policies.enabled=false skips both policy kustomizations entirely and
  # drops the policy-resources dep from pki-base.
  - name: policies.enabled false excludes policy kustomizations and drops pki-base dep
    values:
      provider: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      policies:
        enabled: false
    expect:
      kustomize:
        - name: pki-base
          path: pki/base
          dependsOn:
            - telemetry-base
          components:
            - cert-manager
            - cert-manager/prometheus
    exclude:
      kustomize:
        - name: policy-base
        - name: policy-resources

  # Both metrics and logs disabled skips both telemetry kustomizations, the
  # fluentd aggregator, and strips telemetry-base / cert-manager/prometheus
  # from pki-base entirely.
  - name: telemetry metrics and logs both disabled excludes telemetry pipeline and trims pki-base
    values:
      provider: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      telemetry:
        metrics:
          enabled: false
        logs:
          enabled: false
    expect:
      kustomize:
        - name: pki-base
          path: pki/base
          dependsOn:
            - policy-resources
          components:
            - cert-manager
    exclude:
      kustomize:
        - name: telemetry-base
        - name: telemetry-resources
        - name: observability

  # Metrics on, logs off: Prometheus stack deploys, fluent-bit and fluentd are
  # dropped. cert-manager/prometheus stays (metrics are on).
  - name: telemetry logs disabled keeps metrics pipeline and drops fluent-bit
    values:
      provider: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      telemetry:
        logs:
          enabled: false
    expect:
      kustomize:
        - name: telemetry-base
          path: telemetry/base
          components:
            - prometheus
            - prometheus/flux
        - name: telemetry-resources
          path: telemetry/resources
          dependsOn:
            - telemetry-base
          components:
            - metrics-server
            - prometheus
            - prometheus/flux
        - name: pki-base
          path: pki/base
          dependsOn:
            - policy-resources
            - telemetry-base
          components:
            - cert-manager
            - cert-manager/prometheus
    exclude:
      kustomize:
        - name: observability

  # Logs on, metrics off: fluent-bit ships + fluentd aggregates, Prometheus
  # stack is dropped. cert-manager/prometheus and fluentbit/prometheus (the
  # ServiceMonitors) are excluded — no Prometheus to scrape.
  - name: telemetry metrics disabled keeps logs pipeline and drops Prometheus
    values:
      provider: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      telemetry:
        metrics:
          enabled: false
    expect:
      kustomize:
        - name: telemetry-base
          path: telemetry/base
          components:
            - fluentbit
        - name: telemetry-resources
          path: telemetry/resources
          dependsOn:
            - telemetry-base
          components:
            - fluentbit
            - fluentbit/containerd
            - fluentbit/kubernetes
            - fluentbit/parser
            - fluentbit/systemd
            - fluentbit/fluentd
        - name: pki-base
          path: pki/base
          dependsOn:
            - policy-resources
            - telemetry-base
          components:
            - cert-manager
        - name: observability
          path: observability
          dependsOn:
            - telemetry-base
          components:
            - fluentd
            - fluentd/filters/otel

  # Observability addon force-overrides both telemetry toggles — Grafana needs
  # Prometheus to scrape and the fluentbit→fluentd path to ship logs.
  - name: observability addon overrides telemetry metrics and logs disabled
    values:
      provider: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      telemetry:
        metrics:
          enabled: false
        logs:
          enabled: false
      addons:
        observability:
          enabled: true
    expect:
      kustomize:
        - name: telemetry-base
          path: telemetry/base
          components:
            - prometheus
            - prometheus/flux
            - fluentbit
        - name: pki-base
          path: pki/base
          dependsOn:
            - policy-resources
            - telemetry-base
          components:
            - cert-manager
            - cert-manager/prometheus

