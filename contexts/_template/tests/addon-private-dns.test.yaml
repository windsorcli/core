# addon-private-dns.yaml facet tests
# Tests CoreDNS for private DNS zones with external-dns integration

# Common configurations
x-defaults:
  network: &default-network
    cidr_block: 10.5.0.0/16
    loadbalancer_driver: kube-vip
    loadbalancer_mode: arp
    loadbalancer_ips:
      start: "10.5.1.10"
      end: "10.5.1.100"

  cluster: &default-cluster
    driver: talos
    controlplanes:
      nodes:
        controlplane-1:
          endpoint: 10.5.0.10:50000
          node: 10.5.0.10
          hostname: controlplane-1
    workers:
      volumes:
        - /var/mnt/local


cases:
  # Minimal: Test default behavior with dev mode (implicit enablement).
  # Metal defaults to Cilium CNI → gateway driver is cilium → dns depends on cni for LBIPAM.
  - name: minimal config creates CoreDNS with defaults via dev mode
    values:
      provider: metal
      dev: true
      network: *default-network
      cluster: *default-cluster
    expect:
      kustomize:
        - name: dns
          path: dns
          dependsOn:
            - pki-base
            - cni
          timeout: 20m
          interval: 5m
          components:
            - coredns
            - coredns/etcd
            - coredns/loadbalancer
            - coredns/cilium
            - external-dns
            - external-dns/coredns

  # Full: Test all options with Docker Desktop (envoy gateway — docker-desktop default).
  - name: full config creates CoreDNS with localhost external-dns on Docker Desktop
    values:
      provider: metal
      dev: true
      workstation:
        runtime: docker-desktop
      network: *default-network
      cluster: *default-cluster
    terraformOutputs:
      compute:
        controlplanes:
          - endpoint: 10.5.0.10:6443
            node: 10.5.0.10
            hostname: controlplane-1
        workers: []
      workstation:
        registries: {}
    expect:
      kustomize:
        - name: dns
          path: dns
          dependsOn:
            - pki-base
            - gateway-base
          timeout: 20m
          interval: 5m
          components:
            - coredns
            - coredns/etcd
            - coredns/gateway
            - external-dns
            - external-dns/coredns
            - external-dns/localhost

  # Docker platform + docker-desktop + dev: gateway defaults to envoy (no cilium CNI on docker-desktop),
  # so dns depends on gateway-base (not cni) and gets coredns/gateway instead of coredns/loadbalancer.
  - name: docker-desktop with dev mode uses envoy gateway and coredns/gateway
    values:
      platform: docker
      dev: true
      workstation:
        runtime: docker-desktop
      network: *default-network
      cluster: *default-cluster
    terraformOutputs:
      compute:
        controlplanes:
          - endpoint: 10.5.0.10:6443
            node: 10.5.0.10
            hostname: controlplane-1
        workers: []
      workstation:
        registries: {}
    expect:
      kustomize:
        - name: dns
          path: dns
          dependsOn:
            - pki-base
            - gateway-base
          timeout: 20m
          interval: 5m
          components:
            - coredns
            - coredns/etcd
            - coredns/gateway
            - external-dns
            - external-dns/coredns
            - external-dns/localhost
    exclude:
      kustomize:
        - name: cni

  # Cilium: CoreDNS gets a LoadBalancer IP via LBIPAM; depends on cni.
  - name: cilium gateway uses coredns/loadbalancer and depends on cni
    values:
      provider: metal
      gateway:
        enabled: true
        driver: cilium
      network: *default-network
      cluster: *default-cluster
      addons:
        private_dns:
          enabled: true
    expect:
      kustomize:
        - name: dns
          path: dns
          dependsOn:
            - pki-base
            - cni
          components:
            - coredns
            - coredns/etcd
            - coredns/loadbalancer
            - coredns/cilium
            - external-dns
            - external-dns/coredns

  # Edge: Envoy gateway path includes coredns/gateway for DNS routing through the gateway.
  - name: private dns works with envoy gateway mode
    values:
      provider: metal
      gateway:
        enabled: true
        driver: envoy
      network: *default-network
      cluster: *default-cluster
      addons:
        private_dns:
          enabled: true
    expect:
      kustomize:
        - name: dns
          path: dns
          dependsOn:
            - pki-base
          components:
            - coredns
            - coredns/etcd
            - coredns/gateway
            - external-dns
            - external-dns/coredns

  # Edge: Gateway disabled with non-cilium CNI — dns must not depend on gateway-base (it doesn't exist).
  - name: private dns with gateway disabled does not depend on gateway-base
    values:
      provider: metal
      gateway:
        enabled: false
        driver: envoy
      network: *default-network
      cluster:
        <<: *default-cluster
        cni:
          driver: flannel
      addons:
        private_dns:
          enabled: true
    expect:
      kustomize:
        - name: dns
          path: dns
          dependsOn:
            - pki-base

  # Edge case: Addon disabled
  - name: excludes DNS when addon disabled
    values:
      provider: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      addons:
        private_dns:
          enabled: false
    exclude:
      kustomize:
        - name: dns
