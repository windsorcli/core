cases:
  - name: creates VNet, AKS, and GitOps terraform chain
    values:
      provider: azure
      gateway:
        enabled: false
    expect:
      terraform:
        - name: network
          path: network/azure-vnet
        - name: cluster
          path: cluster/azure-aks
          dependsOn:
            - network
        - name: gitops
          path: gitops/flux
          dependsOn:
            - cluster
      kustomize:
        - name: csi
          dependsOn:
            - policy-resources
          components:
            - azure-disk

  - name: excludes gateway when disabled
    values:
      provider: azure
      gateway:
        enabled: false
    exclude:
      kustomize:
        - name: gateway-resources
