cases:
  - name: creates VNet, AKS, and GitOps terraform chain
    values:
      platform: azure
      gateway:
        enabled: false
    expect:
      terraform:
        - name: backend
          path: backend/azurerm
        - name: network
          path: network/azure-vnet
          dependsOn:
            - backend
        - name: cluster
          path: cluster/azure-aks
          dependsOn:
            - network
        - name: gitops
          path: gitops/flux
          dependsOn:
            - cluster
      kustomize:
        - name: csi
          dependsOn:
            - policy-resources
          components:
            - azure-disk

  # cluster.pools wires to the azure-aks module's var.pools (mirrors AWS).
  # With no cluster.pools set, the facet defaults to one autoscaling general
  # pool; the cluster's inline default_node_pool already covers the fixed system
  # role, so AWS and AKS land on the same arrangement.
  - name: default pools are a single autoscaling general pool
    values:
      platform: azure
      gateway:
        enabled: false
    expect:
      terraform:
        - name: cluster
          path: cluster/azure-aks
          inputs:
            pools:
              general:
                class: general
                count: 1

  - name: cluster.pools wires through to azure-aks module
    values:
      platform: azure
      gateway:
        enabled: false
      cluster:
        pools:
          general:
            class: general
            count: 3
    expect:
      terraform:
        - name: cluster
          path: cluster/azure-aks
          inputs:
            pools:
              general:
                class: general
                count: 3

  # Multi-pool with mixed classes + a spot batch pool.
  - name: cluster.pools multi-pool with mixed sizing and lifecycle on Azure
    values:
      platform: azure
      gateway:
        enabled: false
      cluster:
        pools:
          extrasys:
            class: system
            count: 2
          general:
            class: general
            count: 3
          batch:
            class: compute
            count: 5
            lifecycle: spot
    expect:
      terraform:
        - name: cluster
          path: cluster/azure-aks
          inputs:
            pools:
              extrasys:
                class: system
                count: 2
              general:
                class: general
                count: 3
              batch:
                class: compute
                count: 5
                lifecycle: spot

  # Cheap single-zone default (no topology set → cloud derives multi-node):
  # node pools get no zone constraint (availability_zones null).
  - name: cheap default leaves node pools without a zone constraint
    values:
      platform: azure
      gateway:
        enabled: false
    expect:
      terraform:
        - name: cluster
          path: cluster/azure-aks
          inputs:
            availability_zones: null

  # topology: ha spreads node pools across zones 1-3.
  - name: topology ha spreads node pools across zones 1-3
    values:
      platform: azure
      topology: ha
      gateway:
        enabled: false
    expect:
      terraform:
        - name: cluster
          path: cluster/azure-aks
          inputs:
            availability_zones:
              - "1"
              - "2"
              - "3"

  - name: excludes gateway when disabled
    values:
      platform: azure
      gateway:
        enabled: false
    exclude:
      kustomize:
        - name: gateway-resources

  # Default selfsigned mode: no public_domain set, so dns-zone stack is not
  # provisioned and pki-resources renders public-issuer/selfsigned. The cert-
  # manager Workload Identity is not provisioned (create_cert_manager_identity
  # defaults to false), but external-dns identity still is — matching the AWS
  # baseline-on default for that role.
  - name: default selfsigned mode without a public domain
    values:
      platform: azure
    expect:
      terraform:
        - name: cluster
          path: cluster/azure-aks
          dependsOn:
            - network
          inputs:
            create_cert_manager_identity: "false"
      flux:
        - name: pki
          resources:
            - components:
                - public-issuer/selfsigned
    exclude:
      terraform:
        - name: dns-zone

  # ACME path on (production): dns.public_domain triggers the standalone
  # dns-zone stack, the cert-manager UAMI on the cluster, the
  # public-issuer/acme/azuredns component on pki-resources, and the gateway
  # TLS cert switches to the `public-acme` ClusterIssuer with the public
  # domain. Mirrors the AWS Route53 test exactly so divergence between the
  # two platforms shows up here first.
  - name: dns.public_domain wires up ACME azureDNS issuer end to end
    values:
      platform: azure
      gateway:
        enabled: true
        driver: envoy
      dns:
        public_domain: example.com
      email: ops@example.com
    terraformOutputs:
      dns-zone:
        zone_id: /subscriptions/12345678-1234-9876-4563-123456789012/resourceGroups/rg-dns/providers/Microsoft.Network/dnszones/example.com
        resource_group_name: rg-dns
        subscription_id: 12345678-1234-9876-4563-123456789012
      cluster:
        cert_manager_client_id: 11111111-aaaa-aaaa-aaaa-111111111111
        external_dns_client_id: 22222222-bbbb-bbbb-bbbb-222222222222
        tenant_id: 33333333-cccc-cccc-cccc-333333333333
    expect:
      terraform:
        - name: dns-zone
          path: dns/zone/azure-dns
          dependsOn:
            - backend
          inputs:
            domain_name: example.com
        - name: cluster
          path: cluster/azure-aks
          # cluster must wait for dns-zone so terraform_output('dns-zone',
          # 'zone_id') is resolved before the Workload Identity role
          # assignment list is rendered. Without this edge the assignments
          # fall through to the empty default and cert-manager / external-dns
          # have no DNS Zone Contributor role.
          dependsOn:
            - network
            - dns-zone
          inputs:
            create_cert_manager_identity: "true"
            cert_manager_dns_zone_ids:
              - /subscriptions/12345678-1234-9876-4563-123456789012/resourceGroups/rg-dns/providers/Microsoft.Network/dnszones/example.com
            external_dns_dns_zone_ids:
              - /subscriptions/12345678-1234-9876-4563-123456789012/resourceGroups/rg-dns/providers/Microsoft.Network/dnszones/example.com
      flux:
        # Workload Identity wiring on the cert-manager pod itself — the
        # azure-workload-identity component patches the cert-manager
        # HelmRelease to add the SA annotation + pod label so the
        # workload-identity webhook injects the projected token at runtime.
        - name: pki
          install:
            components:
              - cert-manager
              - cert-manager/azure-workload-identity
              - cert-manager/prometheus
            substitutions:
              cert_manager_client_id: 11111111-aaaa-aaaa-aaaa-111111111111
              cert_manager_tenant_id: 33333333-cccc-cccc-cccc-333333333333
          resources:
            - dependsOn:
                - policy-resources
              components:
                - public-issuer/acme/azuredns
              substitutions:
                acme_server: https://acme-v02.api.letsencrypt.org/directory
                acme_email: ops@example.com
                acme_dns_zone: example.com
                # Substitutions read by the azureDNS solver block. If the keys
                # are renamed or terraform_outputs stop threading through, the
                # issuer would deploy with empty fields and every DNS-01
                # challenge would fail.
                acme_dns_zone_resource_group: rg-dns
                acme_dns_zone_subscription_id: 12345678-1234-9876-4563-123456789012
                cert_manager_client_id: 11111111-aaaa-aaaa-aaaa-111111111111
                cert_manager_tenant_id: 33333333-cccc-cccc-cccc-333333333333
      kustomize:
        # Gateway-on + public-domain path: external-dns must wait for
        # gateway-base (HTTPRoute CRDs) and layer the gateway-httproute
        # source on top of the azure provider. Locks the conditional in
        # platform-azure.yaml's dns kustomization.
        - name: dns
          path: dns
          dependsOn:
            - policy-resources
            - gateway-base
          components:
            - external-dns
            - external-dns/providers/azure
            - external-dns/sources/gateway-httproute
          substitutions:
            external_domain: example.com
            zone_id_filter: /subscriptions/12345678-1234-9876-4563-123456789012/resourceGroups/rg-dns/providers/Microsoft.Network/dnszones/example.com
            external_dns_client_id: 22222222-bbbb-bbbb-bbbb-222222222222
            external_dns_tenant_id: 33333333-cccc-cccc-cccc-333333333333
            external_dns_dns_zone_subscription_id: 12345678-1234-9876-4563-123456789012
            external_dns_dns_zone_resource_group: rg-dns
        - name: gateway-resources
          path: gateway/resources
          components:
            - envoy/default-404
            - envoy/default-404/external-dns
            - flux-webhook
          substitutions:
            gateway_cert_issuer: public-acme
            external_domain: example.com

  # Dev mode flips the ACME server to Let's Encrypt staging to avoid
  # burning Let's Encrypt prod rate limits during iteration.
  - name: dev mode uses Let's Encrypt staging server on Azure
    values:
      platform: azure
      dev: true
      gateway:
        enabled: true
        driver: envoy
      dns:
        public_domain: dev.example.com
      email: dev@example.com
    expect:
      flux:
        - name: pki
          resources:
            - components:
                - public-issuer/acme/azuredns
              substitutions:
                acme_server: https://acme-staging-v02.api.letsencrypt.org/directory
                acme_email: dev@example.com

  # Public mode: gateway-base adds no platform-azure component. AKS's CCM
  # provisions a public Standard SKU LB for any Service: LoadBalancer with
  # no annotations needed, so the option-gateway base components are enough.
  - name: gateway with envoy on Azure uses AKS-default public LB
    values:
      platform: azure
      gateway:
        enabled: true
        driver: envoy
      dns:
        public_domain: example.com
      email: ops@example.com
    expect:
      kustomize:
        - name: gateway-base
          path: gateway/base
          components:
            - envoy
            - envoy/loadbalancer
            - envoy/prometheus

  # Private mode flips the AKS Standard LB to internal so the gateway only
  # exposes a private subnet IP. Same gating as the AWS aws-nlb internal
  # toggle (requires dns.private_domain, otherwise the rest of the private
  # cascade no-ops and the gateway runs as public). public_domain is also
  # set here to exercise the public+private overlap; the private-only path
  # is covered by the case below.
  - name: gateway.access=private flips the Azure LB to internal
    values:
      platform: azure
      gateway:
        enabled: true
        driver: envoy
        access: private
      dns:
        public_domain: example.com
        private_domain: internal.example.com
      email: ops@example.com
    expect:
      kustomize:
        - name: gateway-base
          path: gateway/base
          components:
            - envoy
            - envoy/loadbalancer
            - envoy/loadbalancer/azure-lb-internal
            - envoy/prometheus

  # Private-only mode: dns.private_domain set, no public_domain. The dns-zone
  # stack is never registered, so every dns-zone terraform_output must be
  # gated on public_domain — referencing an unregistered component is a hard
  # error. external-dns targets the private zone via the azure-private-dns
  # provider, and pki-resources falls to the private (selfsigned) issuer.
  - name: private-only mode targets external-dns at the private Azure DNS zone
    values:
      platform: azure
      gateway:
        enabled: true
        driver: envoy
        access: private
      dns:
        private_domain: internal.example.com
    terraformOutputs:
      network:
        private_zone_id: /subscriptions/sub-123/resourceGroups/rg-net/providers/Microsoft.Network/privateDnsZones/internal.example.com
        subscription_id: sub-123
        resource_group_name: rg-net
    expect:
      kustomize:
        - name: dns
          path: dns
          dependsOn:
            - policy-resources
            - gateway-base
          components:
            - external-dns
            - external-dns/providers/azure
            - external-dns/sources/gateway-httproute
          substitutions:
            external_domain: internal.example.com
            external_dns_azure_provider: azure-private-dns
            zone_id_filter: /subscriptions/sub-123/resourceGroups/rg-net/providers/Microsoft.Network/privateDnsZones/internal.example.com
            external_dns_dns_zone_subscription_id: sub-123
            external_dns_dns_zone_resource_group: rg-net
      # Private mode falls to the selfsigned issuer; its acme_* dns-zone
      # substitutions resolve to empty without touching the unregistered
      # dns-zone component.
      flux:
        - name: pki
          resources:
            - components:
                - private-issuer/selfsigned

  # Negative branch: Cilium provides its own gateway implementation, so
  # there's no Envoy data-plane Service to annotate. The azure-lb-internal
  # component must NOT merge into the cilium gateway-base.
  - name: gateway with cilium driver on Azure does not add azure-lb-internal component
    values:
      platform: azure
      gateway:
        enabled: true
        driver: cilium
    expect:
      kustomize:
        - name: gateway-base
          path: gateway/base
          components:
            - cilium

  # Negative branch: NodePort service_type means no LoadBalancer Service,
  # so the internal-LB annotation has nothing to attach to. The
  # azure-lb-internal component must NOT merge into the nodeport gateway-base.
  - name: gateway with envoy and NodePort service_type on Azure does not add azure-lb-internal component
    values:
      platform: azure
      gateway:
        enabled: true
        driver: envoy
        service_type: NodePort
    expect:
      kustomize:
        - name: gateway-base
          path: gateway/base
          components:
            - envoy
            - envoy/nodeport
            - envoy/prometheus
