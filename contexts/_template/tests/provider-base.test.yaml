# provider-base.yaml facet tests
# Tests base infrastructure components shared by all providers
# Includes: cleanup, policy, PKI, telemetry, and log aggregation driver configuration

# Common configurations
x-defaults:
  network: &default-network
    cidr_block: 10.5.0.0/16
    loadbalancer_driver: kube-vip
    loadbalancer_mode: arp
    loadbalancer_ips:
      start: "10.5.1.10"
      end: "10.5.1.100"

  cluster: &default-cluster
    driver: talos
    controlplanes:
      nodes:
        controlplane-1:
          endpoint: 10.5.0.10:50000
          node: 10.5.0.10
          hostname: controlplane-1
    workers:
      volumes:
        - /var/mnt/local

cases:
  # Minimal: Test base infrastructure with default log aggregation driver (fluentd)
  - name: minimal config creates base infrastructure with default fluentd driver
    values:
      provider: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
    expect:
      kustomize:
        - name: cleanup
          path: cleanup
          destroyOnly: true
          components:
            - ingresses
            - loadbalancers
            - pvcs
          timeout: 10m
          interval: 5m
        - name: policy-base
          path: policy/base
          components:
            - kyverno
          timeout: 30m
          interval: 5m
        - name: policy-resources
          path: policy/resources
          dependsOn:
            - policy-base
          components:
            - kyverno/resource-limits-requests
            - kyverno/require-image-digest
          timeout: 5m
          interval: 5m
        - name: telemetry-base
          path: telemetry/base
          components:
            - prometheus
            - prometheus/flux
            - fluentbit
          timeout: 30m
          interval: 10m
        - name: telemetry-resources
          path: telemetry/resources
          dependsOn:
            - telemetry-base
          components:
            - metrics-server
            - prometheus
            - prometheus/flux
            - fluentbit
            - fluentbit/containerd
            - fluentbit/kubernetes
            - fluentbit/parser
            - fluentbit/systemd
            - fluentbit/prometheus
            - fluentbit/fluentd
          timeout: 10m
          interval: 5m
        - name: pki-base
          path: pki/base
          dependsOn:
            - policy-resources
            - telemetry-base
          components:
            - cert-manager
            - cert-manager/prometheus
          timeout: 20m
          interval: 5m
        # observability: facet sets dependsOn: [telemetry-base]; engine does not preserve/merge dependsOn (see OBSERVABILITY-DEPENDSON.md)
        - name: observability
          path: observability
          components:
            - fluentd
            - fluentd/filters/otel
            - fluentd/prometheus
          timeout: 15m
          interval: 10m

  # Full: observability addon enabled; addon wins for same-name observability (grafana + fluentd/outputs/stdout)
  - name: full config with explicit fluentd driver and observability enabled
    values:
      provider: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      telemetry:
        logs:
          driver: fluentd
      addons:
        observability:
          enabled: true
          logs_driver: stdout
    expect:
      kustomize:
        - name: telemetry-resources
          path: telemetry/resources
          dependsOn:
            - telemetry-base
          components:
            - metrics-server
            - prometheus
            - prometheus/flux
            - fluentbit
            - fluentbit/containerd
            - fluentbit/kubernetes
            - fluentbit/parser
            - fluentbit/systemd
            - fluentbit/fluentd
          timeout: 10m
          interval: 5m
        - name: observability
          path: observability
          components:
            - grafana
            - grafana/prometheus
            - grafana/dashboards/node
            - grafana/dashboards/kubernetes
            - grafana/dashboards/flux
            - grafana/dashboards/cert-manager
            - grafana/dashboards/fluent-bit
            - grafana/dashboards/fluentd
            - fluentd/outputs/stdout
          timeout: 15m
          interval: 10m

  # Edge case: FluentD included when observability addon disabled (independent of observability addon)
  - name: fluentd included when observability addon disabled
    values:
      provider: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      addons:
        observability:
          enabled: false
    expect:
      kustomize:
        - name: telemetry-resources
          components:
            - fluentbit/fluentd
        - name: observability
          components:
            - fluentd
            - fluentd/filters/otel
            - fluentd/prometheus

  # Edge case: elasticsearch logs driver; addon overrides telemetry-base (filebeat). Intended: addon wins. See docs/cli-bugs.md if this fails.
  - name: fluentd excluded when elasticsearch logs driver used
    values:
      provider: metal
      dns:
        domain: elk.example.com
      gateway:
        enabled: true
        driver: envoy
      network: *default-network
      cluster: *default-cluster
      addons:
        observability:
          enabled: true
          logs_driver: elasticsearch
    expect:
      kustomize:
        - name: telemetry-base
          path: telemetry/base
          strategy: replace
          components:
            - prometheus
            - prometheus/flux
            - filebeat
          timeout: 30m
          interval: 10m
        - name: telemetry-resources
          path: telemetry/resources
          strategy: replace
          dependsOn:
            - telemetry-base
          components:
            - metrics-server
            - prometheus
            - prometheus/flux
          timeout: 10m
          interval: 5m
        - name: observability
          path: observability
          dependsOn:
            - csi
            - gateway-resources
          components:
            - elasticsearch
            - kibana
            - kibana/gateway
          substitutions:
            external_domain: elk.example.com

  # Edge case: None driver disables log aggregation
  - name: none driver disables log aggregation
    values:
      provider: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      telemetry:
        logs:
          driver: none
    expect:
      kustomize:
        - name: telemetry-resources
          path: telemetry/resources
          dependsOn:
            - telemetry-base
          components:
            - metrics-server
            - prometheus
            - prometheus/flux
            - fluentbit
            - fluentbit/containerd
            - fluentbit/kubernetes
            - fluentbit/parser
            - fluentbit/systemd
            - fluentbit/prometheus
          timeout: 10m
          interval: 5m
    exclude:
      kustomize:
        - name: observability
          components:
            - fluentd

  # Policy modes: disabled removes policy component from policy-resources stack.
  - name: policy mode disabled excludes selected policies
    values:
      provider: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      policies:
        require_image_digest: disabled
        resource_limits_requests: disabled
    expect:
      kustomize:
        - name: policy-resources
          path: policy/resources
          dependsOn:
            - policy-base
          components: []
          timeout: 5m
          interval: 5m

