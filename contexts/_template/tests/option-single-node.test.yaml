# option-single-node.yaml facet tests
# Verifies the single-node topology layers leader-election-disable
# components onto the pki install tier (cert-manager, optional trust-manager),
# csi (openebs), database (cloudnative-pg), and flips flux's leader_election
# terraform input.

x-defaults:
  network: &default-network
    cidr_block: 10.5.0.0/16
    loadbalancer_driver: kube-vip
    loadbalancer_mode: arp
    loadbalancer_ips:
      start: "10.5.1.10"
      end: "10.5.1.100"

  cluster: &default-cluster
    driver: talos
    controlplanes:
      nodes:
        controlplane-1:
          endpoint: 10.5.0.10:50000
          node: 10.5.0.10
          hostname: controlplane-1
    workers:
      volumes:
        - /var/mnt/local

cases:
  - name: single-node adds cert-manager + openebs overlays and disables flux leader election
    values:
      platform: metal
      topology: single-node
      network: *default-network
      cluster: *default-cluster
    expect:
      flux:
        - name: pki
          install:
            components:
              - cert-manager/single-node
        - name: csi
          install:
            components:
              - openebs/single-node
      terraform:
        - name: gitops
          path: gitops/flux
          inputs:
            leader_election: false

  - name: single-node with cnpg database addon adds cloudnativepg/single-node overlay
    values:
      platform: metal
      topology: single-node
      network: *default-network
      cluster: *default-cluster
      addons:
        database:
          postgres:
            enabled: true
            driver: cloudnativepg
    expect:
      flux:
        - name: database
          install:
            components:
              - cloudnativepg/single-node

  - name: single-node with private-ca addon also adds trust-manager/single-node
    values:
      platform: metal
      topology: single-node
      network: *default-network
      cluster: *default-cluster
      addons:
        private_ca:
          enabled: true
    expect:
      flux:
        - name: pki
          install:
            components:
              - cert-manager/single-node
              - trust-manager/single-node

  - name: multi-node topology leaves pki-install without single-node overlays
    values:
      platform: metal
      topology: multi-node
      network: *default-network
      cluster: *default-cluster
    expect:
      flux:
        - name: pki
          install:
            components:
              - cert-manager
              - cert-manager/prometheus
