# option-workstation.yaml facet tests
# Tests workstation stack (workstation/docker, compute/docker, cluster/talos) when workstation.enabled and provider docker.
# Facet contributes config (certSANs_from_compute, common_patch_docker, talos_common_docker) and terraform chain.

x-defaults:
  network: &default-network
    cidr_block: 10.5.0.0/16
    loadbalancer_driver: kube-vip
    loadbalancer_mode: arp
    loadbalancer_ips:
      start: "10.5.1.10"
      end: "10.5.1.100"

  dns: &default-dns
    domain: test.local

  cluster: &default-cluster
    controlplanes:
      nodes:
        controlplane-1: &cp1-node
          endpoint: 10.5.0.10:50000
          node: 10.5.0.10
          hostname: controlplane-1
    workers:
      volumes:
        - /var/mnt/local

  terraform-outputs: &default-terraform-outputs
    compute:
      controlplanes:
        - endpoint: 10.5.0.10:6443
          node: 10.5.0.10
          hostname: controlplane-1
      workers: []

  ingress-disabled: &ingress-disabled
    enabled: false
    driver: nginx

cases:
  # Minimal: workstation enabled, docker, minimal cluster/network/dns → cluster and gitops (option-workstation + provider-docker)
  - name: minimal workstation creates terraform chain and talos config
    values:
      provider: docker
      workstation:
        enabled: true
      vm:
        driver: colima
      dns: *default-dns
      ingress: *ingress-disabled
      network: *default-network
      cluster: *default-cluster
    terraformOutputs: *default-terraform-outputs
    expect:
      terraform:
        - name: cluster
          path: cluster/talos
          inputs:
            cluster_name: talos
        - name: gitops
          path: gitops/flux
          destroy: false

  # Full: fully populated cluster, vm.driver, dns, volumes
  - name: full workstation with cluster options and colima
    values:
      provider: docker
      workstation:
        enabled: true
      vm:
        driver: colima
      dns: *default-dns
      ingress: *ingress-disabled
      network: *default-network
      cluster:
        controlplanes:
          cpu: 4
          memory: 8
          nodes:
            controlplane-1: *cp1-node
        workers:
          count: 1
          cpu: 4
          memory: 8
          volumes:
            - /mnt/data
        storage:
          local_base_path: /mnt/data
    terraformOutputs: *default-terraform-outputs
    expect:
      terraform:
        - name: cluster
          path: cluster/talos
        - name: gitops
          path: gitops/flux
          destroy: false

  # Edge: cluster.enabled false with workstation enabled → no cluster (compute block also not run)
  - name: cluster disabled with workstation yields no cluster terraform
    values:
      provider: docker
      workstation:
        enabled: true
      vm:
        driver: colima
      dns: *default-dns
      ingress: *ingress-disabled
      network: *default-network
      cluster:
        enabled: false
        controlplanes:
          nodes:
            controlplane-1: *cp1-node
        workers:
          volumes:
            - /var/mnt/local
    expect:
      terraform:
        - name: gitops
          path: gitops/flux
          destroy: false

  # Edge: workstation.runtime set explicitly overrides vm.driver (config merge); runtime docker → loadbalancer present
  - name: workstation runtime override uses explicit runtime not vm.driver
    values:
      provider: docker
      workstation:
        enabled: true
        runtime: docker
      vm:
        driver: colima
      dns: *default-dns
      ingress: *ingress-disabled
      network: *default-network
      cluster: *default-cluster
    terraformOutputs: *default-terraform-outputs
    expect:
      terraform:
        - name: cluster
          path: cluster/talos
        - name: gitops
          path: gitops/flux
          destroy: false
      kustomize:
        - name: lb-base
          path: lb/base
        - name: lb-resources
          path: lb/resources

  # Edge: services.registries false → effective registries empty; terraform chain still runs
  - name: workstation with services registries disabled still creates terraform chain
    values:
      provider: docker
      workstation:
        enabled: true
        services:
          registries: false
      vm:
        driver: colima
      dns: *default-dns
      ingress: *ingress-disabled
      network: *default-network
      cluster: *default-cluster
    terraformOutputs: *default-terraform-outputs
    expect:
      terraform:
        - name: cluster
          path: cluster/talos
        - name: gitops
          path: gitops/flux
          destroy: false

  # Edge: vm.driver docker-desktop — no lb kustomize components
  - name: docker-desktop workstation has node hostport dns and no lb
    values:
      provider: docker
      workstation:
        enabled: true
      vm:
        driver: docker-desktop
      dns: *default-dns
      ingress: *ingress-disabled
      network: *default-network
      cluster: *default-cluster
    terraformOutputs: *default-terraform-outputs
    expect:
      terraform:
        - name: cluster
          path: cluster/talos
        - name: gitops
          path: gitops/flux
          destroy: false
    exclude:
      kustomize:
        - name: lb-base
        - name: lb-resources
