# addon-object-store.yaml facet tests
# Tests MinIO object storage service

# Common configurations
x-defaults:
  network: &default-network
    cidr_block: 10.5.0.0/16
    loadbalancer_driver: kube-vip
    loadbalancer_mode: arp
    loadbalancer_ips:
      start: "10.5.1.10"
      end: "10.5.1.100"

  cluster: &default-cluster
    driver: talos
    controlplanes:
      nodes:
        controlplane-1:
          endpoint: 10.5.0.10:50000
          node: 10.5.0.10
          hostname: controlplane-1
    workers:
      volumes:
        - /var/mnt/local


cases:
  # Full: Test MinIO with all dependencies (no dev mode implicit enablement)
  - name: full config creates MinIO object store with ingress dependency
    values:
      platform: metal
      workstation:
        runtime: colima
      gateway:
        enabled: true
        driver: envoy
      network: *default-network
      cluster: *default-cluster
      addons:
        object_store:
          enabled: true
          driver: minio
    expect:
      flux:
        - name: object-store
          dependsOn:
            - csi
          install:
            components:
              - minio
            timeout: 10m
            interval: 5m

  # Edge case: Addon disabled
  - name: excludes object store when addon disabled
    values:
      platform: metal
      network: *default-network
      cluster: *default-cluster
      addons:
        object_store:
          enabled: false
    exclude:
      flux:
        - name: object-store

  # Edge case: MinIO does not require ingress/gateway resources for base deployment
  - name: creates MinIO when enabled without ingress
    values:
      platform: metal
      workstation:
        runtime: docker-desktop
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      addons:
        object_store:
          enabled: true
          driver: minio
    expect:
      flux:
        - name: object-store
          dependsOn:
            - csi
          install:
            components:
              - minio
