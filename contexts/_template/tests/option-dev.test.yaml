# option-dev.yaml facet tests
# Tests development mode configurations including selfsigned certificates

# Common configurations
x-defaults:
  network: &default-network
    cidr_block: 10.5.0.0/16
    loadbalancer_driver: kube-vip
    loadbalancer_mode: arp
    loadbalancer_ips:
      start: "10.5.1.10"
      end: "10.5.1.100"

  cluster: &default-cluster
    driver: talos
    controlplanes:
      nodes:
        controlplane-1:
          endpoint: 10.5.0.10:50000
          node: 10.5.0.10
          hostname: controlplane-1
    workers:
      volumes:
        - /var/mnt/local

cases:
  # Minimal: Dev mode; addon-private-ca also applies (when dev), last-wins so pki-resources is addon's
  - name: dev mode creates selfsigned issuer
    values:
      platform: metal
      dev: true
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
    expect:
      flux:
        - name: pki
          install:
            timeout: 10m
            interval: 5m
            components:
              - trust-manager
          resources:
            - timeout: 5m
              interval: 5m
              components:
                - private-issuer/ca

  # Edge case: Non-dev mode excludes selfsigned issuer
  - name: excludes selfsigned issuer when dev disabled
    values:
      platform: metal
      dev: false
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
    exclude:
      kustomize:
        - name: pki-resources
    # pki-resources (the compiled tier name) doesn't exist on non-dev,
    # non-private-ca metal — no facet contributes any resources components.
