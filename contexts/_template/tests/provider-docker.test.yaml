# provider-docker.yaml facet tests
# Tests Talos cluster infrastructure for Docker-based dev environments (workstation path).
# With provider: docker, cluster runs only when workstation.enabled == true; chain is workstation → compute → cluster.
#
# Note: provider: docker requires cluster.controlplanes.nodes because
# cluster_endpoint is derived from the first node.

# Common configurations
x-defaults:
  network: &default-network
    cidr_block: 10.5.0.0/16
    loadbalancer_driver: kube-vip
    loadbalancer_mode: arp
    loadbalancer_ips:
      start: "10.5.1.10"
      end: "10.5.1.100"

  dns: &default-dns
    domain: test.local

  cluster: &default-cluster
    driver: talos
    controlplanes:
      nodes:
        controlplane-1: &cp1-node
          endpoint: 10.5.0.10:50000
          node: 10.5.0.10
          hostname: controlplane-1
    workers:
      volumes:
        - /var/mnt/local

  terraform-outputs: &default-terraform-outputs
    compute:
      controlplanes:
        - endpoint: 10.5.0.10:6443
          node: 10.5.0.10
          hostname: controlplane-1
      workers: []

  ingress-disabled: &ingress-disabled
    enabled: false
    driver: nginx

cases:
  # Minimal: workstation path — when workstation enabled, cluster depends on compute (workstation → compute → cluster from option-workstation + provider-docker)
  - name: minimal config creates workstation compute cluster chain with default CSI
    values:
      provider: docker
      workstation:
        enabled: true
      vm:
        driver: colima
      dns: *default-dns
      ingress: *ingress-disabled
      network: *default-network
      cluster: *default-cluster
    terraformOutputs: *default-terraform-outputs
    expect:
      terraform:
        - name: cluster
          path: cluster/talos
          parallelism: 1
          inputs:
            cluster_endpoint: https://10.5.0.10:6443
            cluster_name: talos
        - name: gitops
          path: gitops/flux
          dependsOn:
            - cluster
          destroy: false
          inputs:
            concurrency: 2
      kustomize:
        - name: cleanup
          path: cleanup
          destroyOnly: true
          components:
            - ingresses
            - loadbalancers
            - pvcs
          timeout: 10m
          interval: 5m
        - name: policy-base
          path: policy/base
          components:
            - kyverno
          timeout: 30m
          interval: 5m
        - name: policy-resources
          path: policy/resources
          dependsOn:
            - policy-base
          components:
            - kyverno/audit-resource-limits-requests
            - kyverno/require-image-digest
          timeout: 5m
          interval: 5m
        - name: pki-base
          path: pki/base
          dependsOn:
            - policy-resources
            - telemetry-base
          components:
            - cert-manager
            - cert-manager/prometheus
          timeout: 20m
          interval: 5m
        - name: telemetry-base
          path: telemetry/base
          components:
            - prometheus
            - prometheus/flux
            - fluentbit
          timeout: 30m
          interval: 10m
        - name: telemetry-resources
          path: telemetry/resources
          dependsOn:
            - telemetry-base
          components:
            - metrics-server
            - prometheus
            - prometheus/flux
            - fluentbit
            - fluentbit/containerd
            - fluentbit/kubernetes
            - fluentbit/parser
            - fluentbit/systemd
            - fluentbit/prometheus
          timeout: 10m
          interval: 5m
        - name: lb-base
          path: lb/base
          dependsOn:
            - policy-resources
          components: []
          timeout: 5m
          interval: 5m
        - name: lb-resources
          path: lb/resources
          dependsOn:
            - lb-base
          components:
            - kube-vip
            - kube-vip/arp
          substitutions:
            loadbalancer_ip_range: 10.5.1.10-10.5.1.100
          timeout: 5m
          interval: 5m
        - name: csi
          path: csi
          dependsOn:
            - policy-resources
          components:
            - openebs
            - openebs/dynamic-localpv
          substitutions:
            local_volume_path: /var/mnt/local
          timeout: 20m
          interval: 5m

  # Full: workstation path with fully populated cluster, ingress, volumes
  - name: full config creates workstation compute cluster chain with all options
    values:
      provider: docker
      workstation:
        enabled: true
      vm:
        driver: colima
      dns: *default-dns
      ingress:
        enabled: true
        driver: nginx
      network: *default-network
      cluster:
        driver: talos
        controlplanes:
          cpu: 20
          memory: 32
          nodes:
            controlplane-1: *cp1-node
        workers:
          count: 1
          volumes:
            - /mnt/data
        storage:
          local_base_path: /mnt/data
    terraformOutputs: *default-terraform-outputs
    expect:
      terraform:
        - name: cluster
          path: cluster/talos
          parallelism: 1
          inputs:
            cluster_endpoint: https://10.5.0.10:6443
            cluster_name: talos
        - name: gitops
          path: gitops/flux
          dependsOn:
            - cluster
          destroy: false
          inputs:
            concurrency: 10
      kustomize:
        - name: cleanup
          path: cleanup
          destroyOnly: true
          components:
            - ingresses
            - loadbalancers
            - pvcs
          timeout: 10m
          interval: 5m
        - name: policy-base
          path: policy/base
          components:
            - kyverno
          timeout: 30m
          interval: 5m
        - name: policy-resources
          path: policy/resources
          dependsOn:
            - policy-base
          components:
            - kyverno/audit-resource-limits-requests
            - kyverno/require-image-digest
          timeout: 5m
          interval: 5m
        - name: pki-base
          path: pki/base
          dependsOn:
            - policy-resources
            - telemetry-base
          components:
            - cert-manager
            - cert-manager/prometheus
          timeout: 20m
          interval: 5m
        - name: telemetry-base
          path: telemetry/base
          components:
            - prometheus
            - prometheus/flux
            - fluentbit
          timeout: 30m
          interval: 10m
        - name: telemetry-resources
          path: telemetry/resources
          dependsOn:
            - telemetry-base
          components:
            - metrics-server
            - prometheus
            - prometheus/flux
            - fluentbit
            - fluentbit/containerd
            - fluentbit/kubernetes
            - fluentbit/parser
            - fluentbit/systemd
            - fluentbit/prometheus
          timeout: 10m
          interval: 5m
        - name: lb-base
          path: lb/base
          dependsOn:
            - policy-resources
          components: []
          timeout: 5m
          interval: 5m
        - name: lb-resources
          path: lb/resources
          dependsOn:
            - lb-base
          components:
            - kube-vip
            - kube-vip/arp
          substitutions:
            loadbalancer_ip_range: 10.5.1.10-10.5.1.100
          timeout: 5m
          interval: 5m
        - name: csi
          path: csi
          dependsOn:
            - policy-resources
          components:
            - openebs
            - openebs/dynamic-localpv
          substitutions:
            local_volume_path: /mnt/data
          timeout: 20m
          interval: 5m

  # Edge: docker without workstation yields no cluster and no gitops (gitops always dependsOn cluster; cluster only when workstation enabled).
  - name: docker without workstation has no cluster terraform
    values:
      provider: docker
      workstation:
        enabled: false
      vm:
        driver: colima
      ingress: *ingress-disabled
      network: *default-network
      cluster: *default-cluster
    expect:
      terraform: []

  # Edge: Docker Desktop excludes load balancer (workstation enabled so cluster runs)
  - name: Docker Desktop excludes load balancer
    values:
      provider: docker
      workstation:
        enabled: true
      vm:
        driver: docker-desktop
      dns: *default-dns
      ingress: *ingress-disabled
      network: *default-network
      cluster: *default-cluster
    terraformOutputs: *default-terraform-outputs
    exclude:
      kustomize:
        - name: lb-base
        - name: lb-resources
