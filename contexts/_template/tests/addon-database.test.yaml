# addon-database.yaml facet tests
# Tests CloudNativePG database operator with HA and observability integration

# Common configurations
x-defaults:
  network: &default-network
    cidr_block: 10.5.0.0/16
    loadbalancer_driver: kube-vip
    loadbalancer_mode: arp
    loadbalancer_ips:
      start: "10.5.1.10"
      end: "10.5.1.100"

  cluster: &default-cluster
    driver: talos
    controlplanes:
      nodes:
        controlplane-1:
          endpoint: 10.5.0.10:50000
          node: 10.5.0.10
          hostname: controlplane-1
    workers:
      volumes:
        - /var/mnt/local


cases:
  # Minimal: dev mode enables database addon. Intended: addon observability (grafana/dashboards/cloudnativepg) overrides. See docs/cli-bugs.md if this fails.
  - name: minimal config creates database with defaults via dev mode
    values:
      provider: metal
      dev: true
      network: *default-network
      cluster: *default-cluster
    expect:
      kustomize:
        - name: database
          path: database
          dependsOn:
            - csi
          components:
            - cloudnativepg
            - cloudnativepg/prometheus
          timeout: 15m
          interval: 10m
        - name: observability
          path: observability
          components:
            - grafana/dashboards/cloudnativepg

  # Full: database with HA and observability. Intended: addon observability overrides. See docs/cli-bugs.md if this fails.
  - name: full config creates database with HA and observability integration
    values:
      provider: metal
      network: *default-network
      cluster: *default-cluster
      topology: ha
      addons:
        database:
          postgres:
            enabled: true
            driver: cloudnativepg
        observability:
          enabled: true
    expect:
      kustomize:
        - name: database
          path: database
          dependsOn:
            - csi
          components:
            - cloudnativepg
            - cloudnativepg/prometheus
            - cloudnativepg/ha
          timeout: 15m
          interval: 10m
        - name: observability
          components:
            - grafana/dashboards/cloudnativepg

  # Edge case: Explicit disable
  - name: excludes database when addon disabled
    values:
      provider: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      addons:
        database:
          postgres:
            enabled: false
    exclude:
      kustomize:
        - name: database

  # Edge case: HA disabled explicitly - database created without HA component
  - name: creates database without HA when topology is multi-node
    values:
      provider: metal
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
      topology: multi-node
      addons:
        database:
          postgres:
            enabled: true
            driver: cloudnativepg
    expect:
      kustomize:
        - name: database
          path: database
          dependsOn:
            - csi
          components:
            - cloudnativepg
            - cloudnativepg/prometheus
          timeout: 15m
          interval: 10m
