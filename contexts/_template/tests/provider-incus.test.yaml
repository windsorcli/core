# provider-incus.yaml facet tests
# Tests Incus compute platform with Talos cluster infrastructure
#
# Note: Tests must provide terraformOutputs.compute to mock terraform_output() calls.

# Common configurations
x-defaults:
  network: &default-network
    cidr_block: 10.5.0.0/16
    loadbalancer_driver: kube-vip
    loadbalancer_mode: arp
    loadbalancer_ips:
      start: "10.5.1.10"
      end: "10.5.1.100"

  cluster: &default-cluster
    driver: talos
    controlplanes:
      nodes:
        controlplane-1: &cp1-node
          endpoint: 10.5.0.10:50000
          node: 10.5.0.10
          hostname: controlplane-1
    workers: &default-workers
      count: 1
      volumes:
        - /var/mnt/local
      nodes:
        worker-1:
          endpoint: 10.5.0.20:50000
          node: 10.5.0.20
          hostname: worker-1

  terraform-outputs: &default-terraform-outputs
    compute:
      controlplanes:
        - endpoint: 10.5.0.10:6443
          node: 10.5.0.10
          hostname: controlplane-1
      workers:
        - endpoint: 10.5.0.20:50000
          node: 10.5.0.20
          hostname: worker-1


cases:
  # Minimal: Test default behavior with minimal required fields
  - name: minimal config creates compute and cluster terraform chain with defaults
    values:
      provider: incus
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
    terraformOutputs: *default-terraform-outputs
    expect:
      terraform:
        - name: compute
          path: compute/incus
        - name: cluster
          path: cluster/talos
          dependsOn:
            - compute
          parallelism: 1
          inputs:
            cluster_endpoint: https://10.5.0.10:6443
            cluster_name: talos
        - name: cni
          path: cni/cilium
          dependsOn:
            - cluster
          inputs:
            cluster_endpoint: https://10.5.0.10:6443
            talos_mode: true
        - name: gitops
          path: gitops/flux
          dependsOn:
            - cluster
            - cni
          destroy: false
          inputs:
            concurrency: 2
      kustomize:
        - name: cni
          path: cni
          dependsOn:
            - policy-resources
          components:
            - cilium
            - cilium/talos
            - cilium/l2
          substitutions:
            k8s_service_host: "10.5.0.10"
            loadbalancer_start_ip: "10.5.1.10"
            loadbalancer_end_ip: "10.5.1.100"
          timeout: 15m
          interval: 5m
        - name: csi
          path: csi
          dependsOn:
            - policy-resources
            - telemetry-base
          components:
            - longhorn
          timeout: 20m
          interval: 5m
    exclude:
      kustomize:
        - name: lb-base
        - name: lb-resources

  # Full: Test all configurable options together (explicit flannel CNI to exercise MetalLB path)
  - name: full config with custom network, MetalLB, ingress, and all cluster options
    values:
      provider: incus
      gateway:
        enabled: true
        driver: envoy
      addons:
        private_dns:
          enabled: true
      network:
        cidr_block: 10.10.0.0/16
        loadbalancer_driver: metallb
        loadbalancer_mode: layer2
        loadbalancer_ips:
          start: "10.10.1.10"
          end: "10.10.1.100"
      cluster:
        driver: talos
        cni:
          driver: flannel
        controlplanes:
          count: 3
          cpu: 4
          memory: 8
          root_disk_size: 50
          nodes:
            controlplane-1:
              endpoint: 10.10.0.10:50000
              node: 10.10.0.10
              hostname: cp-1
        workers:
          count: 2
          cpu: 8
          memory: 16
          volumes:
            - /mnt/storage
          nodes:
            worker-1:
              endpoint: 10.10.0.20:50000
              node: 10.10.0.20
              hostname: wk-1
        storage:
          local_base_path: /mnt/storage
    terraformOutputs:
      compute:
        controlplanes:
          - endpoint: 10.10.0.10:6443
            node: 10.10.0.10
            hostname: cp-1
        workers:
          - endpoint: 10.10.0.20:50000
            node: 10.10.0.20
            hostname: wk-1
    expect:
      terraform:
        - name: compute
          path: compute/incus
        - name: cluster
          path: cluster/talos
          dependsOn:
            - compute
          parallelism: 1
          inputs:
            cluster_endpoint: https://10.10.0.10:6443
            cluster_name: talos
        - name: gitops
          path: gitops/flux
          dependsOn:
            - cluster
          destroy: false
          inputs:
            concurrency: 2
      kustomize:
        - name: csi
          path: csi
          dependsOn:
            - policy-resources
            - telemetry-base
          components:
            - longhorn
          timeout: 20m
          interval: 5m
        - name: lb-base
          path: lb/base
          dependsOn:
            - policy-resources
          components:
            - metallb
          timeout: 5m
          interval: 5m
        - name: lb-resources
          path: lb/resources
          dependsOn:
            - lb-base
          components:
            - metallb
            - metallb/layer2
          substitutions:
            loadbalancer_ip_range: 10.10.1.10-10.10.1.100
          timeout: 5m
          interval: 5m
        - name: gateway-base
          path: gateway/base
          dependsOn:
            - pki-base
          components:
            - envoy
            - envoy/loadbalancer
            - envoy/prometheus
          timeout: 10m
          interval: 5m
        - name: gateway-resources
          path: gateway/resources
          dependsOn:
            - gateway-base
          components:
            - dns
          timeout: 10m
          interval: 5m

  # Edge case: colima-incus uses Incus path (provider selects compute/incus; option-workstation does not apply)
  - name: colima-incus uses compute/incus not docker stack
    values:
      provider: incus
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
    terraformOutputs: *default-terraform-outputs
    expect:
      terraform:
        - name: compute
          path: compute/incus
        - name: cluster
          path: cluster/talos
    exclude:
      terraform:
        - name: workstation
        - path: compute/docker

  # Edge case: Colima uses existing incusbr0 network (avoids creating a new bridge)
  - name: Colima uses existing incusbr0 network
    values:
      provider: incus
      workstation:
        runtime: colima
      gateway:
        enabled: false
      network: *default-network
      cluster: *default-cluster
    terraformOutputs: *default-terraform-outputs
    expect:
      terraform:
        - name: workstation
          path: workstation/incus
          inputs:
            network_name: incusbr0
            create_network: false
      kustomize:
        - name: telemetry-base
          path: telemetry/base
          components:
            - prometheus
            - prometheus/flux
            - fluentbit

  # colima-incus: defaults to flannel CNI (no cilium overhead; used for storage driver testing)
  - name: colima-incus defaults to flannel CNI and excludes lb
    values:
      provider: incus
      workstation:
        runtime: colima
      network: *default-network
      cluster: *default-cluster
    terraformOutputs: *default-terraform-outputs
    expect:
      terraform:
        - name: gitops
          path: gitops/flux
          dependsOn:
            - cluster
      kustomize:
        - name: lb-base
          path: lb/base
        - name: lb-resources
          path: lb/resources
    exclude:
      terraform:
        - name: cni
      kustomize:
        - name: cni

  # Edge case: Schedulable controlplanes use controlplane volume path
  - name: schedulable controlplanes use controlplane volume path for CSI
    values:
      provider: incus
      gateway:
        enabled: false
      network: *default-network
      cluster:
        driver: talos
        controlplanes:
          schedulable: true
          volumes:
            - /data/local
          nodes:
            controlplane-1: *cp1-node
        workers: *default-workers
        storage:
          local_base_path: /data/local
    terraformOutputs: *default-terraform-outputs
    expect:
      kustomize:
        - name: csi
