# platform-aws.yaml facet tests
# Tests AWS EKS infrastructure with VPC networking

cases:
  # Minimal: Test default behavior with required fields only
  - name: minimal config creates VPC, EKS, and GitOps terraform chain
    values:
      provider: aws
      gateway:
        enabled: false
    expect:
      terraform:
        # S3 remote state backend must run first so downstream stacks can
        # migrate their state onto it; on destroy the reverse-order teardown
        # takes it down last.
        - name: backend
          path: backend/s3
        - name: network
          path: network/aws-vpc
          dependsOn:
            - backend
        - name: cluster
          path: cluster/aws-eks
          dependsOn:
            - network
        - name: cluster-additions
          path: cluster/aws-eks/additions
          dependsOn:
            - cluster
        - name: gitops
          path: gitops/flux
          dependsOn:
            - cluster
          inputs:
            concurrency: 5
      kustomize:
        - name: csi
          path: csi
          dependsOn:
            - policy-resources
          components:
            - aws-ebs
          timeout: 5m
          interval: 5m

  # Regression: workstation.runtime must not activate option-workstation on AWS.
  # If option-workstation applied, it would replace provider gitops inputs and set local dev defaults.
  - name: aws with workstation runtime keeps provider gitops defaults
    values:
      provider: aws
      workstation:
        runtime: colima
      gateway:
        enabled: false
    expect:
      terraform:
        - name: network
          path: network/aws-vpc
        - name: cluster
          path: cluster/aws-eks
          dependsOn:
            - network
        - name: cluster-additions
          path: cluster/aws-eks/additions
          dependsOn:
            - cluster
        - name: gitops
          path: gitops/flux
          dependsOn:
            - cluster
          inputs:
            concurrency: 5
      kustomize:
        - name: csi
          path: csi
          dependsOn:
            - policy-resources
          components:
            - aws-ebs
          timeout: 5m
          interval: 5m

  # Full: Test with gateway enabled (envoy)
  - name: full config creates envoy gateway
    values:
      provider: aws
      gateway:
        enabled: true
        driver: envoy
    expect:
      terraform:
        - name: network
          path: network/aws-vpc
        - name: cluster
          path: cluster/aws-eks
          dependsOn:
            - network
        - name: cluster-additions
          path: cluster/aws-eks/additions
          dependsOn:
            - cluster
        - name: gitops
          path: gitops/flux
          dependsOn:
            - cluster
          inputs:
            concurrency: 5
      kustomize:
        - name: csi
          path: csi
          dependsOn:
            - policy-resources
          components:
            - aws-ebs
          timeout: 5m
          interval: 5m
        - name: gateway-base
          path: gateway/base
          dependsOn:
            - pki-base
          components:
            - envoy
            - envoy/loadbalancer
            - envoy/prometheus
          timeout: 10m
          interval: 5m

  # Edge case: Ingress disabled
  - name: excludes ingress when disabled
    values:
      provider: aws
      gateway:
        enabled: false
    exclude:
      kustomize:
        - name: gateway-resources

  # ACME off by default — no public domain configured. pki-resources
  # still renders so the gateway cert always has a working ClusterIssuer
  # (just-works default), but using public-issuer/selfsigned (no Route53
  # wiring needed). Cluster's create_cert_manager_role and the dns-zone
  # stack stay off — Route53 IAM and a public zone aren't needed for
  # selfsigned issuance.
  - name: default selfsigned mode without a public domain
    values:
      provider: aws
      gateway:
        enabled: false
    expect:
      terraform:
        - name: cluster
          path: cluster/aws-eks
          # No dns-zone edge when ACME is off — the path-less injector is gated
          # on dns.public_domain and drops out here.
          dependsOn:
            - network
          inputs:
            create_cert_manager_role: "false"
      kustomize:
        - name: pki-resources
          path: pki/resources
          components:
            - public-issuer/selfsigned
    exclude:
      terraform:
        - name: dns-zone

  # ACME path on (production): dns.public_domain triggers the standalone
  # dns-zone stack, the cert-manager IAM role on the cluster, the
  # public-issuer/acme component on pki-resources, and the gateway TLS
  # cert switches to the `public-acme` ClusterIssuer with the public domain.
  - name: dns.public_domain wires up ACME Route53 issuer end to end
    values:
      provider: aws
      gateway:
        enabled: true
        driver: envoy
      dns:
        public_domain: example.com
      email: ops@example.com
      aws:
        region: us-west-2
    terraformOutputs:
      dns-zone:
        zone_id: Z1ABCDEF12345
    expect:
      terraform:
        - name: dns-zone
          path: dns/zone/route53
          dependsOn:
            - backend
          inputs:
            domain_name: example.com
        - name: cluster
          path: cluster/aws-eks
          # cluster must wait for dns-zone so terraform_output('dns-zone',
          # 'zone_id') is resolved before the cert-manager IAM policy is
          # rendered — without this edge the policy falls back to the
          # account-wide hostedzone/* scope.
          dependsOn:
            - network
            - dns-zone
          inputs:
            create_cert_manager_role: "true"
            # Scope cert-manager's Route53 record-write to just the zone we
            # provisioned, so the credential can't write into unrelated
            # zones in the same account.
            cert_manager_hosted_zone_ids:
              - Z1ABCDEF12345
      kustomize:
        - name: pki-resources
          path: pki/resources
          dependsOn:
            - pki-base
            - policy-resources
          components:
            - public-issuer/acme
          substitutions:
            acme_server: https://acme-v02.api.letsencrypt.org/directory
            acme_email: ops@example.com
            acme_dns_zone: example.com
            acme_region: us-west-2
            # Maps to hostedZoneID in the ClusterIssuer YAML; if the substitution
            # key is renamed or terraform_output('dns-zone', 'zone_id') stops
            # threading through, the issuer would deploy with an empty zone ID
            # and every DNS-01 challenge would fail.
            acme_hosted_zone_id: Z1ABCDEF12345
        # Gateway-on + public-domain path: external-dns must wait for
        # gateway-base (HTTPRoute CRDs) and layer the gateway-httproute
        # source on top of the route53 provider. Locks the conditional
        # in platform-aws.yaml's dns kustomization for the public branch.
        - name: dns
          path: dns
          dependsOn:
            - policy-resources
            - gateway-base
          components:
            - external-dns
            - external-dns/providers/route53
            - external-dns/sources/gateway-httproute
          substitutions:
            external_domain: example.com
            zone_type: public
            zone_id_filter: Z1ABCDEF12345
        - name: gateway-resources
          path: gateway/resources
          # envoy/default-404/external-dns is the AWS-only patch that adds
          # the external-dns hostname annotation to the catch-all 404 route.
          # Gated on dns.public_domain so it doesn't render on platforms
          # without external-dns running (where the substitution would
          # produce a malformed ",*." value).
          components:
            - envoy/default-404
            - envoy/default-404/external-dns
            - flux-webhook
          substitutions:
            gateway_cert_issuer: public-acme
            external_domain: example.com

  # Dev mode flips the ACME server to Let's Encrypt staging to avoid
  # burning Let's Encrypt prod rate limits during iteration.
  - name: dev mode uses Let's Encrypt staging server
    values:
      provider: aws
      dev: true
      gateway:
        enabled: true
        driver: envoy
      dns:
        public_domain: dev.example.com
      email: dev@example.com
    terraformOutputs:
      dns-zone:
        zone_id: Z9DEVZONE000
    expect:
      kustomize:
        - name: pki-resources
          components:
            - public-issuer/acme
          substitutions:
            acme_server: https://acme-staging-v02.api.letsencrypt.org/directory
            acme_email: dev@example.com

  # When dns.public_domain is set, pki-resources renders the ACME
  # ClusterIssuer regardless of whether the dns-zone terraform output is
  # available yet. The acme_hosted_zone_id substitution uses deferred
  # evaluation, so it fills in once dns-zone applies and the manifest is
  # regenerated. Composition itself doesn't call terraform_output for
  # component selection — that would panic during first bootstrap, before
  # the dns-zone component is registered.
  - name: pki-resources renders ACME when public_domain set even without dns-zone output yet
    values:
      provider: aws
      gateway:
        enabled: true
        driver: envoy
      dns:
        public_domain: example.com
      email: ops@example.com
    terraformOutputs:
      dns-zone: {}
    expect:
      kustomize:
        - name: pki-resources
          components:
            - public-issuer/acme

  # cluster.pools threads through to the cluster module as-is. The module
  # converts class + count + lifecycle into EKS managed node group shape
  # internally (class → instance family, lifecycle → capacity_type).
  - name: cluster.pools flows through to the cluster module
    values:
      provider: aws
      gateway:
        enabled: false
      cluster:
        pools:
          general:
            class: general
            count: 3
    expect:
      terraform:
        - name: cluster
          path: cluster/aws-eks
          inputs:
            pools:
              general:
                class: general
                count: 3

  # Multi-pool: a system pool plus general + spot-priced batch. The class
  # label is what makes these pools portable — same shape would land on
  # Azure or GCP once those facets gain pools.
  - name: multi-pool config with mixed sizing and lifecycle
    values:
      provider: aws
      gateway:
        enabled: false
      cluster:
        pools:
          system:
            class: system
            count: 2
          general:
            class: general
            count: 3
          batch:
            class: compute
            count: 5
            lifecycle: spot
    expect:
      terraform:
        - name: cluster
          path: cluster/aws-eks
          inputs:
            pools:
              system:
                class: system
                count: 2
              general:
                class: general
                count: 3
              batch:
                class: compute
                count: 5
                lifecycle: spot

  # Escape hatch: explicit instance_types pinned for regulatory or
  # GPU-shape reasons. The pool still carries class for the
  # windsor.io/pool-class label; the module skips the class default
  # lookup and uses the supplied list verbatim.
  - name: pool with explicit instance_types overrides the class default
    values:
      provider: aws
      gateway:
        enabled: false
      cluster:
        pools:
          gpu:
            class: gpu
            count: 1
            instance_types:
              - p4d.24xlarge
    expect:
      terraform:
        - name: cluster
          path: cluster/aws-eks
          inputs:
            pools:
              gpu:
                class: gpu
                count: 1
                instance_types:
                  - p4d.24xlarge

  # AWS Load Balancer Controller is rendered on every AWS cluster — it's
  # required to get NLBs / ALBs (the in-tree CCM only creates classic ELBs).
  # The component lives at lb/base/aws-lb-controller (sibling of
  # lb/base/metallb on metal/incus); the lb-base kustomization owns the
  # system-lb namespace plus whichever in-cluster LB the platform needs.
  - name: aws-lb-controller renders unconditionally on AWS via lb-base
    values:
      provider: aws
      gateway:
        enabled: false
    expect:
      kustomize:
        - name: lb-base
          path: lb/base
          dependsOn:
            - policy-resources
          components:
            - aws-lb-controller
          timeout: 5m
          interval: 5m

  # When gateway is enabled on AWS, the envoy data-plane Service gets NLB
  # annotations layered on by adding envoy/loadbalancer/aws-nlb to the
  # gateway-base component list. This is an additive merge with option-
  # gateway's gateway-base entry — option-gateway emits the platform-
  # agnostic components, this AWS facet appends the AWS-specific patch.
  - name: gateway with envoy on AWS adds NLB annotations component
    values:
      provider: aws
      gateway:
        enabled: true
        driver: envoy
    expect:
      kustomize:
        - name: gateway-base
          path: gateway/base
          components:
            - envoy
            - envoy/loadbalancer
            - envoy/prometheus
            - envoy/loadbalancer/aws-nlb

  # gateway.access=private threads through the AWS facet's gateway-base
  # merge as the lb_scheme substitution, which the aws-nlb patch consumes
  # to flip aws-load-balancer-scheme to `internal`. Required for clusters
  # in private VPCs (no public subnets) where AWS rejects internet-facing
  # NLB creation. The platform-agnostic `public`/`private` values keep
  # AWS-specific terms (internet-facing) inside the AWS facet.
  #
  # dns.private_domain is required — it's what the rest of the private-mode
  # cascade gates on (cert issuer, external-dns target). Without it the
  # NLB scheme stays public so the gateway doesn't end up internal-only
  # with no DNS pointing at it.
  - name: gateway.access=private flips the AWS NLB to internal
    values:
      provider: aws
      gateway:
        enabled: true
        driver: envoy
        access: private
      dns:
        private_domain: internal.example.com
    expect:
      kustomize:
        - name: gateway-base
          path: gateway/base
          components:
            - envoy/loadbalancer/aws-nlb
          substitutions:
            lb_scheme: internal

  # Coherence guard: gateway.access=private without dns.private_domain is
  # an incoherent operator config (private gateway with no private domain
  # to publish records to). The whole private-mode cascade gates on both,
  # so without private_domain the cluster stays on the public path — better
  # than ending up with a half-private gateway no one can reach. Asserted
  # via the cert issuer falling to `public-selfsigned` (no public_domain
  # was set, so ACME isn't selected; the cascade's private branch would
  # otherwise force `private`). Empty `lb_scheme` substitution is dropped
  # from output so we can't assert it directly, but the cert issuer is
  # the proxy.
  - name: gateway.access=private without private_domain stays public
    values:
      provider: aws
      gateway:
        enabled: true
        driver: envoy
        access: private
    expect:
      kustomize:
        - name: gateway-resources
          path: gateway/resources
          substitutions:
            gateway_cert_issuer: public-selfsigned

  # Negative branch: Cilium provides its own gateway implementation
  # (no Envoy data-plane Service to annotate). The aws-nlb component
  # must NOT merge into the cilium gateway-base.
  - name: gateway with cilium driver on AWS does not add aws-nlb component
    values:
      provider: aws
      gateway:
        enabled: true
        driver: cilium
    expect:
      kustomize:
        - name: gateway-base
          path: gateway/base
          components:
            - cilium

  # Negative branch: NodePort service_type on AWS (e.g. small/edge clusters
  # without a public LB) — aws-nlb annotations are LoadBalancer-only and
  # must NOT merge into the nodeport gateway-base.
  - name: gateway with envoy and NodePort service_type on AWS does not add aws-nlb component
    values:
      provider: aws
      gateway:
        enabled: true
        driver: envoy
        service_type: NodePort
    expect:
      kustomize:
        - name: gateway-base
          path: gateway/base
          components:
            - envoy
            - envoy/nodeport
            - envoy/prometheus

  # External-DNS deploys when dns.public_domain is set. Anchored on the
  # shared `dns` Kustomization (same canonical name addon-private-dns uses)
  # rooted at kustomize/dns/, with external-dns + external-dns/route53 as
  # components — kustomize/dns/external-dns is `kind: Component` so it must
  # be layered, not used as a Kustomization root.
  #
  # The route53 component layers AWS-specific helm values (Pod Identity,
  # txtOwnerId from the cluster configmap, zoneType + zone-id filter) on
  # top of the base external-dns release. Without it, two clusters in the
  # same account would clobber each other's records — txtOwnerId is what
  # scopes ownership.
  # Gateway disabled: the dns Kustomization still ships (public_domain alone
  # is enough to want Route53 record management for ingress hostnames), but
  # the gateway-httproute source must NOT be added — Gateway API CRDs are
  # absent without gateway-base, and external-dns crashes on startup if it
  # finds gateway-httproute in its sources without those CRDs present.
  - name: external-dns deploys when dns.public_domain is set
    values:
      provider: aws
      gateway:
        enabled: false
      dns:
        public_domain: example.com
      email: ops@example.com
    terraformOutputs:
      dns-zone:
        zone_id: Z1ABCDEF12345
    expect:
      kustomize:
        - name: dns
          path: dns
          dependsOn:
            - policy-resources
          components:
            - external-dns
            - external-dns/providers/route53
          timeout: 5m
          interval: 5m
          substitutions:
            external_domain: example.com
            zone_type: public
            zone_id_filter: Z1ABCDEF12345

  # Private mode: gateway.access=private flips the DNS path away from the
  # public zone and onto the VPC-private Route53 zone the network module
  # creates from dns.private_domain. external-dns is still rendered (we
  # want Windsor managing private DNS too — operators of private clusters
  # shouldn't have to wire records by hand) but pointed at the private
  # zone with zoneType=private + the private_zone_id from the network
  # module's terraform output.
  - name: private mode targets external-dns at the private Route53 zone
    values:
      provider: aws
      gateway:
        enabled: true
        driver: envoy
        access: private
      dns:
        private_domain: internal.example.com
    terraformOutputs:
      network:
        private_zone_id: Z9PRIVATEZONE
    expect:
      kustomize:
        - name: dns
          path: dns
          dependsOn:
            - policy-resources
            # gateway-base must be in deps when gateway is on so HTTPRoute
            # CRDs are present before external-dns reconciles.
            - gateway-base
          components:
            - external-dns
            - external-dns/providers/route53
            # Gateway is enabled here, so the HTTPRoute source is layered on.
            - external-dns/sources/gateway-httproute
          substitutions:
            external_domain: internal.example.com
            zone_type: private
            zone_id_filter: Z9PRIVATEZONE
        # Cert issuer falls to `private` (selfsigned) — ACME DNS-01 can't
        # validate against a VPC-only zone, and the gateway's external_domain
        # follows access=private onto the private domain. The 404 hostname
        # annotation patch is added too, asserting the private branch of
        # the option-gateway conditional fires alongside everything else.
        - name: gateway-resources
          path: gateway/resources
          components:
            - envoy/default-404
            - envoy/default-404/external-dns
          substitutions:
            gateway_cert_issuer: private
            external_domain: internal.example.com
        # Private mode swaps pki-resources from public-issuer/* to
        # private-issuer/selfsigned, which creates a ClusterIssuer named
        # `private` — what the gateway cert above references. Without this
        # the cert would reference a non-existent issuer.
        - name: pki-resources
          path: pki/resources
          components:
            - private-issuer/selfsigned

  # Without a public domain (and no private mode), the dns Kustomization
  # has nothing to write to — domainFilters would fall back to the
  # placeholder "test" and the controller would idle. Skip the
  # Kustomization entirely.
  - name: dns excluded when no public domain and no private mode
    values:
      provider: aws
      gateway:
        enabled: false
    exclude:
      kustomize:
        - name: dns

  # Default lifecycle: long-lived, so the cluster gets manage_log_group=true
  # and TF owns the EKS log group with retention + CMK.
  - name: default lifecycle gives cluster manage_log_group true
    values:
      provider: aws
      gateway:
        enabled: false
    expect:
      terraform:
        - name: cluster
          path: cluster/aws-eks
          inputs:
            manage_log_group: true

  # Ephemeral lifecycle: cluster gets manage_log_group=false. EKS owns the
  # log group; same-named cluster recreates avoid the destroy-time race.
  - name: ephemeral flips cluster to manage_log_group false
    values:
      provider: aws
      gateway:
        enabled: false
      ephemeral: true
    expect:
      terraform:
        - name: cluster
          path: cluster/aws-eks
          inputs:
            manage_log_group: false
