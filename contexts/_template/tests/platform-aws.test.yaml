# platform-aws.yaml facet tests
# Tests AWS EKS infrastructure with VPC networking

cases:
  # Minimal: Test default behavior with required fields only
  - name: minimal config creates VPC, EKS, and GitOps terraform chain
    values:
      provider: aws
      gateway:
        enabled: false
    expect:
      terraform:
        # S3 remote state backend must run first so downstream stacks can
        # migrate their state onto it; on destroy the reverse-order teardown
        # takes it down last.
        - name: backend
          path: backend/s3
        - name: network
          path: network/aws-vpc
          dependsOn:
            - backend
        - name: cluster
          path: cluster/aws-eks
          dependsOn:
            - network
        - name: cluster-additions
          path: cluster/aws-eks/additions
          dependsOn:
            - cluster
        - name: gitops
          path: gitops/flux
          dependsOn:
            - cluster
          inputs:
            concurrency: 5
      kustomize:
        - name: csi
          path: csi
          dependsOn:
            - policy-resources
          components:
            - aws-ebs
          timeout: 5m
          interval: 5m

  # Regression: workstation.runtime must not activate option-workstation on AWS.
  # If option-workstation applied, it would replace provider gitops inputs and set local dev defaults.
  - name: aws with workstation runtime keeps provider gitops defaults
    values:
      provider: aws
      workstation:
        runtime: colima
      gateway:
        enabled: false
    expect:
      terraform:
        - name: network
          path: network/aws-vpc
        - name: cluster
          path: cluster/aws-eks
          dependsOn:
            - network
        - name: cluster-additions
          path: cluster/aws-eks/additions
          dependsOn:
            - cluster
        - name: gitops
          path: gitops/flux
          dependsOn:
            - cluster
          inputs:
            concurrency: 5
      kustomize:
        - name: csi
          path: csi
          dependsOn:
            - policy-resources
          components:
            - aws-ebs
          timeout: 5m
          interval: 5m

  # Full: Test with gateway enabled (envoy)
  - name: full config creates envoy gateway
    values:
      provider: aws
      gateway:
        enabled: true
        driver: envoy
    expect:
      terraform:
        - name: network
          path: network/aws-vpc
        - name: cluster
          path: cluster/aws-eks
          dependsOn:
            - network
        - name: cluster-additions
          path: cluster/aws-eks/additions
          dependsOn:
            - cluster
        - name: gitops
          path: gitops/flux
          dependsOn:
            - cluster
          inputs:
            concurrency: 5
      kustomize:
        - name: csi
          path: csi
          dependsOn:
            - policy-resources
          components:
            - aws-ebs
          timeout: 5m
          interval: 5m
        - name: gateway-base
          path: gateway/base
          dependsOn:
            - pki-base
          components:
            - envoy
            - envoy/loadbalancer
            - envoy/prometheus
          timeout: 10m
          interval: 5m

  # Edge case: Ingress disabled
  - name: excludes ingress when disabled
    values:
      provider: aws
      gateway:
        enabled: false
    exclude:
      kustomize:
        - name: gateway-resources

  # ACME path off by default: without dns.public_domain, the dns-zone
  # stack must NOT exist, the cluster's create_cert_manager_role must
  # remain false, and no public-issuer/acme component should appear in
  # pki-resources.
  - name: omits ACME wiring when dns.public_domain is unset
    values:
      provider: aws
      gateway:
        enabled: false
    expect:
      terraform:
        - name: cluster
          path: cluster/aws-eks
          inputs:
            create_cert_manager_role: "false"
    exclude:
      terraform:
        - name: dns-zone
      kustomize:
        - name: pki-resources
          components:
            - public-issuer/acme

  # ACME path on (production): dns.public_domain triggers the standalone
  # dns-zone stack, the cert-manager IAM role on the cluster, the
  # public-issuer/acme component on pki-resources, and the gateway TLS
  # cert switches to the `public` ClusterIssuer with the public domain.
  - name: dns.public_domain wires up ACME Route53 issuer end to end
    values:
      provider: aws
      gateway:
        enabled: true
        driver: envoy
      dns:
        public_domain: example.com
      email: ops@example.com
      aws:
        region: us-west-2
    expect:
      terraform:
        - name: dns-zone
          path: dns/zone/route53
          dependsOn:
            - backend
          inputs:
            domain_name: example.com
        - name: cluster
          path: cluster/aws-eks
          inputs:
            create_cert_manager_role: "true"
      kustomize:
        - name: pki-resources
          path: pki/resources
          dependsOn:
            - pki-base
            - policy-resources
          components:
            - public-issuer/acme
          substitutions:
            acme_server: https://acme-v02.api.letsencrypt.org/directory
            acme_email: ops@example.com
            acme_dns_zone: example.com
            acme_region: us-west-2
        - name: gateway-resources
          path: gateway/resources
          substitutions:
            gateway_cert_issuer: public
            external_domain: example.com

  # BYO zone path: when the operator supplies dns.public_zone_id, the
  # dns-zone stack must NOT be emitted (we don't create a duplicate),
  # but the cert-manager IAM role and ACME issuer component must still
  # be wired using the supplied zone ID.
  - name: dns.public_zone_id reuses an existing zone instead of creating one
    values:
      provider: aws
      gateway:
        enabled: true
        driver: envoy
      dns:
        public_domain: example.com
        public_zone_id: Z0123456789ABCDEFGHIJ
      email: ops@example.com
    expect:
      terraform:
        - name: cluster
          path: cluster/aws-eks
          inputs:
            create_cert_manager_role: "true"
      kustomize:
        - name: pki-resources
          components:
            - public-issuer/acme
          substitutions:
            acme_hosted_zone_id: Z0123456789ABCDEFGHIJ
    exclude:
      terraform:
        - name: dns-zone

  # Dev mode flips the ACME server to Let's Encrypt staging to avoid
  # burning Let's Encrypt prod rate limits during iteration.
  - name: dev mode uses Let's Encrypt staging server
    values:
      provider: aws
      dev: true
      gateway:
        enabled: true
        driver: envoy
      dns:
        public_domain: dev.example.com
      email: dev@example.com
    expect:
      kustomize:
        - name: pki-resources
          components:
            - public-issuer/acme
          substitutions:
            acme_server: https://acme-staging-v02.api.letsencrypt.org/directory
            acme_email: dev@example.com
