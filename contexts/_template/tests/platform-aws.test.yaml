# platform-aws.yaml facet tests
# Tests AWS EKS infrastructure with VPC networking

cases:
  # Minimal: Test default behavior with required fields only
  - name: minimal config creates VPC, EKS, and GitOps terraform chain
    values:
      provider: aws
      gateway:
        enabled: false
    expect:
      terraform:
        # S3 remote state backend must run first so downstream stacks can
        # migrate their state onto it; on destroy the reverse-order teardown
        # takes it down last.
        - name: backend
          path: backend/s3
        - name: network
          path: network/aws-vpc
          dependsOn:
            - backend
        - name: cluster
          path: cluster/aws-eks
          dependsOn:
            - network
        - name: cluster-additions
          path: cluster/aws-eks/additions
          dependsOn:
            - cluster
        - name: gitops
          path: gitops/flux
          dependsOn:
            - cluster
          inputs:
            concurrency: 5
      kustomize:
        - name: csi
          path: csi
          dependsOn:
            - policy-resources
          components:
            - aws-ebs
          timeout: 5m
          interval: 5m

  # Regression: workstation.runtime must not activate option-workstation on AWS.
  # If option-workstation applied, it would replace provider gitops inputs and set local dev defaults.
  - name: aws with workstation runtime keeps provider gitops defaults
    values:
      provider: aws
      workstation:
        runtime: colima
      gateway:
        enabled: false
    expect:
      terraform:
        - name: network
          path: network/aws-vpc
        - name: cluster
          path: cluster/aws-eks
          dependsOn:
            - network
        - name: cluster-additions
          path: cluster/aws-eks/additions
          dependsOn:
            - cluster
        - name: gitops
          path: gitops/flux
          dependsOn:
            - cluster
          inputs:
            concurrency: 5
      kustomize:
        - name: csi
          path: csi
          dependsOn:
            - policy-resources
          components:
            - aws-ebs
          timeout: 5m
          interval: 5m

  # Full: Test with gateway enabled (envoy)
  - name: full config creates envoy gateway
    values:
      provider: aws
      gateway:
        enabled: true
        driver: envoy
    expect:
      terraform:
        - name: network
          path: network/aws-vpc
        - name: cluster
          path: cluster/aws-eks
          dependsOn:
            - network
        - name: cluster-additions
          path: cluster/aws-eks/additions
          dependsOn:
            - cluster
        - name: gitops
          path: gitops/flux
          dependsOn:
            - cluster
          inputs:
            concurrency: 5
      kustomize:
        - name: csi
          path: csi
          dependsOn:
            - policy-resources
          components:
            - aws-ebs
          timeout: 5m
          interval: 5m
        - name: gateway-base
          path: gateway/base
          dependsOn:
            - pki-base
          components:
            - envoy
            - envoy/loadbalancer
            - envoy/prometheus
          timeout: 10m
          interval: 5m

  # Edge case: Ingress disabled
  - name: excludes ingress when disabled
    values:
      provider: aws
      gateway:
        enabled: false
    exclude:
      kustomize:
        - name: gateway-resources

  # ACME off by default — no public domain configured. pki-resources
  # still renders so the gateway cert always has a working ClusterIssuer
  # (just-works default), but using public-issuer/selfsigned (no Route53
  # wiring needed). Cluster's create_cert_manager_role and the dns-zone
  # stack stay off — Route53 IAM and a public zone aren't needed for
  # selfsigned issuance.
  - name: default selfsigned mode without a public domain
    values:
      provider: aws
      gateway:
        enabled: false
    expect:
      terraform:
        - name: cluster
          path: cluster/aws-eks
          # No dns-zone edge when ACME is off — the path-less injector is gated
          # on dns.public_domain and drops out here.
          dependsOn:
            - network
          inputs:
            create_cert_manager_role: "false"
      kustomize:
        - name: pki-resources
          path: pki/resources
          components:
            - public-issuer/selfsigned
    exclude:
      terraform:
        - name: dns-zone

  # ACME path on (production): dns.public_domain triggers the standalone
  # dns-zone stack, the cert-manager IAM role on the cluster, the
  # public-issuer/acme component on pki-resources, and the gateway TLS
  # cert switches to the `public` ClusterIssuer with the public domain.
  - name: dns.public_domain wires up ACME Route53 issuer end to end
    values:
      provider: aws
      gateway:
        enabled: true
        driver: envoy
      dns:
        public_domain: example.com
      email: ops@example.com
      aws:
        region: us-west-2
    terraformOutputs:
      dns-zone:
        zone_id: Z1ABCDEF12345
    expect:
      terraform:
        - name: dns-zone
          path: dns/zone/route53
          dependsOn:
            - backend
          inputs:
            domain_name: example.com
        - name: cluster
          path: cluster/aws-eks
          # cluster must wait for dns-zone so terraform_output('dns-zone',
          # 'zone_id') is resolved before the cert-manager IAM policy is
          # rendered — without this edge the policy falls back to the
          # account-wide hostedzone/* scope.
          dependsOn:
            - network
            - dns-zone
          inputs:
            create_cert_manager_role: "true"
            # Scope cert-manager's Route53 record-write to just the zone we
            # provisioned, so the credential can't write into unrelated
            # zones in the same account.
            cert_manager_hosted_zone_ids:
              - Z1ABCDEF12345
      kustomize:
        - name: pki-resources
          path: pki/resources
          dependsOn:
            - pki-base
            - policy-resources
          components:
            - public-issuer/acme
          substitutions:
            acme_server: https://acme-v02.api.letsencrypt.org/directory
            acme_email: ops@example.com
            acme_dns_zone: example.com
            acme_region: us-west-2
            # Maps to hostedZoneID in the ClusterIssuer YAML; if the substitution
            # key is renamed or terraform_output('dns-zone', 'zone_id') stops
            # threading through, the issuer would deploy with an empty zone ID
            # and every DNS-01 challenge would fail.
            acme_hosted_zone_id: Z1ABCDEF12345
        - name: gateway-resources
          path: gateway/resources
          # envoy/default-404/external-dns is the AWS-only patch that adds
          # the external-dns hostname annotation to the catch-all 404 route.
          # Gated on dns.public_domain so it doesn't render on platforms
          # without external-dns running (where the substitution would
          # produce a malformed ",*." value).
          components:
            - envoy/default-404
            - envoy/default-404/external-dns
            - flux-webhook
          substitutions:
            gateway_cert_issuer: public
            external_domain: example.com

  # Dev mode flips the ACME server to Let's Encrypt staging to avoid
  # burning Let's Encrypt prod rate limits during iteration.
  - name: dev mode uses Let's Encrypt staging server
    values:
      provider: aws
      dev: true
      gateway:
        enabled: true
        driver: envoy
      dns:
        public_domain: dev.example.com
      email: dev@example.com
    terraformOutputs:
      dns-zone:
        zone_id: Z9DEVZONE000
    expect:
      kustomize:
        - name: pki-resources
          components:
            - public-issuer/acme
          substitutions:
            acme_server: https://acme-staging-v02.api.letsencrypt.org/directory
            acme_email: dev@example.com

  # When dns.public_domain is set, pki-resources renders the ACME
  # ClusterIssuer regardless of whether the dns-zone terraform output is
  # available yet. The acme_hosted_zone_id substitution uses deferred
  # evaluation, so it fills in once dns-zone applies and the manifest is
  # regenerated. Composition itself doesn't call terraform_output for
  # component selection — that would panic during first bootstrap, before
  # the dns-zone component is registered.
  - name: pki-resources renders ACME when public_domain set even without dns-zone output yet
    values:
      provider: aws
      gateway:
        enabled: true
        driver: envoy
      dns:
        public_domain: example.com
      email: ops@example.com
    terraformOutputs:
      dns-zone: {}
    expect:
      kustomize:
        - name: pki-resources
          components:
            - public-issuer/acme

  # cluster.pools threads through to the cluster module as-is. The module
  # converts class + count + lifecycle into EKS managed node group shape
  # internally (class → instance family, lifecycle → capacity_type).
  - name: cluster.pools flows through to the cluster module
    values:
      provider: aws
      gateway:
        enabled: false
      cluster:
        pools:
          general:
            class: general
            count: 3
    expect:
      terraform:
        - name: cluster
          path: cluster/aws-eks
          inputs:
            pools:
              general:
                class: general
                count: 3

  # Multi-pool: a system pool plus general + spot-priced batch. The class
  # label is what makes these pools portable — same shape would land on
  # Azure or GCP once those facets gain pools.
  - name: multi-pool config with mixed sizing and lifecycle
    values:
      provider: aws
      gateway:
        enabled: false
      cluster:
        pools:
          system:
            class: system
            count: 2
          general:
            class: general
            count: 3
          batch:
            class: compute
            count: 5
            lifecycle: spot
    expect:
      terraform:
        - name: cluster
          path: cluster/aws-eks
          inputs:
            pools:
              system:
                class: system
                count: 2
              general:
                class: general
                count: 3
              batch:
                class: compute
                count: 5
                lifecycle: spot

  # Escape hatch: explicit instance_types pinned for regulatory or
  # GPU-shape reasons. The pool still carries class for the
  # windsor.io/pool-class label; the module skips the class default
  # lookup and uses the supplied list verbatim.
  - name: pool with explicit instance_types overrides the class default
    values:
      provider: aws
      gateway:
        enabled: false
      cluster:
        pools:
          gpu:
            class: gpu
            count: 1
            instance_types:
              - p4d.24xlarge
    expect:
      terraform:
        - name: cluster
          path: cluster/aws-eks
          inputs:
            pools:
              gpu:
                class: gpu
                count: 1
                instance_types:
                  - p4d.24xlarge

  # AWS Load Balancer Controller is rendered on every AWS cluster — it's
  # required to get NLBs / ALBs (the in-tree CCM only creates classic ELBs).
  # The component lives at lb/base/aws-lb-controller (sibling of
  # lb/base/metallb on metal/incus); the lb-base kustomization owns the
  # system-lb namespace plus whichever in-cluster LB the platform needs.
  - name: aws-lb-controller renders unconditionally on AWS via lb-base
    values:
      provider: aws
      gateway:
        enabled: false
    expect:
      kustomize:
        - name: lb-base
          path: lb/base
          dependsOn:
            - policy-resources
          components:
            - aws-lb-controller
          timeout: 5m
          interval: 5m

  # When gateway is enabled on AWS, the envoy data-plane Service gets NLB
  # annotations layered on by adding envoy/loadbalancer/aws-nlb to the
  # gateway-base component list. This is an additive merge with option-
  # gateway's gateway-base entry — option-gateway emits the platform-
  # agnostic components, this AWS facet appends the AWS-specific patch.
  - name: gateway with envoy on AWS adds NLB annotations component
    values:
      provider: aws
      gateway:
        enabled: true
        driver: envoy
    expect:
      kustomize:
        - name: gateway-base
          path: gateway/base
          components:
            - envoy
            - envoy/loadbalancer
            - envoy/prometheus
            - envoy/loadbalancer/aws-nlb

  # Negative branch: Cilium provides its own gateway implementation
  # (no Envoy data-plane Service to annotate). The aws-nlb component
  # must NOT merge into the cilium gateway-base.
  - name: gateway with cilium driver on AWS does not add aws-nlb component
    values:
      provider: aws
      gateway:
        enabled: true
        driver: cilium
    expect:
      kustomize:
        - name: gateway-base
          path: gateway/base
          components:
            - cilium

  # Negative branch: NodePort service_type on AWS (e.g. small/edge clusters
  # without a public LB) — aws-nlb annotations are LoadBalancer-only and
  # must NOT merge into the nodeport gateway-base.
  - name: gateway with envoy and NodePort service_type on AWS does not add aws-nlb component
    values:
      provider: aws
      gateway:
        enabled: true
        driver: envoy
        service_type: NodePort
    expect:
      kustomize:
        - name: gateway-base
          path: gateway/base
          components:
            - envoy
            - envoy/nodeport
            - envoy/prometheus

  # External-DNS deploys when dns.public_domain is set. The cluster module's
  # IAM role and Pod Identity association cover the credentials side; the
  # facet just needs to render the kustomize component and substitute the
  # domain into the helm chart's domainFilters.
  - name: external-dns deploys when dns.public_domain is set
    values:
      provider: aws
      gateway:
        enabled: false
      dns:
        public_domain: example.com
      email: ops@example.com
    terraformOutputs:
      dns-zone:
        zone_id: Z1ABCDEF12345
    expect:
      kustomize:
        - name: external-dns
          path: dns/external-dns
          dependsOn:
            - policy-resources
          timeout: 5m
          interval: 5m
          substitutions:
            external_domain: example.com

  # Without a public domain, External-DNS would have nothing to write to —
  # the chart's domainFilters would fall back to the placeholder "test"
  # and the controller would idle. Skip the kustomize entirely.
  - name: external-dns excluded when no public domain
    values:
      provider: aws
      gateway:
        enabled: false
    exclude:
      kustomize:
        - name: external-dns
