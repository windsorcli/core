# platform-aws.yaml facet tests
# Tests AWS EKS infrastructure with VPC networking

cases:
  # Minimal: Test default behavior with required fields only
  - name: minimal config creates VPC, EKS, and GitOps terraform chain
    values:
      provider: aws
      gateway:
        enabled: false
    expect:
      terraform:
        - name: network
          path: network/aws-vpc
        - name: cluster
          path: cluster/aws-eks
          dependsOn:
            - network
        - name: cluster-additions
          path: cluster/aws-eks/additions
          dependsOn:
            - cluster
        - name: gitops
          path: gitops/flux
          dependsOn:
            - cluster
          inputs:
            concurrency: 5
      kustomize:
        - name: csi
          path: csi
          dependsOn:
            - policy-resources
          components:
            - aws-ebs
          timeout: 5m
          interval: 5m

  # Regression: workstation.runtime must not activate option-workstation on AWS.
  # If option-workstation applied, it would replace provider gitops inputs and set local dev defaults.
  - name: aws with workstation runtime keeps provider gitops defaults
    values:
      provider: aws
      workstation:
        runtime: colima
      gateway:
        enabled: false
    expect:
      terraform:
        - name: network
          path: network/aws-vpc
        - name: cluster
          path: cluster/aws-eks
          dependsOn:
            - network
        - name: cluster-additions
          path: cluster/aws-eks/additions
          dependsOn:
            - cluster
        - name: gitops
          path: gitops/flux
          dependsOn:
            - cluster
          inputs:
            concurrency: 5
      kustomize:
        - name: csi
          path: csi
          dependsOn:
            - policy-resources
          components:
            - aws-ebs
          timeout: 5m
          interval: 5m

  # Full: Test with gateway enabled (envoy)
  - name: full config creates envoy gateway
    values:
      provider: aws
      gateway:
        enabled: true
        driver: envoy
    expect:
      terraform:
        - name: network
          path: network/aws-vpc
        - name: cluster
          path: cluster/aws-eks
          dependsOn:
            - network
        - name: cluster-additions
          path: cluster/aws-eks/additions
          dependsOn:
            - cluster
        - name: gitops
          path: gitops/flux
          dependsOn:
            - cluster
          inputs:
            concurrency: 5
      kustomize:
        - name: csi
          path: csi
          dependsOn:
            - policy-resources
          components:
            - aws-ebs
          timeout: 5m
          interval: 5m
        - name: gateway-base
          path: gateway/base
          dependsOn:
            - pki-base
          components:
            - envoy
            - envoy/loadbalancer
            - envoy/prometheus
          timeout: 10m
          interval: 5m

  # Edge case: Ingress disabled
  - name: excludes ingress when disabled
    values:
      provider: aws
      gateway:
        enabled: false
    exclude:
      kustomize:
        - name: gateway-resources
