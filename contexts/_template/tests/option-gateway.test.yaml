# option-gateway.yaml facet tests
# Tests configurable gateway and legacy ingress compatibility.

# Common configurations
x-defaults:
  network: &default-network
    cidr_block: 10.5.0.0/16
    loadbalancer_driver: kube-vip
    loadbalancer_mode: arp
    loadbalancer_ips:
      start: "10.5.1.10"
      end: "10.5.1.100"

  cluster: &default-cluster
    driver: talos
    controlplanes:
      nodes:
        controlplane-1:
          endpoint: 10.5.0.10:50000
          node: 10.5.0.10
          hostname: controlplane-1
    workers:
      volumes:
        - /var/mnt/local

  # Shared assertion: gateway-base with envoy loadbalancer
  gateway-base-envoy-lb: &gateway-base-envoy-lb
    name: gateway-base
    path: gateway/base
    dependsOn:
      - pki-base
    components:
      - envoy
      - envoy/loadbalancer
      - envoy/prometheus
    timeout: 10m
    interval: 5m

  # Shared assertion: gateway-base with envoy nodeport
  gateway-base-envoy-np: &gateway-base-envoy-np
    name: gateway-base
    path: gateway/base
    dependsOn:
      - pki-base
    components:
      - envoy
      - envoy/nodeport
      - envoy/prometheus
    timeout: 10m
    interval: 5m

  # Shared assertion: gateway-base with cilium (no longer depends on cni; cni depends on gateway-base instead)
  gateway-base-cilium: &gateway-base-cilium
    name: gateway-base
    path: gateway/base
    dependsOn:
      - pki-base
    components:
      - cilium
    timeout: 10m
    interval: 5m

  # Shared assertion: gateway-resources
  gateway-resources-envoy: &gateway-resources-envoy
    name: gateway-resources
    path: gateway/resources
    dependsOn:
      - gateway-base
    substitutions:
      gateway_class_name: envoy
    timeout: 10m
    interval: 5m

  gateway-resources-cilium: &gateway-resources-cilium
    name: gateway-resources
    path: gateway/resources
    dependsOn:
      - gateway-base
    substitutions:
      gateway_class_name: cilium
    timeout: 10m
    interval: 5m

cases:
  # Minimal: zero-config on metal defaults to cilium CNI → cilium gateway
  - name: zero config on metal defaults to cilium gateway
    values:
      provider: metal
      network: *default-network
      cluster: *default-cluster
    expect:
      kustomize:
        - *gateway-base-cilium
        - *gateway-resources-cilium

  # Docker Desktop: nodeport (docker-desktop defaults to envoy; no cilium bootstrap)
  - name: Docker Desktop uses nodeport gateway
    values:
      platform: docker
      gateway:
        enabled: true
        driver: envoy
      workstation:
        enabled: true
        runtime: docker-desktop
      network: *default-network
      cluster: *default-cluster
    terraformOutputs:
      compute:
        controlplanes:
          - endpoint: 10.5.0.10:6443
            node: 10.5.0.10
            hostname: controlplane-1
        workers: []
      workstation:
        registries: {}
    expect:
      kustomize:
        - *gateway-base-envoy-np
        - *gateway-resources-envoy

  - name: platform docker with runtime colima uses gateway loadbalancer
    values:
      platform: docker
      gateway:
        enabled: true
        driver: envoy
      workstation:
        enabled: true
        runtime: colima
      network: *default-network
      cluster: *default-cluster
    terraformOutputs:
      compute:
        controlplanes:
          - endpoint: 10.5.0.10:6443
            node: 10.5.0.10
            hostname: controlplane-1
        workers: []
      workstation:
        registries: {}
    expect:
      kustomize:
        - *gateway-base-envoy-lb
        - *gateway-resources-envoy

  # Envoy driver
  - name: envoy driver deploys gateway-base with envoy and gateway-resources
    values:
      provider: metal
      gateway:
        enabled: true
        driver: envoy
      network: *default-network
      cluster: *default-cluster
    expect:
      kustomize:
        - *gateway-base-envoy-lb
        - *gateway-resources-envoy

  # Envoy + Docker Desktop: nodeport variant
  - name: envoy on Docker Desktop uses nodeport variant
    values:
      platform: docker
      gateway:
        enabled: true
        driver: envoy
      workstation:
        enabled: true
        runtime: docker-desktop
      network: *default-network
      cluster: *default-cluster
    terraformOutputs:
      compute:
        controlplanes:
          - endpoint: 10.5.0.10:6443
            node: 10.5.0.10
            hostname: controlplane-1
        workers: []
      workstation:
        registries: {}
    expect:
      kustomize:
        - *gateway-base-envoy-np
        - *gateway-resources-envoy

  # Backward compatibility: ingress alias still works
  - name: legacy ingress alias maps envoy-gateway to envoy
    values:
      provider: metal
      ingress:
        enabled: true
        driver: envoy-gateway
      network: *default-network
      cluster: *default-cluster
    expect:
      kustomize:
        - *gateway-base-envoy-lb
        - *gateway-resources-envoy

  # Gateway disabled
  - name: excludes gateway when disabled
    values:
      provider: metal
      gateway:
        enabled: false
        driver: envoy
      network: *default-network
      cluster: *default-cluster
    exclude:
      kustomize:
        - name: gateway-resources
        - name: gateway-base

  # Flux webhook receiver includes webhook/gateway for Gateway API drivers
  - name: envoy driver includes webhook/gateway in gitops component
    values:
      provider: metal
      gateway:
        enabled: true
        driver: envoy
      network: *default-network
      cluster: *default-cluster
    expect:
      kustomize:
        - name: gitops
          path: gitops/flux
          components:
            - webhook
            - webhook/gateway

  # dev mode enables coredns/gateway via the dns component
  - name: dev mode with envoy adds coredns/gateway to dns component
    values:
      provider: metal
      dev: true
      gateway:
        enabled: true
        driver: envoy
      network: *default-network
      cluster: *default-cluster
    expect:
      kustomize:
        - *gateway-base-envoy-lb

  # Cilium driver — GatewayClass only; controller is part of Cilium CNI DaemonSet
  - name: cilium driver deploys gateway-base with cilium and gateway-resources
    values:
      provider: metal
      gateway:
        enabled: true
        driver: cilium
      network: *default-network
      cluster: *default-cluster
    expect:
      kustomize:
        - *gateway-base-cilium
        - *gateway-resources-cilium

  - name: cilium driver includes webhook/gateway in gitops component
    values:
      provider: metal
      gateway:
        enabled: true
        driver: cilium
      network: *default-network
      cluster: *default-cluster
    expect:
      kustomize:
        - name: gitops
          path: gitops/flux
          components:
            - webhook
            - webhook/gateway
