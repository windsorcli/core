# option-gateway.yaml facet tests
# Tests configurable gateway and legacy ingress compatibility.

# Common configurations
x-defaults:
  network: &default-network
    cidr_block: 10.5.0.0/16
    loadbalancer_driver: kube-vip
    loadbalancer_mode: arp
    loadbalancer_ips:
      start: "10.5.1.10"
      end: "10.5.1.100"

  cluster: &default-cluster
    driver: talos
    controlplanes:
      nodes:
        controlplane-1:
          endpoint: 10.5.0.10:50000
          node: 10.5.0.10
          hostname: controlplane-1
    workers:
      volumes:
        - /var/mnt/local

  # CRDs (gateway-api, envoy-gateway) live in the blueprint's top-level `crds:`
  # section, not in `kustomize:`. Kustomizations do not name individual CRDs in
  # dependsOn; the composer wires only dependency-less roots to the `crds` layer,
  # and gateway-base/gateway-resources are not roots.

  # Shared assertion: gateway-base with envoy loadbalancer
  gateway-base-envoy-lb: &gateway-base-envoy-lb
    name: gateway-base
    path: gateway/base
    dependsOn:
      - pki-base
    components:
      - envoy
      - envoy/loadbalancer
      - envoy/prometheus
    timeout: 10m
    interval: 5m

  # Shared assertion: gateway-base with envoy nodeport
  gateway-base-envoy-np: &gateway-base-envoy-np
    name: gateway-base
    path: gateway/base
    dependsOn:
      - pki-base
    components:
      - envoy
      - envoy/nodeport
      - envoy/prometheus
    timeout: 10m
    interval: 5m

  # Shared assertion: gateway-base with cilium (no longer depends on cni; cni
  # depends on gateway-base instead).
  gateway-base-cilium: &gateway-base-cilium
    name: gateway-base
    path: gateway/base
    dependsOn:
      - pki-base
    components:
      - cilium
    timeout: 10m
    interval: 5m

  # Shared assertion: gateway-resources
  gateway-resources-envoy: &gateway-resources-envoy
    name: gateway-resources
    path: gateway/resources
    dependsOn:
      - gateway-base
    substitutions:
      gateway_class_name: envoy
    timeout: 10m
    interval: 5m

  gateway-resources-cilium: &gateway-resources-cilium
    name: gateway-resources
    path: gateway/resources
    dependsOn:
      - gateway-base
      - cni
    substitutions:
      gateway_class_name: cilium
      loadbalancer_start_ip: "10.5.1.10"
    timeout: 10m
    interval: 5m

cases:
  # Minimal: zero-config on metal defaults to cilium CNI → cilium gateway
  - name: zero config on metal defaults to cilium gateway
    values:
      platform: metal
      network: *default-network
      cluster: *default-cluster
    expect:
      kustomize:
        - *gateway-base-cilium
        - *gateway-resources-cilium
      crds:
        - gateway-api-experimental-1.6.0
    exclude:
      crds:
        - envoy-gateway-1.8.2

  # Docker Desktop: nodeport (docker-desktop defaults to envoy; no cilium bootstrap)
  - name: Docker Desktop uses nodeport gateway
    values:
      platform: docker
      gateway:
        enabled: true
        driver: envoy
      workstation:
        enabled: true
        runtime: docker-desktop
      network: *default-network
      cluster: *default-cluster
    terraformOutputs:
      compute:
        controlplanes:
          - endpoint: 10.5.0.10:6443
            node: 10.5.0.10
            hostname: controlplane-1
        workers: []
      workstation:
        registries: {}
    expect:
      kustomize:
        - *gateway-base-envoy-np
        - *gateway-resources-envoy

  - name: platform docker with runtime colima uses gateway loadbalancer
    values:
      platform: docker
      gateway:
        enabled: true
        driver: envoy
      workstation:
        enabled: true
        runtime: colima
      network: *default-network
      cluster: *default-cluster
    terraformOutputs:
      compute:
        controlplanes:
          - endpoint: 10.5.0.10:6443
            node: 10.5.0.10
            hostname: controlplane-1
        workers: []
      workstation:
        registries: {}
    expect:
      kustomize:
        - *gateway-base-envoy-lb
        - *gateway-resources-envoy

  # Envoy driver
  - name: envoy driver deploys gateway-base with envoy and gateway-resources
    values:
      platform: metal
      gateway:
        enabled: true
        driver: envoy
      network: *default-network
      cluster: *default-cluster
    expect:
      kustomize:
        - *gateway-base-envoy-lb
        - *gateway-resources-envoy
      crds:
        - gateway-api-experimental-1.6.0
        - envoy-gateway-1.8.2

  # Envoy + Docker Desktop: nodeport variant
  - name: envoy on Docker Desktop uses nodeport variant
    values:
      platform: docker
      gateway:
        enabled: true
        driver: envoy
      workstation:
        enabled: true
        runtime: docker-desktop
      network: *default-network
      cluster: *default-cluster
    terraformOutputs:
      compute:
        controlplanes:
          - endpoint: 10.5.0.10:6443
            node: 10.5.0.10
            hostname: controlplane-1
        workers: []
      workstation:
        registries: {}
    expect:
      kustomize:
        - *gateway-base-envoy-np
        - *gateway-resources-envoy

  # Explicit gateway.service_type: NodePort works on any platform (e.g. a bare
  # metal single-node cluster with no cluster LB). Network omits
  # loadbalancer_driver so lb_effective.enabled is false — proves the nodeport
  # component is selected purely from gateway.service_type.
  - name: explicit gateway.service_type NodePort selects nodeport variant on metal with no LB
    values:
      platform: metal
      gateway:
        enabled: true
        driver: envoy
        service_type: NodePort
      network:
        cidr_block: 10.5.0.0/16
      cluster: *default-cluster
    expect:
      kustomize:
        - *gateway-base-envoy-np
        - *gateway-resources-envoy

  # NodePort must suppress lb_effective.enabled even when loadbalancer_driver
  # is configured: a NodePort service will never get a LoadBalancer IP, so
  # lb-address (which patches the Gateway with that IP) and gateway_dns_target
  # must not apply. Uses *default-network which has loadbalancer_driver set,
  # and flannel CNI so lb_effective.enabled would otherwise be true.
  - name: explicit NodePort suppresses lb-address even when loadbalancer_driver is set
    values:
      platform: metal
      gateway:
        enabled: true
        driver: envoy
        service_type: NodePort
      network: *default-network
      cluster:
        <<: *default-cluster
        cni:
          driver: flannel
    expect:
      kustomize:
        - *gateway-base-envoy-np
        - name: gateway-resources
          path: gateway/resources
          components:
            - flux-webhook
          substitutions:
            gateway_class_name: envoy

  # Explicit gateway.service_type: LoadBalancer overrides docker-desktop's
  # default NodePort fallback.
  - name: explicit gateway.service_type LoadBalancer overrides docker-desktop default
    values:
      platform: docker
      gateway:
        enabled: true
        driver: envoy
        service_type: LoadBalancer
      workstation:
        enabled: true
        runtime: docker-desktop
      network: *default-network
      cluster: *default-cluster
    terraformOutputs:
      compute:
        controlplanes:
          - endpoint: 10.5.0.10:6443
            node: 10.5.0.10
            hostname: controlplane-1
        workers: []
      workstation:
        registries: {}
    expect:
      kustomize:
        - *gateway-base-envoy-lb
        - *gateway-resources-envoy

  # Backward compatibility: ingress alias still works
  - name: legacy ingress alias maps envoy-gateway to envoy
    values:
      platform: metal
      ingress:
        enabled: true
        driver: envoy-gateway
      network: *default-network
      cluster: *default-cluster
    expect:
      kustomize:
        - *gateway-base-envoy-lb
        - *gateway-resources-envoy
      crds:
        - gateway-api-experimental-1.6.0
        - envoy-gateway-1.8.2

  - name: legacy ingress alias maps nginx to envoy
    values:
      platform: metal
      ingress:
        enabled: true
        driver: nginx
      network: *default-network
      cluster: *default-cluster
    expect:
      kustomize:
        - *gateway-base-envoy-lb
        - *gateway-resources-envoy

  # Gateway disabled
  - name: excludes gateway when disabled
    values:
      platform: metal
      gateway:
        enabled: false
        driver: envoy
      network: *default-network
      cluster: *default-cluster
    exclude:
      kustomize:
        - name: gateway-resources
        - name: gateway-base
      crds:
        - gateway-api-experimental-1.6.0
        - envoy-gateway-1.8.2

  # Flux webhook receiver includes webhook/gateway for Gateway API drivers
  # (push mode is the default, so no explicit gitops.mode needed)
  - name: envoy driver includes webhook/gateway in gitops component
    values:
      platform: metal
      gateway:
        enabled: true
        driver: envoy
      network: *default-network
      cluster: *default-cluster
    expect:
      kustomize:
        - name: gitops
          path: gitops/flux
          components:
            - webhook
            - webhook/gateway

  # dev mode enables coredns/gateway via the dns component
  - name: dev mode with envoy adds coredns/gateway to dns component
    values:
      platform: metal
      dev: true
      gateway:
        enabled: true
        driver: envoy
      network: *default-network
      cluster: *default-cluster
    expect:
      kustomize:
        - *gateway-base-envoy-lb

  # Cilium driver — GatewayClass only; controller is part of Cilium CNI DaemonSet
  - name: cilium driver deploys gateway-base with cilium and gateway-resources
    values:
      platform: metal
      gateway:
        enabled: true
        driver: cilium
      network: *default-network
      cluster: *default-cluster
    expect:
      kustomize:
        - *gateway-base-cilium
        - *gateway-resources-cilium

  - name: cilium driver includes webhook/gateway and webhook/gateway/cilium in gitops component
    values:
      platform: metal
      gateway:
        enabled: true
        driver: cilium
      network: *default-network
      cluster: *default-cluster
    expect:
      kustomize:
        - name: gitops
          path: gitops/flux
          components:
            - webhook
            - webhook/gateway
            - webhook/gateway/cilium

  # gitops.web_ui exposes the operator web UI through the gateway as a separate
  # flux-ui kustomization. Off by default.
  - name: web_ui enabled adds flux-ui with ui component on envoy
    values:
      platform: metal
      gateway:
        enabled: true
        driver: envoy
      gitops:
        web_ui: true
      network: *default-network
      cluster: *default-cluster
    expect:
      kustomize:
        - name: flux-ui
          path: gitops/flux
          dependsOn:
            - gateway-base
          components:
            - ui

  - name: web_ui enabled on cilium adds ui/cilium to flux-ui
    values:
      platform: metal
      gateway:
        enabled: true
        driver: cilium
      gitops:
        web_ui: true
      network: *default-network
      cluster: *default-cluster
    expect:
      kustomize:
        - name: flux-ui
          path: gitops/flux
          components:
            - ui
            - ui/cilium

  - name: web_ui defaults off so flux-ui is absent
    values:
      platform: metal
      gateway:
        enabled: true
        driver: envoy
      network: *default-network
      cluster: *default-cluster
    exclude:
      kustomize:
        - name: flux-ui

  # lb-address: included when lb_effective.enabled (non-Cilium CNI + loadbalancer_driver set); IP pinned in gateway spec
  - name: local envoy gateway-resources includes lb-address when loadbalancer IP configured
    values:
      platform: metal
      gateway:
        enabled: true
        driver: envoy
      network: *default-network
      cluster:
        <<: *default-cluster
        cni:
          driver: flannel
    expect:
      kustomize:
        - name: gateway-resources
          path: gateway/resources
          components:
            - lb-address
          substitutions:
            gateway_class_name: envoy
            loadbalancer_start_ip: "10.5.1.10"

  # AWS uses a cloud-managed LB (lb_effective.enabled == false) and is not cilium,
  # so loadbalancer_start_ip and gateway_dns_target both evaluate to "" and are
  # omitted from output. Only gateway_class_name remains.
  - name: aws envoy gateway-resources omits loadbalancer substitutions
    values:
      platform: aws
      aws:
        region: us-west-2
      gateway:
        enabled: true
        driver: envoy
    expect:
      kustomize:
        - name: gateway-resources
          path: gateway/resources
          dependsOn:
            - gateway-base
          substitutions:
            gateway_class_name: envoy
          timeout: 10m
          interval: 5m

  # Cert issuer + external_domain defaults: on platforms without ACME
  # wiring (no acme_effective.enabled), gateway_cert_issuer must default
  # to `private` and external_domain must come from dns.private_domain
  # (the platform-base `dns` config block resolves the effective value
  # from private_domain → domain → "test" in dev). Regression guard for
  # the cert-issuer abstraction in option-gateway.
  - name: non-ACME platform defaults gateway_cert_issuer to private and uses private_domain
    values:
      platform: metal
      gateway:
        enabled: true
        driver: envoy
      dns:
        private_domain: cluster.local
      network: *default-network
      cluster: *default-cluster
    expect:
      kustomize:
        - name: gateway-resources
          path: gateway/resources
          substitutions:
            gateway_class_name: envoy
            gateway_cert_issuer: private
            external_domain: cluster.local

  # No domain set on a cloud platform is the "just works" selfsigned path
  # (the cheap default deploy). external_domain must still render a valid
  # cert SAN, not the literal "null" cert-manager rejects, and the issuer
  # degrades to public-selfsigned. Regression guard for the gateway cert
  # SAN fallback chain (… → dns.domain → '<id>.local').
  - name: aws with no domain renders a valid selfsigned cert SAN
    values:
      platform: aws
      aws:
        region: us-west-2
      gateway:
        enabled: true
        driver: envoy
      network: *default-network
      cluster: *default-cluster
    expect:
      kustomize:
        - name: gateway-resources
          path: gateway/resources
          substitutions:
            gateway_class_name: envoy
            gateway_cert_issuer: public-selfsigned
            external_domain: windsor.local

  # dns.domain set (no public/private) exercises the intermediate branch of
  # the fallback chain (… → dns.domain → '<id>.local'): external_domain
  # resolves to dns.domain, and the issuer still degrades to public-selfsigned.
  - name: aws with only dns.domain renders that domain as selfsigned cert SAN
    values:
      platform: aws
      aws:
        region: us-west-2
      gateway:
        enabled: true
        driver: envoy
      dns:
        domain: example.com
      network: *default-network
      cluster: *default-cluster
    expect:
      kustomize:
        - name: gateway-resources
          path: gateway/resources
          substitutions:
            gateway_class_name: envoy
            gateway_cert_issuer: public-selfsigned
            external_domain: example.com

  # gitops.mode=pull drops the Flux Receiver kustomize entirely and propagates
  # mode=pull to the gitops/flux terraform module (which then skips
  # notification-controller and the webhook-token secret).
  - name: gitops mode pull excludes receiver and propagates pull to gitops terraform
    values:
      platform: metal
      gateway:
        enabled: true
        driver: envoy
      gitops:
        mode: pull
      network: *default-network
      cluster: *default-cluster
    expect:
      terraform:
        - name: gitops
          path: gitops/flux
          inputs:
            mode: pull
    exclude:
      kustomize:
        - name: gitops
          path: gitops/flux

  # Requires: private gateway without dns.private_domain silently falls back
  # to the public branch (cert, DNS, LB scheme), so option-gateway fails at
  # config-load instead.
  - name: gateway access private without dns.private_domain fails composition
    values:
      platform: metal
      gateway:
        enabled: true
        driver: envoy
        access: private
      network: *default-network
      cluster: *default-cluster
    expectError: true
