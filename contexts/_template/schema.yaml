$schema: https://json-schema.org/draft/2020-12/schema
title: Windsor Core Blueprint Configuration Schema
description: Schema for configuring Windsor platform blueprints
type: object

$defs:
  diskItem: &diskItem
    type: object
    properties:
      name:
        type: string
        description: Disk name; used as the UserVolumeConfig name and mount point (/var/mnt/<name>) on Talos.
      size:
        type: integer
        description: Disk size in GB. Required on provisioned platforms (Incus, cloud) to create the volume. Optional on metal when selector is set.
      selector:
        type: string
        description: >
          CEL expression passed directly to Talos diskSelector.match (e.g. "disk.serial == 'WD-ABC123'",
          "disk.wwid == '...'", "disk.bus_path == '0*:0:0:0'"). Takes precedence over size-based
          post-boot discovery. Set per-node when disks differ between machines.
      type:
        type: string
        description: Disk type (platform-specific; e.g. cloud disk type or "default")
      path:
        type: string
        description: Mount point inside instance (e.g. /mnt/data, /var/mnt/local); used after platform attach. Optional for block storage when device is set.
      source:
        type: string
        description: Source path for bind mounts or volume name
      device:
        type: string
        description: Block device path or URI for block storage (e.g. /dev/sdb). When set, used for node storage pools; platform may still attach by size/type.
      read_only:
        type: boolean
        default: false
        description: Mount as read-only
    required:
      - name
  nodesSchema: &nodesSchema
    type: object
    additionalProperties:
      type: object
      properties:
        endpoint:
          type: string
          description: Node endpoint/IP address
        hostname:
          type: string
          description: Node hostname
        node:
          type: string
          description: Node identifier
        image:
          type: string
          description: Node image. Overrides pool-level image when set.
        disks:
          type: array
          items: *diskItem
          description: Data disks for this node only. Overrides pool-level disks for this node (no merge).
        volumes:
          type: array
          items:
            type: string
          description: Reserved; only pool-level volumes (controlplanes.volumes / workers.volumes) are used today for extraMounts and compute bind mounts.
      required:
        - endpoint
        - node
    description: Named node configurations
  nodePool: &nodePool
    count:
      type: integer
      description: Number of nodes
    image:
      type: string
      description: Node image for this pool. Per-node image overrides when set.
    instance_type:
      type: string
      description: Cloud provider instance type
    cpu:
      type: integer
      description: CPU cores per node
    memory:
      type: integer
      description: Memory in GB per node
    root_disk_size:
      type: integer
      description: Root/OS disk size in GB
    disks:
      type: array
      items: *diskItem
      description: Additional data disks (pool-level). Platform attach and/or block storage.
    hostports:
      type: array
      items:
        type: string
        pattern: "^[0-9]+:[0-9]+/(tcp|udp)$"
      description: Host port mappings (format "host:container/protocol")
    nodes: *nodesSchema
    volumes:
      type: array
      items:
        type: string
      description: Node directory paths for extra mounts. For directory-based storage include cluster.storage.local_base_path. Path format (e.g. /var/mnt/local); host:dest only for local dev bind mounts. Block/device storage uses disks.

properties:
  # Context identity (from windsor.yaml or values)
  id:
    type: string
    description: Context id (e.g. short identifier for this deployment)

  # Infrastructure provider / platform. Use platform ?? provider as effective value;
  provider:
    type: string
    enum:
      - none
      - aws
      - azure
      - incus
      - metal
      - docker
    default: none
    description: Infrastructure provider - includes policy, PKI, telemetry, ingress, and storage
  platform:
    type: string
    enum:
      - none
      - aws
      - azure
      - incus
      - metal
      - docker
    description: Alias for provider; when set overrides provider.

  # Development mode
  dev:
    type: boolean
    default: false
    description: Enable development mode with additional observability and debugging tools

  # AWS provider configuration (only consumed when platform == 'aws').
  aws:
    type: object
    additionalProperties: false
    properties:
      enabled:
        type: boolean
        description: Enable AWS integration
      profile:
        type: string
        description: AWS CLI profile to use for authentication. Defaults to the context name when unset, so `aws configure sso` inside the context auto-wires a usable profile.
      region:
        type: string
        description: AWS region for API calls. Surfaced as AWS_REGION to every tool run inside the context.
      endpoint_url:
        type: string
        description: Custom endpoint URL for AWS services (e.g. LocalStack testing).
      s3_hostname:
        type: string
        description: Custom hostname for the S3 service.
      mwaa_endpoint:
        type: string
        description: Endpoint for Managed Workflows for Apache Airflow.
    description: AWS provider authentication and endpoint configuration

  # Azure provider configuration (only consumed when platform == 'azure').
  azure:
    type: object
    additionalProperties: false
    properties:
      enabled:
        type: boolean
        description: Enable Azure integration
      subscription_id:
        type: string
        description: Azure subscription identifier
      tenant_id:
        type: string
        description: Azure tenant identifier
      environment:
        type: string
        description: Azure cloud environment (e.g. "public", "usgovernment")
    description: Azure provider authentication configuration

  # Terraform execution config
  terraform:
    type: object
    properties:
      enabled:
        type: boolean
        default: true
        description: Enable Terraform in stacks
      backend:
        type: object
        additionalProperties: false
        properties:
          type:
            type: string
            enum:
              - local
              - s3
              - azurerm
              - kubernetes
              - none
            description: Backend type (local, s3, azurerm, kubernetes, or none)
          prefix:
            type: string
            description: Optional state key/prefix applied per module
          local:
            type: object
            additionalProperties: true
            description: Local backend configuration (https://developer.hashicorp.com/terraform/language/backend/local)
          s3:
            type: object
            additionalProperties: true
            description: S3 backend configuration (https://developer.hashicorp.com/terraform/language/backend/s3)
          kubernetes:
            type: object
            additionalProperties: true
            description: Kubernetes backend configuration (https://developer.hashicorp.com/terraform/language/backend/kubernetes)
          azurerm:
            type: object
            additionalProperties: true
            description: AzureRM backend configuration (https://developer.hashicorp.com/terraform/language/backend/azurerm)
        description: Terraform backend configuration
    additionalProperties: true
    description: Terraform execution and backend overrides

  # Demo mode
  demo:
    type: object
    properties:
      enabled:
        type: boolean
        default: false
        description: Enable demo resources
      resources:
        type: object
        properties:
          database:
            type: boolean
            default: true
            description: Enable demo database cluster
          static:
            type: boolean
            default: false
            description: Enable static website demo
          bookinfo:
            type: boolean
            default: false
            description: Enable Istio bookinfo demo application
        additionalProperties: false
    additionalProperties: false

  # Timezone
  timezone:
    type: string
    default: utc
    description: Default timezone for Grafana dashboards (utc, browser, or IANA zone like America/New_York)

  # Time format
  time_format:
    type: string
    enum:
      - 12h
      - 24h
    default: 24h
    description: Time format for Grafana dashboards (12h or 24h)

  # Log level
  log_level:
    type: string
    enum:
      - trace
      - debug
      - info
      - warn
      - error
    default: info
    description: Minimum log level to retain (logs below this level are dropped)

  # Telemetry configuration
  telemetry:
    type: object
    properties:
      metrics:
        type: object
        properties:
          enabled:
            type: boolean
            default: true
            description: >
              Deploy the metrics pipeline (Prometheus operator, kube-prometheus-stack, metrics-server)
              and all per-component ServiceMonitors. Disable on resource-constrained clusters that
              don't need in-cluster metrics. Force-on when addons.observability.enabled is true,
              since the observability addon requires Prometheus to scrape.
        additionalProperties: false
      logs:
        type: object
        properties:
          enabled:
            type: boolean
            default: true
            description: >
              Deploy the logs pipeline (fluent-bit per-node shipper + fluentd aggregator). Disable
              on resource-constrained clusters. Force-on when addons.observability.enabled is true,
              since the observability addon's log sinks need the fluent-bit/fluentd path.
          driver:
            type: string
            enum:
              - fluentd
              - none
            default: fluentd
            description: Log aggregation driver for FluentBit output (fluentd is default, none keeps the per-node shipper but drops the central aggregator)
        additionalProperties: false
    additionalProperties: false

  policies:
    type: object
    description: Policy configuration
    properties:
      enabled:
        type: boolean
        default: true
        description: >
          Deploy the Kyverno admission controller and cluster policies. Set to false to skip both
          policy-base and policy-resources entirely — useful for single-node or resource-constrained
          clusters. Individual policies (require_image_digest, resource_limits_requests) can be
          disabled separately via their own fields.
      reporting:
        type: string
        enum:
          - enabled
          - disabled
        default: disabled
        description: Run Kyverno's reports-controller to emit PolicyReport / ClusterPolicyReport resources (background audit scans). Admission enforcement is unaffected when this is disabled.
      cleanup:
        type: string
        enum:
          - enabled
          - disabled
        default: disabled
        description: Run Kyverno's cleanup-controller to execute CleanupPolicy / ClusterCleanupPolicy resources on a cron. Windsor ships no CleanupPolicy resources by default, so this is off unless you provide your own.
      require_image_digest:
        type: string
        enum:
          - enabled
          - disabled
        default: enabled
        description: Enable or disable the require-image-digest policy
      resource_limits_requests:
        type: string
        enum:
          - enabled
          - disabled
        default: enabled
        description: Enable or disable the resource limits/requests policy
    additionalProperties: false

  docker:
    type: object
    properties:
      enabled:
        type: boolean
        default: false
        description: "[DEPRECATED] Unused. Local dev is via terraform compute/workstation only."
      registries:
        type: object
        additionalProperties:
          type: object
          properties:
            remote:
              type: string
              description: Upstream registry URL (e.g. https://gcr.io).
            local:
              type: string
              description: Client-facing registry host for mirror key (e.g. docker.io). Omit to use the registry map key.
            hostname:
              type: string
              description: Hostname for the mirror endpoint (e.g. registry.test).
          additionalProperties: false
        description: Registry mirror config keyed by registry host (e.g. gcr.io, ghcr.io). Used by workstation proxy/DNS and by Talos cluster mirrors.
    additionalProperties: false

  # Cluster topology preset — selects between a single-node cluster, a
  # multi-node cluster without HA guarantees, and a fully HA cluster
  # (3+ control planes, multi-replica components, PDBs, anti-affinity).
  # The precise node/pool layout is defined by the blueprint; this knob
  # just picks which cross-cutting HA components get layered in.
  topology:
    type: string
    enum:
      - single-node
      - multi-node
      - ha
    description: Cluster topology preset (single-node, multi-node, or ha).

  # Network configuration (used by terraform templates)
  network:
    type: object
    properties:
      cidr_block:
        type: string
        pattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}/[0-9]{1,2}$"
        default: "10.5.0.0/16"
        description: Primary network CIDR block
      loadbalancer_ips:
        type: object
        properties:
          start:
            type: string
            pattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}$"
            description: Load balancer IP pool start
          end:
            type: string
            pattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}$"
            description: Load balancer IP pool end
        additionalProperties: false
      loadbalancer_driver:
        type: string
        enum:
          - metallb
          - kube-vip
        description: In-cluster load balancer driver
      loadbalancer_mode:
        type: string
        enum:
          - arp
        description: Load balancer mode (only 'arp' is currently supported; use for flat L2 networks with ARP broadcasts)
    additionalProperties: false

  # Cluster configuration
  cluster:
    type: object
    properties:
      enabled:
        type: boolean
        default: true
        description: Enable cluster Terraform (and compute when platform is docker with workstation enabled)
      driver:
        type: string
        enum:
          - talos
          - aks
          - eks
        description: Cluster driver. Defaulted by platform-base based on the active platform (aws → eks, azure → aks, otherwise → talos); an explicit value here wins.
      endpoint:
        type: string
        description: External controlplane API endpoint
      controlplanes:
        type: object
        properties:
          <<: *nodePool
          count:
            type: integer
            minimum: 1
            default: 1
            description: Number of control plane nodes
          nodes:
            <<: *nodesSchema
            default:
              controlplane-1:
                endpoint: 10.5.0.1
                node: 10.5.0.1
                hostname: controlplane-1
            description: Named control plane node configurations
          schedulable:
            type: boolean
            default: false
            description: Allow scheduling workloads on control plane nodes (useful for single-node clusters or resource-constrained environments)
        additionalProperties: false
      workers:
        type: object
        properties:
          <<: *nodePool
          count:
            type: integer
            minimum: 0
            default: 0
            description: Number of worker nodes
          nodes:
            <<: *nodesSchema
            default:
              worker-1:
                endpoint: 10.5.0.2
                node: 10.5.0.2
                hostname: worker-1
            description: Named worker node configurations
          volumes:
            type: array
            items:
              type: string
            default:
              - "/var/mnt/local"
            description: "Node directory paths for extra mounts. For directory-based storage include cluster.storage.local_base_path. Path or host:dest for local dev bind mounts. Block/device storage uses disks."
        additionalProperties: false
      storage:
        type: object
        properties:
          single_storage_type:
            type: string
            description: Default storage driver. Directory-based (local_base_path), cloud default, or block (cluster.*.disks).
          local_base_path:
            type: string
            default: "/var/mnt/local"
            description: Base path for directory-based storage. Must be in the volumes list of every pool that can schedule pods using this storage (controlplanes.volumes when schedulable, workers.volumes).
          driver:
            type: string
            enum:
              - openebs
              - longhorn
            description: CSI storage driver. openebs for directory-based local storage; longhorn for block device storage (requires a dedicated disk, mandatory on Talos). Defaults to longhorn on incus, openebs elsewhere.
        additionalProperties: false
      cni:
        type: object
        properties:
          driver:
            type: string
            enum:
              - flannel
              - cilium
            description: >
              CNI driver. flannel is the Talos built-in default and requires no extra bootstrap.
              cilium bootstraps Cilium via terraform/cni/cilium before Flux starts (disables
              flannel and kube-proxy in Talos machine config) and manages it via Flux GitOps.
        additionalProperties: false
    additionalProperties: false

  # Operator contact
  email:
    type: string
    format: email
    description: >
      Primary operator email for the deployment. Used as the contact
      address for things like ACME (Let's Encrypt) account registration
      and may be reused by other contact-aware integrations (alerting,
      certificate expiry notices, etc.). Required when public TLS is
      active (e.g. AWS + dns.public_domain).

  # DNS configuration
  dns:
    type: object
    properties:
      domain:
        type: string
        description: Base domain; used as fallback when public_domain or private_domain are not set
      public_domain:
        type: string
        description: >
          Public DNS zone (e.g. Route53 hosted zone). On AWS, setting
          this activates the public Route53 zone in the network module
          and the ACME public ClusterIssuer for cert-manager.
      public_zone_id:
        type: string
        description: >
          Optional ID of an existing public DNS zone. When set, the
          platform will not provision a new public zone and will instead
          target this one (e.g. for cert-manager DNS-01 challenges). Use
          this when the public zone is already managed outside Windsor
          — either an existing Route53 zone in the same account, or a
          delegated subdomain that the operator has CNAMEd to from their
          authoritative DNS provider.
      private_domain:
        type: string
        description: Private DNS zone (e.g. in-cluster CoreDNS, workstation resolver)
    additionalProperties: false

  # GitOps configuration
  gitops:
    type: object
    properties:
      mode:
        type: string
        enum:
          - pull
          - push
        default: push
        description: |
          GitOps reconciliation mode.
          push — a Flux Receiver is emitted so webhook POSTs trigger immediate reconciliation; intervals act as a safety-net poll only (default).
          pull — Flux polls the GitRepository on its configured interval; no Receiver is emitted.
      repository:
        type: object
        properties:
          name:
            type: string
            default: local
            description: Flux GitRepository name used as the primary source for reconciliations
        additionalProperties: false
      webhook:
        type: object
        properties:
          token:
            type: string
            sensitive: true
            description: Token for the Flux Receiver secret (push mode only). Defaults to a placeholder in workstation mode; set explicitly for production.
        additionalProperties: false
    additionalProperties: false

  # Gateway configuration
  gateway:
    type: object
    properties:
      enabled:
        type: boolean
        default: true
        description: Enable cluster traffic entrypoint
      driver:
        type: string
        enum:
          - envoy
          - cilium
        description: Gateway driver
      service_type:
        type: string
        enum:
          - LoadBalancer
          - NodePort
        description: Kubernetes Service type used to expose the gateway. When unset, defaults to LoadBalancer except on docker-desktop, which is forced to NodePort. Set to NodePort to expose the gateway on any driver without a cluster LB (e.g. single-node Talos VMs).
    additionalProperties: false

  # Ingress configuration
  ingress:
    type: object
    deprecated: true
    description: Deprecated. Prefer gateway.enabled and gateway.driver.
    properties:
      enabled:
        type: boolean
        default: true
        description: Enable cluster traffic entrypoint
      driver:
        type: string
        enum:
          - nginx
          - envoy
          - envoy-gateway
        description: Legacy gateway driver
    additionalProperties: false

  # VM configuration
  # Deprecated: use workstation.runtime and workstation.enabled instead. vm.driver is still used as fallback when workstation.runtime is unset.
  vm:
    type: object
    deprecated: true
    description: Deprecated. Prefer workstation.runtime (and workstation.enabled). vm.driver remains as fallback for effective runtime when option-workstation is not applied.
    properties:
      driver:
        type: string
        enum:
          - ""
          - docker-desktop
          - colima
        default: ""
        description: VM driver for local clusters (empty = not colima)
      runtime:
        type: string
        enum:
          - docker
          - incus
        description: Container/VM runtime
      address:
        type: string
        description: Deprecated. Use workstation.address. VM/workstation host address (e.g. Colima VM IP).
    additionalProperties: false

  # Workstation (DNS, registries, git livereload)
  workstation:
    type: object
    properties:
      enabled:
        type: boolean
        default: false
        description: Enable workstation stack (DNS, registries, git livereload)
      arch:
        type: string
        enum:
          - amd64
          - arm64
        default: amd64
        description: CPU architecture for Incus Talos images (host arch when workstation enabled; target arch for server deployments). Used by talos.incus_image.
      address:
        type: string
        description: Address of the workstation, used for SSH to configure workstation networking
      runtime:
        type: string
        enum:
          - colima
          - docker-desktop
          - docker
        description: Host runtime for local clusters. VM-backed (colima, docker-desktop) or plain engine (docker). When unset, falls back to vm.driver.
      dns:
        type: object
        description: Workstation-specific DNS state (server address, forwarders)
        properties:
          address:
            type: string
            description: DNS server address resolved from workstation infrastructure
          forward:
            type: array
            items:
              type: string
            description: Forward DNS servers
        additionalProperties: false
      services:
        type: object
        properties:
          dns:
            type: boolean
            default: true
            description: Create the DNS (CoreDNS) container
          git:
            type: boolean
            default: true
            description: Create the git livereload container
          registries:
            type: boolean
            default: true
            description: Create registry proxy containers (from docker.registries when true)
        additionalProperties: false
        description: Toggle workstation services
      git:
        type: object
        properties:
          username:
            type: string
            default: local
            description: Username for git livereload HTTP auth
          password:
            type: string
            default: local
            description: Password for git livereload HTTP auth
          livereload:
            type: boolean
            default: false
            description: When true, git-livereload posts to the Flux webhook on push. Requires gitops.mode=push on the cluster side.
        additionalProperties: false
        description: Git livereload credentials and push-mode toggle
    additionalProperties: false

  # Optional addons
  addons:
    type: object
    properties:
      private_ca:
        type: object
        properties:
          enabled:
            type: boolean
            description: Enable private certificate authority with trust-manager
        additionalProperties: false
      private_dns:
        type: object
        properties:
          enabled:
            type: boolean
            description: Enable self-hosted CoreDNS for private DNS zones
        additionalProperties: false
      observability:
        type: object
        properties:
          enabled:
            type: boolean
            description: Enable observability stack
          metrics_backend:
            type: string
            enum:
              - prometheus
            default: prometheus
            description: Metrics backend (prometheus is default and included in base telemetry)
          dashboards:
            type: string
            enum:
              - grafana
            default: grafana
            description: Dashboards provider (grafana for self-hosted Grafana)
          logs_driver:
            type: string
            enum:
              - stdout
              - quickwit
              - elasticsearch
            default: quickwit
            description: Log storage driver (stdout for console output, quickwit for local storage, elasticsearch for ELK stack)
          admin_password:
            type: string
            description: Grafana admin password
        additionalProperties: false
      object_store:
        type: object
        properties:
          enabled:
            type: boolean
            default: false
            description: Enable object storage service
          driver:
            type: string
            enum:
              - minio
            default: minio
            description: Object storage driver
        additionalProperties: false
      database:
        type: object
        properties:
          postgres:
            type: object
            properties:
              enabled:
                type: boolean
                description: Enable PostgreSQL database service
              driver:
                type: string
                enum:
                  - cloudnativepg
                default: cloudnativepg
                description: PostgreSQL database driver
            additionalProperties: false
        additionalProperties: false
    additionalProperties: false

required: []
additionalProperties: false

# Cross-field constraints. JSON Schema's if/then lets us require fields
# only when other fields are set, surfacing config gaps at validation
# time instead of at terraform/cluster apply time.
allOf:
  # Setting dns.public_domain activates ACME (publicly-trusted certs from
  # Let's Encrypt). Let's Encrypt requires an account email at registration,
  # so the top-level `email` field becomes mandatory in this case.
  - if:
      properties:
        dns:
          type: object
          properties:
            public_domain:
              type: string
              minLength: 1
          required:
            - public_domain
      required:
        - dns
    then:
      required:
        - email
      properties:
        email:
          type: string
          minLength: 1
