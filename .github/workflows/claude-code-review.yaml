name: Claude Code Review
on:
  pull_request:
    types: [opened, synchronize]
permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      github.event.pull_request.user.type != 'Bot' &&
      !contains(github.event.pull_request.labels.*.name, 'dependencies')
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1
      - name: Fetch base ref
        run: git fetch --depth=1 origin ${{ github.base_ref }}
      - uses: anthropics/claude-code-action@39431830520a7ae6c0c572f11a7707e7043325e3 # v1.0.95
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Run the `review-pr` skill against this pull request.

            Scope strictly to the diff. Do NOT read files outside the changed
            set unless flagging a specific, concrete concern. Skip style nits
            and focus on correctness, security, and blast-radius issues.

            Context adjustment: the skill is written for `git diff --staged`
            (pre-commit use). In this CI context, stage the PR diff first so
            the skill works unmodified:

              git diff origin/${{ github.base_ref }}...HEAD --name-only | xargs git add -N
              git add -u

            Then invoke the skill. Post the aggregated report as a single PR
            review comment. Also update the PR description with a summary and
            test plan via `gh pr edit ${{ github.event.pull_request.number }} --body`.

            In addition, post a separate top-level PR comment (via
            `gh pr comment ${{ github.event.pull_request.number }} --body`) with
            a high-level summary in this exact format:

              > [!NOTE]
              > **{Low|Medium|High} Risk**
              > {One-sentence risk rationale: what the change affects and why
              > the chosen risk level is appropriate.}
              >
              > **Overview**
              > {2-4 sentences describing what the PR does, the key
              > structural/behavioral changes, and any notable test coverage
              > or follow-ups.}

            Pick the risk level based on blast radius: Low for isolated,
            easily reversible changes; Medium for changes to shared
            infra/CLI/workflows or anything that could break existing
            automation; High for security, data-loss, or cross-cutting
            changes. Keep the summary comment concise — it is separate from
            the detailed review comment.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 25
            --allowedTools Read,Grep,Glob,Bash(git:*),Bash(gh pr comment:*),Bash(gh pr edit:*),Bash(gh pr view:*),Bash(gh pr diff:*)
            --disallowedTools Edit,Write,WebSearch,WebFetch
