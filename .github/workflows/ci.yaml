name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main

permissions:
  contents: write
  security-events: write
  checks: write
  packages: write
  pull-requests: write
  issues: write
  id-token: write

env:
  WINDSOR_PROJECT_ROOT: ${{ github.workspace }}
  DOCKER_HOST: unix:///var/run/docker.sock
  # renovate: datasource=github-releases depName=docker-compose package=docker/compose
  DOCKER_COMPOSE_VERSION: v5.1.2
  # renovate: datasource=github-releases depName=troubleshoot package=replicatedhq/troubleshoot
  SUPPORT_BUNDLE_VERSION: v0.125.1

jobs:
  code-checks:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Docker Compose
        run: |
            sudo curl -L "https://github.com/docker/compose/releases/download/${DOCKER_COMPOSE_VERSION}/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
            docker-compose --version
        continue-on-error: false

      # This module is not loaded by default and is required to run Kubernetes on Docker
      - name: Load br_netfilter kernel module
        run: |
          sudo modprobe br_netfilter
          echo "1" | sudo tee /proc/sys/net/bridge/bridge-nf-call-iptables
          echo "1" | sudo tee /proc/sys/net/bridge/bridge-nf-call-ip6tables

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      - name: Run yamllint
        run: |
          pip install yamllint
          yamllint .

      - name: Run shellcheck
        run: |
          sudo apt-get install -y shellcheck
          shell_files=$(find . -name "*.sh" -print)
          if [ -n "$shell_files" ]; then
            echo "$shell_files" | xargs shellcheck
          else
            echo "No shell scripts found to check"
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          # renovate: datasource=github-releases depName=terraform package=hashicorp/terraform
          terraform_version: 1.14.8

      - name: Run terraform fmt
        run: terraform fmt -check -recursive

      - name: Install Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2
        with:
          version: 3.x

      - name: Validate vendored assets
        run: |
          # Regenerate vendored files from source.yaml definitions and validate
          task dashboards
          
          # Check if any files changed or new files created
          if ! git diff --quiet || [ -n "$(git status --porcelain)" ]; then
            echo "::error::Vendored files are out of sync with source.yaml"
            echo ""
            echo "Changed/untracked files:"
            git status --short
            echo ""
            echo "Run 'task dashboards' locally and commit the changes."
            exit 1
          fi

      - name: Checkov GitHub Action
        uses: bridgecrewio/checkov-action@68260132005eaae0e6f84c7a73cc3b1532f678bf # v12.3058.0
        with:
          directory: ./terraform
          output_format: cli,sarif
          output_file_path: console,results.sarif

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: results.sarif

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          # renovate: datasource=github-releases depName=terraform package=hashicorp/terraform
          terraform_version: 1.14.8

      - name: Install Windsor CLI
        uses: windsorcli/action@a829ee3c5d9826fd0b31d5e730edcd515644d866 # v0.5.1
        with:
          ref: main
          context: local

      - name: Install Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2
        with:
          version: 3.x

      - name: Run Tests
        run: task test

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Docker Compose
        run: |
            sudo curl -L "https://github.com/docker/compose/releases/download/${DOCKER_COMPOSE_VERSION}/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
            docker-compose --version
        continue-on-error: false

      - name: Load br_netfilter kernel module
        run: |
          sudo modprobe br_netfilter
          echo "1" | sudo tee /proc/sys/net/bridge/bridge-nf-call-iptables
          echo "1" | sudo tee /proc/sys/net/bridge/bridge-nf-call-ip6tables

      - name: Configure Docker for increased storage
        run: |
          # Move Docker's data root to /mnt which has 66GB available (vs ~10GB on default location)
          # This increases Docker's storage capacity from ~10GB to ~66GB
          sudo mkdir -p /mnt/docker-data
          sudo mkdir -p /etc/docker
          # Configure Docker to use /mnt for data storage and limit log growth
          echo '{
            "data-root": "/mnt/docker-data",
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "3"
            }
          }' | sudo tee /etc/docker/daemon.json
          # Restart Docker to apply new data-root configuration
          sudo systemctl restart docker || sudo service docker restart || true
          # Wait for Docker to be ready
          timeout 30 bash -c 'until docker info > /dev/null 2>&1; do sleep 1; done' || true
          # Verify Docker is using the new data-root
          docker info | grep "Docker Root Dir" || true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          # renovate: datasource=github-releases depName=terraform package=hashicorp/terraform
          terraform_version: 1.14.8

      - name: Setup kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0
        with:
          # renovate: datasource=github-releases depName=kubectl package=kubernetes/kubectl
          version: v1.34.1

      - name: Install support-bundle CLI
        run: |
          cd "$(mktemp -d)" &&
          curl -fsSLO "https://github.com/replicatedhq/troubleshoot/releases/download/${SUPPORT_BUNDLE_VERSION}/support-bundle_linux_amd64.tar.gz" &&
          tar xzf support-bundle_linux_amd64.tar.gz &&
          sudo install -m 0755 -o root -g root support-bundle /usr/local/bin/ &&
          cd - &&
          rm -rf "$OLDPWD" &&
          support-bundle version

      - name: Create bundle directory
        run: mkdir -p support-bundles

      - name: Install Windsor CLI
        uses: windsorcli/action@a829ee3c5d9826fd0b31d5e730edcd515644d866 # v0.5.1
        with:
          ref: main
          context: local

      - name: Create docker cache directory
        run: mkdir -p .windsor/cache/docker

      - name: Cache docker cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .windsor/cache/docker
          key: docker-cache-${{ runner.os }}-${{ github.sha }}
          restore-keys: docker-cache-${{ runner.os }}-

      - name: Windsor Init
        run: |
          windsor init local --reset

      - name: Show blueprint
        run: |
          windsor show blueprint

      - name: Windsor Up
        run: windsor up --verbose --wait

      - name: Collect Windsor State
        if: always()
        run: |
          tar --exclude='.windsor/cache/docker' --exclude='.terraform' -czf support-bundles/windsor-state.tar.gz contexts/local .windsor

      - name: Collect Talos Diagnostics
        if: always()
        run: |
          # Install talosctl if not available
          if ! command -v talosctl &> /dev/null; then
            echo "Installing talosctl..."
            cd "$(mktemp -d)" &&
            curl -fsSLO "https://github.com/siderolabs/talos/releases/latest/download/talosctl-linux-amd64" &&
            chmod +x talosctl-linux-amd64 &&
            sudo mv talosctl-linux-amd64 /usr/local/bin/talosctl &&
            cd - &&
            rm -rf "$OLDPWD"
          fi
          
          # Run talos diagnostics collection within Windsor environment
          windsor exec -- .github/scripts/collect-talos-diagnostics.sh support-bundles/talos-diagnostics

      - name: Collect support bundle
        if: always()
        run: |
          support-bundle --interactive=false --output=support-bundles/bundle-${{ github.workflow }}-${{ github.run_id }}-${{ github.run_number }} .github/support-bundle.yaml

      - name: Upload support bundle
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: support-bundle-local
          path: support-bundles/
          retention-days: 30

      - name: Investigate cluster failure with Claude
        if: failure()
        uses: anthropics/claude-code-action@39431830520a7ae6c0c572f11a7707e7043325e3 # v1.0.95
        env:
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_ID: ${{ github.run_id }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          DIAGNOSIS_MARKER: "<!-- claude-cluster-diagnosis -->"
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            The integration test job just failed. The local Windsor cluster
            is still running on this runner and has NOT been torn down yet.
            Your job is to inspect it live and publish a short root-cause
            diagnosis.

            ## Inspect the cluster

            Use the `inspect-cluster` skill. All kubectl/talosctl/windsor
            commands must be prefixed with `windsor exec --` so they run
            inside the Windsor environment (bare kubectl will get
            connection refused in this repo).

            Focus on:
            - Which kustomization / helm release / pod is failing, and why
              (look at events, logs, and `status.conditions`).
            - Whether the failure is a flake (image pull, timeout, probe)
              or a real regression in the changed code.
            - One concrete next step for whoever triages this.

            Do NOT attempt to fix the cluster, restart pods, or mutate
            state — read-only inspection only.

            ## Write the diagnosis

            Compose the report body at `/tmp/diagnosis.md` using this
            exact shape (distinctive so humans can spot it at a glance —
            do not deviate from the header, emoji, or sectioning):

              $DIAGNOSIS_MARKER
              > [!CAUTION]
              >
              > ## 🩺 Cluster diagnosis — integration tests failed
              >
              > **Commit:** `<short SHA of COMMIT_SHA>` · **Run:** [#$RUN_ID]($RUN_URL)
              >
              > **Likely cause:** {one sentence}
              >
              > **Evidence:** {2-4 sentences citing the specific resource,
              > condition, and log snippet that points at the cause.
              > Quote log lines inline with backticks.}
              >
              > **Suggested next step:** {one sentence, actionable.}
              >
              > _Live read-only inspection by Claude. Support bundle
              > attached to the run artifacts._
              <!-- /claude-cluster-diagnosis -->

            The `$DIAGNOSIS_MARKER` and closing `<!-- /claude-cluster-diagnosis -->`
            lines are required — they let future runs find and update
            this comment in place.

            Also save a copy to `support-bundles/claude-investigation.md`
            (so it rides along in the uploaded artifact) and append the
            body to `$GITHUB_STEP_SUMMARY` (so it shows on the Actions
            run page).

            ## Publish as a PR comment (upsert)

            If `$PR_NUMBER` is non-empty, upsert the diagnosis as a PR
            conversation comment — find-then-patch-or-create:

              if [ -n "$PR_NUMBER" ]; then
                EXISTING_ID=$(gh api --paginate "repos/$GH_REPO/issues/$PR_NUMBER/comments" \
                  --jq ".[] | select(.body | contains(\"$DIAGNOSIS_MARKER\")) | .id" \
                  | head -n1)
                if [ -n "$EXISTING_ID" ]; then
                  gh api -X PATCH "repos/$GH_REPO/issues/comments/$EXISTING_ID" \
                    --field body=@/tmp/diagnosis.md
                else
                  gh api -X POST "repos/$GH_REPO/issues/$PR_NUMBER/comments" \
                    --field body=@/tmp/diagnosis.md
                fi
              fi

            On push-to-main runs (`$PR_NUMBER` empty), skip the comment
            step — the step summary and artifact are enough.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 30
            --allowedTools Read,Grep,Glob,Write,Bash(windsor exec:*),Bash(windsor show:*),Bash(windsor context:*),Bash(gh api:*),Bash(jq:*),Bash(cat:*),Bash(tee:*),Bash(ls:*),Bash(head:*),Bash(tail:*)
            --disallowedTools WebSearch,WebFetch

      - name: Windsor Down
        if: always()
        run: |
          windsor destroy --confirm local || true

          windsor down

  publish:
    name: Publish OCI Package
    runs-on: ubuntu-latest
    needs: integration
    if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main') && needs.integration.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          # renovate: datasource=github-releases depName=terraform package=hashicorp/terraform
          terraform_version: 1.14.8

      - name: Install Windsor CLI
        uses: windsorcli/action@a829ee3c5d9826fd0b31d5e730edcd515644d866 # v0.5.1
        with:
          ref: main
          context: local

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to OCI Registry
        env:
          TAG: ${{ github.ref_name }}
        run: |
          windsor push oci://ghcr.io/windsorcli/core:${TAG}

      - name: Publish Latest Tag
        if: github.ref == 'refs/heads/main'
        env:
          TAG: latest
        run: |
          windsor push oci://ghcr.io/windsorcli/core:${TAG}
