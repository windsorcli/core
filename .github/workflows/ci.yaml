# =============================================================================
# CI workflow
# =============================================================================
# Runs on push-to-main, tagged releases, and PRs against main. Four jobs:
#   code-checks  — yamllint, shellcheck, terraform fmt, checkov, vendored-file drift
#   tests        — unit tests
#   integration  — end-to-end Windsor runs on a fresh + upgrade matrix
#   publish      — push OCI package on main and tag pushes (gated on integration)
name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main

permissions:
  contents: write
  security-events: write
  checks: write
  packages: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

env:
  WINDSOR_PROJECT_ROOT: ${{ github.workspace }}
  DOCKER_HOST: unix:///var/run/docker.sock
  # renovate: datasource=github-releases depName=troubleshoot package=replicatedhq/troubleshoot
  SUPPORT_BUNDLE_VERSION: v0.130.0
  # renovate: datasource=github-releases depName=flux package=fluxcd/flux2
  FLUX_VERSION: v2.8.8
  # renovate: datasource=github-releases depName=yq package=mikefarah/yq
  YQ_VERSION: v4.53.3
  # renovate: datasource=github-releases depName=helm package=helm/helm
  HELM_VERSION: v4.2.2

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:

  # ===========================================================================
  # Code Quality
  # ===========================================================================
  code-checks:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Full history so the terraform-docs check can diff against the PR base.
          fetch-depth: 0

      # br_netfilter is required to run Kubernetes on Docker; not loaded by default.
      - name: Load br_netfilter kernel module
        run: |
          sudo modprobe br_netfilter
          echo "1" | sudo tee /proc/sys/net/bridge/bridge-nf-call-iptables
          echo "1" | sudo tee /proc/sys/net/bridge/bridge-nf-call-ip6tables

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.x'

      - name: Run yamllint
        run: |
          pip install yamllint
          yamllint .

      - name: Run shellcheck
        run: |
          sudo apt-get install -y shellcheck
          shell_files=$(find . -name "*.sh" -print)
          if [ -n "$shell_files" ]; then
            echo "$shell_files" | xargs shellcheck
          else
            echo "No shell scripts found to check"
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          # renovate: datasource=github-releases depName=terraform package=hashicorp/terraform
          terraform_version: 1.12.2

      - name: Run terraform fmt
        run: terraform fmt -check -recursive

      - name: Install Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.x

      # Regenerate vendored files from source.yaml and fail if the tree drifts.
      - name: Validate vendored assets
        run: |
          task dashboards
          if ! git diff --quiet || [ -n "$(git status --porcelain)" ]; then
            echo "::error::Vendored files are out of sync with source.yaml"
            echo ""
            echo "Changed/untracked files:"
            git status --short
            echo ""
            echo "Run 'task dashboards' locally and commit the changes."
            exit 1
          fi

      # yq is the YAML reader the kustomize-docs generator depends on. Local
      # devs get it via aqua; CI installs the same pinned version directly.
      - name: Install yq
        run: |
          cd "$(mktemp -d)" &&
          curl -fsSLO "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" &&
          sudo install -m 0755 -o root -g root yq_linux_amd64 /usr/local/bin/yq &&
          cd - &&
          rm -rf "$OLDPWD" &&
          yq --version

      # helm renders the vendored CRDs (helm show crds / helm template) for the
      # crds:check drift guard. Local devs get it via aqua; CI installs the same
      # pinned version directly.
      - name: Install Helm
        run: |
          cd "$(mktemp -d)" &&
          curl -fsSLO "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz" &&
          tar xzf "helm-${HELM_VERSION}-linux-amd64.tar.gz" &&
          sudo install -m 0755 -o root -g root linux-amd64/helm /usr/local/bin/helm &&
          cd - &&
          rm -rf "$OLDPWD" &&
          helm version

      # Fail if kustomize/crds/<name>-<version>/ has drifted from the sources in
      # kustomize/crds/sources.yaml (regenerate with 'task crds' and commit).
      - name: Validate vendored CRDs
        run: task crds:check

      # Fail if kustomize/<add-on>/.docs.yaml has diverged from the rendered
      # BEGIN_KUSTOMIZE_DOCS / END_KUSTOMIZE_DOCS region in README.md.
      # Skipped on renovate PRs and on push-to-main; drift is reconciled
      # during pre-release cycles.
      - name: Validate kustomize add-on docs
        if: ${{ github.event_name == 'pull_request' && !startsWith(github.head_ref, 'renovate/') }}
        run: task docs:kustomize:check

      # Regenerate terraform-docs and fail only on drift in modules THIS PR
      # changed. Pre-existing drift in untouched modules — e.g. a renovate
      # provider bump that auto-merged to main without a docs regen — does not
      # block unrelated PRs; you only own the docs for modules whose .tf you
      # edited. terraform-docs is per-module, so changed-module scoping is exact.
      - name: Validate terraform module docs
        if: ${{ github.event_name == 'pull_request' && !startsWith(github.head_ref, 'renovate/') }}
        run: |
          changed="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD -- terraform \
            | grep -E '\.tf$' | xargs -rn1 dirname | sort -u || true)"
          if [ -z "$changed" ]; then
            echo "No terraform modules changed; skipping docs drift check."
            exit 0
          fi
          task docs:terraform
          rc=0
          for d in $changed; do
            if [ -f "$d/README.md" ] && ! git diff --quiet -- "$d/README.md"; then
              echo "::error::terraform-docs drift in $d (changed by this PR). Run 'task docs:terraform' and commit the result."
              git --no-pager diff -- "$d/README.md"
              rc=1
            fi
          done
          git checkout -- terraform/
          exit $rc

      - name: Checkov GitHub Action
        uses: bridgecrewio/checkov-action@68260132005eaae0e6f84c7a73cc3b1532f678bf # v12.3058.0
        with:
          directory: ./terraform
          output_format: cli,sarif
          output_file_path: console,results.sarif

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif

  # ===========================================================================
  # Unit Tests
  # ===========================================================================
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          # renovate: datasource=github-releases depName=terraform package=hashicorp/terraform
          terraform_version: 1.12.2

      - name: Install Windsor CLI
        uses: windsorcli/action@main
        with:
          ref: main
          context: local

      - name: Install Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: 3.x

      - name: Run Tests
        run: task test

  # ===========================================================================
  # Integration (fresh | upgrade)
  # ===========================================================================
  # Two matrix modes per run:
  #   fresh    — single `windsor up` on HEAD; simulates a new user bringing up
  #              the cluster for the first time.
  #   upgrade  — converge the baseline (origin/main), then apply HEAD on top
  #              without reinit; simulates an existing user pulling + applying
  #              this change. PR events only — skipped on push-to-main / tags.
  # On PR failure, the still-running cluster is handed to a read-only Claude
  # step that publishes a diagnosis to the PR / step summary / artifact.
  # The Claude step is also skipped on push-to-main / tags.
  integration:
    name: Integration (${{ matrix.mode }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        mode: ${{ fromJSON(github.event_name == 'pull_request' && '["fresh","upgrade"]' || '["fresh"]') }}
    steps:

      # -----------------------------------------------------------------------
      # Runner preparation
      # -----------------------------------------------------------------------
      # Fetch-depth is full for upgrade mode (needs origin/main), shallow for
      # fresh. Kernel module, Docker daemon tuning, and required CLIs are
      # installed here before anything Windsor-related runs.
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: ${{ matrix.mode == 'upgrade' && '0' || '1' }}

      # Upgrade mode re-runs when anything that Windsor applies changes:
      # terraform, kustomize, facets (contexts), or the root windsor.yaml.
      # Only the kustomize/ tree is rsynced to the in-cluster git server
      # (git_rsync_include default), so only kustomize changes advance the
      # GitRepository revision. Terraform/contexts/windsor.yaml changes are
      # applied locally by `windsor up` but never reach the git server — for
      # those we still run the upgrade test, but skip the revision-bump gate
      # (which would otherwise time out waiting for a bump that can't happen).
      - name: Check infra changes
        id: infra_diff
        run: |
          if [ "${{ matrix.mode }}" != "upgrade" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "expect_bump=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Upgrade mode only makes sense in a PR context — the diff base is
          # origin/main, and on push-to-main origin/main == HEAD so the diff
          # would always be empty. Fail loudly if this invariant is ever
          # broken by re-adding upgrade to the push matrix.
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "::error::upgrade mode requires a PR context (origin/main == HEAD on push events)"
            exit 1
          fi
          git fetch origin main
          if git diff --quiet origin/main HEAD -- terraform kustomize contexts windsor.yaml; then
            echo "No infra changes (terraform, kustomize, contexts, windsor.yaml). Skipping upgrade test."
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "expect_bump=false" >> $GITHUB_OUTPUT
          else
            echo "Infra changes detected. Running upgrade test."
            echo "skip=false" >> $GITHUB_OUTPUT
            if git diff --quiet origin/main HEAD -- kustomize; then
              echo "No kustomize/ changes — GitRepository revision bump not expected."
              echo "expect_bump=false" >> $GITHUB_OUTPUT
            else
              echo "kustomize/ changes detected — expecting GitRepository revision bump."
              echo "expect_bump=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Load br_netfilter kernel module
        run: |
          sudo modprobe br_netfilter
          echo "1" | sudo tee /proc/sys/net/bridge/bridge-nf-call-iptables
          echo "1" | sudo tee /proc/sys/net/bridge/bridge-nf-call-ip6tables

      # Reclaim ~30 GB by removing pre-installed toolchains the runner ships
      # but this repo never uses (.NET, Android SDK, Haskell). Without this the
      # kubelet inside the Talos VM hits its ephemeral-storage eviction threshold
      # during k8s/Cilium image pulls and evicts the Flux controller pods.
      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h /

      # Move docker data-root to /mnt (66GB available vs ~10GB default) and
      # cap json-file logging at 10m × 3 to prevent runaway disk growth.
      - name: Configure Docker for increased storage
        run: |
          sudo mkdir -p /mnt/docker-data
          sudo mkdir -p /etc/docker
          echo '{
            "data-root": "/mnt/docker-data",
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "3"
            }
          }' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker || sudo service docker restart || true
          timeout 30 bash -c 'until docker info > /dev/null 2>&1; do sleep 1; done' || true
          docker info | grep "Docker Root Dir" || true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          # renovate: datasource=github-releases depName=terraform package=hashicorp/terraform
          terraform_version: 1.12.2

      - name: Setup kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0
        with:
          # renovate: datasource=github-releases depName=kubectl package=kubernetes/kubectl
          version: v1.34.1

      - name: Install support-bundle CLI
        run: |
          cd "$(mktemp -d)" &&
          curl -fsSLO "https://github.com/replicatedhq/troubleshoot/releases/download/${SUPPORT_BUNDLE_VERSION}/support-bundle_linux_amd64.tar.gz" &&
          tar xzf support-bundle_linux_amd64.tar.gz &&
          sudo install -m 0755 -o root -g root support-bundle /usr/local/bin/ &&
          cd - &&
          rm -rf "$OLDPWD" &&
          support-bundle version

      - name: Install Flux CLI
        run: |
          cd "$(mktemp -d)" &&
          curl -fsSLO "https://github.com/fluxcd/flux2/releases/download/${FLUX_VERSION}/flux_${FLUX_VERSION#v}_linux_amd64.tar.gz" &&
          tar xzf "flux_${FLUX_VERSION#v}_linux_amd64.tar.gz" &&
          sudo install -m 0755 -o root -g root flux /usr/local/bin/ &&
          cd - &&
          rm -rf "$OLDPWD" &&
          flux --version

      - name: Create bundle directory
        run: mkdir -p support-bundles

      # -----------------------------------------------------------------------
      # Windsor install + image cache
      # -----------------------------------------------------------------------
      - name: Install Windsor CLI
        uses: windsorcli/action@main
        with:
          ref: main
          context: local

      - name: Create docker cache directory
        run: mkdir -p .windsor/cache/docker

      - name: Cache docker cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .windsor/cache/docker
          key: docker-cache-${{ runner.os }}-${{ matrix.mode }}-${{ github.sha }}
          restore-keys: |
            docker-cache-${{ runner.os }}-${{ matrix.mode }}-
            docker-cache-${{ runner.os }}-

      # -----------------------------------------------------------------------
      # Baseline phase — upgrade mode only
      # -----------------------------------------------------------------------
      # Converge the "already-installed" state, then capture the Flux
      # GitRepository revision. The HEAD phase gates its Ready wait on that
      # revision advancing, so a slow git-livereload webhook can't let a
      # stale baseline-Ready state pass for HEAD.
      - name: Checkout baseline
        if: matrix.mode == 'upgrade' && steps.infra_diff.outputs.skip != 'true'
        run: |
          git fetch origin main
          git checkout origin/main

      - name: Baseline — Windsor Init
        if: matrix.mode == 'upgrade' && steps.infra_diff.outputs.skip != 'true'
        run: windsor init local --reset

      - name: Baseline — Show blueprint
        if: matrix.mode == 'upgrade' && steps.infra_diff.outputs.skip != 'true'
        run: windsor show blueprint

      - name: Baseline — Windsor Up
        id: baseline_up
        if: matrix.mode == 'upgrade' && steps.infra_diff.outputs.skip != 'true'
        timeout-minutes: 14
        run: windsor up --verbose --wait

      - name: Baseline — Health check
        id: baseline_health
        if: matrix.mode == 'upgrade' && steps.infra_diff.outputs.skip != 'true'
        run: |
          windsor exec -- kubectl wait --for=condition=Ready --timeout=300s \
            kustomizations --all -A || {
            echo "Baseline: not-ready resources:";
            windsor exec -- kubectl get kustomizations,helmreleases -A;
            exit 1;
          }
          windsor exec -- kubectl wait --for=condition=Ready --timeout=300s \
            helmreleases --all -A || {
            echo "Baseline: not-ready resources:";
            windsor exec -- kubectl get kustomizations,helmreleases -A;
            exit 1;
          }

      - name: Baseline — Capture GitRepository revision
        id: baseline_rev
        if: matrix.mode == 'upgrade' && steps.infra_diff.outputs.skip != 'true' && steps.infra_diff.outputs.expect_bump == 'true'
        run: |
          rev=$(windsor exec -- kubectl get gitrepository local -n system-gitops \
            -o jsonpath='{.status.artifact.revision}')
          if [ -z "$rev" ]; then
            echo "Failed to read GitRepository revision"
            exit 1
          fi
          echo "baseline_rev=$rev" >> $GITHUB_OUTPUT
          echo "Baseline GitRepository revision: $rev"

      # -----------------------------------------------------------------------
      # HEAD phase — both modes
      # -----------------------------------------------------------------------
      # Fresh: a single `windsor up` on HEAD.
      # Upgrade: apply HEAD on top of the converged baseline without reinit,
      # then wait for Flux to catch up past the captured revision before
      # checking health.
      - name: Checkout HEAD
        if: matrix.mode == 'upgrade' && steps.infra_diff.outputs.skip != 'true'
        run: git checkout ${{ github.sha }}

      - name: HEAD — Windsor Plan
        id: windsor_plan
        if: matrix.mode == 'upgrade' && steps.infra_diff.outputs.skip != 'true'
        run: windsor plan

      - name: Windsor Init
        if: matrix.mode == 'fresh'
        run: windsor init local --reset

      - name: Show blueprint
        if: matrix.mode == 'fresh'
        run: windsor show blueprint

      - name: Windsor Up
        id: windsor_up
        if: steps.infra_diff.outputs.skip != 'true'
        # Upgrade mode may reboot the Talos node (e.g. on a Talos version bump);
        # post-reboot pod restart burst takes longer to settle than a fresh install.
        timeout-minutes: ${{ matrix.mode == 'upgrade' && 20 || 14 }}
        run: windsor up --verbose --wait

      - name: HEAD — Wait for GitRepository revision bump
        id: gitrepo_bump
        if: matrix.mode == 'upgrade' && steps.infra_diff.outputs.skip != 'true' && steps.infra_diff.outputs.expect_bump == 'true'
        timeout-minutes: 6
        env:
          BASELINE_REV: ${{ steps.baseline_rev.outputs.baseline_rev }}
        run: |
          echo "Waiting for GitRepository revision to advance past: $BASELINE_REV"
          for i in $(seq 1 60); do
            cur=$(windsor exec -- kubectl get gitrepository local -n system-gitops \
              -o jsonpath='{.status.artifact.revision}' 2>/dev/null || true)
            if [ -n "$cur" ] && [ "$cur" != "$BASELINE_REV" ]; then
              echo "GitRepository advanced to: $cur (poll $i)"
              exit 0
            fi
            sleep 5
          done
          echo "GitRepository never advanced past baseline after 5m"
          windsor exec -- kubectl get gitrepository -A
          exit 1

      - name: Health check
        id: windsor_health
        if: steps.infra_diff.outputs.skip != 'true'
        run: |
          windsor exec -- kubectl wait --for=condition=Ready --timeout=300s \
            kustomizations --all -A || {
            echo "HEAD: not-ready resources:";
            windsor exec -- kubectl get kustomizations,helmreleases -A;
            exit 1;
          }
          windsor exec -- kubectl wait --for=condition=Ready --timeout=300s \
            helmreleases --all -A || {
            echo "HEAD: not-ready resources:";
            windsor exec -- kubectl get kustomizations,helmreleases -A;
            exit 1;
          }

      # -----------------------------------------------------------------------
      # Phase classification + diagnostics collection
      # -----------------------------------------------------------------------
      # Classifies which phase failed so the Claude step gets the right
      # framing:
      #   baseline — upgrade baseline never converged (main is red, not PR)
      #   install  — fresh-mode HEAD up failed
      #   upgrade  — upgrade-mode HEAD applied but didn't reconcile cleanly
      #   none     — everything passed
      - name: Determine failed phase
        if: always()
        id: phase
        run: |
          bad() { [ "$1" = "failure" ] || [ "$1" = "cancelled" ]; }
          if bad "${{ steps.baseline_up.outcome }}" || bad "${{ steps.baseline_health.outcome }}"; then
            echo "phase=baseline" >> $GITHUB_OUTPUT
          elif bad "${{ steps.windsor_plan.outcome }}" || bad "${{ steps.windsor_up.outcome }}" || bad "${{ steps.gitrepo_bump.outcome }}" || bad "${{ steps.windsor_health.outcome }}"; then
            if [ "${{ matrix.mode }}" = "upgrade" ]; then
              echo "phase=upgrade" >> $GITHUB_OUTPUT
            else
              echo "phase=install" >> $GITHUB_OUTPUT
            fi
          else
            echo "phase=none" >> $GITHUB_OUTPUT
          fi

      - name: Collect Windsor State
        if: always() && steps.infra_diff.outputs.skip != 'true'
        run: |
          tar --exclude='.windsor/cache/docker' --exclude='.terraform' -czf support-bundles/windsor-state.tar.gz contexts/local .windsor

      - name: Collect Talos Diagnostics
        if: always() && steps.infra_diff.outputs.skip != 'true'
        run: |
          if ! command -v talosctl &> /dev/null; then
            echo "Installing talosctl..."
            cd "$(mktemp -d)" &&
            curl -fsSLO "https://github.com/siderolabs/talos/releases/latest/download/talosctl-linux-amd64" &&
            chmod +x talosctl-linux-amd64 &&
            sudo mv talosctl-linux-amd64 /usr/local/bin/talosctl &&
            cd - &&
            rm -rf "$OLDPWD"
          fi
          windsor exec -- .github/scripts/collect-talos-diagnostics.sh support-bundles/talos-diagnostics

      - name: Collect support bundle
        if: always() && steps.infra_diff.outputs.skip != 'true'
        run: |
          PHASE_TAG="${{ steps.phase.outputs.phase }}"
          support-bundle --interactive=false --output=support-bundles/bundle-${{ matrix.mode }}-${PHASE_TAG:-unknown}-${{ github.workflow }}-${{ github.run_id }}-${{ github.run_number }} .github/support-bundle.yaml

      - name: Upload support bundle
        if: always() && steps.infra_diff.outputs.skip != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: support-bundle-${{ matrix.mode }}
          path: support-bundles/
          retention-days: 30

      # -----------------------------------------------------------------------
      # Claude investigation (read-only, first-push-only)
      # -----------------------------------------------------------------------
      # Three steps: (1) a cheap bash orientation glance — what's red plus the
      # failed-test log tail, no tokens; (2) Claude investigates the LIVE
      # cluster interactively from that starting point until it finds root
      # cause; (3) a deterministic publish. Gated on the PR-open event so it
      # runs at most once per PR — a renovate rebase is a `synchronize` event
      # and is never eligible, and a breaking change rebased into many open
      # PRs cannot trigger a storm. `baseline` phase is excluded (main is red,
      # not this PR). No cluster mutation — strictly read-only tools.
      - name: Collect cluster glance
        id: seed
        if: always() && steps.phase.outputs.phase != 'none' && steps.phase.outputs.phase != 'baseline' && github.event_name == 'pull_request' && github.event.action == 'opened'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          SEED=/tmp/cluster-glance.txt
          {
            echo "# Failed CI step logs (tail)"
            gh run view "$RUN_ID" --repo "$GH_REPO" --log-failed 2>/dev/null \
              | tail -n 120 || echo "(no failed-step logs available)"
            echo
            echo "# Flux kustomizations"
            windsor exec -- kubectl get kustomizations -A 2>&1 || true
            echo
            echo "# Flux helmreleases"
            windsor exec -- kubectl get helmreleases -A 2>&1 || true
            echo
            echo "# Pods not Running/Succeeded"
            windsor exec -- kubectl get pods -A \
              --field-selector=status.phase!=Running,status.phase!=Succeeded 2>&1 || true
            echo
            echo "# Recent Warning events"
            windsor exec -- kubectl get events -A --field-selector type=Warning \
              --sort-by=.lastTimestamp 2>&1 | tail -n 30 || true
          } > "$SEED" 2>&1
          echo "Wrote $(wc -l < "$SEED") lines to $SEED"

      - name: Investigate failure with Claude
        if: always() && steps.seed.outcome == 'success' && steps.phase.outputs.phase != 'none' && steps.phase.outputs.phase != 'baseline' && github.event_name == 'pull_request' && github.event.action == 'opened'
        uses: anthropics/claude-code-action@fad22eb3fa582b7357fc0ea48af6645851b884fd # v1.0.161
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_ID: ${{ github.run_id }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          MODE: ${{ matrix.mode }}
          PHASE: ${{ steps.phase.outputs.phase }}
          DIAGNOSIS_MARKER: "<!-- claude-integration-${{ matrix.mode }}-diagnosis -->"
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_bots: "renovate"
          prompt: |
            The integration test just failed and the local Windsor cluster is
            STILL RUNNING on this runner — you can inspect it live. Investigate
            it directly and keep going until you have found the actual root
            cause, then write your diagnosis.

            ## Context — mode and phase

            MODE=`$MODE`:
              - `fresh`   — a single `windsor up` on this commit. Simulates
                            a new user bringing up the cluster.
              - `upgrade` — apply the `origin/main` baseline, then apply this
                            commit on top of the converged baseline. Simulates
                            an existing user upgrading.

            PHASE=`$PHASE`:
              - `install`  — fresh-mode `windsor up` failed.
              - `upgrade`  — upgrade-mode HEAD apply on top of a converged
                             baseline failed. This IS the signal upgrade tests
                             exist to catch: this PR breaks the upgrade path.

            ## How to investigate

            Start by reading the orientation glance: `cat
            /tmp/cluster-glance.txt`. It lists what's red (flux kustomizations,
            helmreleases, non-running pods, recent Warning events) and the
            failed-test log tail. It is only a starting point — not the answer.

            From there, investigate the live cluster yourself. All
            kubectl/talosctl commands MUST be prefixed with `windsor exec --`
            (bare kubectl gets connection-refused in this repo). Follow the
            failure down its causal chain until you can name the specific
            broken object and *why* it broke — e.g. a red Kustomization → the
            HelmRelease or objects it owns → the pods → their logs
            (`kubectl logs`, add `--previous` for crash-loopers) → the events →
            the source it reconciles from. Do not stop at the first symptom;
            distinguish the true root cause from downstream casualties. Prefer
            targeted, tailed output over dumping full YAML, and don't inspect
            healthy resources.

            Phase focus:
              - PHASE=install: which kustomization/HelmRelease/pod failed and
                why; whether it looks like a flake or a real regression in the
                changed code.
              - PHASE=upgrade: what differs between baseline and post-HEAD —
                new/changed CRDs, HelmReleases that couldn't reconcile, pods
                stuck during rollout, webhooks rejecting admission, schema
                incompatibility.

            This is READ-ONLY. Do NOT apply, delete, edit, restart, scale, or
            otherwise mutate the cluster — inspect only.

            ## Write early, refine as you go

            As soon as you have a working hypothesis, write `/tmp/diagnosis.md`
            in the format below, then keep updating it in place as you confirm
            or revise. If this step is cut short, whatever is in the file is
            what ships — so never leave it empty once you have any signal.

            ## Diagnosis format (write to /tmp/diagnosis.md)

              $DIAGNOSIS_MARKER
              > [!CAUTION]
              >
              > ## 🩺 Integration diagnosis — mode: `$MODE`, phase: `$PHASE`
              >
              > **Commit:** `<short SHA of COMMIT_SHA>` · **Run:** [#$RUN_ID]($RUN_URL)
              >
              > **Likely cause:** {one sentence}
              >
              > **Evidence:** {2-4 sentences citing the specific resource,
              > condition, and log snippet that points at the cause. Quote log
              > lines inline with backticks.}
              >
              > **Suggested next step:** {one actionable sentence}
              >
              > _Live read-only inspection by Claude. Support bundle attached
              > to the run artifacts._
              <!-- /claude-integration-$MODE-diagnosis -->

            The marker lines are required — a later CI step uses them to anchor
            the published comment. Your only output is `/tmp/diagnosis.md`; do
            NOT post comments, touch the step summary, or write anywhere else.
            A separate CI step publishes the result.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 50
            --allowedTools Read,Write,Bash(cat:*),Bash(windsor exec:*),Bash(tail:*),Bash(head:*),Bash(grep:*),Bash(jq:*)
            --disallowedTools WebSearch,WebFetch

      # Deterministic publish. Runs even if the Claude step errored or hit the
      # turn cap, so a cut-short investigation still ships whatever it wrote —
      # or a stub pointing at the run. Never charges tokens.
      - name: Publish diagnosis
        if: always() && steps.seed.outcome == 'success' && steps.phase.outputs.phase != 'none' && steps.phase.outputs.phase != 'baseline' && github.event_name == 'pull_request' && github.event.action == 'opened'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MODE: ${{ matrix.mode }}
          MARKER: "<!-- claude-integration-${{ matrix.mode }}-diagnosis -->"
          END_MARKER: "<!-- /claude-integration-${{ matrix.mode }}-diagnosis -->"
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          DIAG=/tmp/diagnosis.md
          if [ ! -s "$DIAG" ]; then
            printf '%s\n' \
              "$MARKER" \
              "> [!CAUTION]" \
              ">" \
              "> ## 🩺 Integration diagnosis — mode: \`$MODE\`" \
              ">" \
              "> Automated inspection did not complete. See the [run]($RUN_URL)" \
              "> and the uploaded support bundle for manual triage." \
              "$END_MARKER" > "$DIAG"
          fi
          mkdir -p support-bundles
          cp "$DIAG" "support-bundles/claude-$MODE-investigation.md" || true
          {
            echo "## Integration diagnosis — mode: $MODE"
            cat "$DIAG"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$PR_NUMBER" ]; then
            EXISTING_ID=$(gh api --paginate "repos/$GH_REPO/issues/$PR_NUMBER/comments" \
              --jq ".[] | select(.body | contains(\"$MARKER\")) | .id" | head -n1)
            if [ -n "$EXISTING_ID" ]; then
              gh api -X PATCH "repos/$GH_REPO/issues/comments/$EXISTING_ID" \
                --field body=@"$DIAG"
            else
              gh api -X POST "repos/$GH_REPO/issues/$PR_NUMBER/comments" \
                --field body=@"$DIAG"
            fi
          fi

      # -----------------------------------------------------------------------
      # Teardown
      # -----------------------------------------------------------------------
      - name: Windsor Down
        if: always()
        run: |
          windsor destroy --confirm local || true

          windsor down

  # ===========================================================================
  # Publish OCI Package
  # ===========================================================================
  # Gated on successful integration. Pushes the Windsor bundle to GHCR under
  # the current ref (tag name or "latest" on main).
  publish:
    name: Publish OCI Package
    runs-on: ubuntu-latest
    needs: integration
    if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main') && needs.integration.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          # renovate: datasource=github-releases depName=terraform package=hashicorp/terraform
          terraform_version: 1.12.2

      - name: Install Windsor CLI
        uses: windsorcli/action@main
        with:
          ref: main
          context: local

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to OCI Registry
        env:
          TAG: ${{ github.ref_name }}
        run: |
          windsor push oci://ghcr.io/windsorcli/core:${TAG}

      - name: Publish Latest Tag
        if: github.ref == 'refs/heads/main'
        env:
          TAG: latest
        run: |
          windsor push oci://ghcr.io/windsorcli/core:${TAG}
