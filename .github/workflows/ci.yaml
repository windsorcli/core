name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main

permissions:
  contents: write
  security-events: write
  checks: write
  packages: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

env:
  WINDSOR_PROJECT_ROOT: ${{ github.workspace }}
  DOCKER_HOST: unix:///var/run/docker.sock
  # renovate: datasource=github-releases depName=troubleshoot package=replicatedhq/troubleshoot
  SUPPORT_BUNDLE_VERSION: v0.125.1

jobs:
  code-checks:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # This module is not loaded by default and is required to run Kubernetes on Docker
      - name: Load br_netfilter kernel module
        run: |
          sudo modprobe br_netfilter
          echo "1" | sudo tee /proc/sys/net/bridge/bridge-nf-call-iptables
          echo "1" | sudo tee /proc/sys/net/bridge/bridge-nf-call-ip6tables

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      - name: Run yamllint
        run: |
          pip install yamllint
          yamllint .

      - name: Run shellcheck
        run: |
          sudo apt-get install -y shellcheck
          shell_files=$(find . -name "*.sh" -print)
          if [ -n "$shell_files" ]; then
            echo "$shell_files" | xargs shellcheck
          else
            echo "No shell scripts found to check"
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          # renovate: datasource=github-releases depName=terraform package=hashicorp/terraform
          terraform_version: 1.14.8

      - name: Run terraform fmt
        run: terraform fmt -check -recursive

      - name: Install Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2
        with:
          version: 3.x

      - name: Validate vendored assets
        run: |
          # Regenerate vendored files from source.yaml definitions and validate
          task dashboards

          # Check if any files changed or new files created
          if ! git diff --quiet || [ -n "$(git status --porcelain)" ]; then
            echo "::error::Vendored files are out of sync with source.yaml"
            echo ""
            echo "Changed/untracked files:"
            git status --short
            echo ""
            echo "Run 'task dashboards' locally and commit the changes."
            exit 1
          fi

      - name: Checkov GitHub Action
        uses: bridgecrewio/checkov-action@68260132005eaae0e6f84c7a73cc3b1532f678bf # v12.3058.0
        with:
          directory: ./terraform
          output_format: cli,sarif
          output_file_path: console,results.sarif

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: results.sarif

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          # renovate: datasource=github-releases depName=terraform package=hashicorp/terraform
          terraform_version: 1.14.8

      - name: Install Windsor CLI
        uses: windsorcli/action@a829ee3c5d9826fd0b31d5e730edcd515644d866 # v0.5.1
        with:
          ref: main
          context: local

      - name: Install Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2
        with:
          version: 3.x

      - name: Run Tests
        run: task test

  integration:
    name: Integration (${{ matrix.mode }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        mode: [fresh, upgrade]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: ${{ matrix.mode == 'upgrade' && 0 || 1 }}

      - name: Load br_netfilter kernel module
        run: |
          sudo modprobe br_netfilter
          echo "1" | sudo tee /proc/sys/net/bridge/bridge-nf-call-iptables
          echo "1" | sudo tee /proc/sys/net/bridge/bridge-nf-call-ip6tables

      - name: Configure Docker for increased storage
        run: |
          # Move Docker's data root to /mnt which has 66GB available (vs ~10GB on default location)
          # This increases Docker's storage capacity from ~10GB to ~66GB
          sudo mkdir -p /mnt/docker-data
          sudo mkdir -p /etc/docker
          # Configure Docker to use /mnt for data storage and limit log growth
          echo '{
            "data-root": "/mnt/docker-data",
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "3"
            }
          }' | sudo tee /etc/docker/daemon.json
          # Restart Docker to apply new data-root configuration
          sudo systemctl restart docker || sudo service docker restart || true
          # Wait for Docker to be ready
          timeout 30 bash -c 'until docker info > /dev/null 2>&1; do sleep 1; done' || true
          # Verify Docker is using the new data-root
          docker info | grep "Docker Root Dir" || true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          # renovate: datasource=github-releases depName=terraform package=hashicorp/terraform
          terraform_version: 1.14.8

      - name: Setup kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0
        with:
          # renovate: datasource=github-releases depName=kubectl package=kubernetes/kubectl
          version: v1.34.1

      - name: Install support-bundle CLI
        run: |
          cd "$(mktemp -d)" &&
          curl -fsSLO "https://github.com/replicatedhq/troubleshoot/releases/download/${SUPPORT_BUNDLE_VERSION}/support-bundle_linux_amd64.tar.gz" &&
          tar xzf support-bundle_linux_amd64.tar.gz &&
          sudo install -m 0755 -o root -g root support-bundle /usr/local/bin/ &&
          cd - &&
          rm -rf "$OLDPWD" &&
          support-bundle version

      - name: Create bundle directory
        run: mkdir -p support-bundles

      - name: Install Windsor CLI
        uses: windsorcli/action@a829ee3c5d9826fd0b31d5e730edcd515644d866 # v0.5.1
        with:
          ref: main
          context: local

      - name: Create docker cache directory
        run: mkdir -p .windsor/cache/docker

      - name: Cache docker cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .windsor/cache/docker
          key: docker-cache-${{ runner.os }}-${{ matrix.mode }}-${{ github.sha }}
          restore-keys: |
            docker-cache-${{ runner.os }}-${{ matrix.mode }}-
            docker-cache-${{ runner.os }}-

      # ========== Upgrade-mode baseline phase ==========
      # Baseline = origin/main on PR events (simulates "existing user pulls this PR")
      # Baseline = HEAD~1 on push events (simulates post-merge upgrade from previous main)
      - name: Checkout baseline
        if: matrix.mode == 'upgrade'
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin main
            git checkout origin/main
          else
            git checkout HEAD~1
          fi

      - name: Baseline — Windsor Init
        if: matrix.mode == 'upgrade'
        run: windsor init local --reset

      - name: Baseline — Show blueprint
        if: matrix.mode == 'upgrade'
        run: windsor show blueprint

      - name: Baseline — Windsor Up
        id: baseline_up
        if: matrix.mode == 'upgrade'
        timeout-minutes: 18
        run: windsor up --verbose --wait

      - name: Baseline — Health check
        id: baseline_health
        if: matrix.mode == 'upgrade'
        run: |
          windsor exec -- kubectl wait --for=condition=Ready --timeout=300s \
            kustomizations --all -A || {
            echo "Baseline: not-ready resources:";
            windsor exec -- kubectl get kustomizations,helmreleases -A;
            exit 1;
          }
          windsor exec -- kubectl wait --for=condition=Ready --timeout=300s \
            helmreleases --all -A || {
            echo "Baseline: not-ready resources:";
            windsor exec -- kubectl get kustomizations,helmreleases -A;
            exit 1;
          }

      - name: Checkout HEAD
        if: matrix.mode == 'upgrade'
        run: git checkout ${{ github.sha }}

      - name: HEAD — Windsor Plan
        if: matrix.mode == 'upgrade'
        run: windsor plan

      # ========== Fresh-mode init (fresh only) ==========
      - name: Windsor Init
        if: matrix.mode == 'fresh'
        run: windsor init local --reset

      - name: Show blueprint
        if: matrix.mode == 'fresh'
        run: windsor show blueprint

      # ========== Apply HEAD (both modes) ==========
      # Fresh mode: this is the only up.
      # Upgrade mode: this is phase 2, applied on top of converged baseline without reinit.
      - name: Windsor Up
        id: windsor_up
        timeout-minutes: 18
        run: windsor up --verbose --wait

      - name: Health check
        id: windsor_health
        run: |
          windsor exec -- kubectl wait --for=condition=Ready --timeout=300s \
            kustomizations --all -A || {
            echo "HEAD: not-ready resources:";
            windsor exec -- kubectl get kustomizations,helmreleases -A;
            exit 1;
          }
          windsor exec -- kubectl wait --for=condition=Ready --timeout=300s \
            helmreleases --all -A || {
            echo "HEAD: not-ready resources:";
            windsor exec -- kubectl get kustomizations,helmreleases -A;
            exit 1;
          }

      - name: Determine failed phase
        if: always()
        id: phase
        run: |
          bad() { [ "$1" = "failure" ] || [ "$1" = "cancelled" ]; }
          if bad "${{ steps.baseline_up.outcome }}" || bad "${{ steps.baseline_health.outcome }}"; then
            echo "phase=baseline" >> $GITHUB_OUTPUT
          elif bad "${{ steps.windsor_up.outcome }}" || bad "${{ steps.windsor_health.outcome }}"; then
            if [ "${{ matrix.mode }}" = "upgrade" ]; then
              echo "phase=upgrade" >> $GITHUB_OUTPUT
            else
              echo "phase=install" >> $GITHUB_OUTPUT
            fi
          else
            echo "phase=none" >> $GITHUB_OUTPUT
          fi

      - name: Collect Windsor State
        if: always()
        run: |
          tar --exclude='.windsor/cache/docker' --exclude='.terraform' -czf support-bundles/windsor-state.tar.gz contexts/local .windsor

      - name: Collect Talos Diagnostics
        if: always()
        run: |
          # Install talosctl if not available
          if ! command -v talosctl &> /dev/null; then
            echo "Installing talosctl..."
            cd "$(mktemp -d)" &&
            curl -fsSLO "https://github.com/siderolabs/talos/releases/latest/download/talosctl-linux-amd64" &&
            chmod +x talosctl-linux-amd64 &&
            sudo mv talosctl-linux-amd64 /usr/local/bin/talosctl &&
            cd - &&
            rm -rf "$OLDPWD"
          fi

          # Run talos diagnostics collection within Windsor environment
          windsor exec -- .github/scripts/collect-talos-diagnostics.sh support-bundles/talos-diagnostics

      - name: Collect support bundle
        if: always()
        run: |
          PHASE_TAG="${{ steps.phase.outputs.phase }}"
          support-bundle --interactive=false --output=support-bundles/bundle-${{ matrix.mode }}-${PHASE_TAG:-unknown}-${{ github.workflow }}-${{ github.run_id }}-${{ github.run_number }} .github/support-bundle.yaml

      - name: Upload support bundle
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: support-bundle-${{ matrix.mode }}
          path: support-bundles/
          retention-days: 30

      - name: Investigate failure with Claude
        if: always() && steps.phase.outputs.phase != 'none'
        uses: anthropics/claude-code-action@38ec876110f9fbf8b950c79f534430740c3ac009 # v1.0.101
        env:
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_ID: ${{ github.run_id }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          MODE: ${{ matrix.mode }}
          PHASE: ${{ steps.phase.outputs.phase }}
          DIAGNOSIS_MARKER: "<!-- claude-integration-${{ matrix.mode }}-diagnosis -->"
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_bots: "renovate"
          prompt: |
            The integration test just failed. The local Windsor cluster
            is still running on this runner and has NOT been torn down.
            Inspect it, cross-reference the CI run's logs, and publish a
            short root-cause diagnosis.

            ## Context — mode and phase

            MODE=`$MODE`:
              - `fresh`   — a single `windsor up` on this commit. Simulates
                            a new user bringing up the cluster.
              - `upgrade` — apply a baseline (`origin/main` on PR events,
                            `HEAD~1` on push events), then apply this
                            commit on top of the converged baseline.
                            Simulates an existing user upgrading.

            PHASE=`$PHASE`:
              - `install`  — fresh-mode `windsor up` failed.
              - `baseline` — upgrade-mode baseline did not come up. Main
                             (or HEAD~1) is red — NOT caused by this PR's
                             changes. Triage should go to whoever broke
                             the baseline.
              - `upgrade`  — upgrade-mode HEAD apply on top of a converged
                             baseline failed. This IS the signal upgrade
                             tests exist to catch: this PR breaks the
                             upgrade path.

            ## Step 1 — Read the CI run's failure logs

            Pull the failed step logs for this run so the diagnosis is
            anchored to what CI actually saw, not just cluster state:

              # Identify failed jobs and steps in the current run.
              gh run view "$RUN_ID" --repo "$GH_REPO" --json jobs \
                --jq '.jobs[] | select(.conclusion=="failure") |
                  {name, html_url,
                   failed_steps: [.steps[] | select(.conclusion=="failure") | .name]}' \
                > /tmp/failed-jobs.json
              cat /tmp/failed-jobs.json

              # Fetch the failed-step log slices.
              gh run view "$RUN_ID" --repo "$GH_REPO" --log-failed \
                > /tmp/failed.log 2>&1 || true
              tail -n 400 /tmp/failed.log

            Treat the log tail as ground truth for *what* failed. Use the
            live cluster to explain *why*.

            ## Step 2 — Inspect the cluster

            Use the `inspect-cluster` skill. All kubectl/talosctl/windsor
            commands must be prefixed with `windsor exec --` so they run
            inside the Windsor environment (bare kubectl will get
            connection refused in this repo).

            Focus the inspection on the failed phase:
              - PHASE=install: which kustomization/HelmRelease/pod failed
                and why (events, logs, conditions). Whether it's a flake
                or a real regression in the changed code.
              - PHASE=baseline: whether the baseline itself is healthy now
                — this is orthogonal to the PR. Suggested next step is
                almost always "triage main, not this PR."
              - PHASE=upgrade: what changed between baseline and post-HEAD
                state — new/changed CRDs, HelmReleases that couldn't
                reconcile, pods stuck during rollout, webhooks rejecting
                admission, stale context or schema incompatibility.

            Do NOT attempt to fix the cluster, restart pods, or mutate
            state — read-only inspection only.

            ## Write the diagnosis

            Compose the report body at `/tmp/diagnosis.md` using this
            exact shape (distinctive so humans can spot it at a glance —
            do not deviate from the header, emoji, or sectioning):

              $DIAGNOSIS_MARKER
              > [!CAUTION]
              >
              > ## 🩺 Integration diagnosis — mode: `$MODE`, phase: `$PHASE`
              >
              > **Commit:** `<short SHA of COMMIT_SHA>` · **Run:** [#$RUN_ID]($RUN_URL)
              >
              > **Likely cause:** {one sentence}
              >
              > **Evidence:** {2-4 sentences citing the specific resource,
              > condition, and log snippet that points at the cause.
              > Quote log lines inline with backticks.}
              >
              > **Suggested next step:** {one sentence, actionable.
              > PHASE=baseline ⇒ "triage main, not this PR."
              > PHASE=install or upgrade ⇒ actionable on this PR.}
              >
              > _Live read-only inspection by Claude. Support bundle
              > attached to the run artifacts._
              <!-- /claude-integration-$MODE-diagnosis -->

            The `$DIAGNOSIS_MARKER` and closing
            `<!-- /claude-integration-$MODE-diagnosis -->` lines are
            required — they let future runs find and update this comment
            in place.

            Also save a copy to
            `support-bundles/claude-$MODE-investigation.md` (so it rides
            along in the uploaded artifact) and append the body to
            `$GITHUB_STEP_SUMMARY` (so it shows on the Actions run page).

            ## Publish as a PR comment (upsert)

            If `$PR_NUMBER` is non-empty, upsert the diagnosis as a PR
            conversation comment — find-then-patch-or-create:

              if [ -n "$PR_NUMBER" ]; then
                EXISTING_ID=$(gh api --paginate "repos/$GH_REPO/issues/$PR_NUMBER/comments" \
                  --jq ".[] | select(.body | contains(\"$DIAGNOSIS_MARKER\")) | .id" \
                  | head -n1)
                if [ -n "$EXISTING_ID" ]; then
                  gh api -X PATCH "repos/$GH_REPO/issues/comments/$EXISTING_ID" \
                    --field body=@/tmp/diagnosis.md
                else
                  gh api -X POST "repos/$GH_REPO/issues/$PR_NUMBER/comments" \
                    --field body=@/tmp/diagnosis.md
                fi
              fi

            On push-to-main runs (`$PR_NUMBER` empty), skip the comment
            step — the step summary and artifact are enough.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 80
            --allowedTools Read,Grep,Glob,Write,Bash(windsor exec:*),Bash(windsor show:*),Bash(windsor context:*),Bash(gh api:*),Bash(gh run view:*),Bash(gh run list:*),Bash(jq:*),Bash(cat:*),Bash(tee:*),Bash(ls:*),Bash(head:*),Bash(tail:*),Bash(grep:*)
            --disallowedTools WebSearch,WebFetch

      - name: Windsor Down
        if: always()
        run: |
          windsor destroy --confirm local || true

          windsor down

  publish:
    name: Publish OCI Package
    runs-on: ubuntu-latest
    needs: integration
    if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main') && needs.integration.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          # renovate: datasource=github-releases depName=terraform package=hashicorp/terraform
          terraform_version: 1.14.8

      - name: Install Windsor CLI
        uses: windsorcli/action@a829ee3c5d9826fd0b31d5e730edcd515644d866 # v0.5.1
        with:
          ref: main
          context: local

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to OCI Registry
        env:
          TAG: ${{ github.ref_name }}
        run: |
          windsor push oci://ghcr.io/windsorcli/core:${TAG}

      - name: Publish Latest Tag
        if: github.ref == 'refs/heads/main'
        env:
          TAG: latest
        run: |
          windsor push oci://ghcr.io/windsorcli/core:${TAG}
