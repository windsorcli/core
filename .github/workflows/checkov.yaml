name: Checkov Scan

on:
  push:
    branches:
      - main
      - checkov
  pull_request:
    branches:
      - main

jobs:
  checkov:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov
        run: checkov -d ./terraform --framework terraform -o csv --output-file checkov_results.csv
        
      - name: Report
        run: cat checkov_results.csv
